    // ============================================================
    // Manager screen (Chat / Artifacts / Memory)
    // ============================================================
    function ensureMessageIds() {
      TMS_DATA.manager.messages.forEach((m, i) => { if (!m._id) m._id = 'msg' + i; });
    }

    function scheduleTranscription(m) {
      if (!m.transcribing || m._transcribeScheduled) return;
      m._transcribeScheduled = true;
      setTimeout(() => {
        m.transcribing = false;
        m.transcript = '(Demo) Transkription abgeschlossen';
        const screen = document.querySelector('[data-screen="manager"]');
        if (screen && !screen.hidden) renderManagerChat();
      }, 2500);
    }

    function renderChatMessageHtml(m) {
      if (m.type === 'voice') {
        const bars = Array.from({ length: 18 }, (_, i) => `<span style="height:${6 + ((i * 37) % 14)}px"></span>`).join('');
        let inner = '';
        if (m.transcribing) {
          inner = `<div class="voice-transcribing">Transkribiere… <span class="dots"><span>●</span><span>●</span><span>●</span></span></div>`;
        } else if (m.transcript) {
          inner = `<div class="voice-transcript">${escapeHtml(m.transcript)}</div>`;
        }
        return `
          <div class="chat-bubble-row" data-from="${m.from}">
            <div class="chat-bubble">
              <div class="voice-pill" data-act="play">
                <span class="voice-pill__play">▶</span>
                <span class="voice-pill__wave">${bars}</span>
                <span class="voice-pill__dur">0:${String(m.duration).padStart(2, '0')}</span>
              </div>
              ${inner}
              <span class="chat-bubble__time">${escapeHtml(m.time)}</span>
            </div>
          </div>`;
      }
      return `
        <div class="chat-bubble-row" data-from="${m.from}">
          <div class="chat-bubble">${escapeHtml(m.text)}<span class="chat-bubble__time">${escapeHtml(m.time)}</span></div>
        </div>`;
    }

    function renderManagerChat() {
      const host = document.getElementById('managerChat');
      host.innerHTML = TMS_DATA.manager.messages.map(renderChatMessageHtml).join('');
      host.scrollTop = host.scrollHeight;
      wireManagerChatInteractions();
      // Arm transcription timers only while the Manager screen is visible, so the
      // seed message's "Transkribiere… → transcript" demo moment plays on first
      // entry to the screen (via SCREEN_HOOKS.manager) instead of expiring at page init.
      const screen = document.querySelector('[data-screen="manager"]');
      if (screen && !screen.hidden) TMS_DATA.manager.messages.forEach(scheduleTranscription);
    }

    function wireManagerChatInteractions() {
      document.querySelectorAll('#managerChat .voice-pill').forEach(pill => {
        pill.addEventListener('click', () => {
          const playing = pill.classList.toggle('is-playing');
          const playBtn = pill.querySelector('.voice-pill__play');
          if (playing) {
            playBtn.textContent = '❚❚';
            const durText = pill.querySelector('.voice-pill__dur').textContent;
            const secs = parseInt(durText.split(':')[1], 10) || 5;
            setTimeout(() => { pill.classList.remove('is-playing'); playBtn.textContent = '▶'; }, Math.min(secs, 6) * 1000);
          } else {
            playBtn.textContent = '▶';
          }
        });
      });
    }

    function renderManagerArtifacts() {
      const host = document.getElementById('managerArtifacts');
      host.innerHTML = TMS_DATA.manager.artifacts.map(a => `
        <div class="note-card">
          <div class="note-card__title">${escapeHtml(a.title)}</div>
          <div class="artifact-card__meta">${escapeHtml(a.kind)} · ${escapeHtml(a.time)}</div>
        </div>`).join('');
    }

    function renderManagerMemory() {
      const host = document.getElementById('managerMemory');
      host.innerHTML = TMS_DATA.manager.memory.map(m => `
        <div class="memory-row"><span>${escapeHtml(m.text)}</span><span class="memory-row__time">${escapeHtml(m.time)}</span></div>`).join('');
    }

    function wireManagerTabs() {
      document.getElementById('managerTabs').addEventListener('click', e => {
        const btn = e.target.closest('button[data-tab]');
        if (!btn) return;
        const tab = btn.dataset.tab;
        state.managerTab = tab;
        document.querySelectorAll('#managerTabs button').forEach(b => b.classList.toggle('active', b === btn));
        document.getElementById('managerChat').hidden = tab !== 'chat';
        document.getElementById('managerInputRow').hidden = tab !== 'chat';
        document.getElementById('managerArtifacts').hidden = tab !== 'artifacts';
        document.getElementById('managerMemory').hidden = tab !== 'memory';
      });
    }

    function wireManagerInput() {
      const micBtn = document.getElementById('managerMicBtn');
      micBtn.addEventListener('click', () => {
        if (micBtn.classList.contains('is-recording')) return;
        micBtn.classList.add('is-recording');
        setTimeout(() => {
          micBtn.classList.remove('is-recording');
          const now = new Date();
          const time = `${String(now.getHours()).padStart(2, '0')}:${String(now.getMinutes()).padStart(2, '0')}`;
          const msg = { type: 'voice', from: 'user', time, duration: 8, transcript: null, transcribing: true, _id: 'msg' + TMS_DATA.manager.messages.length };
          TMS_DATA.manager.messages.push(msg);
          renderManagerChat();
        }, 2000);
      });
      document.getElementById('managerTextInput').addEventListener('keydown', e => {
        if (e.key !== 'Enter') return;
        const input = e.target;
        const text = input.value.trim();
        if (!text) return;
        const now = new Date();
        const time = `${String(now.getHours()).padStart(2, '0')}:${String(now.getMinutes()).padStart(2, '0')}`;
        TMS_DATA.manager.messages.push({ type: 'text', from: 'user', time, text, _id: 'msg' + TMS_DATA.manager.messages.length });
        input.value = '';
        renderManagerChat();
      });
    }

    SCREEN_HOOKS.manager = renderManagerChat;

    // ============================================================
    // Cloud screen (Vercel + Render): folders/favorites, Env/Logs/Deploys
    // ============================================================
    const CLOUD_GLYPH = { vercel: '▲', render: 'R' };
    const FAV_KEY = 'tms-mission-control-cloud-favorites';
    function loadFavorites() {
      try {
        const raw = localStorage.getItem(FAV_KEY);
        if (!raw) return;
        const map = JSON.parse(raw);
        TMS_DATA.cloudProjects.forEach(p => { if (Object.prototype.hasOwnProperty.call(map, p.id)) p.favorite = !!map[p.id]; });
      } catch (e) { /* corrupt/unavailable storage: keep seed favorites */ }
    }
    function saveFavorites() {
      const map = {};
      TMS_DATA.cloudProjects.forEach(p => { map[p.id] = p.favorite; });
      try { localStorage.setItem(FAV_KEY, JSON.stringify(map)); } catch (e) { /* storage unavailable */ }
    }

    function cloudFilteredProjects() {
      return TMS_DATA.cloudProjects.filter(p => state.cloudProviderFilter === 'all' || p.provider === state.cloudProviderFilter);
    }

    function cloudRowHtml(p) {
      return `
        <button class="cloud-row" data-project="${p.id}">
          <span class="provider-glyph">${CLOUD_GLYPH[p.provider] || '?'}</span>
          <span class="cloud-row__main">
            <span class="cloud-row__name">${escapeHtml(p.name)}</span>
            <span class="cloud-row__meta">
              <span class="status-chip" data-status="${p.status}"><span class="status-chip__dot"></span>${escapeHtml(p.status)}</span>
              <span class="cloud-row__deploy">${escapeHtml(p.lastDeploy)}</span>
            </span>
          </span>
          <span class="fav-btn${p.favorite ? ' is-fav' : ''}" data-fav="${p.id}">★</span>
        </button>`;
    }

    function renderCloudGroups() {
      const host = document.getElementById('cloudGroups');
      const list = cloudFilteredProjects();
      document.getElementById('cloudCount').textContent = String(list.length);
      if (state.cloudView === 'list') {
        const sorted = [...list].sort((a, b) => (b.favorite - a.favorite));
        host.innerHTML = `<div class="folder-group__rows">${sorted.map(cloudRowHtml).join('')}</div>`;
        return;
      }
      const folders = {};
      list.forEach(p => { (folders[p.folder] = folders[p.folder] || []).push(p); });
      const folderNames = Object.keys(folders).sort();
      host.innerHTML = folderNames.map(name => {
        const rows = [...folders[name]].sort((a, b) => (b.favorite - a.favorite));
        return `
          <div class="folder-group" data-folder="${escapeHtml(name)}">
            <div class="folder-group__head">
              <span class="folder-group__name">${escapeHtml(name)}</span>
              <span class="folder-group__count">${rows.length}</span>
            </div>
            <div class="folder-group__rows">${rows.map(cloudRowHtml).join('')}</div>
          </div>`;
      }).join('');
    }

    function wireCloudToolbar() {
      document.getElementById('cloudProviderFilter').addEventListener('click', e => {
        const btn = e.target.closest('button[data-provider]');
        if (!btn) return;
        state.cloudProviderFilter = btn.dataset.provider;
        document.querySelectorAll('#cloudProviderFilter button').forEach(b => b.classList.toggle('active', b === btn));
        renderCloudGroups();
      });
      document.getElementById('cloudViewToggle').addEventListener('click', e => {
        const btn = e.target.closest('button[data-view]');
        if (!btn) return;
        state.cloudView = btn.dataset.view;
        document.querySelectorAll('#cloudViewToggle button').forEach(b => b.classList.toggle('active', b === btn));
        renderCloudGroups();
      });
      document.getElementById('cloudGroups').addEventListener('click', e => {
        const favBtn = e.target.closest('[data-fav]');
        if (favBtn) {
          const p = TMS_DATA.cloudProjects.find(x => x.id === favBtn.dataset.fav);
          if (p) { p.favorite = !p.favorite; saveFavorites(); renderCloudGroups(); renderCloudZone(); }
          return;
        }
        const folderHead = e.target.closest('.folder-group__head');
        if (folderHead) { folderHead.closest('.folder-group').classList.toggle('is-collapsed'); return; }
        const row = e.target.closest('.cloud-row');
        if (row) openCloudDetail(row.dataset.project, 'env');
      });
    }

    function stopCloudBuildTimer() {
      if (state.cloudBuildTimer) { clearInterval(state.cloudBuildTimer); state.cloudBuildTimer = null; }
    }

    function showCloudList() {
      stopCloudBuildTimer();
      state.cloudDetailId = null;
      document.getElementById('cloudDetail').hidden = true;
      document.getElementById('cloudDetail').innerHTML = '';
      document.getElementById('cloudListView').hidden = false;
    }

    function openCloudDetail(id, tab) {
      const project = TMS_DATA.cloudProjects.find(p => p.id === id);
      if (!project) return;
      show('cloud');
      state.cloudDetailId = id;
      state.cloudDetailTab = tab || 'env';
      document.getElementById('cloudListView').hidden = true;
      document.getElementById('cloudDetail').hidden = false;
      renderCloudDetail();
    }

    function renderCloudDetail() {
      const project = TMS_DATA.cloudProjects.find(p => p.id === state.cloudDetailId);
      const detail = document.getElementById('cloudDetail');
      if (!project) return;
      detail.innerHTML = `
        <div class="cloud-detail__head">
          <span class="back-chip" id="cloudBackBtn">&larr; Liste</span>
          <span class="cloud-detail__title">${escapeHtml(project.name)}</span>
        </div>
        <div class="subtabs" id="cloudDetailTabs">
          <button data-tab="env" class="${state.cloudDetailTab === 'env' ? 'active' : ''}">Env</button>
          <button data-tab="logs" class="${state.cloudDetailTab === 'logs' ? 'active' : ''}">Logs</button>
          <button data-tab="deploys" class="${state.cloudDetailTab === 'deploys' ? 'active' : ''}">Deploys</button>
        </div>
        <div class="cloud-detail__body" id="cloudDetailBody"></div>
      `;
      document.getElementById('cloudBackBtn').addEventListener('click', showCloudList);
      document.getElementById('cloudDetailTabs').addEventListener('click', e => {
        const btn = e.target.closest('button[data-tab]');
        if (!btn) return;
        stopCloudBuildTimer();
        state.cloudDetailTab = btn.dataset.tab;
        renderCloudDetail();
      });
      renderCloudDetailBody(project);
    }

    function renderCloudDetailBody(project) {
      const host = document.getElementById('cloudDetailBody');
      if (state.cloudDetailTab === 'env') renderEnvTab(host, project);
      else if (state.cloudDetailTab === 'logs') renderLogsTab(host, project);
      else renderDeploysTab(host, project);
    }

    function renderEnvTab(host, project) {
      host.innerHTML = project.env.map((e, i) => `
        <div class="env-row" data-idx="${i}">
          <span class="env-row__key">${escapeHtml(e.key)}</span>
          <span class="env-row__value" data-act="reveal">${'•'.repeat(10)}</span>
          <div class="env-row__actions">
            <button data-act="copy">Kopieren</button>
            <button data-act="edit">Bearbeiten</button>
          </div>
        </div>`).join('');
      host.querySelectorAll('.env-row').forEach(row => {
        const idx = Number(row.dataset.idx);
        const entry = project.env[idx];
        const valueEl = row.querySelector('[data-act="reveal"]');
        let revealed = false;
        valueEl.addEventListener('click', () => {
          revealed = !revealed;
          valueEl.textContent = revealed ? entry.value : '•'.repeat(10);
        });
        row.querySelector('[data-act="copy"]').addEventListener('click', () => {
          copyText(entry.value);
          toast('Kopiert ✓');
        });
        row.querySelector('[data-act="edit"]').addEventListener('click', () => {
          if (row.querySelector('.env-row__edit')) return;
          const editRow = document.createElement('div');
          editRow.className = 'env-row__edit';
          editRow.innerHTML = `<input type="text" value="${escapeHtml(entry.value)}"><button class="btn-secondary" data-act="save">Speichern</button>`;
          row.appendChild(editRow);
          editRow.querySelector('input').focus();
          editRow.querySelector('[data-act="save"]').addEventListener('click', () => {
            entry.value = editRow.querySelector('input').value;
            valueEl.textContent = revealed ? entry.value : '•'.repeat(10);
            editRow.remove();
            toast('Gespeichert — Redeploy nötig');
          });
        });
      });
    }

    function cloudLogCardId(project) { return `cloud-${project.id}`; }

    function renderLogsTab(host, project) {
      const cardId = cloudLogCardId(project);
      if (!cardState[cardId]) cardState[cardId] = { lines: project.logs.slice(), selectionMode: false, selection: null };
      else {
        // The DOM below (Selektieren button + .ws-term-pre classes) is rebuilt fresh,
        // so reset selection state to match — otherwise flag and UI desync after
        // a Logs → other tab → Logs round-trip and the first toggle tap is a no-op.
        cardState[cardId].lines = project.logs.slice();
        cardState[cardId].selectionMode = false;
        cardState[cardId].selection = null;
      }
      host.innerHTML = `
        <div class="log-viewer">
          <div class="log-viewer__tools">
            <input type="text" class="log-viewer__search" id="cloudLogSearch" placeholder="Logs durchsuchen…" autocomplete="off">
            <button class="btn-secondary" id="cloudLogSelectBtn">Selektieren</button>
            <button class="btn-secondary" id="cloudLogCopyBtn">Kopieren</button>
          </div>
          <div class="ws-term-pre log-viewer__pre" data-card-id="${cardId}"></div>
        </div>`;
      const pre = host.querySelector('.ws-term-pre');
      renderCardLines(pre, cardId);
      document.getElementById('cloudLogSearch').addEventListener('input', e => {
        const q = e.target.value.toLowerCase();
        cardState[cardId].lines = q ? project.logs.filter(l => l.toLowerCase().includes(q)) : project.logs.slice();
        renderCardLines(pre, cardId);
      });
      document.getElementById('cloudLogSelectBtn').addEventListener('click', () => {
        const cs = cardState[cardId];
        cs.selectionMode = !cs.selectionMode;
        document.getElementById('cloudLogSelectBtn').classList.toggle('is-on', cs.selectionMode);
        pre.classList.toggle('selection-mode', cs.selectionMode);
        if (!cs.selectionMode) clearSelection(cardId);
      });
      document.getElementById('cloudLogCopyBtn').addEventListener('click', () => {
        copyText(cardState[cardId].lines.join('\n'));
        toast('Log kopiert ✓');
      });
      stopCloudBuildTimer();
      if (project.status === 'building') {
        let n = 0;
        state.cloudBuildTimer = setInterval(() => {
          n++;
          const time = new Date().toTimeString().slice(0, 5);
          const line = `${time} BUILD Verarbeite Modul ${n}…`;
          project.logs.push(line);
          const searchInput = document.getElementById('cloudLogSearch');
          if (searchInput && !searchInput.value) {
            cardState[cardId].lines.push(line);
            renderCardLines(pre, cardId);
          }
        }, 2000);
      }
    }

    function renderDeploysTab(host, project) {
      const deploys = [
        { version: 'v12', time: project.lastDeploy, status: project.status === 'building' ? 'building' : 'ready' },
        { version: 'v11', time: 'vor 2 Tagen', status: 'ready' },
        { version: 'v10', time: 'vor 5 Tagen', status: project.status === 'suspended' ? 'suspended' : 'ready' },
      ];
      host.innerHTML = deploys.map(d => `
        <div class="deploy-row">
          <span class="deploy-row__version">${d.version}</span>
          <span class="deploy-row__time">${escapeHtml(d.time)}</span>
          <span class="status-chip" data-status="${d.status}"><span class="status-chip__dot"></span>${escapeHtml(d.status)}</span>
        </div>`).join('');
    }

          </div>
          <div class="settings-row is-tap" id="lockNowRow">
            <span class="settings-row__label">App sperren</span>
            <span class="settings-row__value">›</span>
          </div>
        </div>
        <div class="settings-group">
          <div class="settings-group__title">Benachrichtigungen</div>
          <div class="settings-row">
            <span class="settings-row__label">Push-Benachrichtigungen</span>
            ${switchHtml('pushNotif', state.pushNotif)}
          </div>
          <div class="settings-row">
            <span class="settings-row__label">Adhan-Erinnerung</span>
            ${switchHtml('adhanNotif', state.adhanNotif)}
          </div>
          <div class="settings-row is-tap" id="prayerRow">
            <span class="settings-row__label">Gebetszeiten<small>Heutige Zeiten ansehen</small></span>
            <span class="settings-row__value">›</span>
          </div>
        </div>
        <div class="settings-group">
          <div class="settings-group__title">Terminal</div>
          <div class="settings-row settings-row--stack">
            <span class="settings-row__label">Schriftgröße<small id="fontSizeValue">${state.fontSize}px</small></span>
            <div class="ws-term-pre font-preview" id="fontSizePreview">$ echo "TMS Terminal"</div>
            <input type="range" class="settings-slider" id="fontSizeSlider" min="11" max="18" value="${state.fontSize}">
          </div>
        </div>
        <div class="settings-group">
          <div class="settings-group__title">Über</div>
          <div class="settings-row">
            <span class="settings-row__label">Version</span>
            <span class="settings-row__value">v${escapeHtml(TMS_DATA.update.current)}</span>
          </div>
          <div class="settings-row is-tap" id="updateHintRow">
            <span class="settings-row__label">Update verfügbar<small>v${escapeHtml(TMS_DATA.update.latest)} — ${escapeHtml(TMS_DATA.update.notes)}</small></span>
            <span class="settings-row__value">›</span>
          </div>
        </div>
      `;
      wireSettingsInteractions();
    }

    function togglePinEditor() {
      const editHost = document.getElementById('pinEditHost');
      if (editHost.innerHTML) { editHost.innerHTML = ''; return; }
      editHost.innerHTML = `
        <div class="settings-pin-edit">
          <input type="text" inputmode="numeric" maxlength="4" id="newPinInput" placeholder="Neue 4-stellige PIN">
          <button class="btn-secondary" id="savePinBtn">Speichern</button>
        </div>`;
      document.getElementById('savePinBtn').addEventListener('click', () => {
        const val = document.getElementById('newPinInput').value.trim();
        if (!/^\d{4}$/.test(val)) { toast('PIN muss 4 Ziffern haben'); return; }
        state.pin = val;
        editHost.innerHTML = '';
        toast('PIN geändert ✓');
      });
    }

    function wireSettingsInteractions() {
      document.querySelectorAll('#settingsBody [data-switch]').forEach(inp => {
        inp.addEventListener('change', () => {
          state[inp.dataset.switch] = inp.checked;
          toast(inp.checked ? 'Aktiviert' : 'Deaktiviert');
        });
      });
      document.getElementById('pinChangeRow').addEventListener('click', togglePinEditor);
      document.getElementById('lockNowRow').addEventListener('click', lockApp);
      document.getElementById('prayerRow').addEventListener('click', () => show('prayer'));
      document.getElementById('updateHintRow').addEventListener('click', () => toast(`v${TMS_DATA.update.latest} verfügbar — ${TMS_DATA.update.notes}`));
      const slider = document.getElementById('fontSizeSlider');
      slider.addEventListener('input', () => {
        state.fontSize = Number(slider.value);
        document.getElementById('fontSizeValue').textContent = `${state.fontSize}px`;
        document.documentElement.style.setProperty('--term-font-size', state.fontSize + 'px');
      });
    }

    // ============================================================
    // Prayer screen + Adhan overlay (nextPrayer/parsePrayerTime/formatCountdown
    // already defined above for the Heute-Zone + status strip — reused here so
    // the countdown format matches everywhere in the app.)
    // ============================================================
    function renderPrayerList() {
      const next = nextPrayer();
      const host = document.getElementById('prayerList');
      host.innerHTML = TMS_DATA.prayerTimes.map(p => `
        <div class="prayer-row${p.name === next.name && !next.tomorrow ? ' is-next' : ''}">
          <span class="prayer-row__name">${escapeHtml(p.name)}</span>
          <span class="prayer-row__time">${escapeHtml(p.time)}</span>
        </div>`).join('');
    }

    let prayerTickTimer = null;
    function tickPrayerCountdown() {
      renderPrayerList();
      const next = nextPrayer();
      const card = document.getElementById('prayerNextCard');
      const update = () => {
        card.innerHTML = `
          <div class="prayer-next-card glass">
            <div class="prayer-next-card__label">Nächstes Gebet — ${escapeHtml(next.name)}${next.tomorrow ? ' (morgen)' : ''}</div>
            <div class="prayer-next-card__countdown">${formatCountdown(next)}</div>
          </div>`;
      };
      update();
      clearInterval(prayerTickTimer);
      prayerTickTimer = setInterval(update, 30000);
    }

    function openAdhanOverlay(prayerName) {
      const overlay = document.getElementById('adhanOverlay');
      document.getElementById('adhanName').textContent = prayerName;
      document.getElementById('adhanRingCode').textContent = prayerName.slice(0, 3).toUpperCase();
      overlay.hidden = false;
      requestAnimationFrame(() => overlay.classList.add('is-open'));
    }
    function closeAdhanOverlay() {
      const overlay = document.getElementById('adhanOverlay');
      overlay.classList.remove('is-open');
      setTimeout(() => { overlay.hidden = true; }, 150);
    }
    function wirePrayer() {
      document.getElementById('adhanDemoBtn').addEventListener('click', () => openAdhanOverlay(nextPrayer().name));
      document.getElementById('adhanStop').addEventListener('click', closeAdhanOverlay);
    }

    SCREEN_HOOKS.prayer = tickPrayerCountdown;

    // ============================================================
    // Server detail screen (from Server-Zone; offline handled inline as a toast)
    // ============================================================
    function enterServerDetail(id) {
      const server = TMS_DATA.servers.find(s => s.id === id);
      if (!server) return;
      document.getElementById('serverDetailTitle').textContent = server.name;
      const chip = document.getElementById('serverDetailChip');
      chip.dataset.status = server.status === 'online' ? 'ready' : 'suspended';
      chip.innerHTML = `<span class="status-chip__dot"></span>${escapeHtml(server.status)}`;
      document.getElementById('serverDetailBody').innerHTML = `
        <div class="settings-group">
          <div class="settings-row"><span class="settings-row__label">Adresse</span><span class="settings-row__value">${escapeHtml(server.host)}:${server.port}</span></div>
          <div class="settings-row"><span class="settings-row__label">Latenz</span><span class="settings-row__value">${server.latency != null ? server.latency + 'ms' : '—'}</span></div>
          <div class="settings-row"><span class="settings-row__label">Aktive Sessions</span><span class="settings-row__value">${server.sessions}</span></div>
          <div class="settings-row"><span class="settings-row__label">Betriebssystem</span><span class="settings-row__value">${escapeHtml(server.os)}</span></div>
        </div>`;
      show('serverDetail');
    }

    // ============================================================
    // Spotlight — full-index search (glass overlay, search icon in status strip)
    // ============================================================
    function buildSpotlightIndex() {
      const idx = [];
      TMS_DATA.sessions.forEach(s => idx.push({ type: 'Sitzung', label: s.name, sub: s.description, action: () => enterWorkspace(s.id) }));
      TMS_DATA.cloudProjects.forEach(p => idx.push({ type: 'Cloud', label: p.name, sub: `${p.provider} · ${p.folder}`, action: () => openCloudDetail(p.id, 'env') }));
      TMS_DATA.snippets.forEach(sn => idx.push({ type: 'Snippet', label: sn.label, sub: sn.cmd, action: () => toast('In Terminal eingefügt') }));
      TOOL_DEFS.forEach(t => idx.push({ type: 'Tool', label: t.label, sub: 'Werkzeug öffnen', action: () => openToolSheet(t.id) }));
      TMS_DATA.servers.forEach(s => idx.push({
        type: 'Server', label: s.name, sub: `${s.host}:${s.port}`,
        action: () => { if (s.status === 'online') enterServerDetail(s.id); else toast('Server offline — zuletzt gesehen vor 2 Std'); },
      }));
      idx.push({ type: 'Screen', label: 'Hub', sub: 'Zur Startseite', action: () => show('hub') });
      idx.push({ type: 'Screen', label: 'Manager', sub: 'Manager-Chat öffnen', action: () => show('manager') });
      idx.push({ type: 'Screen', label: 'Cloud', sub: 'Cloud-Projekte öffnen', action: () => show('cloud') });
      idx.push({ type: 'Screen', label: 'Einstellungen', sub: 'Server, Sicherheit, Terminal, Über', action: () => show('settings') });
      idx.push({ type: 'Screen', label: 'Gebetszeiten', sub: 'Heutige Gebetszeiten', action: () => show('prayer') });
      idx.push({ type: 'Aktion', label: 'Adhan-Demo', sub: 'Adhan-Alarm testen', action: () => { show('prayer'); openAdhanOverlay(nextPrayer().name); } });
      idx.push({ type: 'Aktion', label: 'Env kopieren — pinterest-scraper', sub: 'Cloud → Env-Variablen', action: () => openCloudDetail('c1', 'env') });
      idx.push({ type: 'Aktion', label: 'App sperren', sub: 'Zur PIN-Sperre zurückkehren', action: () => lockApp() });
      return idx;
    }

    function spotlightFuzzyScore(query, text) {
      if (!query) return 0;
      query = query.toLowerCase();
      text = (text || '').toLowerCase();
      let qi = 0, score = 0, lastIndex = -1;
      for (let i = 0; i < text.length && qi < query.length; i++) {
        if (text[i] === query[qi]) {
          score += lastIndex === i - 1 ? 3 : 1;
          lastIndex = i;
          qi++;
        }
      }
      return qi === query.length ? score : -1;
    }

    let spotlightIndex = [];
    let spotlightFiltered = [];
    let spotlightHighlight = 0;

    function renderSpotlightResults(query) {
      const scored = spotlightIndex
        .map(entry => ({ entry, s: Math.max(spotlightFuzzyScore(query, entry.label), spotlightFuzzyScore(query, entry.sub || '')) }))
        .filter(x => query === '' || x.s >= 0);
      scored.sort((a, b) => b.s - a.s);
      spotlightFiltered = scored.map(x => x.entry).slice(0, 30);
      spotlightHighlight = 0;
      const host = document.getElementById('spotlightResults');
      if (!spotlightFiltered.length) {
        host.innerHTML = `<div class="spotlight-empty">Keine Treffer</div>`;
        return;
      }
      host.innerHTML = spotlightFiltered.map((entry, i) => `
        <button class="spotlight-row${i === 0 ? ' is-highlighted' : ''}" data-idx="${i}">
          <span class="spotlight-row__type">${escapeHtml(entry.type)}</span>
          <span class="spotlight-row__label">${escapeHtml(entry.label)}</span>
          <span class="spotlight-row__sub">${escapeHtml(entry.sub || '')}</span>
        </button>
      `).join('');
    }

    function moveSpotlightHighlight(dir) {
      if (!spotlightFiltered.length) return;
      spotlightHighlight = (spotlightHighlight + dir + spotlightFiltered.length) % spotlightFiltered.length;
      document.querySelectorAll('.spotlight-row').forEach((el, i) => el.classList.toggle('is-highlighted', i === spotlightHighlight));
      const activeEl = document.querySelector('.spotlight-row.is-highlighted');
      if (activeEl) activeEl.scrollIntoView({ block: 'nearest' });
    }

    function activateSpotlightEntry(i) {
      const entry = spotlightFiltered[i];
      if (!entry) return;
      closeSpotlight();
      entry.action();
    }

    function openSpotlight() {
      spotlightIndex = buildSpotlightIndex();
      state.spotlightOpen = true;
      const wrap = document.getElementById('spotlightWrap');
      wrap.hidden = false;
      const input = document.getElementById('spotlightInput');
      input.value = '';
      renderSpotlightResults('');
      requestAnimationFrame(() => {
        wrap.classList.add('is-open');
        input.focus();
      });
    }
    function closeSpotlight() {
      state.spotlightOpen = false;
      const wrap = document.getElementById('spotlightWrap');
      wrap.classList.remove('is-open');
      setTimeout(() => { wrap.hidden = true; }, 150);
    }
    function wireSpotlight() {
      document.getElementById('stripSearchBtn').addEventListener('click', e => { e.stopPropagation(); openSpotlight(); });
      const input = document.getElementById('spotlightInput');
      input.addEventListener('input', () => renderSpotlightResults(input.value));
      input.addEventListener('keydown', e => {
        if (e.key === 'ArrowDown') { e.preventDefault(); moveSpotlightHighlight(1); }
        else if (e.key === 'ArrowUp') { e.preventDefault(); moveSpotlightHighlight(-1); }
        else if (e.key === 'Enter') { e.preventDefault(); activateSpotlightEntry(spotlightHighlight); }
        else if (e.key === 'Escape') { closeSpotlight(); }
      });
      document.getElementById('spotlightCloseBtn').addEventListener('click', closeSpotlight);
      document.querySelector('.spotlight-backdrop').addEventListener('click', closeSpotlight);
      document.getElementById('spotlightResults').addEventListener('click', e => {
        const row = e.target.closest('.spotlight-row');
        if (row) activateSpotlightEntry(Number(row.dataset.idx));
      });
      document.addEventListener('keydown', e => {
        if (document.body.classList.contains('is-locked')) return; // no shortcuts while locked
        if ((e.metaKey || e.ctrlKey) && e.key.toLowerCase() === 'k') { e.preventDefault(); openSpotlight(); }
      });
    }

    // ============================================================
    // Lock screen (PIN pad)
    // ============================================================
    function renderPinDots(n) {
      document.querySelectorAll('#pinDots span').forEach((dot, i) => dot.classList.toggle('is-filled', i < n));
    }
    function checkPin() {
      if (state.lockDigits === state.pin) {
        unlockApp();
        return;
      }
      const section = document.querySelector('[data-screen="lock"]');
      section.classList.add('lock-shake');
      setTimeout(() => section.classList.remove('lock-shake'), 400);
      state.lockDigits = '';
      setTimeout(() => renderPinDots(0), 400);
      toast('Falscher PIN');
    }
    function handlePinKey(key) {
      if (key === 'back') { state.lockDigits = state.lockDigits.slice(0, -1); renderPinDots(state.lockDigits.length); return; }
      if (!key || state.lockDigits.length >= 4) return;
      state.lockDigits += key;
      renderPinDots(state.lockDigits.length);
      if (state.lockDigits.length === 4) setTimeout(checkPin, 120);
    }
    function unlockApp() {
      document.body.classList.remove('is-locked');
      state.lockDigits = '';
      renderPinDots(0);
      renderSessionsZone();
      renderServerZone();
      renderCloudZone();
      renderManagerZone();
      renderHubQuickActions();
      startGlobalTick();
      initLiveSession();
      show('hub');
    }
    function lockApp() {
      document.body.classList.add('is-locked');
      state.lockDigits = '';
      renderPinDots(0);
      stopGlobalTick();
      stopCloudBuildTimer();
      closeStrip();
      closeSpotlight();
      closeToolSheet();
      closeAdhanOverlay();
      show('lock');
    }
    function wireLock() {
      document.getElementById('pinPad').addEventListener('click', e => {
        const btn = e.target.closest('button[data-key]');
        if (btn) handlePinKey(btn.dataset.key);
      });
      document.addEventListener('keydown', e => {
        if (!document.body.classList.contains('is-locked')) return;
        if (/^[0-9]$/.test(e.key)) handlePinKey(e.key);
        else if (e.key === 'Backspace') handlePinKey('back');
      });
    }

    // ============================================================
    // Router
    // ============================================================
    SCREEN_HOOKS.hub = () => { renderHeuteZone(); updateStripPrayer(); };
    function show(name) {
      if (name !== 'cloud') stopCloudBuildTimer();
      document.querySelectorAll('[data-screen]').forEach(s => s.hidden = s.dataset.screen !== name);
      if (SCREEN_HOOKS[name]) SCREEN_HOOKS[name]();
    }

    // ============================================================
    // Init
    // ============================================================
    ensureMessageIds();
    loadFavorites();

    wireLock();
    wireToolbar();
    wireRailTabs();
    wireNameEdit();

    renderManagerArtifacts();
    renderManagerMemory();
    wireManagerTabs();
    wireManagerInput();
    renderManagerChat();

    renderCloudGroups();
    wireCloudToolbar();

    renderSettings();

    renderPrayerList();
    wirePrayer();

    wireSpotlight();

    document.getElementById('wsBack').addEventListener('click', () => {
      state.activeSessionId = null;
      closePermSheet();
      show('hub');
    });

    document.querySelectorAll('[data-nav-back]').forEach(btn => btn.addEventListener('click', () => show('hub')));
    document.getElementById('heuteSettingsBtn').addEventListener('click', () => show('settings'));

    document.getElementById('statusStrip').addEventListener('click', toggleStrip);
    document.getElementById('statusStrip').addEventListener('keydown', e => {
      if (e.key === 'Enter' || e.key === ' ') { e.preventDefault(); toggleStrip(); }
    });
    document.addEventListener('keydown', e => {
      if (e.key === 'Escape' && state.stripOpen) closeStrip();
    });

    document.querySelector('#permSheetWrap [data-act="yes"]').addEventListener('click', () => resolvePrompt(true));
    document.querySelector('#permSheetWrap [data-act="no"]').addEventListener('click', () => resolvePrompt(false));
    document.getElementById('permAutoBtn').addEventListener('click', toggleAutoApprove);
    // Permission sheet is modal for a pending decision — backdrop tap does not dismiss it.

    document.getElementById('toolSheetClose').addEventListener('click', closeToolSheet);
    document.querySelector('#toolSheetWrap .sheet-backdrop').addEventListener('click', closeToolSheet);

    show('lock');
  </script>
</body>
</html>

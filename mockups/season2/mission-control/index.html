<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>Mission Control — TMS Terminal</title>
<style>
  :root {
    --bg: #0c0e12; --panel: #14171d; --panel-2: #1a1e26; --border: #262b35;
    --text: #e8ebf2; --text-dim: #97a0af; --accent: #4f8cff; --accent-2: #8f6aff;
    --glass: rgba(79,140,255,0.08); --glass-strong: rgba(79,140,255,0.16); --glass-border: rgba(79,140,255,0.25); --blur: blur(18px);
    --ok: #35c26e; --warn: #e5a53a; --err: #ec5f67;
    --radius: 14px; --radius-sm: 8px;
    --font-mono: 'SF Mono', ui-monospace, monospace;
    --font-ui: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    --transition: 150ms ease-out;
    --fs-micro: 11px;
    --strip-h: 46px;
    --term-font-size: 13px;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  html, body { height: 100%; }
  body {
    background: var(--bg); color: var(--text);
    font: 400 13.5px/1.45 var(--font-ui);
    -webkit-font-smoothing: antialiased;
    display: flex; flex-direction: column; height: 100dvh;
    overflow: hidden;
  }
  button, input { font-family: inherit; color: inherit; }
  button { appearance: none; -webkit-appearance: none; background: none; border: none; cursor: pointer; }
  a { color: inherit; }
  :focus-visible { outline: 2px solid var(--accent); outline-offset: 2px; }
  @media (prefers-reduced-motion: reduce) {
    *, *::before, *::after { animation-duration: .001ms !important; transition-duration: .001ms !important; }
  }

  /* ============================================================
     Lock-first structural gating — everything but the lock screen
     is inert / invisible while body carries .is-locked, enforced
     here (before any JS runs) so nothing flashes pre-PIN.
     ============================================================ */
  body.is-locked .chrome-el { display: none !important; }

  /* ---------- Screen shell ---------- */
  #screens { flex: 1; min-height: 0; position: relative; }
  section[data-screen] { position: absolute; left: 0; right: 0; bottom: 0; top: calc(var(--strip-h) + env(safe-area-inset-top, 0px)); overflow-y: auto; }
  section[data-screen="workspace"]:not([hidden]) { display: flex; flex-direction: column; overflow-y: hidden; }
  section[data-screen="lock"]:not([hidden]) { display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 22px; overflow: hidden; top: 0; }

  /* ---------- Glass utility (elevated moments ONLY: strip, sheets, alerts) ---------- */
  .glass { background: var(--glass); -webkit-backdrop-filter: var(--blur); backdrop-filter: var(--blur); border: 1px solid var(--glass-border); }

  /* ---------- Status chip (shared: sessions, cloud) ---------- */
  .status-chip { display: inline-flex; align-items: center; gap: 6px; font: 600 10.5px var(--font-mono); letter-spacing: .04em; text-transform: uppercase; color: var(--text-dim); flex: 0 0 auto; white-space: nowrap; }
  .status-chip__dot { width: 6px; height: 6px; border-radius: 50%; background: var(--text-dim); flex: 0 0 auto; }
  @keyframes pulseDot { 0%, 100% { opacity: 1; box-shadow: 0 0 0 0 rgba(79,140,255,.5); } 50% { opacity: .55; box-shadow: 0 0 0 4px rgba(79,140,255,0); } }
  .status-chip[data-status="running"] .status-chip__dot,
  .status-chip[data-status="live"] .status-chip__dot,
  .status-chip[data-status="building"] .status-chip__dot { background: var(--accent); animation: pulseDot 1.6s ease-in-out infinite; }
  .status-chip[data-status="waiting"] .status-chip__dot,
  .status-chip[data-status="prompt"] .status-chip__dot { background: var(--warn); animation: pulseDot 1.1s ease-in-out infinite; }
  .status-chip[data-status="done"] .status-chip__dot,
  .status-chip[data-status="ready"] .status-chip__dot { background: var(--ok); }
  .status-chip[data-status="idle"] .status-chip__dot,
  .status-chip[data-status="suspended"] .status-chip__dot { background: var(--text-dim); }

  /* ============================================================
     Top status strip — the ONLY persistent chrome. Glass because
     it is a permanently elevated surface (concept-3 "island").
     ============================================================ */
  #statusStrip { position: fixed; top: 0; left: 0; right: 0; z-index: 200; padding-top: env(safe-area-inset-top, 0px); border-bottom: 1px solid var(--glass-border); cursor: pointer; }
  .strip-bar { display: flex; align-items: center; gap: 10px; height: var(--strip-h); padding: 0 14px; }
  .strip-seg { display: flex; align-items: center; gap: 6px; min-width: 0; }
  .strip-seg__label { font: 600 12px var(--font-ui); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .strip-dot { width: 7px; height: 7px; border-radius: 50%; background: var(--text-dim); flex: 0 0 auto; }
  .strip-dot.is-live { background: var(--accent); animation: pulseDot 1.4s ease-in-out infinite; }
  .strip-dot.is-warn { background: var(--warn); animation: pulseDot 1.1s ease-in-out infinite; }
  .strip-dot.is-ok { background: var(--ok); }
  .strip-dot.is-err { background: var(--err); }
  .strip-divider { width: 1px; height: 14px; background: var(--glass-border); flex: 0 0 auto; }
  .strip-seg--prayer .strip-seg__label { color: var(--text-dim); font-variant-numeric: tabular-nums; }
  .strip-seg--prayer { display: none; }
  @media (min-width: 400px) { .strip-seg--prayer { display: flex; } }
  .strip-time { margin-left: auto; font: 700 13px var(--font-mono); font-variant-numeric: tabular-nums; letter-spacing: .02em; flex: 0 0 auto; }
  .strip-expanded { max-height: 0; opacity: 0; overflow: hidden; padding: 0 16px; transition: max-height .2s ease, opacity .16s ease; }
  #statusStrip.is-open .strip-expanded { max-height: 60vh; opacity: 1; overflow-y: auto; padding: 4px 16px 16px; }
  .strip-group-title { margin-top: 12px; font: 700 var(--fs-micro) var(--font-mono); letter-spacing: .06em; text-transform: uppercase; color: var(--text-dim); }
  .strip-group-title:first-child { margin-top: 0; }
  .strip-row { display: flex; align-items: center; gap: 10px; padding: 8px 0; border-top: 1px solid var(--glass-border); }
  .strip-row:first-of-type { border-top: none; }
  .strip-row[data-session], .strip-row[data-prayer], .strip-row[data-build] { cursor: pointer; }
  .strip-row__dot { width: 8px; height: 8px; border-radius: 50%; flex: 0 0 auto; }
  .strip-row__name { flex: 1; font: 600 13px var(--font-ui); min-width: 0; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .strip-row__meta { font: 12px var(--font-mono); color: var(--text-dim); flex: 0 0 auto; }
  .strip-hint { text-align: center; margin-top: 12px; font-size: 11px; color: var(--text-dim); opacity: .7; }

  /* ============================================================
     Hub — the operations-center home. Dense solid zones, priority
     stacked on compact, 2-column grid (Sessions full-height left)
     on expanded (Fold 7 unfolded).
     ============================================================ */
  .hub-grid { display: grid; grid-template-columns: 1fr; gap: 14px; padding: 14px 14px 28px; }
  @media (min-width: 700px) {
    .hub-grid { grid-template-columns: minmax(300px, 1fr) minmax(340px, 1.5fr); gap: 16px; padding: 16px 20px 32px; }
  }
  .hub-col-right { display: flex; flex-direction: column; gap: 14px; min-width: 0; }

  .zone { background: var(--panel); border: 1px solid var(--border); border-radius: var(--radius); display: flex; flex-direction: column; overflow: hidden; }
  .zone--sessions { min-height: 0; }
  .zone__head { display: flex; align-items: center; gap: 8px; padding: 11px 14px; border-bottom: 1px solid var(--border); flex: 0 0 auto; }
  .zone__eyebrow { font: 700 11px/1 var(--font-mono); letter-spacing: .08em; text-transform: uppercase; color: var(--text-dim); }
  .zone__eyebrow--bracket::before { content: '['; margin-right: 4px; color: var(--border); }
  .zone__eyebrow--bracket::after { content: ']'; margin-left: 4px; color: var(--border); }
  .zone__count { margin-left: auto; font: 12px var(--font-mono); color: var(--text-dim); }
  .zone__body { padding: 10px 12px 12px; display: flex; flex-direction: column; gap: 8px; }
  .zone--sessions .zone__body { flex: 1; }

  /* ---------- Sessions-Zone ---------- */
  .session-tile { display: flex; flex-direction: column; gap: 6px; width: 100%; text-align: left; padding: 11px 12px 11px 15px; background: var(--panel-2); border: 1px solid var(--border); border-radius: 10px; position: relative; transition: border-color var(--transition); }
  .session-tile::before { content: ''; position: absolute; left: 0; top: 8px; bottom: 8px; width: 3px; border-radius: 2px; background: var(--tag-color, var(--border)); }
  .session-tile:hover, .session-tile:active { border-color: var(--accent); }
  .session-tile__top { display: flex; align-items: center; gap: 8px; }
  .session-tile__name { font: 600 14px var(--font-ui); flex: 1; min-width: 0; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .session-tile__line { font: 12px var(--font-mono); color: var(--text-dim); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .session-tile.is-streaming .session-tile__line { color: var(--text); }
  .session-tile.is-streaming .session-tile__line::after { content: '\258C'; margin-left: 3px; color: var(--accent); animation: blinkCursor 1s steps(1) infinite; }
  @keyframes blinkCursor { 50% { opacity: 0; } }

  /* ---------- Server-Zone ---------- */
  .server-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; width: 100%; }
  .server-tile { padding: 10px 11px; background: var(--panel-2); border: 1px solid var(--border); border-radius: 10px; display: flex; flex-direction: column; gap: 4px; min-width: 0; transition: border-color var(--transition); }
  .server-tile[data-status="offline"] { opacity: .5; }
  .server-tile:hover { border-color: var(--accent); }
  .server-tile__top { display: flex; align-items: center; gap: 6px; }
  .server-tile__dot { width: 7px; height: 7px; border-radius: 50%; background: var(--ok); flex: 0 0 auto; }
  .server-tile[data-status="offline"] .server-tile__dot { background: var(--err); }
  .server-tile__name { font: 600 12.5px var(--font-ui); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .server-tile__meta { font: 11px var(--font-mono); color: var(--text-dim); }

  /* ---------- Cloud-Zone ---------- */
  .cloud-mini-row { display: flex; align-items: center; gap: 8px; padding: 8px 10px; background: var(--panel-2); border: 1px solid var(--border); border-radius: 8px; transition: border-color var(--transition); }
  .cloud-mini-row:hover { border-color: var(--accent); }
  .provider-glyph { width: 20px; height: 20px; display: flex; align-items: center; justify-content: center; border: 1px solid var(--border); border-radius: 5px; font: 700 10px var(--font-mono); color: var(--text-dim); flex: 0 0 auto; }
  .cloud-mini-row__name { flex: 1; font: 600 12.5px var(--font-ui); min-width: 0; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .shimmer-track { height: 3px; background: var(--border); border-radius: 2px; overflow: hidden; margin: -2px 2px 2px; position: relative; }
  .shimmer-track__fill { position: absolute; inset: 0; width: 40%; background: linear-gradient(90deg, transparent, var(--accent), transparent); animation: shimmerMove 1.4s ease-in-out infinite; }
  @keyframes shimmerMove { 0% { transform: translateX(-140%); } 100% { transform: translateX(340%); } }

  /* ---------- Manager-Zone ---------- */
  .manager-teaser { display: flex; align-items: flex-start; gap: 10px; padding: 10px 11px; background: var(--panel-2); border: 1px solid var(--border); border-radius: 10px; width: 100%; text-align: left; transition: border-color var(--transition); }
  .manager-teaser:hover { border-color: var(--accent); }
  .manager-teaser__dot { width: 8px; height: 8px; border-radius: 50%; background: var(--accent-2); flex: 0 0 auto; margin-top: 4px; }
  .manager-teaser__body { flex: 1; min-width: 0; }
  .manager-teaser__from { font: 700 var(--fs-micro) var(--font-mono); color: var(--text-dim); text-transform: uppercase; letter-spacing: .04em; }
  .manager-teaser__text { font: 13px var(--font-ui); margin-top: 2px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .manager-teaser__time { font: 11px var(--font-mono); color: var(--text-dim); flex: 0 0 auto; }

  /* ---------- Heute-Zone ---------- */
  .heute-row { display: flex; align-items: center; justify-content: space-between; gap: 10px; width: 100%; text-align: left; padding: 10px 11px; background: var(--panel-2); border: 1px solid var(--border); border-radius: 10px; transition: border-color var(--transition); }
  .heute-row:hover { border-color: var(--accent); }
  .heute-row__label { font-size: 12.5px; color: var(--text-dim); }
  .heute-row__value { font: 700 14px var(--font-mono); font-variant-numeric: tabular-nums; }
  .update-banner-mini { display: flex; align-items: center; gap: 10px; padding: 10px 11px; border-radius: 10px; }
  .update-banner-mini__text { flex: 1; font-size: 12.5px; }
  .update-banner-mini__cta { font: 700 12px var(--font-ui); color: var(--accent); cursor: pointer; white-space: nowrap; }

  /* ============================================================
     Workspace — focused terminal dive-in.
     ============================================================ */
  .ws-head { display: flex; align-items: center; gap: 10px; padding: 10px 14px; border-bottom: 1px solid var(--border); flex: 0 0 auto; }
  .back-chip { display: inline-flex; align-items: center; gap: 4px; padding: 6px 10px; border: 1px solid var(--border); border-radius: 20px; font: 600 12px var(--font-ui); color: var(--text-dim); flex: 0 0 auto; transition: border-color var(--transition), color var(--transition); }
  .back-chip:hover { border-color: var(--accent); color: var(--accent); }
  .ws-name { flex: 1; min-width: 0; background: transparent; border: none; font: 700 16px var(--font-ui); padding: 5px 7px; margin-left: -3px; border-radius: 6px; transition: background var(--transition); }
  .ws-name:hover { background: var(--panel-2); }
  .ws-name:focus { background: var(--panel); outline: 2px solid var(--accent); outline-offset: 0; }
  .ws-desc { padding: 0 14px 10px; font-size: 12.5px; color: var(--text-dim); flex: 0 0 auto; }
  .ws-body { flex: 1; min-height: 0; display: flex; flex-direction: column; overflow: hidden; }
  @media (min-width: 700px) { .ws-body { flex-direction: row; } }
  .ws-terminal-col { flex: 1; min-height: 0; display: flex; flex-direction: column; }
  @media (min-width: 700px) { .ws-terminal-col { flex: 0 0 62%; max-width: 62%; border-right: 1px solid var(--border); } }

  .ws-term-pre { position: relative; flex: 1; min-height: 0; overflow-y: auto; font-family: var(--font-mono); font-size: var(--term-font-size); line-height: 1.6; padding: 12px 14px; white-space: pre-wrap; overflow-wrap: anywhere; background: var(--bg); touch-action: pan-y; }
  .term-line { display: block; padding: 1px 4px; margin: 0 -4px; border-radius: 4px; }
  .ws-term-pre.selection-mode .term-line { cursor: pointer; }
  .ws-term-pre.selection-mode .term-line:hover { background: rgba(79,140,255,.08); }
  .term-line.is-selected { background: rgba(79,140,255,.28); }
  .ans-b { font-weight: 700; } .ans-d { color: var(--text-dim); } .ans-g { color: var(--ok); } .ans-r { color: var(--err); }
  .wrapped-link { color: var(--accent); text-decoration: underline; text-decoration-color: rgba(79,140,255,.5); text-underline-offset: 2px; cursor: pointer; }
  .wrapped-link:hover { color: #85aeff; }

  .sel-handle { position: absolute; width: 14px; height: 14px; border-radius: 50%; background: var(--accent); transform: translate(-50%, 0); touch-action: none; z-index: 5; }
  .sel-handle::before { content: ''; position: absolute; left: 50%; bottom: 100%; width: 2px; height: 16px; background: var(--accent); transform: translateX(-50%); }
  .copy-bubble { position: absolute; transform: translateX(-8px); font: 600 12px var(--font-ui); padding: 7px 14px; border-radius: 20px; cursor: pointer; z-index: 6; white-space: nowrap; color: var(--text); background: var(--glass-strong); -webkit-backdrop-filter: var(--blur); backdrop-filter: var(--blur); border: 1px solid var(--glass-border); }
  .copy-bubble::after { content: ''; position: absolute; left: 16px; top: 100%; border: 5px solid transparent; border-top-color: var(--glass-strong); }

  .replay-btn:not([hidden]) { display: block; width: 100%; margin: 0; padding: 10px 14px; border: none; border-top: 1px dashed var(--border); color: var(--text-dim); font: 600 12.5px var(--font-ui); transition: color var(--transition); flex: 0 0 auto; }
  .replay-btn:hover { color: var(--accent); }

  /* ---------- Terminal toolbar ---------- */
  .term-toolbar-wrap { position: relative; flex: 0 0 auto; border-top: 1px solid var(--border); background: var(--panel); }
  .key-echo-host { position: absolute; left: 50%; bottom: 100%; transform: translateX(-50%); display: flex; gap: 6px; margin-bottom: 6px; pointer-events: none; }
  .key-echo { background: var(--panel-2); border: 1px solid var(--border); color: var(--text); font: 600 11px var(--font-mono); padding: 4px 8px; border-radius: 6px; opacity: 0; transform: translateY(4px); transition: opacity var(--transition), transform var(--transition); }
  .key-echo.show { opacity: 1; transform: translateY(0); }
  .term-toolbar { display: flex; gap: 6px; padding: 8px 10px; overflow-x: auto; scrollbar-width: none; }
  .term-toolbar::-webkit-scrollbar { display: none; }
  .term-toolbar button { flex: 0 0 auto; min-width: 36px; padding: 8px 10px; background: var(--panel-2); border: 1px solid var(--border); border-radius: 6px; font: 600 12px var(--font-mono); transition: border-color var(--transition), color var(--transition); }
  #selToggleBtn.is-on { border-color: var(--accent); color: var(--accent); }

  /* ---------- Context rail (Kontext / Dateien / Notizen) ---------- */
  .ws-rail { display: none; }
  @media (min-width: 700px) { .ws-rail { display: flex; flex: 1; min-width: 0; flex-direction: column; } }
  .subtabs { display: flex; gap: 6px; padding: 10px 14px; border-bottom: 1px solid var(--border); flex: 0 0 auto; }
  .subtabs button { padding: 6px 12px; border: 1px solid var(--border); border-radius: 20px; font: 600 12px var(--font-ui); color: var(--text-dim); transition: border-color var(--transition), color var(--transition); }
  .subtabs button.active { border-color: var(--accent); color: var(--accent); background: rgba(79,140,255,.08); }
  .ws-rail-body { flex: 1; min-height: 0; overflow-y: auto; padding: 12px 14px 20px; }

  .rail-context__row { display: flex; align-items: center; justify-content: space-between; gap: 10px; padding: 9px 0; border-top: 1px solid var(--border); font-size: 12.5px; }
  .rail-context__row:first-child { border-top: none; }
  .rail-context__value { color: var(--text-dim); text-align: right; }
  .rail-swatch { width: 14px; height: 14px; border-radius: 4px; flex: 0 0 auto; }
  .rail-section-title { margin-top: 12px; padding-top: 10px; border-top: 1px solid var(--border); font: 700 var(--fs-micro) var(--font-mono); letter-spacing: .06em; text-transform: uppercase; color: var(--text-dim); }
  .rail-empty { padding: 10px 0; color: var(--text-dim); font-size: 12.5px; }
  .hit-badge { font: 700 11px var(--font-mono); color: var(--accent); background: rgba(79,140,255,.12); padding: 2px 7px; border-radius: 20px; flex: 0 0 auto; }
  .mono-text { font: 12.5px var(--font-mono); }
  .tool-list__row { display: flex; align-items: center; gap: 10px; width: 100%; text-align: left; padding: 9px 0; border-top: 1px solid var(--border); font-size: 13px; }
  .tool-list__row:first-child { border-top: none; }
  .tool-list__icon { width: 14px; text-align: center; color: var(--text-dim); font: 12px var(--font-mono); flex: 0 0 auto; }
  .tool-list__name { flex: 1; min-width: 0; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .tool-list__meta { font: 12px var(--font-mono); color: var(--text-dim); flex: 0 0 auto; }
  .notes-grid { display: flex; flex-direction: column; gap: 10px; }
  .note-card { padding: 12px; background: var(--panel-2); border: 1px solid var(--border); border-radius: 10px; }
  .note-card__title { font: 600 13px var(--font-ui); margin-bottom: 4px; }
  .note-card__body { font-size: 12.5px; color: var(--text-dim); line-height: 1.5; }
  .note-card__time { margin-top: 6px; font: 11px var(--font-mono); color: var(--text-dim); }

  /* ---------- Folded session-switcher (compact/medium only) ---------- */
  .ws-switcher { display: flex; gap: 8px; padding: 8px 12px; overflow-x: auto; border-top: 1px solid var(--border); background: var(--panel); flex: 0 0 auto; scrollbar-width: none; }
  .ws-switcher::-webkit-scrollbar { display: none; }
  @media (min-width: 700px) { .ws-switcher { display: none; } }
  .ws-switcher-chip { display: flex; align-items: center; gap: 6px; padding: 7px 12px; border: 1px solid var(--border); border-radius: 20px; font: 600 12px var(--font-ui); color: var(--text-dim); white-space: nowrap; flex: 0 0 auto; transition: border-color var(--transition), color var(--transition); }
  .ws-switcher-chip.is-active { border-color: var(--accent); color: var(--text); }
  .ws-switcher-chip__dot { width: 7px; height: 7px; border-radius: 50%; flex: 0 0 auto; }

  /* ============================================================
     Permission sheet — glass modal (an elevated moment).
     ============================================================ */
  .sheet-wrap:not([hidden]) { position: fixed; inset: 0; z-index: 900; display: flex; align-items: flex-end; justify-content: center; opacity: 0; transition: opacity .18s ease; }
  .sheet-wrap.is-open { opacity: 1; }
  .sheet-backdrop { position: absolute; inset: 0; background: rgba(0,0,0,.55); }
  .sheet-panel { position: relative; width: 100%; max-width: 640px; padding: 18px 18px calc(18px + env(safe-area-inset-bottom, 0px)); border-radius: 20px 20px 0 0; transform: translateY(14px); transition: transform .2s ease; background: var(--glass-strong); -webkit-backdrop-filter: var(--blur); backdrop-filter: var(--blur); border: 1px solid var(--glass-border); border-bottom: none; }
  .sheet-wrap.is-open .sheet-panel { transform: translateY(0); }
  .perm-tool-row { display: flex; gap: 8px; align-items: baseline; font: 13px var(--font-mono); flex-wrap: wrap; }
  .perm-tool { font-weight: 700; }
  .perm-target { color: var(--text-dim); overflow-wrap: anywhere; }
  .perm-question { margin-top: 8px; font-size: 13.5px; }
  .perm-actions { display: flex; gap: 8px; margin-top: 14px; flex-wrap: wrap; }
  .perm-actions button { font: 600 13px var(--font-ui); padding: 9px 14px; border-radius: 8px; transition: opacity var(--transition); }
  .perm-actions [data-act="yes"] { background: var(--accent); color: #fff; }
  .perm-actions [data-act="no"] { border: 1px solid var(--glass-border); color: var(--text); }
  .perm-actions [data-act="auto"] { border: 1px solid var(--glass-border); color: var(--text-dim); margin-left: auto; }
  .perm-actions [data-act="auto"][aria-pressed="true"] { color: var(--accent); border-color: var(--accent); }

  /* ---------- Toasts ---------- */
  #toasts { position: fixed; left: 0; right: 0; bottom: 18px; display: flex; flex-direction: column; align-items: center; gap: 8px; z-index: 1100; pointer-events: none; padding: 0 16px; }
  .toast { background: var(--panel-2); border: 1px solid var(--border); font: 500 12.5px var(--font-ui); padding: 9px 14px; border-radius: 8px; opacity: 0; transform: translateY(6px); transition: opacity .18s, transform .18s; max-width: 88vw; text-align: center; }
  .toast.show { opacity: 1; transform: translateY(0); }

  /* ---------- Lock screen ---------- */
  .lock-title { font: 700 var(--fs-micro) var(--font-mono); letter-spacing: .1em; text-transform: uppercase; color: var(--text-dim); }
  .pin-dots { display: flex; gap: 14px; }
  .pin-dots span { display: block; width: 12px; height: 12px; border-radius: 50%; border: 1px solid var(--border); transition: background var(--transition), border-color var(--transition); }
  .pin-dots span.is-filled { background: var(--accent); border-color: var(--accent); }
  .pin-pad { display: grid; grid-template-columns: repeat(3, 64px); gap: 14px; }
  .pin-pad button { width: 64px; height: 64px; border-radius: 50%; border: 1px solid var(--border); font: 600 20px var(--font-mono); color: var(--text); transition: border-color var(--transition), background var(--transition); }
  .pin-pad button:active { background: var(--panel-2); }
  .pin-pad button[data-key="back"] { font-size: 15px; color: var(--text-dim); border-color: transparent; }
  .pin-pad__spacer { visibility: hidden; }
  .lock-shake { animation: pin-shake 400ms ease-in-out; }
  @keyframes pin-shake {
    10%, 90% { transform: translateX(-6px); } 20%, 80% { transform: translateX(5px); }
    30%, 50%, 70% { transform: translateX(-8px); } 40%, 60% { transform: translateX(8px); }
  }

  /* ============================================================
     Task 8 — Cloud, Manager, Tools, Settings, Prayer, Spotlight,
     Server detail. Same visual language as the hub/workspace:
     solid panels + hairline borders; glass reserved for sheets/
     overlays/alerts — elevated moments only.
     ============================================================ */

  /* ---------- Shared: screen header, buttons, switch ---------- */
  .screen-head { display: flex; align-items: center; gap: 10px; padding: 12px 14px; border-bottom: 1px solid var(--border); flex: 0 0 auto; }
  .screen-head__title { font: 700 16px var(--font-ui); flex: 1; min-width: 0; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .screen-head__count { font: 12px var(--font-mono); color: var(--text-dim); flex: 0 0 auto; }
  .screen-head__actions { display: flex; gap: 8px; flex: 0 0 auto; }
  .icon-btn { display: inline-flex; align-items: center; justify-content: center; width: 30px; height: 30px; border: 1px solid var(--border); border-radius: var(--radius-sm); color: var(--text-dim); font: 600 13px var(--font-mono); transition: border-color var(--transition), color var(--transition); flex: 0 0 auto; }
  .icon-btn:hover { border-color: var(--accent); color: var(--accent); }
  .zone__head-action { margin-left: auto; }
  .btn-primary { display: inline-flex; align-items: center; gap: 6px; padding: 9px 14px; background: var(--accent); color: #fff; font: 600 12.5px var(--font-ui); border-radius: 8px; transition: opacity var(--transition); }
  .btn-primary:active { opacity: .8; }
  .btn-secondary { display: inline-flex; align-items: center; gap: 6px; padding: 8px 13px; border: 1px solid var(--border); color: var(--text); font: 600 12.5px var(--font-ui); border-radius: 8px; background: var(--panel-2); transition: border-color var(--transition), color var(--transition); }
  .btn-secondary:hover { border-color: var(--accent); color: var(--accent); }
  .btn-secondary.is-on { border-color: var(--accent); color: var(--accent); }
  .table-scroll { overflow-x: auto; }

  .switch { position: relative; display: inline-block; width: 38px; height: 22px; flex: 0 0 auto; }
  .switch input { position: absolute; inset: 0; opacity: 0; margin: 0; z-index: 1; }
  .switch__track { position: absolute; inset: 0; background: var(--bg); border: 1px solid var(--border); border-radius: 20px; transition: background var(--transition), border-color var(--transition); }
  .switch__thumb { position: absolute; top: 2px; left: 2px; width: 16px; height: 16px; border-radius: 50%; background: var(--text-dim); transition: transform var(--transition), background var(--transition); }
  .switch input:checked + .switch__track { background: var(--glass-strong); border-color: var(--accent); }
  .switch input:checked + .switch__track .switch__thumb { transform: translateX(16px); background: var(--accent); }

  /* ---------- Hub quick-actions row (Tools; folded reach) ---------- */
  .hub-quick-actions { display: flex; gap: 8px; padding: 12px 14px 0; overflow-x: auto; scrollbar-width: none; }
  .hub-quick-actions::-webkit-scrollbar { display: none; }
  @media (min-width: 700px) { .hub-quick-actions { padding: 14px 20px 0; } }
  .quick-tile { flex: 0 0 auto; display: flex; flex-direction: column; align-items: center; gap: 5px; width: 58px; padding: 9px 4px; background: var(--panel); border: 1px solid var(--border); border-radius: 10px; transition: border-color var(--transition); }
  .quick-tile:hover { border-color: var(--accent); }
  .quick-tile__glyph { font: 700 10.5px var(--font-mono); color: var(--accent); }
  .quick-tile__label { font: 500 10px var(--font-ui); color: var(--text-dim); text-align: center; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; max-width: 52px; }

  /* ---------- Status-strip search icon (Spotlight) ---------- */
  .strip-search-btn { flex: 0 0 auto; width: 26px; height: 26px; display: flex; align-items: center; justify-content: center; border-radius: 50%; font: 600 13px var(--font-mono); color: var(--text-dim); transition: color var(--transition), background var(--transition); }
  .strip-search-btn:hover { color: var(--accent); background: var(--glass-strong); }

  /* ---------- Tool grid + sheet body primitives ---------- */
  /* Always 3 columns: this grid renders both inside the wide tool sheet (up to
     640px) AND the narrow workspace context rail (~35% of the viewport) — a
     4-column variant used to overflow the rail's available width. */
  .tool-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; }
  .tool-tile { display: flex; flex-direction: column; align-items: center; gap: 8px; padding: 16px 8px; background: var(--panel-2); border: 1px solid var(--border); border-radius: var(--radius); transition: border-color var(--transition); }
  .tool-tile:hover { border-color: var(--accent); }
  .tool-tile__glyph { display: flex; align-items: center; justify-content: center; width: 34px; height: 34px; border: 1px solid var(--border); border-radius: var(--radius-sm); font: 700 11px var(--font-mono); color: var(--accent); }
  .tool-tile__label { font: 500 12px var(--font-ui); text-align: center; }

  .sheet-head { display: flex; align-items: center; gap: 10px; margin-bottom: 12px; }

  .sheet-close:hover { border-color: var(--accent); color: var(--accent); }
  .sheet-body { max-height: 62vh; overflow-y: auto; }

  .tool-list__row.is-tap { cursor: pointer; transition: background var(--transition); border-radius: 6px; }
  .tool-list__row.is-tap:active { background: var(--panel-2); }
  .tool-list__info { flex: 1; min-width: 0; }
  .tool-list__title { overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .tool-list__sub { margin-top: 2px; font: var(--fs-micro) var(--font-mono); color: var(--text-dim); }

  .sql-query { font: 12.5px/1.6 var(--font-mono); background: var(--bg); border: 1px solid var(--border); border-radius: var(--radius-sm); padding: 10px 12px; margin-bottom: 14px; overflow-x: auto; white-space: pre; }
  .data-table { width: 100%; border-collapse: collapse; font: 12.5px var(--font-mono); }
  .data-table th, .data-table td { text-align: left; padding: 7px 10px; border-top: 1px solid var(--border); white-space: nowrap; }
  .data-table th { color: var(--text-dim); font-weight: 600; font-size: 11px; text-transform: uppercase; letter-spacing: .04em; }
  .data-table tr:first-child td { border-top: none; }
  .cpu-cell { display: flex; align-items: center; gap: 8px; }
  .cpu-bar { position: relative; width: 56px; height: 6px; background: var(--bg); border-radius: 3px; overflow: hidden; flex: 0 0 auto; }
  .cpu-bar__fill { position: absolute; inset: 0; width: var(--pct, 0%); background: var(--accent); border-radius: 3px; }

  .shot-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin-bottom: 14px; }
  .shot-tile { aspect-ratio: 9 / 16; background: linear-gradient(160deg, var(--panel-2), var(--bg)); border: 1px solid var(--border); border-radius: var(--radius-sm); }
  .shot-flash { position: fixed; inset: 0; background: #fff; opacity: 0; pointer-events: none; z-index: 1400; transition: opacity 90ms ease-out; }
  .shot-flash.is-flashing { opacity: .85; transition: opacity 40ms ease-out; }

  .browser-bar { padding: 9px 12px; background: var(--bg); border: 1px solid var(--border); border-radius: 20px; font: 12.5px var(--font-mono); color: var(--text-dim); margin-bottom: 14px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .browser-skeleton { display: flex; flex-direction: column; gap: 10px; }
  .browser-skeleton__block { height: 14px; border-radius: 4px; background: var(--panel-2); }

  /* ---------- Manager screen ---------- */
  section[data-screen="manager"]:not([hidden]) { display: flex; flex-direction: column; overflow: hidden; }
  .manager-view { flex: 1; min-height: 0; display: flex; flex-direction: column; overflow: hidden; }
  .chat-scroll:not([hidden]), #managerArtifacts:not([hidden]), #managerMemory:not([hidden]) { flex: 1; min-height: 0; overflow-y: auto; padding: 12px 14px; display: flex; flex-direction: column; gap: 10px; }

  .chat-bubble-row { display: flex; }
  .chat-bubble-row[data-from="user"] { justify-content: flex-end; }
  .chat-bubble { max-width: 82%; padding: 10px 12px; border-radius: 12px; font-size: 13px; line-height: 1.5; background: var(--panel-2); border: 1px solid var(--border); }
  .chat-bubble-row[data-from="manager"] .chat-bubble { border-bottom-left-radius: 4px; }
  .chat-bubble-row[data-from="user"] .chat-bubble { background: var(--glass); border: 1px solid var(--glass-border); border-bottom-right-radius: 4px; }
  .chat-bubble__time { display: block; margin-top: 4px; font: var(--fs-micro) var(--font-mono); color: var(--text-dim); }

  .voice-pill { display: flex; align-items: center; gap: 8px; min-width: 180px; cursor: pointer; }
  .voice-pill__play { flex: 0 0 auto; width: 26px; height: 26px; border-radius: 50%; background: var(--accent); color: #fff; display: flex; align-items: center; justify-content: center; font-size: 10px; }
  .voice-pill__wave { flex: 1; display: flex; align-items: center; gap: 2px; height: 20px; color: var(--accent); }
  .voice-pill__wave span { width: 2px; display: block; background: currentColor; opacity: .5; border-radius: 1px; }
  .voice-pill__dur { font: 11px var(--font-mono); color: var(--text-dim); flex: 0 0 auto; }
  .voice-pill.is-playing .voice-pill__wave span { animation: waveScale .9s ease-in-out infinite; }
  @keyframes waveScale { 0%, 100% { transform: scaleY(.4); } 50% { transform: scaleY(1); } }
  .voice-transcript { margin-top: 8px; font-size: 12.5px; color: var(--text-dim); border-top: 1px solid var(--border); padding-top: 8px; }
  .voice-transcribing { margin-top: 8px; font: 600 12px var(--font-mono); color: var(--accent); }
  .voice-transcribing .dots span { display: inline-block; animation: vDotBlink 1.2s infinite; opacity: .2; }
  .voice-transcribing .dots span:nth-child(2) { animation-delay: .2s; }
  .voice-transcribing .dots span:nth-child(3) { animation-delay: .4s; }
  @keyframes vDotBlink { 0%, 100% { opacity: .2; } 50% { opacity: 1; } }

  .chat-input-row:not([hidden]) { flex: 0 0 auto; display: flex; align-items: center; gap: 8px; padding: 10px 12px; border-top: 1px solid var(--border); background: var(--panel); }
  .chat-input-row input { flex: 1; padding: 9px 12px; background: var(--panel-2); border: 1px solid var(--border); border-radius: 20px; font: 13px var(--font-ui); }
  .mic-btn { flex: 0 0 auto; width: 34px; height: 34px; border-radius: 50%; border: 1px solid var(--border); color: var(--text-dim); display: flex; align-items: center; justify-content: center; transition: border-color var(--transition), color var(--transition); }
  .mic-btn.is-recording { border-color: var(--err); color: var(--err); animation: pulseDot 1s ease-in-out infinite; }

  .memory-row { display: flex; justify-content: space-between; gap: 10px; padding: 10px 0; border-top: 1px solid var(--border); font-size: 12.5px; }
  .memory-row:first-child { border-top: none; }
  .memory-row__time { color: var(--text-dim); font: var(--fs-micro) var(--font-mono); flex: 0 0 auto; white-space: nowrap; }
  .artifact-card__meta { margin-top: 6px; font: var(--fs-micro) var(--font-mono); color: var(--text-dim); }

  /* ---------- Cloud screen ---------- */
  .cloud-toolbar { display: flex; flex-wrap: wrap; gap: 8px; padding: 12px 14px; align-items: center; border-bottom: 1px solid var(--border); }
  .chip-group { display: flex; gap: 6px; }
  .chip-group button { padding: 6px 12px; border: 1px solid var(--border); border-radius: 20px; font: 600 12px var(--font-ui); color: var(--text-dim); transition: border-color var(--transition), color var(--transition); }
  .chip-group button.active { border-color: var(--accent); color: var(--accent); background: var(--glass); }
  .cloud-toolbar__spacer { flex: 1; }

  .folder-group__head { display: flex; align-items: center; gap: 8px; padding: 10px 14px; }
  .folder-group__head::before { content: '▾'; font-size: 10px; color: var(--text-dim); transition: transform var(--transition); }
  .folder-group.is-collapsed .folder-group__head::before { transform: rotate(-90deg); }
  .folder-group__name { font: 700 var(--fs-micro) var(--font-mono); letter-spacing: .06em; text-transform: uppercase; color: var(--text-dim); flex: 1; }
  .folder-group__count { font: var(--fs-micro) var(--font-mono); color: var(--text-dim); }
  .folder-group.is-collapsed .folder-group__rows { display: none; }

  .cloud-row { display: flex; align-items: center; gap: 10px; width: 100%; padding: 12px 14px; border-top: 1px solid var(--border); text-align: left; transition: background var(--transition); }
  .cloud-row:hover { background: var(--panel-2); }
  .cloud-row__main { flex: 1; min-width: 0; display: flex; flex-direction: column; gap: 4px; }
  .cloud-row__name { font: 600 13.5px var(--font-ui); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .cloud-row__meta { display: flex; gap: 10px; align-items: center; flex-wrap: wrap; }
  .cloud-row__deploy { font: 11.5px var(--font-mono); color: var(--text-dim); }
  .fav-btn { flex: 0 0 auto; font-size: 17px; color: var(--border); transition: color var(--transition); padding: 4px; }
  .fav-btn.is-fav { color: var(--accent); }

  .cloud-detail__head { display: flex; align-items: center; gap: 10px; padding: 12px 14px 0; }
  .cloud-detail__title { font: 700 15px var(--font-ui); flex: 1; min-width: 0; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .cloud-detail__body { padding: 12px 14px 24px; }

  .env-row { padding: 10px 0; border-top: 1px solid var(--border); }
  .env-row:first-child { border-top: none; }
  .env-row__key { font: 600 12.5px var(--font-mono); }
  .env-row__value { display: block; margin-top: 4px; font: 12.5px var(--font-mono); color: var(--text-dim); cursor: pointer; word-break: break-all; }
  .env-row__actions { display: flex; gap: 8px; margin-top: 8px; }
  .env-row__actions button { font: 600 11.5px var(--font-ui); padding: 5px 10px; border: 1px solid var(--border); border-radius: 6px; color: var(--text-dim); transition: border-color var(--transition), color var(--transition); }
  .env-row__actions button:hover { border-color: var(--accent); color: var(--accent); }
  .env-row__edit { display: flex; gap: 8px; margin-top: 8px; }
  .env-row__edit input { flex: 1; padding: 7px 9px; background: var(--bg); border: 1px solid var(--border); border-radius: 6px; font: 12.5px var(--font-mono); }

  .log-viewer { display: flex; flex-direction: column; height: min(60vh, 520px); }
  .log-viewer__tools { display: flex; gap: 8px; padding-bottom: 10px; flex-wrap: wrap; }
  .log-viewer__search { flex: 1; min-width: 120px; padding: 8px 10px; background: var(--bg); border: 1px solid var(--border); border-radius: 6px; font: 12.5px var(--font-mono); }
  .log-viewer__pre { flex: 1; min-height: 0; border-radius: var(--radius-sm); border: 1px solid var(--border); }

  .deploy-row { display: flex; align-items: center; gap: 10px; padding: 11px 0; border-top: 1px solid var(--border); }
  .deploy-row:first-child { border-top: none; }
  .deploy-row__version { font: 700 12.5px var(--font-mono); width: 40px; flex: 0 0 auto; }
  .deploy-row__time { flex: 1; font: 12px var(--font-ui); color: var(--text-dim); }

  /* ---------- Settings screen ---------- */
  .settings-group { padding: 4px 14px 18px; }
  .settings-group__title { font: 700 var(--fs-micro) var(--font-mono); letter-spacing: .06em; text-transform: uppercase; color: var(--text-dim); padding: 12px 0 8px; }
  .settings-row { display: flex; align-items: center; gap: 10px; padding: 12px 0; border-top: 1px solid var(--border); }
  .settings-group .settings-row:first-of-type { border-top: none; }
  .settings-row--stack { flex-direction: column; align-items: stretch; gap: 8px; }
  .settings-row__label { flex: 1; font-size: 13px; }
  .settings-row__label small { display: block; margin-top: 2px; color: var(--text-dim); font-size: 11.5px; }
  .settings-row__value { font: 12.5px var(--font-mono); color: var(--text-dim); }
  .settings-row.is-tap { cursor: pointer; }
  .settings-row.is-tap:hover { color: var(--accent); }
  .settings-slider { width: 100%; accent-color: var(--accent); }
  .settings-pin-edit { display: flex; gap: 8px; padding-bottom: 12px; }
  .settings-pin-edit input { flex: 1; padding: 8px 10px; background: var(--bg); border: 1px solid var(--border); border-radius: 6px; font: 13px var(--font-mono); letter-spacing: .3em; }
  .font-preview { max-height: 56px; }

  /* ---------- Prayer screen + Adhan overlay ---------- */
  .prayer-list { padding: 4px 14px 8px; }
  .prayer-row { display: flex; justify-content: space-between; align-items: center; padding: 13px 0; border-top: 1px solid var(--border); transition: color var(--transition); }
  .prayer-row:first-child { border-top: none; }
  .prayer-row.is-next { color: var(--accent); }
  .prayer-row__name { font: 600 14px var(--font-ui); }
  .prayer-row__time { font: 14px var(--font-mono); font-variant-numeric: tabular-nums; }
  .prayer-next-card { margin: 12px 14px 18px; padding: 16px; border-radius: var(--radius); text-align: center; }
  .prayer-next-card__label { font: 700 var(--fs-micro) var(--font-mono); letter-spacing: .06em; text-transform: uppercase; color: var(--accent); }
  .prayer-next-card__countdown { margin-top: 4px; font: 700 26px var(--font-mono); font-variant-numeric: tabular-nums; }
  .prayer-demo-btn { display: block; margin: 4px 14px 24px; }

  .adhan-overlay:not([hidden]) { position: fixed; inset: 0; z-index: 1300; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 18px; opacity: 0; transition: opacity var(--transition); }
  .adhan-overlay.is-open { opacity: 1; }
  .adhan-ring { width: 96px; height: 96px; border-radius: 50%; border: 2px solid var(--accent); display: flex; align-items: center; justify-content: center; font: 700 20px var(--font-mono); color: var(--accent); animation: adhanPulse 1.6s ease-in-out infinite; }
  @keyframes adhanPulse { 0%, 100% { box-shadow: 0 0 0 0 rgba(79,140,255,.4); } 50% { box-shadow: 0 0 0 18px rgba(79,140,255,0); } }
  .adhan-overlay__name { font: 700 22px var(--font-ui); }
  .adhan-overlay__sub { color: var(--text-dim); font-size: 13px; }
  .adhan-overlay__stop { margin-top: 12px; padding: 12px 28px; background: var(--accent); color: #fff; font: 700 14px var(--font-ui); border-radius: 8px; }

  /* ---------- Server detail screen ---------- */
  .server-detail__body { padding: 4px 14px 24px; }

  /* ---------- Spotlight (glass overlay, search icon in status strip) ---------- */
  .spotlight-wrap:not([hidden]) { position: fixed; inset: 0; z-index: 1000; display: flex; align-items: flex-start; justify-content: center; padding-top: min(12vh, 80px); padding-left: 16px; padding-right: 16px; opacity: 0; transition: opacity var(--transition); }
  .spotlight-wrap.is-open { opacity: 1; }
  .spotlight-backdrop { position: absolute; inset: 0; background: rgba(0,0,0,.55); }
  .spotlight-panel { position: relative; width: min(560px, 100%); max-height: 68vh; display: flex; flex-direction: column; border-radius: var(--radius); transform: translateY(-6px); transition: transform var(--transition); overflow: hidden; background: var(--glass-strong); -webkit-backdrop-filter: var(--blur); backdrop-filter: var(--blur); border: 1px solid var(--glass-border); }
  .spotlight-wrap.is-open .spotlight-panel { transform: translateY(0); }
  .spotlight-search { display: flex; align-items: center; gap: 10px; padding: 12px 14px; border-bottom: 1px solid var(--glass-border); }
  .spotlight-search__icon { color: var(--text-dim); font: 600 14px var(--font-mono); }
  #spotlightInput { flex: 1; border: none; background: none; font: 500 15px var(--font-ui); outline: none; }
  #spotlightInput::placeholder { color: var(--text-dim); }
  .spotlight-close { background: var(--glass); border: 1px solid var(--glass-border); color: var(--text-dim); font: var(--fs-micro) var(--font-mono); padding: 4px 8px; border-radius: 6px; }

  .spotlight-row { display: flex; align-items: center; gap: 10px; width: 100%; padding: 10px; border-radius: 8px; text-align: left; transition: background var(--transition); }

  .spotlight-row__type { flex: 0 0 auto; font: 600 10px var(--font-mono); text-transform: uppercase; letter-spacing: .05em; color: var(--text-dim); border: 1px solid var(--glass-border); padding: 2px 6px; border-radius: 20px; }

  <script>
    // ============================================================
    // Utilities: escaping, ANSI rendering, wrapped-link, toast, clipboard
    // ============================================================
    function escapeHtml(s) {
      return String(s).replace(/[&<>"']/g, c => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;' }[c]));
    }

    // Minimal ANSI SGR renderer: bold(1) dim(2) red(31) green(32) reset(0),
    // incl. multi-param sequences like \x1b[1;32m. Every other escape sequence
    // (non-SGR CSI, OSC, lone ESC) is stripped so no raw escapes ever leak into the DOM.
    function ansiToHtml(str) {
      const CLASS = { '1': 'ans-b', '2': 'ans-d', '31': 'ans-r', '32': 'ans-g' };
      let out = '', open = 0, last = 0, m;
      const re = /\x1b\[([0-9;]*)m/g;
      const emitText = chunk => {
        chunk = chunk
          .replace(/\x1b\][^\x07\x1b]*(?:\x07|\x1b\\)/g, '') // OSC (…BEL or …ESC\)
          .replace(/\x1b\[[0-9;?]*[ -\/]*[@-~]/g, '')        // any other CSI
          .replace(/\x1b./g, '');                            // lone ESC + follow byte
        out += escapeHtml(chunk);
      };
      while ((m = re.exec(str))) {
        emitText(str.slice(last, m.index));
        last = re.lastIndex;
        for (const code of (m[1] === '' ? '0' : m[1]).split(';')) {
          const c = code === '' ? '0' : code;
          if (c === '0') { while (open) { out += '</span>'; open--; } }
          else if (CLASS[c]) { out += `<span class="${CLASS[c]}">`; open++; }
        }
      }
      emitText(str.slice(last));
      while (open) { out += '</span>'; open--; }
      return out;
    }

    // Renders one buffer line to HTML, special-casing the wrapped deploy link so
    // it always stays a single inline element (browser wraps it visually, never split in the DOM).
    function renderBufferLine(line) {
      const url = TMS_DATA.demo.wrappedLinkUrl;
      const idx = line.indexOf(url);
      if (idx === -1) return ansiToHtml(line);
      const idMatch = url.match(/dpl_\w+/);
      const shortId = idMatch ? idMatch[0].slice(0, 12) : url.slice(-12);
      const before = ansiToHtml(line.slice(0, idx));
      const after = ansiToHtml(line.slice(idx + url.length));
      const link = `<span class="wrapped-link" data-url="${escapeHtml(url)}" data-short="${escapeHtml(shortId)}" role="link" tabindex="0">${escapeHtml(url)}</span>`;
      return before + link + after;
    }

    function toast(message) {
      const host = document.getElementById('toasts');
      const el = document.createElement('div');
      el.className = 'toast';
      el.textContent = message;
      host.appendChild(el);
      requestAnimationFrame(() => el.classList.add('show'));
      setTimeout(() => {
        el.classList.remove('show');
        setTimeout(() => el.remove(), 200);
      }, 2400);
    }

    function copyText(text) {
      try {
        if (navigator.clipboard && navigator.clipboard.writeText) {
          navigator.clipboard.writeText(text).catch(() => fallbackCopy(text));
          return;
        }
      } catch (e) { /* fall through to fallback */ }
      fallbackCopy(text);
    }
    function fallbackCopy(text) {
      try {
        const ta = document.createElement('textarea');
        ta.value = text; ta.style.position = 'fixed'; ta.style.opacity = '0';
        document.body.appendChild(ta); ta.select();
        document.execCommand('copy');
        document.body.removeChild(ta);
      } catch (e) { /* no-op: mockup best-effort copy */ }
    }

    function statusLabel(status) {
      const MAP = { done: 'fertig', waiting: 'wartet', prompt: 'erlaubnis?', running: 'läuft' };
      return MAP[status] || status;
    }

    // ============================================================
    // State
    // ============================================================
    const state = {
      pin: TMS_DATA.demo.pin, lockDigits: '',
      activeSessionId: null,
      stripOpen: false,
      railTab: 'context',
      managerTab: 'chat',
      cloudView: 'folder', cloudProviderFilter: 'all', cloudDetailId: null, cloudDetailTab: 'env', cloudBuildTimer: null,
      autoLock: false, pushNotif: true, adhanNotif: true, fontSize: 13,
      spotlightOpen: false,
    };
    const cardState = {};
    TMS_DATA.sessions.forEach(s => {
      cardState[s.id] = {
        lines: s.buffer.slice(),
        status: s.status,
        selectionMode: false,
        selection: null,
        autoApprove: false,
        pendingPrompt: null,
        replayAvailable: false,
        sim: null,
        autoTimer: null,
      };
    });
    function chipStatusFor(id) {
      const cs = cardState[id];
      return cs.pendingPrompt ? 'prompt' : cs.status;
    }

    // SCREEN_HOOKS: optional per-screen refresh callback, run every time show(name) activates
    // that screen.
    const SCREEN_HOOKS = {};

    // ============================================================
    // Sessions-Zone (hub)
    // ============================================================
    function renderSessionsZone() {
      const host = document.getElementById('sessionsList');
      document.getElementById('sessionsCount').textContent = String(TMS_DATA.sessions.length);
      host.innerHTML = TMS_DATA.sessions.map(s => {
        const cs = cardState[s.id];
        const status = chipStatusFor(s.id);
        const last = [...cs.lines].reverse().find(l => l.trim() !== '') || '';
        return `
          <button class="session-tile${status === 'running' ? ' is-streaming' : ''}" data-id="${s.id}" style="--tag-color:${s.colorTag}">
            <div class="session-tile__top">
              <span class="session-tile__name">${escapeHtml(s.name)}</span>
              <span class="status-chip" data-status="${status}"><span class="status-chip__dot"></span>${statusLabel(status)}</span>
            </div>
            <div class="session-tile__line">${ansiToHtml(last) || '&nbsp;'}</div>
          </button>`;
      }).join('');
      host.querySelectorAll('.session-tile').forEach(tile => {
        tile.addEventListener('click', () => enterWorkspace(tile.dataset.id));
      });
    }

    function updateSessionTileChip(id) {
      const tile = document.querySelector(`.session-tile[data-id="${id}"]`);
      if (!tile) return;
      const status = chipStatusFor(id);
      const chip = tile.querySelector('.status-chip');
      chip.dataset.status = status;
      chip.innerHTML = `<span class="status-chip__dot"></span>${statusLabel(status)}`;
      tile.classList.toggle('is-streaming', status === 'running');
    }
    function updateSessionTileLine(id) {
      const el = document.querySelector(`.session-tile[data-id="${id}"] .session-tile__line`);
      if (!el) return;
      const cs = cardState[id];
      const last = [...cs.lines].reverse().find(l => l.trim() !== '') || '';
      el.innerHTML = ansiToHtml(last) || '&nbsp;';
    }

    // ============================================================
    // Server-Zone (hub)
    // ============================================================
    function renderServerZone() {
      const host = document.getElementById('serverGrid');
      host.innerHTML = TMS_DATA.servers.map(s => `
        <div class="server-tile" data-status="${s.status}" data-id="${s.id}">
          <div class="server-tile__top"><span class="server-tile__dot"></span><span class="server-tile__name">${escapeHtml(s.name)}</span></div>
          <span class="server-tile__meta">${s.status === 'online' ? `${s.latency}ms · ${s.sessions} Sessions` : 'offline'}</span>
        </div>`).join('');
      host.querySelectorAll('.server-tile').forEach(tile => {
        tile.addEventListener('click', () => {
          if (tile.dataset.status === 'online') enterServerDetail(tile.dataset.id);
          else toast('Server offline — zuletzt gesehen vor 2 Std');
        });
      });
    }

    // ============================================================
    // Cloud-Zone (hub) — favorites first, building project shimmers
    // ============================================================
    function renderCloudZone() {
      const host = document.getElementById('cloudList');
      const favorites = TMS_DATA.cloudProjects.filter(p => p.favorite);
      document.getElementById('cloudFavCount').textContent = String(favorites.length);
      host.innerHTML = favorites.map(p => `
        <div class="cloud-mini-row" data-id="${p.id}">
          <span class="provider-glyph">${CLOUD_GLYPH[p.provider] || '?'}</span>
          <span class="cloud-mini-row__name">${escapeHtml(p.name)}</span>
          <span class="status-chip" data-status="${p.status}"><span class="status-chip__dot"></span>${escapeHtml(p.status)}</span>
        </div>
        ${p.status === 'building' ? '<div class="shimmer-track"><div class="shimmer-track__fill"></div></div>' : ''}
      `).join('');
      host.querySelectorAll('.cloud-mini-row').forEach(row => {
        row.addEventListener('click', () => openCloudDetail(row.dataset.id, 'env'));
      });
    }

    // ============================================================
    // Manager-Zone (hub) — last message teaser + unread dot
    // ============================================================
    function renderManagerZone() {
      const host = document.getElementById('managerTeaser');
      const messages = TMS_DATA.manager.messages;
      const last = messages[messages.length - 1];
      const preview = last.type === 'voice'
        ? (last.transcribing ? '\u{1F3A4} Sprachnachricht — wird transkribiert…' : (last.transcript || '\u{1F3A4} Sprachnachricht'))
        : last.text;
      host.innerHTML = `
        <button class="manager-teaser" id="managerTeaserRow">
          <span class="manager-teaser__dot"></span>
          <div class="manager-teaser__body">
            <span class="manager-teaser__from">${last.from === 'user' ? 'Du' : 'Manager'}</span>
            <div class="manager-teaser__text">${escapeHtml(preview)}</div>
          </div>
          <span class="manager-teaser__time">${escapeHtml(last.time)}</span>
        </button>`;
      document.getElementById('managerTeaserRow').addEventListener('click', () => show('manager'));
    }

    // ============================================================
    // Heute-Zone (hub) — prayer countdown + update banner
    // ============================================================
    function parsePrayerTime(t) {
      const [h, m] = t.split(':').map(Number);
      const d = new Date();
      d.setHours(h, m, 0, 0);
      return d;
    }
    function nextPrayer() {
      const now = new Date();
      const upcoming = TMS_DATA.prayerTimes.map(p => ({ ...p, date: parsePrayerTime(p.time) })).find(p => p.date > now);
      if (upcoming) return upcoming;
      const first = TMS_DATA.prayerTimes[0];
      const d = parsePrayerTime(first.time);
      d.setDate(d.getDate() + 1);
      return { ...first, date: d, tomorrow: true };
    }
    function formatCountdown(next) {
      const diffMs = Math.max(0, next.date - new Date());
      const mins = Math.floor(diffMs / 60000);
      const h = Math.floor(mins / 60), m = mins % 60;
      return `${h}:${String(m).padStart(2, '0')}h`;
    }
    function renderHeuteZone() {
      const host = document.getElementById('heuteBody');
      const np = nextPrayer();
      const u = TMS_DATA.update;
      host.innerHTML = `
        <button class="heute-row" id="heutePrayerRow">
          <span class="heute-row__label">Nächstes Gebet — ${escapeHtml(np.name)}${np.tomorrow ? ' (morgen)' : ''}</span>
          <span class="heute-row__value">${formatCountdown(np)}</span>
        </button>
        ${u && u.current !== u.latest ? `
        <div class="update-banner-mini glass">
          <span class="update-banner-mini__text">v${escapeHtml(u.latest)} verfügbar — ${escapeHtml(u.notes)}</span>
          <span class="update-banner-mini__cta" id="heuteUpdateCta">Update</span>
        </div>` : ''}
      `;
      document.getElementById('heutePrayerRow').addEventListener('click', () => show('prayer'));
      const cta = document.getElementById('heuteUpdateCta');
      if (cta) cta.addEventListener('click', () => toast('Mockup: Update-Vorgang wird nicht simuliert'));
    }

    // ============================================================
    // Top status strip — global chrome, live clock + activity + prayer.
    // ============================================================
    function setStripActivity(kind, label) {
      const dot = document.getElementById('stripActivityDot');
      dot.className = 'strip-dot' + (kind === 'live' ? ' is-live' : kind === 'warn' ? ' is-warn' : kind === 'ok' ? ' is-ok' : '');
      document.getElementById('stripActivityLabel').textContent = label;
      if (state.stripOpen) renderStripExpanded();
    }
    function updateStripServer() {
      const online = TMS_DATA.servers.find(s => s.status === 'online');
      document.getElementById('stripServerDot').className = 'strip-dot' + (online ? ' is-ok' : ' is-err');
      document.getElementById('stripServerLabel').textContent = online ? online.name : 'Kein Server';
    }
    function updateStripTime() {
      const now = new Date();
      document.getElementById('stripTime').textContent = `${String(now.getHours()).padStart(2, '0')}:${String(now.getMinutes()).padStart(2, '0')}`;
    }
    function updateStripPrayer() {
      const np = nextPrayer();
      document.getElementById('stripPrayerLabel').textContent = `${np.name} in ${formatCountdown(np)}`;
    }
    function renderStripExpanded() {
      const host = document.getElementById('stripExpanded');
      const np = nextPrayer();
      const building = TMS_DATA.cloudProjects.find(p => p.status === 'building');
      const sessionRows = TMS_DATA.sessions.map(s => {
        const status = chipStatusFor(s.id);
        return `<div class="strip-row" data-session="${s.id}"><span class="strip-row__dot" style="background:${s.colorTag}"></span><span class="strip-row__name">${escapeHtml(s.name)}</span><span class="strip-row__meta">${statusLabel(status)}</span></div>`;
      }).join('');
      host.innerHTML = `
        <div class="strip-group-title">Aktive Sitzungen</div>
        ${sessionRows}
        <div class="strip-group-title">Nächstes Gebet</div>

    function openStrip() {
      state.stripOpen = true;
      document.getElementById('statusStrip').classList.add('is-open');
      document.getElementById('statusStrip').setAttribute('aria-expanded', 'true');
      document.getElementById('stripExpanded').removeAttribute('aria-hidden');
      renderStripExpanded();
    }
    function closeStrip() {
      state.stripOpen = false;
      document.getElementById('statusStrip').classList.remove('is-open');
      document.getElementById('statusStrip').setAttribute('aria-expanded', 'false');
      document.getElementById('stripExpanded').setAttribute('aria-hidden', 'true');
    }

    let globalTick = null;
    function startGlobalTick() {
      updateStripTime(); updateStripPrayer(); updateStripServer(); renderHeuteZone();
      clearInterval(globalTick);
      globalTick = setInterval(() => {
        updateStripTime(); updateStripPrayer(); renderHeuteZone();
        if (state.stripOpen) renderStripExpanded();

    // ============================================================
    // Live Claude session (TMSSim) — hub-level instance for session t1.
    // Drives both the Sessions-Zone tile and (when open) the workspace
    // terminal + top status strip, regardless of which screen is visible.
    // ============================================================
    function appendOutChunk(cs, chunk) {
      const pieces = chunk.split('\n');
      if (pieces[pieces.length - 1] === '') pieces.pop();
      cs.lines.push(...pieces);
    }

    function currentPre() { return document.getElementById('wsTermPre'); }

    function renderCardLines(pre, id) {
      if (!pre) return;
      const cs = cardState[id];
      const atBottom = pre.scrollHeight - pre.scrollTop - pre.clientHeight < 6;
      const prevScrollTop = pre.scrollTop;
      pre.querySelectorAll('.term-line').forEach(l => l.remove());
      const frag = document.createDocumentFragment();
      cs.lines.forEach((line, i) => {
        const div = document.createElement('div');
        div.className = 'term-line';
        div.dataset.i = String(i);
        const span = document.createElement('span');
        span.className = 'term-line__text';
        span.innerHTML = renderBufferLine(line) || '&nbsp;';
        div.appendChild(span);
        frag.appendChild(div);
      });
      pre.insertBefore(frag, pre.firstChild);
      if (cs.selection) {
        if (cs.selection.end >= cs.lines.length) cs.selection = null;
        syncSelectionUI(id);
      }
      pre.scrollTop = atBottom ? pre.scrollHeight : prevScrollTop;
    }

    let liveSimStarted = false;
    function initLiveSession() {
      if (liveSimStarted) return;
      liveSimStarted = true;
      const session = TMS_DATA.sessions.find(s => s.live);
      if (!session) return;
      const id = session.id;
      const cs = cardState[id];
      const sim = TMSSim.createSession(session.script, { autoApprove: false });
      cs.sim = sim;
      sim.on('out', chunk => { appendOutChunk(cs, chunk); onSessionLinesChanged(id); });
      sim.on('status', status => onSessionStatusChanged(id, status));
      sim.on('prompt', data => onSessionPrompt(id, data));
      sim.on('done', () => onSessionDone(id));
      sim.start();
    }

    function onSessionLinesChanged(id) {
      updateSessionTileLine(id);
      if (state.activeSessionId === id) renderCardLines(currentPre(), id);
      if (state.stripOpen) renderStripExpanded();
    }
    function onSessionStatusChanged(id, status) {
      const cs = cardState[id];
      cs.status = status;
      updateSessionTileChip(id);
      if (state.activeSessionId === id) updateWorkspaceChip(id);
      const live = TMS_DATA.sessions.find(s => s.live);
      if (live && live.id === id) {
        setStripActivity(status === 'running' ? 'live' : status === 'done' ? 'ok' : 'idle',
          status === 'running' ? 'Claude aktiv' : status === 'done' ? 'Fertig' : 'Bereit');
      }
    }
    function onSessionPrompt(id, data) {
      const cs = cardState[id];
      cs.pendingPrompt = data;
      updateSessionTileChip(id);
      if (state.activeSessionId === id) updateWorkspaceChip(id);
      setStripActivity('warn', 'Wartet auf Freigabe');
      if (state.activeSessionId === id) openPermSheet(id);
    }
    function onSessionDone(id) {
      const cs = cardState[id];
      cs.replayAvailable = true;
      updateSessionTileChip(id);
      if (state.activeSessionId === id) {
        const btn = document.getElementById('wsReplayBtn');
        btn.hidden = false;
        btn.onclick = () => replaySession(id);
      }
    }

    function replaySession(id) {
      const cs = cardState[id];
      const session = TMS_DATA.sessions.find(s => s.id === id);
      clearTimeout(cs.autoTimer);
      cs.lines = session.buffer.slice();
      cs.pendingPrompt = null;
      cs.status = 'running';
      cs.replayAvailable = false;
      clearSelection(id);
      if (state.activeSessionId === id) {
        document.getElementById('wsReplayBtn').hidden = true;
        renderCardLines(currentPre(), id);
      }
      updateSessionTileChip(id);
      if (state.activeSessionId === id) updateWorkspaceChip(id);
      setStripActivity('live', 'Claude aktiv');
      cs.sim.reset();
      cs.sim.start();
    }

    // ============================================================
    // Permission sheet (glass) — Ja / Nein (recoverable) / Auto-Approve
    // ============================================================
    function openPermSheet(id) {
      const cs = cardState[id];
      const data = cs.pendingPrompt;
      if (!data) return;
      document.getElementById('permTool').textContent = data.tool;
      document.getElementById('permTarget').textContent = data.target || '';
      document.getElementById('permQuestion').textContent = data.question || 'Erlauben?';
      document.getElementById('permAutoBtn').setAttribute('aria-pressed', String(cs.autoApprove));
      const wrap = document.getElementById('permSheetWrap');
      wrap.hidden = false;
      requestAnimationFrame(() => wrap.classList.add('is-open'));
      if (cs.autoApprove) armAutoApprove(id);
    }
    function closePermSheet() {
      const wrap = document.getElementById('permSheetWrap');
      wrap.classList.remove('is-open');
      setTimeout(() => { wrap.hidden = true; }, 180);
    }
    function resolvePrompt(approved) {
      const id = state.activeSessionId;
      if (!id) return;
      const cs = cardState[id];
      clearTimeout(cs.autoTimer);
      closePermSheet();
      cs.pendingPrompt = null;
      if (approved) {
        updateSessionTileChip(id);
        updateWorkspaceChip(id);
        setStripActivity('live', 'Claude aktiv');
        cs.sim.respond();
      } else {
        appendOutChunk(cs, '  ⎿ ✖ Abgelehnt — Aktion gestoppt\n');
        onSessionLinesChanged(id);
        cs.status = 'idle';
        cs.replayAvailable = true;
        updateSessionTileChip(id);
        updateWorkspaceChip(id);
        setStripActivity('idle', 'Bereit');
        document.getElementById('wsReplayBtn').hidden = false;
        document.getElementById('wsReplayBtn').onclick = () => replaySession(id);
      }
    }
    function armAutoApprove(id) {
      const cs = cardState[id];
      clearTimeout(cs.autoTimer);
      cs.autoTimer = setTimeout(() => {
        if (!cs.pendingPrompt || !cs.sim) return;
        appendOutChunk(cs, '  ⎿ ✔ Auto-Approve\n');
        onSessionLinesChanged(id);
        cs.pendingPrompt = null;
        updateSessionTileChip(id);
        updateWorkspaceChip(id);
        closePermSheet();
        setStripActivity('live', 'Claude aktiv');
        cs.sim.respond();
      }, 600);
    }
    function toggleAutoApprove() {
      const id = state.activeSessionId;
      if (!id) return;
      const cs = cardState[id];
      cs.autoApprove = !cs.autoApprove;
      document.getElementById('permAutoBtn').setAttribute('aria-pressed', String(cs.autoApprove));
      if (cs.autoApprove && cs.pendingPrompt) armAutoApprove(id);
      else clearTimeout(cs.autoTimer);
    }

    // ============================================================
    // Touch text-selection: handles + copy bubble (workspace terminal)
    // ============================================================
    // Generic lookup by cardId: matches the workspace's singleton #wsTermPre (when its
    // data-card-id equals the active session) AND any other .ws-term-pre with that
    // data-card-id (e.g. the Cloud XXL log viewer) — lets the selection machinery below
    // be shared between the workspace terminal and cloud logs instead of duplicated.
    function findPre(id) { return document.querySelector(`.ws-term-pre[data-card-id="${id}"]`); }

    function handleLineTap(pre, line) {
      const id = pre.dataset.cardId;
      const cs = cardState[id];
      const i = Number(line.dataset.i);
      if (cs.selection && cs.selection.start === i && cs.selection.end === i) {
        clearSelection(id);
        return;
      }
      cs.selection = { start: i, end: i };
      syncSelectionUI(id);
    }
    function syncSelectionUI(id) {
      const pre = findPre(id);
      if (!pre) return;
      const cs = cardState[id];
      pre.querySelectorAll('.term-line').forEach(l => {
        const i = Number(l.dataset.i);
        l.classList.toggle('is-selected', !!cs.selection && i >= cs.selection.start && i <= cs.selection.end);
      });
      positionHandlesAndBubble(id);
    }
    function makeHandle(kind, id) {
      const el = document.createElement('div');
      el.className = `sel-handle sel-handle--${kind}`;
      el.addEventListener('pointerdown', e => startHandleDrag(e, id, kind));
      return el;
    }
    function startHandleDrag(e, id, kind) {
      e.preventDefault(); e.stopPropagation();
      const handle = e.currentTarget;
      const pointerId = e.pointerId;
      let cleaned = false;
      function onMove(ev) {
        if (ev.pointerId !== pointerId) return;
        const el = document.elementFromPoint(ev.clientX, ev.clientY);
        const line = el && el.closest && el.closest('.term-line');
        if (!line) return;
        const idx = Number(line.dataset.i);
        const cs = cardState[id];
        if (!cs.selection) return;
        if (kind === 'start') cs.selection.start = Math.min(idx, cs.selection.end);
        else cs.selection.end = Math.max(idx, cs.selection.start);
        syncSelectionUI(id);
      }
      function cleanup() {
        if (cleaned) return;
        cleaned = true;
        handle.removeEventListener('pointermove', onMove);
        handle.removeEventListener('pointerup', onUp);
        handle.removeEventListener('pointercancel', onCancel);
        handle.removeEventListener('lostpointercapture', onLostCapture);
        try { handle.releasePointerCapture(pointerId); } catch (err) { /* already released */ }
      }
      function onUp() { cleanup(); }
      function onCancel() { cleanup(); }
      function onLostCapture() { cleanup(); }
      try { handle.setPointerCapture(pointerId); } catch (err) { /* unsupported */ }
      handle.addEventListener('pointermove', onMove);
      handle.addEventListener('pointerup', onUp);
      handle.addEventListener('pointercancel', onCancel);
      handle.addEventListener('lostpointercapture', onLostCapture);
    }
    function makeBubble(id) {
      const el = document.createElement('button');
      el.className = 'copy-bubble';
      el.textContent = 'Kopieren';
      el.addEventListener('click', e => {
        e.stopPropagation();
        const cs = cardState[id];
        if (!cs.selection) return;
        const pre = findPre(id);
        const lines = [...pre.querySelectorAll('.term-line')].slice(cs.selection.start, cs.selection.end + 1);
        const text = lines.map(l => l.querySelector('.term-line__text').textContent).join('\n');
        copyText(text);
        toast('Kopiert ✓');
        clearSelection(id);
      });
      return el;
    }
    function positionHandlesAndBubble(id) {
      const pre = findPre(id);
      if (!pre) return;
      const cs = cardState[id];
      let handleStart = pre.querySelector('.sel-handle--start');
      let handleEnd = pre.querySelector('.sel-handle--end');
      let bubble = pre.querySelector('.copy-bubble');
      if (!cs.selection) {
        [handleStart, handleEnd, bubble].forEach(el => el && el.remove());
        return;
      }
      if (!handleStart) { handleStart = makeHandle('start', id); pre.appendChild(handleStart); }
      if (!handleEnd) { handleEnd = makeHandle('end', id); pre.appendChild(handleEnd); }
      if (!bubble) { bubble = makeBubble(id); pre.appendChild(bubble); }
      const startLine = pre.querySelector(`.term-line[data-i="${cs.selection.start}"]`);
      const endLine = pre.querySelector(`.term-line[data-i="${cs.selection.end}"]`);
      if (!startLine || !endLine) return;
      const startText = startLine.querySelector('.term-line__text');
      const endText = endLine.querySelector('.term-line__text');
      handleStart.style.top = (startLine.offsetTop + startLine.offsetHeight) + 'px';
      handleStart.style.left = startText.offsetLeft + 'px';
      handleEnd.style.top = (endLine.offsetTop + endLine.offsetHeight) + 'px';
      handleEnd.style.left = (endText.offsetLeft + endText.offsetWidth) + 'px';
      bubble.style.top = Math.max(0, startLine.offsetTop - 34) + 'px';
      bubble.style.left = Math.min(startText.offsetLeft, endText.offsetLeft) + 'px';
    }
    function clearSelection(id) {
      const cs = cardState[id];
      cs.selection = null;
      const pre = findPre(id);
      if (!pre) return;
      pre.querySelectorAll('.term-line.is-selected').forEach(l => l.classList.remove('is-selected'));
      positionHandlesAndBubble(id);
    }

    // Delegated: wrapped-link copy (outside selection mode) + line-tap selection
    // (inside selection mode). Scoped to .ws-term-pre so hub tile previews (which
    // never carry that class) never trigger these paths. Generic over ANY
    // .ws-term-pre in the DOM — the workspace terminal AND the Cloud XXL log
    // viewer share this exact delegated handler.
    document.addEventListener('click', e => {
      const link = e.target.closest('.wrapped-link');
      if (link && link.closest('.ws-term-pre')) {
        const inSelectionMode = link.closest('.ws-term-pre.selection-mode');
        if (!inSelectionMode) {
          copyText(link.dataset.url);
          toast(`Vollständiger Link kopiert ✓ (…${link.dataset.short}…)`);
          return;
        }
      }
      const pre = e.target.closest('.ws-term-pre.selection-mode');
      if (pre) {
        const line = e.target.closest('.term-line');
        if (line) handleLineTap(pre, line);
      }
    });

    function toggleSelectionMode() {
      const id = state.activeSessionId;
      if (!id) return;
      const cs = cardState[id];
      cs.selectionMode = !cs.selectionMode;
      document.getElementById('selToggleBtn').classList.toggle('is-on', cs.selectionMode);
      document.getElementById('selToggleBtn').setAttribute('aria-pressed', String(cs.selectionMode));

          <div class="note-card"><div class="note-card__title">${escapeHtml(n.title)}</div><div class="note-card__body">${escapeHtml(n.body)}</div><div class="note-card__time">${escapeHtml(n.time)}</div></div>`).join('')}</div>`;

        host.innerHTML = `<div class="tool-grid">${TOOL_DEFS.map(t => `

    function wireRailTabs() {
      document.getElementById('wsRailTabs').addEventListener('click', e => {
        const btn = e.target.closest('button[data-tab]');

        document.querySelectorAll('#wsRailTabs button').forEach(b => b.classList.toggle('active', b === btn));

    function wireNameEdit() {
      const input = document.getElementById('wsName');
      input.addEventListener('keydown', e => { if (e.key === 'Enter') input.blur(); });
      input.addEventListener('focusout', () => {
        const id = state.activeSessionId;
        if (!id) return;
        const session = TMS_DATA.sessions.find(s => s.id === id);
        if (!input.value.trim()) { input.value = input.dataset.prev; return; }
        input.dataset.prev = input.value;
        session.name = input.value;
        renderSessionsZone();
        renderSwitcherChips();
      });

    function enterWorkspace(id) {
      state.activeSessionId = id;
      state.railTab = 'context';
      const session = TMS_DATA.sessions.find(s => s.id === id);
      const cs = cardState[id];
      const nameInput = document.getElementById('wsName');
      nameInput.value = session.name;
      nameInput.dataset.prev = session.name;
      document.getElementById('wsDesc').textContent = session.description;
      const pre = document.getElementById('wsTermPre');
      pre.dataset.cardId = id;
      pre.classList.toggle('selection-mode', cs.selectionMode);
      document.getElementById('selToggleBtn').classList.toggle('is-on', cs.selectionMode);
      document.getElementById('selToggleBtn').setAttribute('aria-pressed', String(cs.selectionMode));
      updateWorkspaceChip(id);
      const replayBtn = document.getElementById('wsReplayBtn');
      replayBtn.hidden = !cs.replayAvailable;
      replayBtn.onclick = () => replaySession(id);
      renderCardLines(pre, id);
      document.querySelectorAll('#wsRailTabs button').forEach(b => b.classList.toggle('active', b.dataset.tab === 'context'));
      renderRailBody();
      renderSwitcherChips();
      if (cs.pendingPrompt) openPermSheet(id); else closePermSheet();
      show('workspace');

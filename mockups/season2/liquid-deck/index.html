<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>Liquid Deck — TMS Terminal</title>
<style>
  :root {
    --bg-grad: radial-gradient(120% 90% at 20% 0%, #1b2340 0%, #0b0e1a 55%, #06070d 100%);
    --glass: rgba(255,255,255,0.07); --glass-strong: rgba(255,255,255,0.12);
    --glass-border: rgba(255,255,255,0.16); --blur: blur(24px) saturate(160%);
    --text: #f2f4ff; --text-dim: rgba(242,244,255,0.55);
    --accent: #6aa8ff; --accent-warm: #ff9f6a;
    --ok: #4ade80; --warn: #fbbf24; --err: #f87171;
    --radius-lg: 24px; --radius-md: 16px; --radius-sm: 12px;
    --spring: cubic-bezier(0.34, 1.3, 0.5, 1);
    --font-ui: -apple-system, BlinkMacSystemFont, "SF Pro Display", "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    --font-mono: ui-monospace, "SF Mono", "Cascadia Code", "JetBrains Mono", Menlo, Consolas, monospace;
    --island-space: 92px;
    --chrome-space: 118px;
    --chrome-space-term: 168px;
    --term-font-size: 13px;
  }

  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  html, body { height: 100%; }
  body {
    margin: 0; overflow: hidden; background: var(--bg-grad); color: var(--text);
    font: 400 14.5px/1.45 var(--font-ui); -webkit-font-smoothing: antialiased;
  }
  button, input { font: inherit; color: inherit; }
  button { background: none; border: none; cursor: pointer; }
  a { color: inherit; }

  /* ============================================================
     Ambient liquid background — soft drifting color blobs behind
     every glass surface, source of the "light" glass refracts.
     ============================================================ */
  .atmosphere { position: fixed; inset: 0; overflow: hidden; z-index: 0; pointer-events: none; }
  .atmosphere .blob { position: absolute; border-radius: 50%; filter: blur(60px); opacity: .55; will-change: transform; }
  .blob--a { width: 60vmax; height: 60vmax; left: -20vmax; top: -24vmax; background: radial-gradient(circle at 30% 30%, rgba(106,168,255,.35), transparent 65%); animation: driftA 46s ease-in-out infinite alternate; }
  .blob--b { width: 52vmax; height: 52vmax; right: -18vmax; top: 10vmax; background: radial-gradient(circle at 60% 40%, rgba(255,159,106,.22), transparent 65%); animation: driftB 58s ease-in-out infinite alternate; }
  .blob--c { width: 46vmax; height: 46vmax; left: 8vmax; bottom: -20vmax; background: radial-gradient(circle at 50% 50%, rgba(154,120,255,.20), transparent 65%); animation: driftC 64s ease-in-out infinite alternate; }
  @keyframes driftA { from { transform: translate(0,0) scale(1); } to { transform: translate(6vmax,8vmax) scale(1.08); } }
  @keyframes driftB { from { transform: translate(0,0) scale(1); } to { transform: translate(-8vmax,4vmax) scale(0.94); } }
  @keyframes driftC { from { transform: translate(0,0) scale(1); } to { transform: translate(4vmax,-6vmax) scale(1.06); } }
  @media (prefers-reduced-motion: reduce) {
    .atmosphere .blob { animation: none; }
  }

  /* ============================================================
     Glass utility — every surface in this concept is one of these.
     ============================================================ */
  .glass {
    position: relative;
    background: var(--glass);
    -webkit-backdrop-filter: var(--blur); backdrop-filter: var(--blur);
    border: 1px solid var(--glass-border);
    border-radius: var(--radius-lg);
  }
  .glass--strong { background: var(--glass-strong); }
  .glass--dark { background: rgba(6,9,18,0.55); -webkit-backdrop-filter: blur(20px) saturate(120%); backdrop-filter: blur(20px) saturate(120%); }
  .glass::before {
    content: ''; position: absolute; left: 10%; right: 10%; top: 0; height: 1px;
    background: linear-gradient(90deg, transparent, rgba(255,255,255,.55), transparent);
    pointer-events: none;
  }

  /* ============================================================
     Screens / router
     ============================================================ */
  #screens { position: fixed; inset: 0; z-index: 1; }
  section[data-screen] {
    position: absolute; inset: 0; overflow-y: auto; -webkit-overflow-scrolling: touch;
    padding: var(--island-space) 16px var(--chrome-space);
  }
  section[data-screen="terminals"] { padding-bottom: var(--chrome-space-term); }
  section[data-screen="terminals"]:not([hidden]) { overflow: hidden; display: flex; flex-direction: column; }

  ::-webkit-scrollbar { width: 0; height: 0; }

  /* ============================================================
     Dynamic Island — persistent, top center, morphs compact<->open.
     ============================================================ */
  #island { position: fixed; top: calc(env(safe-area-inset-top, 0px) + 10px); left: 50%; transform: translateX(-50%); z-index: 60; }
  .island-shell {
    width: 292px; height: 40px; overflow: hidden; cursor: pointer;
    display: flex; align-items: center;
    transition: width 380ms var(--spring), height 380ms var(--spring), border-radius 380ms var(--spring), background 380ms var(--spring);
    border-radius: 20px;
  }
  .island-shell.is-open { width: min(92vw, 400px); height: auto; max-height: 74vh; border-radius: var(--radius-lg); cursor: default; align-items: stretch; overflow-y: auto; }
  .island-compact { display: flex; align-items: center; gap: 10px; padding: 0 14px; width: 100%; white-space: nowrap; transition: opacity 200ms ease, transform 300ms var(--spring); }
  .island-shell.is-open .island-compact { opacity: 0; transform: translateY(-6px) scale(.94); pointer-events: none; position: absolute; }
  .island-seg { display: flex; align-items: center; gap: 6px; min-width: 0; }
  .island-seg__label { font-size: 12px; font-weight: 600; letter-spacing: .01em; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  /* Activity is the only segment allowed to shrink/ellipsis under pressure —
     latency + prayer are short, fixed-format readouts and always stay whole. */
  .island-seg--activity { flex: 1 1 auto; }
  .island-seg--latency, .island-seg--prayer { flex: none; }
  .island-seg--latency .island-seg__label { color: var(--ok); font-family: var(--font-mono); font-variant-numeric: tabular-nums; }
  .island-dot { width: 7px; height: 7px; border-radius: 50%; flex: none; background: var(--text-dim); }
  .island-dot.is-live { background: var(--accent); box-shadow: 0 0 0 0 rgba(106,168,255,.6); animation: islandPulse 1.4s ease-out infinite; }
  .island-dot.is-warn { background: var(--warn); box-shadow: 0 0 0 0 rgba(251,191,36,.6); animation: islandPulse 1.1s ease-out infinite; }
  .island-dot.is-ok { background: var(--ok); }
  @keyframes islandPulse { 0% { box-shadow: 0 0 0 0 rgba(106,168,255,.55); } 70% { box-shadow: 0 0 0 7px rgba(106,168,255,0); } 100% { box-shadow: 0 0 0 0 rgba(106,168,255,0); } }
  .island-divider { width: 1px; height: 16px; background: var(--glass-border); flex: none; }
  .island-seg--prayer { color: var(--text-dim); font-variant-numeric: tabular-nums; }
  .island-moon { flex: none; opacity: .85; }

  /* Dictation-in-progress badge — sits OUTSIDE .island-shell (which clips via
     overflow:hidden) so it can hang off the shell's corner without being cut. */
  .island-mic-badge { position: absolute; top: -3px; right: -3px; width: 16px; height: 16px; border-radius: 50%;
    background: var(--err); color: #2b0a0a; font-size: 8px; display: flex; align-items: center; justify-content: center;
    box-shadow: 0 0 10px rgba(248,113,113,.7); animation: islandPulse 1s ease-in-out infinite; z-index: 2; }
  .island-mic-badge[hidden] { display: none; }
  .island-shell.is-open ~ .island-mic-badge { display: none; }

  .island-expanded { display: none; opacity: 0; padding: 16px 18px 18px; }
  .island-shell.is-open .island-expanded { display: block; opacity: 1; transition: opacity 320ms var(--spring) 90ms; }
  .island-expanded h4 { margin: 14px 0 8px; font-size: 11px; text-transform: uppercase; letter-spacing: .08em; color: var(--text-dim); font-weight: 600; }
  .island-expanded h4:first-child { margin-top: 0; }
  .island-row { display: flex; align-items: center; gap: 10px; padding: 8px 0; border-top: 1px solid rgba(255,255,255,.08); }
  .island-row:first-of-type { border-top: none; }
  .island-row__dot { width: 8px; height: 8px; border-radius: 50%; flex: none; }
  .island-row__name { font-weight: 600; font-size: 13.5px; flex: 1; min-width: 0; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .island-row__meta { font-size: 12px; color: var(--text-dim); flex: none; }
  .island-activity-feed { font: 12.5px/1.5 var(--font-mono); color: var(--text-dim); background: rgba(0,0,0,.28); border-radius: var(--radius-sm); padding: 10px 12px; white-space: pre-wrap; word-break: break-word; }
  .island-activity-feed .sgr-g { color: var(--ok); } .island-activity-feed .sgr-r { color: var(--err); } .island-activity-feed .sgr-b { font-weight: 700; } .island-activity-feed .sgr-d { opacity: .6; }
  .island-close-hint { text-align: center; font-size: 11px; color: var(--text-dim); padding-top: 12px; opacity: .7; }

  /* ============================================================
     Toasts
     ============================================================ */
  #toasts { position: fixed; left: 50%; bottom: calc(env(safe-area-inset-bottom,0px) + 96px); transform: translateX(-50%); z-index: 100; display: flex; flex-direction: column; gap: 8px; align-items: center; pointer-events: none; }
  .toast { background: var(--glass-strong); -webkit-backdrop-filter: var(--blur); backdrop-filter: var(--blur); border: 1px solid var(--glass-border); color: var(--text); padding: 10px 18px; border-radius: 999px; font-size: 13px; font-weight: 500; opacity: 0; transform: translateY(8px) scale(.96); transition: opacity 260ms var(--spring), transform 260ms var(--spring); white-space: nowrap; }
  .toast.show { opacity: 1; transform: translateY(0) scale(1); }

  /* ============================================================
     Glass dock — bottom pill navigation
     ============================================================ */
  #dock { position: fixed; left: 50%; bottom: calc(env(safe-area-inset-bottom, 0px) + 16px); transform: translateX(-50%); z-index: 40;
    display: flex; gap: 2px; padding: 6px; background: var(--glass); -webkit-backdrop-filter: var(--blur); backdrop-filter: var(--blur);
    border: 1px solid var(--glass-border); border-radius: 999px; }
  #dock::before { content: ''; position: absolute; left: 14%; right: 14%; top: 0; height: 1px; background: linear-gradient(90deg, transparent, rgba(255,255,255,.5), transparent); }
  .dock-btn { display: flex; flex-direction: column; align-items: center; gap: 3px; width: 58px; padding: 7px 2px 6px; border-radius: 999px; color: var(--text-dim); transition: color 250ms var(--spring), background 250ms var(--spring); }
  .dock-btn svg { width: 20px; height: 20px; }
  .dock-btn span { font-size: 9.5px; font-weight: 600; letter-spacing: .01em; }
  .dock-btn.active { color: var(--text); background: rgba(106,168,255,.16); }
  .dock-btn:active { transform: scale(.94); }

  /* ============================================================
     Bottom sheets (Mehr / permission) — slide up with spring
     ============================================================ */
  .sheet-wrap { position: fixed; inset: 0; z-index: 70; display: flex; align-items: flex-end; justify-content: center; visibility: hidden; }
  .sheet-wrap.is-open { visibility: visible; }
  .sheet-backdrop { position: absolute; inset: 0; background: rgba(4,6,12,0); transition: background 350ms var(--spring); }
  .sheet-wrap.is-open .sheet-backdrop { background: rgba(4,6,12,.5); }
  .sheet-panel { position: relative; width: 100%; max-width: 480px; margin: 0 10px calc(env(safe-area-inset-bottom, 0px) + 10px); padding: 10px 18px calc(18px + env(safe-area-inset-bottom, 0px));
    background: var(--glass-strong); -webkit-backdrop-filter: var(--blur); backdrop-filter: var(--blur); border: 1px solid var(--glass-border); border-radius: var(--radius-lg);
    transform: translateY(110%); transition: transform 400ms var(--spring); }
  .sheet-wrap.is-open .sheet-panel { transform: translateY(0); }
  .sheet-grabber { width: 36px; height: 4px; border-radius: 3px; background: var(--glass-border); margin: 4px auto 14px; }
  .sheet-title { font-size: 15px; font-weight: 700; margin-bottom: 12px; }

  .mehr-list { display: flex; flex-direction: column; gap: 4px; }
  .mehr-item { display: flex; align-items: center; gap: 12px; padding: 13px 10px; border-radius: var(--radius-md); text-align: left; transition: background 200ms var(--spring); }
  .mehr-item:active, .mehr-item:hover { background: rgba(255,255,255,.06); }
  .mehr-item svg { width: 19px; height: 19px; color: var(--accent); flex: none; }
  .mehr-item span { font-size: 14.5px; font-weight: 500; }

  .perm-tool-row { display: flex; align-items: baseline; gap: 8px; flex-wrap: wrap; }
  .perm-tool { font-weight: 700; font-size: 15px; }
  .perm-target { font: 12.5px var(--font-mono); color: var(--text-dim); background: rgba(0,0,0,.28); padding: 2px 7px; border-radius: 6px; }
  .perm-question { color: var(--text-dim); font-size: 13.5px; margin: 8px 0 16px; }
  .perm-actions { display: flex; gap: 8px; flex-wrap: wrap; }
  .perm-actions button { flex: 1; min-width: 96px; padding: 12px 10px; border-radius: var(--radius-md); font-weight: 600; font-size: 13.5px; border: 1px solid var(--glass-border); background: rgba(255,255,255,.05); transition: background 200ms var(--spring), border-color 200ms var(--spring), color 200ms var(--spring); }
  .perm-actions button[data-act="yes"] { background: rgba(106,168,255,.22); border-color: rgba(106,168,255,.4); color: #d9e6ff; }
  .perm-actions button[data-act="no"] { color: var(--err); }
  .perm-actions button[data-act="auto"][aria-pressed="true"] { background: rgba(74,222,128,.18); border-color: rgba(74,222,128,.4); color: var(--ok); }

  /* ============================================================
     Servers screen
     ============================================================ */
  .update-pill { display: flex; align-items: center; gap: 10px; padding: 11px 14px; margin-bottom: 18px; border-radius: 999px; }
  .update-pill__text { flex: 1; font-size: 12.5px; }
  .update-pill__text b { color: var(--accent-warm); }
  .update-pill button.cta { font-size: 12px; font-weight: 700; color: var(--accent); padding: 6px 12px; border-radius: 999px; background: rgba(106,168,255,.16); }
  .update-pill button.x { color: var(--text-dim); font-size: 16px; padding: 2px 4px; }

  .screen-title { font-size: 26px; font-weight: 700; letter-spacing: -0.01em; margin: 4px 0 16px; }

  .server-grid { display: grid; grid-template-columns: 1fr; gap: 12px; }
  .server-card { padding: 18px; display: flex; align-items: center; gap: 14px; transition: transform 300ms var(--spring), background 300ms var(--spring); }
  .server-card[data-status="online"] { cursor: pointer; }
  .server-card[data-status="online"]:active { transform: scale(.98); }
  .server-card[data-status="offline"] { opacity: .55; }
  .server-orb { position: relative; width: 46px; height: 46px; border-radius: 50%; flex: none; display: flex; align-items: center; justify-content: center; background: rgba(255,255,255,.06); border: 1px solid var(--glass-border); }
  .server-orb svg { width: 22px; height: 22px; }
  .server-card[data-status="online"] .server-orb { box-shadow: 0 0 0 1px rgba(74,222,128,.4), 0 0 30px 6px rgba(74,222,128,.30); color: var(--ok); }
  .server-card[data-status="offline"] .server-orb { color: var(--text-dim); }
  .server-info { flex: 1; min-width: 0; }
  .server-name { font-size: 17px; font-weight: 700; letter-spacing: -0.01em; }
  .server-host { font: 12px var(--font-mono); color: var(--text-dim); margin-top: 2px; }
  .server-meta { display: flex; gap: 8px; margin-top: 8px; flex-wrap: wrap; }
  .server-chip { font-size: 11px; font-weight: 600; padding: 4px 9px; border-radius: 999px; background: rgba(255,255,255,.06); color: var(--text-dim); }
  .server-chip.ok { color: var(--ok); }

  /* ============================================================
     Terminal workspace — spatial swipeable stack
     ============================================================ */
  .term-header { display: flex; flex-direction: column; gap: 10px; padding: 0 2px 12px; flex: none; }
  .term-header__top { display: flex; align-items: center; justify-content: space-between; gap: 10px; }
  .term-header__top h2 { margin: 0; font-size: 22px; font-weight: 700; letter-spacing: -.01em; }
  .term-header__actions { display: flex; align-items: center; gap: 8px; flex: none; }
  .overview-btn { width: 38px; height: 38px; border-radius: 12px; font-size: 17px; display: flex; align-items: center; justify-content: center; }
  .overview-btn.is-on { background: rgba(106,168,255,.2); color: var(--accent); }

  /* Stack ⇄ Liste segmented view toggle */
  .view-toggle { display: inline-flex; gap: 3px; padding: 4px; border-radius: 999px; align-self: flex-start; }
  .view-toggle__btn { display: flex; align-items: center; gap: 6px; padding: 8px 14px; border-radius: 999px; font: 600 12.5px var(--font-ui); color: var(--text-dim); transition: background 220ms var(--spring), color 220ms var(--spring); }
  .view-toggle__btn svg { width: 15px; height: 15px; flex: none; }
  .view-toggle__btn[aria-selected="true"] { color: var(--text); background: rgba(106,168,255,.2); }

  .term-body-wrap { position: relative; flex: 1; min-height: 0; display: flex; flex-direction: column; }
  .term-body { flex: 1; min-height: 0; display: flex; flex-direction: column; }
  .term-body-wrap.overview-active .term-body { visibility: hidden; }

  .workspace { flex: 1; min-height: 0; display: flex; gap: 14px; padding: 0 16px; }
  .stack-pane { position: relative; flex: 1; min-width: 0; min-height: 0; overflow: hidden; border-radius: var(--radius-lg); }
  .stack { position: absolute; inset: 0; touch-action: pan-y; }
  .stack.is-dragging .stack-card { transition: none !important; }

  .stack-card { position: absolute; inset: 0; margin: 0 auto; width: 100%; max-width: 480px; display: flex; flex-direction: column; overflow: hidden;
    transition: transform 380ms var(--spring), opacity 380ms var(--spring), filter 380ms var(--spring); will-change: transform, opacity; }
  .card-header { flex: none; display: flex; align-items: center; gap: 10px; padding: 14px 16px 12px; cursor: grab; }
  .card-tag { width: 10px; height: 10px; border-radius: 50%; flex: none; }
  .card-name-wrap { flex: 1; min-width: 0; }
  .card-name { font-size: 15.5px; font-weight: 700; letter-spacing: -.005em; background: none; border: none; padding: 2px 0; width: 100%; border-bottom: 1px solid transparent; }
  .card-name[data-editing="1"] { border-bottom: 1px solid var(--accent); outline: none; }
  .card-desc { font-size: 11.5px; color: var(--text-dim); margin-top: 1px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .status-chip { flex: none; font-size: 10.5px; font-weight: 700; letter-spacing: .02em; padding: 4px 9px; border-radius: 999px; display: flex; align-items: center; gap: 5px; text-transform: uppercase; }
  .status-chip .dot { width: 6px; height: 6px; border-radius: 50%; }
  .status-chip[data-status="running"] { color: var(--accent); background: rgba(106,168,255,.14); }
  .status-chip[data-status="running"] .dot { background: var(--accent); animation: islandPulse 1.3s ease-out infinite; }
  .status-chip[data-status="waiting"] { color: var(--warn); background: rgba(251,191,36,.14); }
  .status-chip[data-status="waiting"] .dot { background: var(--warn); }
  .status-chip[data-status="done"] { color: var(--ok); background: rgba(74,222,128,.14); }
  .status-chip[data-status="done"] .dot { background: var(--ok); }
  .status-chip[data-status="idle"] { color: var(--text-dim); background: rgba(255,255,255,.06); }
  .status-chip[data-status="idle"] .dot { background: var(--text-dim); }

  .card-body { flex: 1; min-height: 0; overflow-y: auto; margin: 0 8px 8px; border-radius: var(--radius-md); padding: 12px 14px; font-size: var(--term-font-size); line-height: 1.6; font-family: var(--font-mono); position: relative; }
  .card-body::before { display: none; }
  .term-line { display: block; white-space: pre-wrap; word-break: break-word; padding: 1px 0; border-radius: 4px; }
  .term-line.is-selected { background: rgba(106,168,255,.22); }
  .selection-mode .term-line { cursor: pointer; }
  .selection-mode .term-line:active { background: rgba(106,168,255,.12); }
  .sgr-b { font-weight: 700; } .sgr-d { opacity: .58; } .sgr-g { color: var(--ok); } .sgr-r { color: var(--err); }
  .wrapped-link { color: var(--accent); text-decoration: underline; text-decoration-color: rgba(106,168,255,.4); text-underline-offset: 2px; cursor: pointer; word-break: break-all; }

  .replay-pill { flex: none; margin: 0 8px 10px; padding: 10px; border: 1px dashed var(--glass-border); border-radius: var(--radius-md); text-align: center; font-size: 12.5px; font-weight: 600; color: var(--text-dim); transition: border-color 250ms var(--spring), color 250ms var(--spring); }
  .replay-pill:hover { border-color: var(--accent); color: var(--accent); }
  .replay-pill[hidden] { display: none; }

  /* glowing selection handles + copy bubble */
  .sel-handle { position: absolute; width: 16px; height: 16px; border-radius: 50%; background: var(--accent); transform: translate(-50%, 0); touch-action: none; z-index: 5;
    box-shadow: 0 0 0 4px rgba(106,168,255,.22), 0 0 16px 3px rgba(106,168,255,.65); animation: handleGlow 1.6s ease-in-out infinite; }
  @keyframes handleGlow { 0%,100% { box-shadow: 0 0 0 4px rgba(106,168,255,.22), 0 0 16px 3px rgba(106,168,255,.55); } 50% { box-shadow: 0 0 0 6px rgba(106,168,255,.3), 0 0 22px 6px rgba(106,168,255,.8); } }
  .sel-handle::before { content: ''; position: absolute; left: 50%; bottom: 100%; width: 2px; height: 18px; background: var(--accent); transform: translateX(-50%); box-shadow: 0 0 8px rgba(106,168,255,.7); }
  .copy-bubble { position: absolute; transform: translateX(-8px); background: var(--glass-strong); -webkit-backdrop-filter: var(--blur); backdrop-filter: var(--blur); border: 1px solid var(--glass-border); color: var(--text); font: 600 12px var(--font-ui); padding: 7px 14px; border-radius: 999px; cursor: pointer; z-index: 6; white-space: nowrap; }

  /* rail (expanded ≥700px) */
  .rail { display: none; }
  .rail-item { padding: 10px 12px; margin-bottom: 8px; cursor: grab; transition: transform 300ms var(--spring), border-color 300ms var(--spring); border-radius: var(--radius-md); touch-action: none; }
  .rail-item.is-active { border-color: rgba(106,168,255,.5); background: rgba(106,168,255,.08); }
  .rail-item.is-dragging { opacity: .35; }
  .rail-item__top { display: flex; align-items: center; gap: 8px; }
  .rail-item__name { font-size: 12.5px; font-weight: 700; flex: 1; min-width: 0; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .rail-item__preview { margin-top: 6px; font: 10.5px/1.4 var(--font-mono); color: var(--text-dim); max-height: 42px; overflow: hidden; word-break: break-word; overflow-wrap: anywhere; }
  .rail-drop-ghost { position: fixed; z-index: 90; pointer-events: none; opacity: .9; padding: 10px 14px; border-radius: var(--radius-md); font-size: 12.5px; font-weight: 700; }
  .rail-item.drop-target, .stack-pane.drop-target { outline: 2px solid var(--accent); outline-offset: -2px; border-radius: var(--radius-md); }
  .overview-tile .status-chip { padding: 4px 6px; }

  /* overview 2x2 grid — lives above .term-body (either Stack or Liste), a
     transient third state layered over whichever view is currently active */
  .overview-grid { display: none; position: absolute; inset: 0; z-index: 150; grid-template-columns: 1fr 1fr; grid-auto-rows: minmax(120px, 1fr); gap: 10px; padding: 4px; overflow-y: auto; }
  .overview-grid.is-open { display: grid; }
  .overview-tile { min-width: 0; min-height: 0; padding: 12px; display: flex; flex-direction: column; gap: 6px; text-align: left; transition: transform 200ms var(--spring); cursor: pointer; }
  .overview-tile:active { transform: scale(.96); }
  .overview-tile__head { display: flex; align-items: center; gap: 6px; min-width: 0; }
  .overview-tile__name { font-size: 12.5px; font-weight: 700; flex: 1; min-width: 0; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .overview-tile__body { flex: 1; min-width: 0; min-height: 0; overflow: hidden; font: 10px/1.4 var(--font-mono); color: var(--text-dim); word-break: break-word; overflow-wrap: anywhere; }

  /* ============================================================
     Liste view — vertical terminal stack (Command-Deck ergonomics,
     Liquid glass styling). Cards reuse .card-header/.card-body/
     .term-input-row/.card-note-btn verbatim from Stack so both views
     render off the exact same cardState/TMS_DATA — never a copy.
     ============================================================ */
  .term-list { flex: 1; min-height: 0; overflow-y: auto; -webkit-overflow-scrolling: touch; }
  .term-list__inner { max-width: 640px; margin: 0 auto; padding: 2px 16px calc(20px + env(safe-area-inset-bottom, 0px)); display: flex; flex-direction: column; gap: 14px; }
  .list-card { display: flex; flex-direction: column; flex: none; }
  .list-card .card-header { cursor: default; }
  /* Block, not flex: .card-body inherits flex:1/min-height:0 from the Stack
     context, which would collapse to ~0px inside an auto-height flex column.
     max-height below (not flex-grow) is what bounds it here. */
  .list-card__collapsible { border-top: 1px solid rgba(255,255,255,.08); padding-top: 10px; }
  .list-card[data-collapsed="true"] .list-card__collapsible { display: none; }
  .list-card__body { flex: none; max-height: min(300px, 42vh); }
  .chevron-btn { flex: none; width: 26px; height: 26px; display: flex; align-items: center; justify-content: center; border-radius: 8px; color: var(--text-dim); font-size: 12px; transition: transform 220ms var(--spring), color 200ms var(--spring), background 200ms var(--spring); }
  .chevron-btn:active { background: rgba(255,255,255,.1); }
  .list-card[data-collapsed="true"] .chevron-btn { transform: rotate(-90deg); }

  .add-terminal-cta { flex: none; display: flex; align-items: center; justify-content: center; gap: 8px; padding: 16px; border-radius: 999px; font: 700 14.5px var(--font-ui); color: var(--accent); margin-top: 2px; transition: background 220ms var(--spring), transform 150ms var(--spring); }
  .add-terminal-cta:active { transform: scale(.98); background: rgba(106,168,255,.14); }
  .add-terminal-cta__icon { font-size: 18px; line-height: 1; }

  /* toolbar */
  #toolbarHost { position: fixed; left: 50%; bottom: calc(env(safe-area-inset-bottom, 0px) + 74px); transform: translateX(-50%); z-index: 45; display: none; flex-direction: column; align-items: center; gap: 6px; }
  #toolbarHost.is-visible { display: flex; }
  .key-echo-host { display: flex; gap: 6px; min-height: 0; }
  .key-echo { background: var(--glass-strong); border: 1px solid var(--glass-border); padding: 4px 10px; border-radius: 999px; font-size: 11px; font-weight: 700; opacity: 0; transform: translateY(4px); transition: opacity 180ms var(--spring), transform 180ms var(--spring); }
  .key-echo.show { opacity: 1; transform: translateY(0); }
  .toolbar-pill { display: flex; gap: 3px; padding: 6px; border-radius: 999px; }
  .toolbar-pill button { min-width: 34px; height: 32px; padding: 0 9px; border-radius: 999px; font-size: 12px; font-weight: 700; color: var(--text-dim); transition: background 200ms var(--spring), color 200ms var(--spring); }
  .toolbar-pill button:active { background: rgba(255,255,255,.1); }
  .toolbar-pill button.is-on { color: var(--accent); background: rgba(106,168,255,.18); }

  /* ============================================================
     Breakpoints — compact <400, medium 400-699, expanded >=700
     ============================================================ */
  @media (min-width: 700px) {
    .server-grid { grid-template-columns: 1fr 1fr; }
    .rail { display: block; flex: 0 0 38%; max-width: 320px; overflow-y: auto; padding-right: 2px; }
    .stack-pane { flex: 1 1 60%; }
  }
  @media (max-width: 699.98px) {
    .stack-card { max-width: 520px; }
  }

  /* ============================================================
     Task 6 — Tools, Manager, Cloud, Settings, Prayer, Lock, Spotlight
     ============================================================ */

  .screen-col { max-width: 640px; margin: 0 auto; }
  .screen-title-row { display: flex; align-items: center; justify-content: space-between; gap: 10px; }
  .icon-btn { flex: none; width: 38px; height: 38px; border-radius: 12px; display: flex; align-items: center; justify-content: center; font-size: 16px; color: var(--text-dim); cursor: pointer; transition: color 200ms var(--spring), background 200ms var(--spring); }
  .icon-btn:hover, .icon-btn:active { color: var(--accent); }
  .mono-text { font: 12.5px var(--font-mono); }
  .table-scroll { overflow-x: auto; }

  /* Toggle switch (ports, watchers) */
  .switch { position: relative; display: inline-block; width: 40px; height: 24px; flex: none; }
  .switch input { position: absolute; inset: 0; opacity: 0; margin: 0; cursor: pointer; z-index: 1; }
  .switch__track { position: absolute; inset: 0; background: rgba(255,255,255,.08); border: 1px solid var(--glass-border); border-radius: 20px; transition: background 250ms var(--spring), border-color 250ms var(--spring); }
  .switch__thumb { position: absolute; top: 2px; left: 2px; width: 18px; height: 18px; border-radius: 50%; background: var(--text-dim); transition: transform 250ms var(--spring), background 250ms var(--spring); }
  .switch input:checked + .switch__track { background: rgba(106,168,255,.25); border-color: rgba(106,168,255,.5); }
  .switch input:checked + .switch__track .switch__thumb { transform: translateX(16px); background: var(--accent); box-shadow: 0 0 8px rgba(106,168,255,.6); }

  /* Reusable status-chip dataset values for cloud project statuses */
  .status-chip[data-status="ready"] { color: var(--ok); background: rgba(74,222,128,.14); }
  .status-chip[data-status="ready"] .dot { background: var(--ok); }
  .status-chip[data-status="live"] { color: var(--ok); background: rgba(74,222,128,.14); }
  .status-chip[data-status="live"] .dot { background: var(--ok); animation: islandPulse 1.4s ease-out infinite; }
  .status-chip[data-status="building"] { color: var(--accent); background: rgba(106,168,255,.14); }
  .status-chip[data-status="building"] .dot { background: var(--accent); animation: islandPulse 1.4s ease-out infinite; }
  .status-chip[data-status="suspended"] { color: var(--text-dim); background: rgba(255,255,255,.06); }
  .status-chip[data-status="suspended"] .dot { background: var(--text-dim); }

  /* ---------- Tools screen + tool sheet ---------- */
  .tool-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; }
  @media (min-width: 700px) { .tool-grid { grid-template-columns: repeat(5, 1fr); } }
  .tool-tile { display: flex; flex-direction: column; align-items: center; gap: 9px; padding: 18px 8px; cursor: pointer; transition: transform 220ms var(--spring), background 220ms var(--spring); }
  .tool-tile:active { transform: scale(.95); }
  .tool-tile__glyph { display: flex; align-items: center; justify-content: center; width: 36px; height: 36px; border-radius: 12px; background: rgba(255,255,255,.08); border: 1px solid var(--glass-border); font: 700 11px var(--font-mono); color: var(--accent); }
  .tool-tile__label { font: 600 12px var(--font-ui); color: var(--text); text-align: center; }

  .sheet-panel--tall { max-width: 640px; max-height: 82vh; display: flex; flex-direction: column; }
  .sheet-head-row { display: flex; align-items: center; gap: 10px; margin-bottom: 4px; }
  .sheet-head-row .sheet-title { flex: 1; margin-bottom: 0; }
  .sheet-close-btn { flex: none; font: 700 11px var(--font-mono); color: var(--text-dim); padding: 6px 13px; border-radius: 999px; background: rgba(255,255,255,.06); border: 1px solid var(--glass-border); cursor: pointer; transition: color 200ms var(--spring), border-color 200ms var(--spring); }
  .sheet-close-btn:hover { color: var(--accent); border-color: rgba(106,168,255,.4); }
  .sheet-scroll-body { overflow-y: auto; flex: 1; min-height: 0; padding-top: 6px; }

  .tool-row { display: flex; align-items: center; gap: 10px; width: 100%; padding: 12px 4px; border-top: 1px solid rgba(255,255,255,.08); text-align: left; }
  .tool-row:first-child { border-top: none; }
  .tool-row.is-tap { cursor: pointer; border-radius: 10px; transition: background 200ms var(--spring); }
  .tool-row.is-tap:active { background: rgba(255,255,255,.06); }
  .tool-row__icon { font: 12px var(--font-mono); color: var(--text-dim); width: 14px; text-align: center; flex: none; }
  .tool-row__name { flex: 1; font: 13px var(--font-ui); min-width: 0; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .tool-row__meta { font: 12px var(--font-mono); color: var(--text-dim); flex: none; }
  .tool-row__info { flex: 1; min-width: 0; }
  .tool-row__title { font: 13px var(--font-ui); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .tool-row__sub { margin-top: 2px; font: 11px var(--font-mono); color: var(--text-dim); }

  .sql-query { font: 12.5px/1.6 var(--font-mono); background: rgba(0,0,0,.28); border: 1px solid var(--glass-border); border-radius: 12px; padding: 11px 13px; margin-bottom: 14px; overflow-x: auto; white-space: pre; }
  .data-table { width: 100%; border-collapse: collapse; font: 12.5px var(--font-mono); }
  .data-table th, .data-table td { text-align: left; padding: 8px 10px; border-top: 1px solid rgba(255,255,255,.08); white-space: nowrap; }
  .data-table th { color: var(--text-dim); font-weight: 600; font-size: 11px; text-transform: uppercase; letter-spacing: .04em; }
  .data-table tr:first-child td { border-top: none; }
  .cpu-cell { display: flex; align-items: center; gap: 8px; }
  .cpu-bar { position: relative; width: 56px; height: 6px; background: rgba(0,0,0,.3); border-radius: 3px; overflow: hidden; flex: none; }
  .cpu-bar__fill { position: absolute; inset: 0; width: var(--pct, 0%); background: var(--accent); border-radius: 3px; }

  .notes-grid { display: flex; flex-direction: column; gap: 10px; }
  .note-card { padding: 13px; background: rgba(255,255,255,.05); border: 1px solid var(--glass-border); border-radius: 14px; }
  .note-card__title { font: 700 13px var(--font-ui); margin-bottom: 4px; }
  .note-card__body { font-size: 12.5px; color: var(--text-dim); line-height: 1.5; }
  .note-card__time { margin-top: 7px; font: 11px var(--font-mono); color: var(--text-dim); }

  .shot-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin-bottom: 14px; }
  .shot-tile { aspect-ratio: 9 / 16; border-radius: 14px; background: linear-gradient(160deg, rgba(255,255,255,.10), rgba(255,255,255,.02)); border: 1px solid var(--glass-border); }
  .shot-flash { position: fixed; inset: 0; background: #fff; opacity: 0; pointer-events: none; z-index: 110; transition: opacity 90ms ease-out; }
  .shot-flash.is-flashing { opacity: .85; transition: opacity 40ms ease-out; }

  .browser-bar { padding: 10px 15px; background: rgba(255,255,255,.05); border: 1px solid var(--glass-border); border-radius: 999px; font: 12.5px var(--font-mono); color: var(--text-dim); margin-bottom: 14px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .browser-skeleton { display: flex; flex-direction: column; gap: 10px; }
  .browser-skeleton__block { height: 14px; border-radius: 6px; background: rgba(255,255,255,.06); }

  .hit-badge { font: 700 11px var(--font-mono); color: var(--accent); background: rgba(106,168,255,.16); padding: 3px 8px; border-radius: 999px; flex: none; }

  /* ---------- Sub-tabs (Manager, Cloud detail) ---------- */
  .subtabs { display: flex; gap: 6px; margin: 4px 0 14px; flex-wrap: wrap; }
  .subtabs button { padding: 7px 14px; border-radius: 999px; font: 600 12px var(--font-ui); color: var(--text-dim); background: rgba(255,255,255,.05); border: 1px solid var(--glass-border); cursor: pointer; transition: color 200ms var(--spring), background 200ms var(--spring), border-color 200ms var(--spring); }
  .subtabs button.active { color: var(--text); background: rgba(106,168,255,.18); border-color: rgba(106,168,255,.4); }

  /* ---------- Manager screen ---------- */
  section[data-screen="manager"]:not([hidden]) { display: flex; flex-direction: column; overflow: hidden; }
  .manager-col { flex: 1; min-height: 0; display: flex; flex-direction: column; width: 100%; max-width: 640px; margin: 0 auto; }
  .manager-view { flex: 1; min-height: 0; display: flex; flex-direction: column; overflow: hidden; }
  .chat-scroll:not([hidden]) { flex: 1; min-height: 0; overflow-y: auto; padding: 4px 2px 12px; display: flex; flex-direction: column; gap: 10px; }
  #managerArtifacts:not([hidden]) { flex: 1; min-height: 0; display: flex; flex-direction: column; padding: 4px 0 12px; overflow: hidden; }
  #managerMemory:not([hidden]) { flex: 1; min-height: 0; overflow-y: auto; padding: 4px 2px 12px; display: flex; flex-direction: column; gap: 4px; }

  .chat-row { display: flex; }
  .chat-row[data-from="user"] { justify-content: flex-end; }
  .chat-bubble { max-width: 82%; padding: 10px 13px; border-radius: 18px; font-size: 13px; line-height: 1.5; }
  .chat-row[data-from="manager"] .chat-bubble { background: var(--glass); -webkit-backdrop-filter: var(--blur); backdrop-filter: var(--blur); border: 1px solid var(--glass-border); border-bottom-left-radius: 6px; }
  .chat-row[data-from="user"] .chat-bubble { background: rgba(106,168,255,.22); border: 1px solid rgba(106,168,255,.4); border-bottom-right-radius: 6px; }
  .chat-bubble__time { display: block; margin-top: 4px; font: 10.5px var(--font-mono); color: var(--text-dim); }

  .voice-pill { display: flex; align-items: center; gap: 9px; min-width: 180px; cursor: pointer; }
  .voice-pill__play { flex: none; width: 28px; height: 28px; border-radius: 50%; background: var(--accent); color: #071021; display: flex; align-items: center; justify-content: center; font-size: 10px; box-shadow: 0 0 14px rgba(106,168,255,.5); }
  .voice-pill__wave { flex: 1; display: flex; align-items: center; gap: 2px; height: 22px; color: var(--accent); }
  .voice-pill__wave span { width: 2.5px; display: block; background: currentColor; opacity: .5; border-radius: 2px; }
  .voice-pill.is-playing .voice-pill__wave span { animation: wave .9s ease-in-out infinite; }
  @keyframes wave { 0%, 100% { transform: scaleY(.4); } 50% { transform: scaleY(1); } }
  .voice-pill__dur { font: 11px var(--font-mono); color: var(--text-dim); flex: none; }
  .voice-transcript { margin-top: 8px; font-size: 12.5px; color: var(--text-dim); border-top: 1px solid rgba(255,255,255,.1); padding-top: 8px; }
  .voice-transcribing { margin-top: 8px; font: 600 12px var(--font-mono); color: var(--accent); }
  .voice-transcribing .dots span { display: inline-block; animation: blink 1.2s infinite; opacity: .2; }
  .voice-transcribing .dots span:nth-child(2) { animation-delay: .2s; }
  .voice-transcribing .dots span:nth-child(3) { animation-delay: .4s; }
  @keyframes blink { 0%, 100% { opacity: .2; } 50% { opacity: 1; } }

  .chat-input-row:not([hidden]) { flex: none; display: flex; align-items: center; gap: 10px; padding-top: 10px; }
  .chat-input-row input { flex: 1; padding: 11px 15px; border-radius: 999px; font: 13px var(--font-ui); background: var(--glass); border: 1px solid var(--glass-border); color: var(--text); }
  .chat-input-row input::placeholder { color: var(--text-dim); }
  .mic-btn { flex: none; width: 38px; height: 38px; border-radius: 50%; color: var(--text-dim); display: flex; align-items: center; justify-content: center; cursor: pointer; transition: color 200ms var(--spring), border-color 200ms var(--spring), box-shadow 200ms var(--spring); }
  .mic-btn.is-recording { border-color: rgba(248,113,113,.6); color: var(--err); box-shadow: 0 0 0 6px rgba(248,113,113,.15); animation: islandPulse 1s ease-in-out infinite; }

  .artifact-carousel { display: flex; gap: 12px; overflow-x: auto; padding: 4px 2px 8px; scroll-snap-type: x mandatory; -webkit-overflow-scrolling: touch; }
  .artifact-card { scroll-snap-align: start; flex: 0 0 auto; width: min(78vw, 260px); padding: 16px; display: flex; flex-direction: column; gap: 8px; min-height: 92px; }
  .artifact-card__title { font-weight: 700; font-size: 14px; }
  .artifact-card__meta { font: 11px var(--font-mono); color: var(--text-dim); margin-top: auto; }

  .memory-row { display: flex; justify-content: space-between; gap: 10px; padding: 11px 2px; border-top: 1px solid rgba(255,255,255,.08); font-size: 12.5px; }
  .memory-row:first-child { border-top: none; }
  .memory-row__time { color: var(--text-dim); font: 10.5px var(--font-mono); flex: none; white-space: nowrap; }

  /* ---------- Cloud screen ---------- */
  .cloud-toolbar { display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 14px; align-items: center; }
  .chip-group { display: flex; gap: 6px; }
  .chip-group button { padding: 7px 13px; border-radius: 999px; font: 600 12px var(--font-ui); color: var(--text-dim); background: rgba(255,255,255,.05); border: 1px solid var(--glass-border); cursor: pointer; transition: color 200ms var(--spring), background 200ms var(--spring), border-color 200ms var(--spring); }
  .chip-group button.active { color: var(--text); background: rgba(106,168,255,.18); border-color: rgba(106,168,255,.4); }
  .cloud-toolbar__spacer { flex: 1; }

  .folder-group { padding: 6px 8px 8px; margin-bottom: 14px; }
  .folder-group__head { display: flex; align-items: center; gap: 8px; padding: 8px 6px; cursor: pointer; }
  .folder-group__head::before { content: '▾'; font-size: 10px; color: var(--text-dim); transition: transform 200ms var(--spring); }
  .folder-group.is-collapsed .folder-group__head::before { transform: rotate(-90deg); }
  .folder-group__name { font: 700 11px var(--font-mono); letter-spacing: .06em; text-transform: uppercase; color: var(--text-dim); flex: 1; }
  .folder-group__count { font: 11px var(--font-mono); color: var(--text-dim); }
  .folder-group.is-collapsed .folder-group__rows { display: none; }

  .cloud-row { display: flex; align-items: center; gap: 12px; width: 100%; padding: 12px 6px; border-top: 1px solid rgba(255,255,255,.08); text-align: left; cursor: pointer; border-radius: 10px; transition: background 200ms var(--spring); }
  .folder-group__rows .cloud-row:first-child { border-top: none; }
  .cloud-row:active { background: rgba(255,255,255,.05); }
  .provider-glyph { flex: none; width: 28px; height: 28px; display: flex; align-items: center; justify-content: center; border-radius: 9px; background: rgba(255,255,255,.07); border: 1px solid var(--glass-border); font: 700 11px var(--font-mono); color: var(--text-dim); }
  .cloud-row__main { flex: 1; min-width: 0; display: flex; flex-direction: column; gap: 5px; }
  .cloud-row__name { font: 700 13.5px var(--font-ui); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .cloud-row__meta { display: flex; gap: 10px; align-items: center; flex-wrap: wrap; }
  .cloud-row__deploy { font: 11px var(--font-mono); color: var(--text-dim); }
  .fav-btn { flex: none; font-size: 18px; color: rgba(255,255,255,.25); cursor: pointer; padding: 4px; line-height: 1; transition: color 200ms var(--spring), text-shadow 200ms var(--spring); }
  .fav-btn.is-fav { color: var(--accent-warm); text-shadow: 0 0 10px rgba(255,159,106,.75), 0 0 20px rgba(255,159,106,.35); }

  .cloud-detail__head { display: flex; align-items: center; gap: 10px; margin-bottom: 12px; }
  .back-btn { flex: none; color: var(--text-dim); font: 600 13px var(--font-mono); cursor: pointer; padding: 6px 8px; }
  .back-btn:hover { color: var(--accent); }
  .cloud-detail__title { font: 700 16px var(--font-ui); flex: 1; min-width: 0; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .cloud-detail__body { padding: 4px 4px 2px; }

  .env-row { padding: 12px 4px; border-top: 1px solid rgba(255,255,255,.08); }
  .env-row:first-child { border-top: none; }
  .env-row__top { display: flex; align-items: center; gap: 8px; }
  .env-row__key { flex: 1; font: 700 12.5px var(--font-mono); min-width: 0; overflow: hidden; text-overflow: ellipsis; }
  .env-row__value { display: block; margin-top: 5px; font: 12.5px var(--font-mono); color: var(--text-dim); cursor: pointer; word-break: break-all; }
  .env-row__actions { display: flex; gap: 8px; margin-top: 9px; }
  .env-row__actions button { font: 600 11.5px var(--font-ui); padding: 6px 12px; border-radius: 999px; color: var(--text-dim); background: rgba(255,255,255,.05); border: 1px solid var(--glass-border); cursor: pointer; transition: color 200ms var(--spring), border-color 200ms var(--spring); }
  .env-row__actions button:hover { border-color: var(--accent); color: var(--accent); }
  .env-row__edit { display: flex; gap: 8px; margin-top: 9px; }
  .env-row__edit input { flex: 1; padding: 8px 10px; border-radius: 8px; font: 12.5px var(--font-mono); background: rgba(0,0,0,.25); border: 1px solid var(--glass-border); color: var(--text); }

  .log-viewer { display: flex; flex-direction: column; height: min(60vh, 520px); }
  .log-viewer__tools { display: flex; gap: 8px; padding-bottom: 10px; flex: none; flex-wrap: wrap; }
  .log-viewer__search { flex: 1; min-width: 120px; padding: 9px 12px; border-radius: 10px; font: 12.5px var(--font-mono); background: rgba(0,0,0,.25); border: 1px solid var(--glass-border); color: var(--text); }
  .log-viewer__search::placeholder { color: var(--text-dim); }
  .log-viewer__pre { flex: 1; min-height: 0; margin: 0; }

  .adhan-overlay:not([hidden]) { position: fixed; inset: 0; z-index: 80; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 20px; background: rgba(6,9,18,.72); -webkit-backdrop-filter: blur(40px) saturate(160%); backdrop-filter: blur(40px) saturate(160%); opacity: 0; transition: opacity 350ms var(--spring); }
  .adhan-overlay.is-open { opacity: 1; }
  .adhan-ring { width: 104px; height: 104px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font: 700 22px var(--font-mono); color: var(--accent); animation: adhan-pulse 1.8s ease-in-out infinite; }
  @keyframes adhan-pulse { 0%, 100% { box-shadow: 0 0 0 0 rgba(106,168,255,.45); } 50% { box-shadow: 0 0 0 22px rgba(106,168,255,0); } }
  .adhan-overlay__name { font: 700 24px var(--font-ui); }

  /* ---------- Lock screen ---------- */
  section[data-screen="lock"]:not([hidden]) { display: flex; align-items: center; justify-content: center; padding: 16px; overflow: hidden; }
  body.is-locked #dock, body.is-locked #island, body.is-locked #toolbarHost, body.is-locked #pullHint { display: none !important; }
  /* Any sheet (permission prompt, Mehr, tool, spotlight) stays fully inert while
     locked — the live session keeps running in the background and can pop a
     permission prompt at any time, but it must never be reachable before PIN entry. */
  body.is-locked .sheet-wrap { display: none !important; }
  /* The Adhan overlay is a standalone fixed layer (not a .sheet-wrap), so the
     rule above doesn't cover it — without this it would stay reachable/visible
     on top of the PIN pad if a demo alarm fired while locked. */

  .pin-pad button:active { background: rgba(255,255,255,.14); transform: scale(.94); }
  .pin-pad button[data-key="back"] { font-size: 16px; color: var(--text-dim); border-color: transparent; background: none; }
  .pin-pad__spacer { visibility: hidden; }
  .lock-shake { animation: pin-shake 400ms ease-in-out; }
  @keyframes pin-shake {
    10%, 90% { transform: translateX(-6px); } 20%, 80% { transform: translateX(5px); }
    30%, 50%, 70% { transform: translateX(-8px); } 40%, 60% { transform: translateX(8px); }
  }

  /* ---------- Spotlight (pull-down / dock long-press universal search) ---------- */
  .sheet-wrap--top { align-items: flex-start; }
  .spotlight-panel { width: min(560px, 92vw); margin-top: max(env(safe-area-inset-top, 0px), 14px); display: flex; flex-direction: column; max-height: 70vh; overflow: hidden; transform: translateY(-14px) scale(.97); opacity: 0; transition: transform 380ms var(--spring), opacity 280ms var(--spring); }

  .spotlight-search { display: flex; align-items: center; gap: 10px; padding: 6px 6px 14px; border-bottom: 1px solid rgba(255,255,255,.1); flex: none; }

  .spotlight-row__type { flex: none; font: 600 10px var(--font-mono); text-transform: uppercase; letter-spacing: .05em; color: var(--text-dim); background: rgba(255,255,255,.06); border: 1px solid var(--glass-border); padding: 3px 8px; border-radius: 999px; }
  .spotlight-row__label { font: 500 13.5px var(--font-ui); flex: 0 1 auto; white-space: nowrap; color: var(--text); }
  .spotlight-row__sub { font: 12px var(--font-mono); color: var(--text-dim); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; flex: 1; min-width: 0; }
  .spotlight-empty { padding: 24px; text-align: center; color: var(--text-dim); font-size: 13px; }

  .pull-hint { position: fixed; top: calc(env(safe-area-inset-top, 0px) + 58px); left: 50%; transform: translateX(-50%) translateY(-8px); z-index: 55; padding: 8px 16px; border-radius: 999px; font-size: 11.5px; font-weight: 700; color: var(--text-dim); opacity: 0; pointer-events: none; transition: opacity 140ms ease-out, transform 140ms ease-out; }

  // ============================================================
  // Liste swipe-action rail (Addendum 1) — a leftward swipe on a list card
  // reveals its per-card action cluster. Horizontal-intent detection defers
  // to native vertical scroll (surface is touch-action: pan-y); full pointer
  // capture/cancel hygiene; only one rail open at a time.
  // ============================================================
  const listRailState = { openCardEl: null };
  function closeListRail(card) {
    if (!card) return;
    const surface = card.querySelector('.list-card__surface');
    if (surface) surface.style.transform = '';
    if (listRailState.openCardEl === card) listRailState.openCardEl = null;
  }
  function closeAllListRails() {
    document.querySelectorAll('.list-card__surface').forEach(s => { s.style.transform = ''; });
    listRailState.openCardEl = null;
  }
  function openListRail(card) {
    if (listRailState.openCardEl && listRailState.openCardEl !== card) closeListRail(listRailState.openCardEl);
    const surface = card.querySelector('.list-card__surface');
    const rail = card.querySelector('.list-card__rail');
    const w = rail.getBoundingClientRect().width;
    surface.style.transform = `translateX(${-w}px)`;
    listRailState.openCardEl = card;
  }
  function handleRailAction(action, id) {
    switch (action) {
      case 'ctrlc': sendCtrlC(id); break;
      case 'jump': scrollTerminalToBottom(id); break;
      case 'clear': clearActiveTerminal(id); break;
      case 'notes': openSessionSheet(id); break;
      case 'files': openToolSheet('files'); break;
      case 'keys': toggleKeysPanel(); break;
      case 'close': {
        // Beenden ist endgültig — der erste Tipp spannt nur, der zweite handelt.
        const btn = document.querySelector(`.list-card[data-id="${id}"] [data-rail="close"]`);
        if (btn && !btn.dataset.armed) {
          btn.dataset.armed = '1';
          btn.classList.add('is-on');
          toast('Nochmal tippen: Terminal beenden');
          setTimeout(() => { delete btn.dataset.armed; btn.classList.remove('is-on'); }, 3000);
        } else {
          if (btn) delete btn.dataset.armed;
          closeTerminal(id);
        }
        break;
      }
    }
  }
  function wireListSwipe(card) {
    const surface = card.querySelector('.list-card__surface');
    const rail = card.querySelector('.list-card__rail');
    let pointerId = null, startX = 0, startY = 0, dragging = false, decided = false, railW = 0, wasOpen = false, cleaned = true;
    function cleanup() {
      if (cleaned) return;
      cleaned = true;
      document.removeEventListener('pointermove', onMove);
      document.removeEventListener('pointerup', onUp);
      document.removeEventListener('pointercancel', onCancel);
      try { surface.releasePointerCapture(pointerId); } catch (e) { /* already released */ }
      card.classList.remove('is-swiping');
    }
    function onMove(e) {
      if (e.pointerId !== pointerId) return;
      const dx = e.clientX - startX, dy = e.clientY - startY;
      if (!decided) {
        if (Math.abs(dx) < 8 && Math.abs(dy) < 8) return;
        if (Math.abs(dx) <= Math.abs(dy)) { cleanup(); return; } // vertical intent → let native scroll win
        decided = true; dragging = true;
        card.classList.add('is-swiping');
        // Deferred capture (only once horizontal intent is locked) is
        // deliberate: plain taps never get captured, so click dispatch to
        // wrapped links / selection lines inside the card stays untouched.
        try { surface.setPointerCapture(pointerId); } catch (e2) { /* unsupported */ }
      }
      const base = wasOpen ? -railW : 0;
      const x = clamp(base + dx, -railW, 0);
      surface.style.transform = `translateX(${x}px)`;
    }
    function onUp(e) {
      const wasDragging = dragging;
      cleanup();
      if (!wasDragging) return;
      const base = wasOpen ? -railW : 0;
      const x = clamp(base + (e.clientX - startX), -railW, 0);
      if (-x > railW * 0.4) openListRail(card); else closeListRail(card);
    }
    function onCancel() { const wd = dragging; cleanup(); if (wd) { if (wasOpen) openListRail(card); else closeListRail(card); } }
    surface.addEventListener('pointerdown', e => {
      // Controls with their own gestures never start a swipe.
      if (e.target.closest('.term-input-row, .card-name, .card-desc, .auto-toggle, .status-chip, .chevron-btn, .replay-pill, .jump-bottom-orb, .keys-panel')) return;
      pointerId = e.pointerId; startX = e.clientX; startY = e.clientY;
      dragging = false; decided = false; cleaned = false;
      railW = rail.getBoundingClientRect().width || 260;
      wasOpen = listRailState.openCardEl === card;
      // NOTE (real-touch fix): there is deliberately NO 'lostpointercapture'
      // cleanup listener here anymore. Touch pointers get implicit capture on
      // the pointerdown TARGET (a descendant of `surface`, e.g. .card-body);
      // when onMove later calls surface.setPointerCapture() at the horizontal-
      // intent threshold, the implicit→explicit hand-off fires a transient
      // 'lostpointercapture' on that descendant which BUBBLES to `surface`.
      // The old listener treated it as gesture-over and killed the swipe after
      // ~10px of travel on every real touch (reproduced with CDP touch
      // dispatch; synthetic mouse drags never hit it — mouse pointers have no
      // implicit capture to hand off from). pointerup/pointercancel are fully
      // sufficient for cleanup: touch streams end in exactly one of the two.
      document.addEventListener('pointermove', onMove);
      document.addEventListener('pointerup', onUp);
      document.addEventListener('pointercancel', onCancel);
    });
  }
  // A plain tap anywhere but the open rail's buttons closes it.
  document.addEventListener('click', e => {
    if (!listRailState.openCardEl) return;
    if (e.target.closest('.list-card__rail')) return;

  }, true);

  // ============================================================

  const FS_TYPE_COLORS = { ts:'#3B82F6', tsx:'#3B82F6', js:'#F59E0B', jsx:'#F59E0B', py:'#22C55E',
    rs:'#EF4444', go:'#06B6D4', html:'#F97316', css:'#3B82F6', json:'#F59E0B', yml:'#F59E0B',
    yaml:'#F59E0B', md:'#8B5CF6', mdx:'#8B5CF6', txt:'#94A3B8', pdf:'#EF4444', sh:'#22C55E',
    log:'#94A3B8', png:'#EC4899', jpg:'#EC4899', jpeg:'#EC4899', gif:'#EC4899', webp:'#EC4899',
    svg:'#F97316', mp4:'#A855F7', webm:'#A855F7', mov:'#A855F7', mkv:'#A855F7', mp3:'#06B6D4',
    wav:'#06B6D4', m4a:'#06B6D4', zip:'#F59E0B', gz:'#F59E0B', env:'#F59E0B' };
  const FS_KINDS = {
    img: ['png','jpg','jpeg','gif','webp','svg','ico','bmp','heic'],
    vid: ['mp4','webm','mov','m4v','mkv','avi'],
    aud: ['mp3','wav','m4a','ogg','flac'],
    md:  ['md','mdx'],
    pdf: ['pdf'],
  };
  function fsExt(name) { return (name.split('.').pop() || '').toLowerCase(); }
  function fsKind(name) {
    const e = fsExt(name);
    for (const k in FS_KINDS) if (FS_KINDS[k].indexOf(e) !== -1) return k;
    return 'txt';
  }
  function fsFmtSize(n) {
    if (!n && n !== 0) return '';
    if (n < 1024) return n + ' B';
    if (n < 1048576) return (n / 1024).toFixed(0) + ' KB';
    if (n < 1073741824) return (n / 1048576).toFixed(1) + ' MB';
    return (n / 1073741824).toFixed(2) + ' GB';
  }
  function fsFmtDate(ms) {
    if (!ms) return '';
    const d = new Date(ms), now = new Date();
    return d.getFullYear() === now.getFullYear()
      ? d.toLocaleDateString('de-DE', { day: '2-digit', month: 'short' })
      : String(d.getFullYear());
  }

  const fsState = {
    cwd: '~', entries: [], sort: 'name', asc: true, filter: '', showSearch: false,
    selectMode: false, sel: new Set(), renaming: null, newFolder: false,
    downloads: [],  // {id, name, pct, state}
  };

  // ── Demo data layer (bridge.js replaces these) ──
  const FS_DEMO = {
    '~': [
      { name: 'Desktop', isDir: true }, { name: 'projekt', isDir: true },
      { name: 'notizen.md', isDir: false, size: 2400 },
      { name: 'foto.svg', isDir: false, size: 5200 },
      { name: 'demo.mp4', isDir: false, size: 1288490188 },
      { name: 'report.pdf', isDir: false, size: 312000 },
    ],
    '~/Desktop': [{ name: 'screenshot.svg', isDir: false, size: 8100 }],
    '~/projekt': [
      { name: 'src', isDir: true }, { name: 'README.md', isDir: false, size: 1800 },
      { name: 'server.log', isDir: false, size: 45000 },
    ],
    '~/projekt/src': [{ name: 'index.ts', isDir: false, size: 3200 }],
  };
  const FS_DEMO_SVG = 'data:image/svg+xml;utf8,' + encodeURIComponent(
    '<svg xmlns="http://www.w3.org/2000/svg" width="240" height="160">' +
    '<rect width="240" height="160" rx="16" fill="#223"/><circle cx="70" cy="66" r="30" fill="#8ab8ff"/>' +
    '<rect x="120" y="46" width="90" height="12" rx="6" fill="#555"/><rect x="120" y="70" width="70" height="12" rx="6" fill="#444"/></svg>');
  window.fsListDir = function (path) {
    const list = (FS_DEMO[path] || []).map(e => ({
      name: e.name, isDir: !!e.isDir, size: e.size || 0,
      modified: Date.now() - 86400000,
      path: path.replace(/\/$/, '') + '/' + e.name,
    }));
    window.fsSetDir(path, list);
  };
  window.fsFileUrl = function (path) { return /\.svg$/.test(path) ? FS_DEMO_SVG : ''; };
  window.fsPdfUrl = function () { return ''; };
  window.fsReadFile = function (path) {
    window.fsSetFileContent(path, /\.md$/.test(path)
      ? '# Demo\n\nDies ist **Markdown** aus dem Mockup.\n\n- Punkt eins\n- Punkt zwei\n\n```js\nconsole.log("hi");\n```'
      : 'Demo-Inhalt von ' + path + '\nZeile 2\nZeile 3');
  };
  window.fsAction = function (action, payload) { toast('Demo: ' + action); };

  window.fsSetDir = function (path, entries) {
    fsState.cwd = path;
    fsState.entries = entries;
    fsState.sel.clear(); fsState.selectMode = false;
    renderFilesScreen();
  };
  window.openFilesScreen = function (path) {
    if (path) fsState.cwd = path;
    show('files');
    window.fsListDir(fsState.cwd);
  };
  window.fsRerender = function () { if (currentScreen === 'files') renderFilesScreen(); };

  function fsSorted() {
    const q = fsState.filter.toLowerCase();
    let list = q ? fsState.entries.filter(e => e.name.toLowerCase().indexOf(q) !== -1) : fsState.entries.slice();
    const dir = fsState.asc ? 1 : -1;
    list.sort((a, b) => {
      if (a.isDir !== b.isDir) return a.isDir ? -1 : 1;
      if (fsState.sort === 'size') return (a.size - b.size) * dir;
      if (fsState.sort === 'date') return (a.modified - b.modified) * dir;
      return a.name.localeCompare(b.name, 'de', { sensitivity: 'base' }) * dir;
    });
    return list;
  }

  function fsCrumbsHtml() {
    const parts = fsState.cwd.split('/').filter(Boolean);
    let acc = '';
    return parts.map((p, i) => {
      acc += (i ? '/' : '') + p;
      const target = acc;
      return (i ? '<span class="fs-crumb-sep">›</span>' : '') +
        '<button class="fs-crumb" data-crumb="' + escapeHtml(target) + '">' + escapeHtml(p) + '</button>';
    }).join('');
  }

  function fsRowHtml(e) {
    const kind = e.isDir ? 'dir' : fsKind(e.name);
    const color = e.isDir ? '#F59E0B' : (FS_TYPE_COLORS[fsExt(e.name)] || '#64748B');
    const url = !e.isDir && kind === 'img' ? window.fsFileUrl(e.path) : '';
    const iconHtml = url
      ? '<img class="fs-thumb" loading="lazy" src="' + escapeHtml(url) + '">'
      : '<span class="fs-ico" style="color:' + color + '">' + (e.isDir ? icon('folder', 16) : (fsExt(e.name).slice(0, 3).toUpperCase() || '·')) + '</span>';
    const sel = fsState.sel.has(e.path);
    const check = fsState.selectMode
      ? '<span class="fs-check' + (sel ? ' is-on' : '') + '">' + (sel ? '✓' : '') + '</span>' : '';
    return '<div class="fs-rowwrap">' +
      '<button class="fs-row' + (sel ? ' is-selected' : '') + '" data-fspath="' + escapeHtml(e.path) + '" data-fsdir="' + (e.isDir ? 1 : 0) + '">' +
        check + iconHtml +
        '<span class="fs-cell"><span class="fs-name">' + escapeHtml(e.name) + '</span>' +
        '<span class="fs-sub">' + (e.isDir ? 'Ordner' : escapeHtml(fsFmtSize(e.size))) +
        (e.modified ? ' · ' + fsFmtDate(e.modified) : '') + '</span></span>' +
      '</button></div>';
  }

  function renderFilesScreen() {
    const host = document.querySelector('[data-screen="files"]');
    if (!host) return;
    const list = fsSorted();
    const favs = (window.__tmsFavs || []);
    const sortLabel = { name: 'Name', date: 'Datum', size: 'Größe' }[fsState.sort];
    host.innerHTML =
      '<div class="fs-head">' +
        '<button class="btn-chip" data-fsup>▴</button>' +
        '<div class="fs-crumbs">' + fsCrumbsHtml() + '</div>' +
      '</div>' +
      '<div class="fs-tools">' +
        '<button class="btn-chip" data-fssearch>' + icon('search', 13) + '</button>' +
        '<button class="btn-chip" data-fssort>' + escapeHtml(sortLabel) + ' ' + (fsState.asc ? '↑' : '↓') + '</button>' +
        '<button class="btn-chip" data-fsselect>' + (fsState.selectMode ? '✕ Auswahl' : '☑ Auswählen') + '</button>' +
        (fsState.selectMode ? '<button class="btn-chip" data-fsselectall>Alle</button>' : '') +
        '<button class="btn-chip" data-fsnewfolder>+ Ordner</button>' +
      '</div>' +
      (fsState.showSearch ? '<div class="fs-searchrow"><input class="term-input" id="fsSearchInput" placeholder="Filtern…" value="' + escapeHtml(fsState.filter) + '"></div>' : '') +
      (fsState.newFolder ? '<div class="fs-searchrow" style="display:flex;gap:6px"><input class="term-input" id="fsNewFolderInput" placeholder="Ordnername…" style="flex:1">' +
        '<button class="btn-chip" data-fsmkdirok>Anlegen</button><button class="btn-chip" data-fscancel>✕</button></div>' : '') +
      (fsState.renaming ? '<div class="fs-searchrow" style="display:flex;gap:6px">' +
        '<input class="term-input" id="fsRenameInput" style="flex:1" value="' + escapeHtml((fsState.renaming.split('/').pop() || '')) + '">' +
        '<button class="btn-chip" data-fsrenameok>Umbenennen</button><button class="btn-chip" data-fscancelrename>✕</button></div>' : '') +
      (favs.length ? '<div class="fs-tools">' + favs.map(p =>
        '<button class="btn-chip" data-fsgofav="' + escapeHtml(p) + '">★ ' + escapeHtml(p.split('/').pop() || p) + '</button>').join('') + '</div>' : '') +
      '<div class="fs-list">' + (list.length ? list.map(fsRowHtml).join('') : '<div class="fs-empty">Leer.</div>') + '</div>' +
      fsBulkbarHtml() + fsDlbarHtml();
    wireFilesScreen(host);
  }
  function fsBulkbarHtml() {
    if (!fsState.selectMode || !fsState.sel.size) return '';
    return '<div class="fs-bulkbar glass">' +
      '<button class="btn-chip" data-fsbulk="download">⇩ Laden (' + fsState.sel.size + ')</button>' +
      '<button class="btn-chip" data-fsbulk="copyPath">Pfade</button>' +
      '<button class="btn-chip btn-chip--danger" data-fsbulk="trash">Löschen</button>' +
      '</div>';
  }
  function fsDlbarHtml() {
    const running = fsState.downloads.filter(d => d.state === 'running');
    if (!running.length || (fsState.selectMode && fsState.sel.size)) return '';
    const d = running[0];
    return '<div class="fs-dlbar glass">⇩ ' + escapeHtml(d.name) +
      '<progress max="100" value="' + Math.round(d.pct * 100) + '"></progress>' +
      Math.round(d.pct * 100) + '%</div>';
  }
  window.fsDownloadProgress = function (id, name, pct, state) {
    const i = fsState.downloads.findIndex(d => d.id === id);
    if (i === -1) fsState.downloads.push({ id: id, name: name, pct: pct, state: state });
    else fsState.downloads[i] = { id: id, name: name, pct: pct, state: state };
    if (state === 'done') { toast('Gespeichert: ' + name); fsState.downloads = fsState.downloads.filter(d => d.id !== id); }
    if (state === 'error') { fsState.downloads = fsState.downloads.filter(d => d.id !== id); }
    window.fsRerender();
  };
  function wireFilesScreen(host) {
    host.querySelectorAll('[data-crumb]').forEach(b => b.addEventListener('click', () => {
      const t = b.dataset.crumb;
      window.fsListDir(t.indexOf('~') === 0 ? t : '/' + t);
    }));
    const up = host.querySelector('[data-fsup]');
    if (up) up.addEventListener('click', () => {
      const c = fsState.cwd.replace(/\/+$/, '');
      if (c === '~' || c === '/' || !c) return;
      const p = c.replace(/\/[^/]+$/, '');
      window.fsListDir(p || (c.indexOf('~') === 0 ? '~' : '/'));
    });
    const se = host.querySelector('[data-fssearch]');
    if (se) se.addEventListener('click', () => {
      fsState.showSearch = !fsState.showSearch;
      if (!fsState.showSearch) fsState.filter = '';
      renderFilesScreen();
      if (fsState.showSearch) { const i = document.getElementById('fsSearchInput'); if (i) i.focus(); }
    });
    const si = host.querySelector('#fsSearchInput');
    if (si) si.addEventListener('input', () => {
      fsState.filter = si.value;
      const lst = host.querySelector('.fs-list');
      const l = fsSorted();
      lst.innerHTML = l.length ? l.map(fsRowHtml).join('') : '<div class="fs-empty">Nichts gefunden.</div>';
      wireFsRows(host);
    });
    const so = host.querySelector('[data-fssort]');
    if (so) so.addEventListener('click', () => {
      const order = ['name', 'date', 'size'];
      if (fsState.asc) { fsState.asc = false; }
      else { fsState.sort = order[(order.indexOf(fsState.sort) + 1) % 3]; fsState.asc = true; }
      renderFilesScreen();
    });
    const sm = host.querySelector('[data-fsselect]');
    if (sm) sm.addEventListener('click', () => { fsState.selectMode = !fsState.selectMode; fsState.sel.clear(); renderFilesScreen(); });
    const sa = host.querySelector('[data-fsselectall]');
    if (sa) sa.addEventListener('click', () => { fsSorted().forEach(e => fsState.sel.add(e.path)); renderFilesScreen(); });
    const nf = host.querySelector('[data-fsnewfolder]');
    if (nf) nf.addEventListener('click', () => { fsState.newFolder = true; renderFilesScreen(); const i = document.getElementById('fsNewFolderInput'); if (i) i.focus(); });
    const ok = host.querySelector('[data-fsmkdirok]');
    if (ok) ok.addEventListener('click', () => {
      const i = document.getElementById('fsNewFolderInput');
      if (i && i.value.trim()) window.fsAction('mkdir', { path: fsState.cwd.replace(/\/$/, '') + '/' + i.value.trim() });
      fsState.newFolder = false; renderFilesScreen();
    });
    const ca = host.querySelector('[data-fscancel]');
    if (ca) ca.addEventListener('click', () => { fsState.newFolder = false; renderFilesScreen(); });
    const ro = host.querySelector('[data-fsrenameok]');
    if (ro) ro.addEventListener('click', () => {
      const i = document.getElementById('fsRenameInput');
      if (i && i.value.trim()) window.fsAction('rename', { path: fsState.renaming, name: i.value.trim() });
      fsState.renaming = null; renderFilesScreen();
    });
    const rc = host.querySelector('[data-fscancelrename]');
    if (rc) rc.addEventListener('click', () => { fsState.renaming = null; renderFilesScreen(); });
    host.querySelectorAll('[data-fsgofav]').forEach(b => {
      let lpTimer = null, lpFired = false;
      b.addEventListener('pointerdown', () => {
        lpFired = false;
        lpTimer = setTimeout(() => { lpFired = true; openFsFavMenu(b.dataset.fsgofav); }, 550);
      });
      ['pointerup', 'pointerleave', 'pointercancel'].forEach(ev => b.addEventListener(ev, () => clearTimeout(lpTimer)));
      b.addEventListener('click', () => { if (lpFired) { lpFired = false; return; } window.fsListDir(b.dataset.fsgofav); });
    });
    host.querySelectorAll('[data-fsbulk]').forEach(b => b.addEventListener('click', () => {
      const paths = Array.from(fsState.sel);
      const hasDir = fsState.entries.some(e => e.isDir && fsState.sel.has(e.path));
      const a = b.dataset.fsbulk;
      if (a === 'download') window.fsAction('download', { paths: paths, zip: hasDir || paths.length > 1 });
      else if (a === 'copyPath') window.fsAction('copyPath', { paths: paths });
      else if (a === 'trash') {
        if (b.dataset.confirmed) {
          window.fsAction('trash', { paths: paths });
          fsState.selectMode = false; fsState.sel.clear();
          renderFilesScreen();
        } else {
          b.dataset.confirmed = '1';
          b.textContent = paths.length + ' in den Papierkorb?';
          setTimeout(() => { delete b.dataset.confirmed; if (document.contains(b)) renderFilesScreen(); }, 3000);
        }
      }
    }));
    wireFsRows(host);
  }
  function wireFsRows(host) {
    host.querySelectorAll('img.fs-thumb').forEach(im => im.addEventListener('error', () => {
      const s = document.createElement('span'); s.className = 'fs-ico'; s.textContent = '·';
      im.replaceWith(s);
    }));
    host.querySelectorAll('.fs-row').forEach(row => {
      let lpTimer = null, lpFired = false;
      row.addEventListener('pointerdown', () => {
        lpFired = false;
        lpTimer = setTimeout(() => {
          lpFired = true;
          // Langes Drücken zeigt die Aktionen der Zeile — dieselbe Geste wie bei
          // den Favoriten. Das ⋯ an jeder Zeile ist dafür weggefallen. In der
          // Mehrfachauswahl bleibt es beim Hinzu-/Abwählen.
          if (fsState.selectMode) { fsState.sel.add(row.dataset.fspath); renderFilesScreen(); }
          else openFsRowMenu(row.dataset.fspath);
        }, 500);
      });
      ['pointerup', 'pointerleave', 'pointercancel'].forEach(ev => row.addEventListener(ev, () => clearTimeout(lpTimer)));
      row.addEventListener('click', (ev) => {
        if (lpFired) { lpFired = false; return; }
        const p = row.dataset.fspath, isDir = row.dataset.fsdir === '1';
        if (fsState.selectMode) { fsState.sel.has(p) ? fsState.sel.delete(p) : fsState.sel.add(p); renderFilesScreen(); return; }
        if (isDir) window.fsListDir(p);
        else openFsViewer(p);
      });
    });
  }
  function fsMdToHtml(md) {
    let h = md
      .replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;')
      .replace(/```(\w*)\n([\s\S]*?)```/g, '<pre><code>$2</code></pre>')
      .replace(/`([^`]+)`/g, '<code>$1</code>')
      .replace(/^######\s+(.+)$/gm, '<h6>$1</h6>').replace(/^#####\s+(.+)$/gm, '<h5>$1</h5>')
      .replace(/^####\s+(.+)$/gm, '<h4>$1</h4>').replace(/^###\s+(.+)$/gm, '<h3>$1</h3>')
      .replace(/^##\s+(.+)$/gm, '<h2>$1</h2>').replace(/^#\s+(.+)$/gm, '<h1>$1</h1>')
      .replace(/\*\*\*(.+?)\*\*\*/g, '<strong><em>$1</em></strong>')
      .replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>').replace(/\*(.+?)\*/g, '<em>$1</em>')
      .replace(/^&gt;\s+(.+)$/gm, '<blockquote>$1</blockquote>')
      .replace(/^---+$/gm, '<hr>')
      .replace(/^[\-\*]\s+(.+)$/gm, '<li>$1</li>')
      .replace(/!\[([^\]]*)\]\(([^)]+)\)/g, '<img src="$2" alt="$1" style="max-width:100%">')
      .replace(/\[([^\]]+)\]\(([^)]+)\)/g, '<a href="$2">$1</a>');
    h = h.replace(/(<li>[\s\S]*?<\/li>)(?!\s*<li>)/g, '<ul>$1</ul>');
    return h.split(/\n{2,}/).map(b => /^\s*<(h\d|ul|pre|blockquote|hr)/.test(b) ? b : '<p>' + b.replace(/\n/g, '<br>') + '</p>').join('');
  }

  let fsViewerReadTarget = null;
  window.fsSetFileContent = function (path, content, error) {
    if (fsViewerReadTarget !== path) return;
    fsViewerReadTarget = null;
    const body = document.querySelector('.fs-viewer__body');
    if (!body) return;
    if (error) { body.innerHTML = fsInfoCardHtml(path, error); wireFsInfoCard(body, path); return; }
    if (fsKind(path.split('/').pop() || '') === 'md') {
      body.innerHTML = '<div class="fs-md">' + fsMdToHtml(content || '') + '</div>';
      const bar = document.querySelector('.fs-viewer__bar');
      const t = document.createElement('button');
      t.className = 'btn-chip'; t.textContent = 'Quelltext';
      let raw = false;
      t.addEventListener('click', () => {
        raw = !raw; t.textContent = raw ? 'Ansicht' : 'Quelltext';
        body.innerHTML = raw
          ? '<div class="fs-txt"><pre>' + escapeHtml(content || '') + '</pre></div>'
          : '<div class="fs-md">' + fsMdToHtml(content || '') + '</div>';
      });
      bar.insertBefore(t, bar.querySelector('[data-vdl]'));
    } else {
      const lines = (content || '').split('\n');
      body.innerHTML = '<div class="fs-txt"><pre>' + lines.map((l, i) =>
        '<span class="ln">' + (i + 1) + '</span>' + escapeHtml(l)).join('\n') + '</pre></div>';
    }
  };

  function fsInfoCardHtml(p, note) {
    const e = fsState.entries.find(x => x.path === p) || { name: p.split('/').pop(), size: 0, modified: 0 };
    return '<div class="fs-infocard">' +
      '<div style="font-size:34px">🗂</div>' +
      '<div style="font-weight:800">' + escapeHtml(e.name || '') + '</div>' +
      '<div class="fs-sub">' + escapeHtml(fsFmtSize(e.size)) + (e.modified ? ' · ' + fsFmtDate(e.modified) : '') + '</div>' +
      (note ? '<div class="fs-sub">' + escapeHtml(note) + '</div>' : '') +
      '<div style="display:flex;gap:8px"><button class="btn-chip" data-ic="download">⇩ Herunterladen</button>' +
      '<button class="btn-chip" data-ic="share">Teilen</button></div></div>';
  }
  function wireFsInfoCard(body, p) {
    body.querySelectorAll('[data-ic]').forEach(b => b.addEventListener('click', () => {
      if (b.dataset.ic === 'download') window.fsAction('download', { paths: [p], zip: false });
      else window.fsAction('share', { path: p });
    }));
  }

  function openFsViewer(p) {
    const name = p.split('/').pop() || p;
    const kind = fsKind(name);
    const url = window.fsFileUrl(p);
    const old = document.getElementById('fsViewer');
    if (old) old.remove();
    const el = document.createElement('div');
    el.className = 'fs-viewer'; el.id = 'fsViewer';
    el.innerHTML =
      '<div class="fs-viewer__bar">' +
        '<span class="fs-viewer__name">' + escapeHtml(name) + '</span>' +
        '<button class="btn-chip" data-vdl>⇩</button>' +
        '<button class="btn-chip" data-vshare>Teilen</button>' +
        '<button class="btn-chip" data-vclose>✕</button>' +
      '</div><div class="fs-viewer__body"></div>';
    document.body.appendChild(el);
    el.querySelector('[data-vclose]').addEventListener('click', () => el.remove());
    el.querySelector('[data-vdl]').addEventListener('click', () => window.fsAction('download', { paths: [p], zip: false }));
    el.querySelector('[data-vshare]').addEventListener('click', () => window.fsAction('share', { path: p }));
    const body = el.querySelector('.fs-viewer__body');

    if (kind === 'img' && url) {
      const imgs = fsSorted().filter(x => !x.isDir && fsKind(x.name) === 'img');
      let idx = Math.max(0, imgs.findIndex(x => x.path === p));
      const render = () => {
        const cur = imgs[idx];
        el.querySelector('.fs-viewer__name').textContent = cur.name;
        body.innerHTML = '<img src="' + escapeHtml(window.fsFileUrl(cur.path)) + '">' +
          (imgs.length > 1 ? '<button class="fs-viewer__nav" style="left:8px" data-vprev>‹</button>' +
            '<button class="fs-viewer__nav" style="right:8px" data-vnext>›</button>' : '');
        const pv = body.querySelector('[data-vprev]'), nx = body.querySelector('[data-vnext]');
        if (pv) pv.addEventListener('click', () => { idx = (idx - 1 + imgs.length) % imgs.length; render(); });
        if (nx) nx.addEventListener('click', () => { idx = (idx + 1) % imgs.length; render(); });
        const img = body.querySelector('img');
        let zoomed = false;
        img.addEventListener('dblclick', () => {
          zoomed = !zoomed;
          img.style.maxWidth = zoomed ? 'none' : '100%';
          img.style.maxHeight = zoomed ? 'none' : '100%';
        });
      };
      render();
    } else if (kind === 'vid' && url) {
      body.innerHTML = '<video controls autoplay playsinline src="' + escapeHtml(url) + '"></video>';
      body.querySelector('video').addEventListener('error', () => {
        body.innerHTML = fsInfoCardHtml(p, 'Format nicht abspielbar — herunterladen oder teilen.');
        wireFsInfoCard(body, p);
      });

  // Rundes Profilbild — echtes Bild, sonst Initialen auf getöntem Kreis.
  function managerAvatarHtml(size, extra) {
    const p = TMS_DATA.manager.persona || {};
    const cls = 'mgr-ava' + (extra ? ' ' + extra : '');
    const dim = `width:${size}px;height:${size}px`;
    const init = (p.name || 'M').trim().split(/\s+/).map(w => w[0]).slice(0, 2).join('').toUpperCase() || 'M';
    // Lädt das Bild nicht (Datei-URI im WebView), fällt es sauber auf die
    // Initialen zurück, statt ein kaputtes Bild-Symbol zu zeigen.
    if (p.avatar) return `<img class="${cls}" style="${dim}" src="${p.avatar}" alt=""` +
      ` onerror="this.outerHTML='<span class=\\'${cls} mgr-ava--init\\' style=\\'${dim};font-size:${Math.round(size * 0.4)}px\\'>${escapeHtml(init)}</span>'">`;
    return `<span class="${cls} mgr-ava--init" style="${dim};font-size:${Math.round(size * 0.4)}px">${escapeHtml(init)}</span>`;
  }

  // WhatsApp-Prinzip: aufeinanderfolgende Nachrichten desselben Absenders bilden
  // eine Gruppe. Nur die LETZTE der Gruppe trägt das Schwänzchen, die Uhrzeit und
  // (beim Manager) das Profilbild — dazwischen rücken sie eng zusammen.
  function renderChatMessageHtml(m, prev, next) {
    const grouped = prev && prev.from === m.from;   // an die vorige angehängt
    const last = !next || next.from !== m.from;      // letzte der Gruppe → Schwänzchen
    const avatar = m.from === 'manager'
      ? `<span class="chat-row__avatar">${last ? managerAvatarHtml(26) : ''}</span>`
      : '';
    const rowCls = 'chat-row' + (grouped ? ' is-grouped' : '') + (last ? ' is-tail' : '');
    const time = last ? `<span class="chat-bubble__time">${escapeHtml(m.time)}</span>` : '';

    let body;
    if (m.type === 'voice') {
      const bars = Array.from({ length: 18 }, (_, i) => `<span style="height:${6 + ((i * 37) % 14)}px"></span>`).join('');
      let inner = '';
      if (m.transcribing) inner = `<div class="voice-transcribing">Transkribiere… <span class="dots"><span>●</span><span>●</span><span>●</span></span></div>`;
      else if (m.transcript) inner = `<div class="voice-transcript">${escapeHtml(m.transcript)}</div>`;
      body = `
        <div class="voice-pill" data-act="play">
          <span class="voice-pill__play">${icon('play', 13)}</span>
          <span class="voice-pill__wave">${bars}</span>
          <span class="voice-pill__dur">0:${String(m.duration).padStart(2, '0')}</span>
        </div>${inner}${time}`;
    } else {
      body = `${escapeHtml(m.text)}${time}`;
    }
    return `<div class="${rowCls}" data-from="${m.from}">${avatar}<div class="chat-bubble">${body}</div></div>`;
  }

  function renderManagerChat() {
    const host = document.getElementById('managerChat');
    if (!host) return;
    const msgs = TMS_DATA.manager.messages;
    host.innerHTML = msgs.map((m, i) => renderChatMessageHtml(m, msgs[i - 1], msgs[i + 1])).join('');
    host.scrollTop = host.scrollHeight;
    // Präsenz wie im Messenger: „tippt …", solange die letzte Nachricht vom
    // Manager noch wächst (Streaming), sonst „online".
    const presence = document.getElementById('mgrPresence');
    if (presence) {
      const growing = msgs.length && msgs[msgs.length - 1].from === 'manager' && msgs[msgs.length - 1]._streaming;
      presence.textContent = growing ? 'tippt …' : 'online';
      presence.classList.toggle('is-typing', !!growing);
    }
    wireManagerChatInteractions();
    // Arm transcription timers only while the Manager screen is visible, so the
    // seed message's "Transkribiere… → transcript" demo moment plays on first
    // entry to the screen (via SCREEN_HOOKS.manager) instead of expiring
    // silently at page init before the user ever looks.
    const screen = document.querySelector('[data-screen="manager"]');
    if (screen && !screen.hidden) TMS_DATA.manager.messages.forEach(scheduleTranscription);
  }

  function wireManagerChatInteractions() {
    document.querySelectorAll('#managerChat .voice-pill').forEach(pill => {
      pill.addEventListener('click', () => {
        const playing = pill.classList.toggle('is-playing');
        const playBtn = pill.querySelector('.voice-pill__play');
        if (playing) {
          playBtn.innerHTML = icon('pause', 13);
          const durText = pill.querySelector('.voice-pill__dur').textContent;
          const secs = parseInt(durText.split(':')[1], 10) || 5;
          setTimeout(() => { pill.classList.remove('is-playing'); playBtn.innerHTML = icon('play', 13); }, Math.min(secs, 6) * 1000);
        } else {
          playBtn.innerHTML = icon('play', 13);
        }
      });
    });
  }

  function wireManagerInput() {

      if (micBtn.classList.contains('is-recording')) return;
      micBtn.classList.add('is-recording');
      setTimeout(() => {
        micBtn.classList.remove('is-recording');
        const now = new Date();
        const time = `${String(now.getHours()).padStart(2, '0')}:${String(now.getMinutes()).padStart(2, '0')}`;
        TMS_DATA.manager.messages.push({ type: 'voice', from: 'user', time, duration: 8, transcript: null, transcribing: true, _id: 'msg' + TMS_DATA.manager.messages.length });
        renderManagerChat();
      }, 2000);
    });
    document.getElementById('managerTextInput').addEventListener('keydown', e => {
      if (e.key !== 'Enter') return;
      const input = e.target;
      const text = input.value.trim();
      if (!text) return;
      const now = new Date();
      const time = `${String(now.getHours()).padStart(2, '0')}:${String(now.getMinutes()).padStart(2, '0')}`;
      TMS_DATA.manager.messages.push({ type: 'text', from: 'user', time, text, _id: 'msg' + TMS_DATA.manager.messages.length });
      input.value = '';
      renderManagerChat();
    });
  }

  const BROWSER_PASSWORDS = [

  const browserState = { tabs: [], activeId: null, nextId: 1, progressTimer1: null, progressTimer2: null };

  function browserHostOf(raw) {
    const s = String(raw || '').trim().toLowerCase().replace(/^[a-z]+:\/\//, '').replace(/^www\./, '');
    const cut = s.search(/[\/?#]/);
    return cut === -1 ? s : s.slice(0, cut);
  }
  // Resolves whatever the user typed/tapped to a page template. Anything
  // that isn't the two dedicated demo hosts (or an empty new-tab) falls
  // through to the "Seite simuliert" placeholder — including render.com,
  // github.com and arbitrary/garbage input. url/display are always the
  // raw, unescaped user input; every render site MUST escapeHtml() it.
  function resolveBrowserPage(raw) {
    const input = String(raw || '').trim();
    if (!input) return { kind: 'newtab', url: '', display: '' };
    const host = browserHostOf(input);
    if (host === 'vercel.com') return { kind: 'vercel', url: input, display: input };
    if (host === 'docs.tms.dev') return { kind: 'docs', url: input, display: input };
    return { kind: 'unknown', url: input, display: input };
  }

  function activeBrowserTab() {
    return browserState.tabs.find(t => t.id === browserState.activeId) || browserState.tabs[0] || null;
  }
  function createBrowserTab(activate) {
    const id = 'bt' + (browserState.nextId++);
    const tab = {
      id,
      history: [{ kind: 'newtab', url: '', display: '' }],
      historyIndex: 0,
      // Per-tab "cookie jar" — the whole point of incognito isolation.
      session: { vercelLoggedIn: false, vercelEmail: null },
    };
    browserState.tabs.push(tab);
    if (activate !== false) browserState.activeId = id;
    return tab;
  }
  function switchToBrowserTab(id) {
    if (!browserState.tabs.some(t => t.id === id)) return;
    browserState.activeId = id;
    renderBrowserActiveTab({ progress: false });
  }
  function closeBrowserTab(id) {
    const idx = browserState.tabs.findIndex(t => t.id === id);
    if (idx === -1) return;
    const wasActive = browserState.activeId === id;
    browserState.tabs.splice(idx, 1);
    if (browserState.tabs.length === 0) {
      createBrowserTab(true); // unlimited tabs, but never zero — a fresh isolated tab replaces the last one
    } else if (wasActive) {
      browserState.activeId = browserState.tabs[Math.min(idx, browserState.tabs.length - 1)].id;
    }
    renderBrowserTabsOverview();
    if (wasActive) renderBrowserActiveTab({ progress: false }); else syncBrowserChrome();
  }

  function browserNavigate(rawInput) {
    const tab = activeBrowserTab();
    if (!tab) return;
    const page = resolveBrowserPage(rawInput);
    tab.history = tab.history.slice(0, tab.historyIndex + 1); // drop stale forward history
    tab.history.push(page);
    tab.historyIndex = tab.history.length - 1;
    renderBrowserActiveTab();
  }
  function browserGoBack() {
    const tab = activeBrowserTab();
    if (!tab || tab.historyIndex <= 0) return;
    tab.historyIndex--;
    renderBrowserActiveTab();
  }
  function browserGoForward() {
    const tab = activeBrowserTab();
    if (!tab || tab.historyIndex >= tab.history.length - 1) return;
    tab.historyIndex++;
    renderBrowserActiveTab();
  }
  function browserReload() { renderBrowserActiveTab(); }

  // ---- Loading progress bar — one pair of timeouts, always cleared before
  // a new one starts and on screen exit (see show()), so nothing lingers. ----
  function runBrowserProgress() {
    const wrap = document.getElementById('browserProgress');
    const bar = document.getElementById('browserProgressBar');
    if (!wrap || !bar) return;
    stopBrowserProgressTimers();
    wrap.classList.add('is-active');
    bar.style.transition = 'none';
    bar.style.width = '0%';
    void bar.offsetWidth; // reflow — restarts the width transition below
    bar.style.transition = 'width 560ms cubic-bezier(.3,.6,.4,1)';
    bar.style.width = '100%';
    browserState.progressTimer1 = setTimeout(() => {
      wrap.classList.remove('is-active');
      browserState.progressTimer1 = null;
      browserState.progressTimer2 = setTimeout(() => {
        bar.style.transition = 'none';
        bar.style.width = '0%';
        browserState.progressTimer2 = null;
      }, 220);
    }, 600);
  }
  function stopBrowserProgressTimers() {
    if (browserState.progressTimer1) { clearTimeout(browserState.progressTimer1); browserState.progressTimer1 = null; }
    if (browserState.progressTimer2) { clearTimeout(browserState.progressTimer2); browserState.progressTimer2 = null; }
    const wrap = document.getElementById('browserProgress');
    const bar = document.getElementById('browserProgressBar');
    if (wrap) wrap.classList.remove('is-active');
    if (bar) { bar.style.transition = 'none'; bar.style.width = '0%'; }
  }

  // In-place re-render for state changes that aren't a navigation (login,
  // logout, cache clear) — no history mutation, no progress bar.
  function rerenderBrowserContentOnly() {
    const tab = activeBrowserTab();
    if (!tab) return;
    const page = tab.history[tab.historyIndex] || { kind: 'newtab', url: '', display: '' };
    const content = document.getElementById('browserContent');
    if (!content) return;
    content.innerHTML = renderBrowserPageHtml(page, tab);
    wireBrowserPageInteractions(page, tab);

  function renderBrowserActiveTab(opts) {
    const withProgress = !opts || opts.progress !== false;
    const tab = activeBrowserTab();
    if (!tab) return;
    const page = tab.history[tab.historyIndex] || { kind: 'newtab', url: '', display: '' };
    if (withProgress) runBrowserProgress();
    const content = document.getElementById('browserContent');
    if (content) { content.scrollTop = 0; content.innerHTML = renderBrowserPageHtml(page, tab); }
    wireBrowserPageInteractions(page, tab);
    syncBrowserChrome();

  // Re-syncs the chrome (back/forward disabled state, tab count, address
  // text) without touching content — used after tab list mutations and every
  // time the Browser screen becomes visible again (SCREEN_HOOKS.browser).
  function syncBrowserChrome() {
    const tab = activeBrowserTab();
    const backBtn = document.getElementById('browserBackBtn');
    const fwdBtn = document.getElementById('browserFwdBtn');
    const countEl = document.getElementById('browserTabCount');
    const urlInput = document.getElementById('browserUrlInput');
    if (backBtn) backBtn.disabled = !tab || tab.historyIndex <= 0;
    if (fwdBtn) fwdBtn.disabled = !tab || tab.historyIndex >= tab.history.length - 1;
    if (countEl) countEl.textContent = String(browserState.tabs.length);
    if (urlInput && tab && document.activeElement !== urlInput) {
      const page = tab.history[tab.historyIndex];
      urlInput.value = (page && page.display) || '';
    }
  }

  function fuzzyScore(query, text) {
    if (!query) return 0;
    query = query.toLowerCase();
    text = (text || '').toLowerCase();
    let qi = 0, score = 0, lastIndex = -1;
    for (let i = 0; i < text.length && qi < query.length; i++) {
      if (text[i] === query[qi]) {
        score += lastIndex === i - 1 ? 3 : 1;
        lastIndex = i;
        qi++;
      }
    }
    return qi === query.length ? score : -1;
  }

  let spotlightIndex = [];
  let spotlightFiltered = [];
  let spotlightHighlight = 0;

  function renderSpotlightResults(query) {
    const scored = spotlightIndex
      .map(entry => ({ entry, s: Math.max(fuzzyScore(query, entry.label), fuzzyScore(query, entry.sub || '')) }))
      .filter(x => query === '' || x.s >= 0);
    scored.sort((a, b) => b.s - a.s);
    spotlightFiltered = scored.map(x => x.entry).slice(0, 30);
    spotlightHighlight = 0;
    const host = document.getElementById('spotlightResults');
    if (!spotlightFiltered.length) { host.innerHTML = `<div class="spotlight-empty">Keine Treffer</div>`; return; }
    host.innerHTML = spotlightFiltered.map((entry, i) => `
      <button class="spotlight-row${i === 0 ? ' is-highlighted' : ''}" data-idx="${i}">
        <span class="spotlight-row__type">${escapeHtml(entry.type)}</span>
        <span class="spotlight-row__label">${escapeHtml(entry.label)}</span>
        <span class="spotlight-row__sub">${escapeHtml(entry.sub || '')}</span>
      </button>
    `).join('');
  }

  function moveSpotlightHighlight(dir) {
    if (!spotlightFiltered.length) return;
    spotlightHighlight = (spotlightHighlight + dir + spotlightFiltered.length) % spotlightFiltered.length;
    document.querySelectorAll('.spotlight-row').forEach((el, i) => el.classList.toggle('is-highlighted', i === spotlightHighlight));
    const activeEl = document.querySelector('.spotlight-row.is-highlighted');
    if (activeEl) activeEl.scrollIntoView({ block: 'nearest' });
  }

  function activateSpotlightEntry(i) {
    const entry = spotlightFiltered[i];
    if (!entry) return;
    closeSheet(document.getElementById('spotlightWrap'));
    entry.action();
  }

  function openSpotlight() {
    if (document.body.classList.contains('is-locked')) return;
    spotlightIndex = buildSpotlightIndex();
    const input = document.getElementById('spotlightInput');
    input.value = '';
    renderSpotlightResults('');
    openSheet(document.getElementById('spotlightWrap'));
    requestAnimationFrame(() => input.focus());
  }

  function wireSpotlight() {
    const input = document.getElementById('spotlightInput');
    input.addEventListener('input', () => renderSpotlightResults(input.value));
    input.addEventListener('keydown', e => {
      if (e.key === 'ArrowDown') { e.preventDefault(); moveSpotlightHighlight(1); }
      else if (e.key === 'ArrowUp') { e.preventDefault(); moveSpotlightHighlight(-1); }
      else if (e.key === 'Enter') { e.preventDefault(); activateSpotlightEntry(spotlightHighlight); }
      else if (e.key === 'Escape') { closeSheet(document.getElementById('spotlightWrap')); }
    });
    document.getElementById('spotlightResults').addEventListener('click', e => {
      const row = e.target.closest('.spotlight-row');
      if (row) activateSpotlightEntry(Number(row.dataset.idx));
    });
    document.addEventListener('keydown', e => {
      if (document.body.classList.contains('is-locked')) return;
      if ((e.metaKey || e.ctrlKey) && e.key.toLowerCase() === 'k') { e.preventDefault(); openSpotlight(); return; }
      if (e.key === 'Escape') {
        const tool = document.getElementById('toolSheetWrap');
        if (!tool.hidden) closeSheet(tool);
        const tt = document.getElementById('termToolsSheetWrap');
        if (!tt.hidden) closeSheet(tt);
        closeAllListRails();
      }
    });
  }

  // Pull-down-to-search: on any screen, starting a vertical drag from the
  // very top of its scroll position and pulling down past a threshold opens
  // Spotlight on release — the iOS-style "pull for search" gesture. Purely
  // additive: passive listeners, no preventDefault, so a genuine scroll
  // always wins and cancels tracking.
  //
  // Several screens (Manager's chat/memory, Cloud's log viewer) are
  // `overflow: hidden` at the <section> level with the real vertical scroll
  // living on a nested element — so "scrollTop === 0" has to be evaluated on
  // whichever element actually scrolls, not on the section. findScrollTarget
  // walks up from the touch/click origin to the nearest ancestor (inclusive
  // of the section as a fallback) that is both overflow-y auto/scroll AND
  // has scrollable overflow.
  function findScrollTarget(target, section) {
    let node = target;
    while (node && node !== section) {
      if (node.nodeType === 1) {
        const oy = getComputedStyle(node).overflowY;
        if ((oy === 'auto' || oy === 'scroll') && node.scrollHeight > node.clientHeight) return node;
      }
      node = node.parentElement;
    }
    return section;
  }

  // ============================================================
  // Init
  // ============================================================
  ensureMessageIds();
  loadFavorites();

  renderServers();
  buildTerminalScreen();

  renderTools();

  initManagerScreen();

  renderCloudShell();
  renderCloudGroups();
  wireCloudToolbar();

  initBrowserScreen();

  renderSettings();

  renderPrayerShell();
  wirePrayer();

  wireLock();
  wireSessionSheet();


  // ============================================================
  // Die Bottom-Bar IST die Terminal-Leiste. Auf dem Terminals-Tab verwandelt
  // sie sich in Eingabezeile + Tasten für das GEWÄHLTE Terminal; lange drücken
  // hebt sie an, ein Wisch zur Seite schaltet zwischen beiden Leisten um.
  // Beim Diktieren wird sie zur Aufnahme-Spur mit Timer und Ja/Nein.
  // ============================================================
  const dockEl = document.getElementById('dock');
  const dockPages = {
    nav: document.getElementById('dockNav'),
    term: document.getElementById('dockTerm'),
    rec: document.getElementById('dockRec'),
  };
  document.getElementById('dockMicBtn').innerHTML = icon('mic');
  document.getElementById('dockSendBtn').innerHTML = icon('enter');
  document.getElementById('dockKeysBtn').innerHTML = icon('keyboard');
  document.getElementById('recCancelBtn').innerHTML = icon('x');
  document.getElementById('recConfirmBtn').innerHTML = icon('check');
  document.getElementById('recWave').innerHTML =
    Array.from({ length: 22 }, (_, i) =>
      `<span style="--h:${8 + ((i * 7) % 16)}px;animation-delay:${(i % 7) * 70}ms"></span>`).join('');

  function setDockPage(page) {
    if (!dockPages[page]) return;
    state.dockPage = page;
    dockEl.dataset.page = page;
    Object.keys(dockPages).forEach(k => dockPages[k].classList.toggle('is-active', k === page));
    if (page === 'nav') positionDockPill();
    if (page === 'term') syncDockTerminal();
    // Nav- und Terminal-Seite sind unterschiedlich hoch: was auf der Bar steht
    // (die Tastenleiste) muss die neue Höhe kennen, sonst überlappt sie.
    syncDockHeight();
  }

  /** Which terminal the bar acts on: the one last tapped / typed into. */
  function dockTargetId() {
    return state.activeCardId || state.order[0] || null;
  }
  function syncDockTerminal() {
    const id = dockTargetId();
    const session = TMS_DATA.sessions.find(s => s.id === id);
    const input = document.getElementById('dockInput');
    input.placeholder = session ? `Befehl an ${session.name}…` : 'Kein Terminal';
    input.disabled = !session;
    document.getElementById('dockKeysBtn').classList.toggle('is-on', !!state.keysPanelOpen);
    document.querySelectorAll('.term-card').forEach(c => c.classList.toggle('is-target', c.dataset.id === id));
    if (state.keysPanelOpen) applyKeysPanelVisibility();
  }
  // ============================================================
  // Eingabezeile: mitwachsen (bis 3 Zeilen) + Cursor-Schrubber
  // ============================================================
  // Die Bar sitzt unten fest — wächst das Feld, wächst sie nach OBEN. Alles,
  // was auf ihr steht (Tastenleiste), hängt an --dock-h und rückt mit.
  function syncDockHeight() {
    // Auf dem Sperrbildschirm ist die Bar display:none — dann misst sie 0 und
    // die Tastenleiste säße plötzlich HINTER ihr. Nur echte Höhen zählen.
    const h = dockEl.offsetHeight;
    if (h > 0) document.documentElement.style.setProperty('--dock-h', h + 'px');
  }
  window.addEventListener('resize', syncDockHeight);
  function autoGrowInput(el) {
    if (!el) return;
    const cs = getComputedStyle(el);
    const lh = parseFloat(cs.lineHeight) || 20;
    const pad = parseFloat(cs.paddingTop) + parseFloat(cs.paddingBottom);
    const max = lh * 3 + pad;
    // Beim Messen MUSS das Feld auf overflow:hidden stehen. Steht es noch auf
    // „scrollbar" (weil es eben noch dreizeilig war), rechnet Chrome scrollHeight
    // mit dem alten Scroll-Inhalt — das Feld schrumpfte dann nie ganz zurück.
    el.style.overflowY = 'hidden';
    el.style.height = 'auto';
    // Ist das Feld leer, misst Chrome den PLATZHALTER mit — der bricht auf zwei
    // Zeilen um, und die Bar stünde im Ruhezustand zweizeilig da. Leer heißt
    // immer genau eine Zeile.
    const contentH = el.value ? el.scrollHeight : lh + pad;
    const h = Math.min(contentH, max);
    el.style.height = h + 'px';
    // Erst ab der vierten Zeile scrollt das Feld in sich selbst.
    el.style.overflowY = contentH > max + 1 ? 'auto' : 'hidden';
    if (contentH <= max) el.scrollTop = 0;
    // Feld und Bar wachsen im SELBEN Frame — eine Höhen-Animation hier hätte
    // die Leiste darüber hinterherhinken lassen (und scrollHeight mitten im
    // Übergang lügt ohnehin).
    syncDockHeight();
  }
  // Gedrückt halten und waagerecht ziehen schiebt den Cursor durch den Text —
  // die Alternative zu Androids Lupe, die im WebView nicht zuverlässig kommt.
  // Greift nur im FOKUSSIERTEN Feld: unfokussiert gehört das lange Drücken
  // weiterhin der Bar (Terminal-Wechsel), sonst würden sich beide beißen.
  function wireCaretScrub(el) {
    const HOLD_MS = 280, PX_PER_CHAR = 7, MOVE_CANCEL = 10;
    let hold = null, scrubbing = false, startX = 0, startPos = 0;
    const stop = () => {
      clearTimeout(hold); hold = null;
      if (!scrubbing) return;
      scrubbing = false;
      el.classList.remove('is-scrubbing');
    };
    el.addEventListener('pointerdown', e => {
      if (document.activeElement !== el) return; // erst tippen, dann schrubben
      startX = e.clientX;
      clearTimeout(hold);
      hold = setTimeout(() => {
        scrubbing = true;
        startPos = el.selectionStart == null ? el.value.length : el.selectionStart;
        el.classList.add('is-scrubbing');
        try { el.setPointerCapture(e.pointerId); } catch (err) { /* kein Capture nötig */ }
        if (navigator.vibrate) navigator.vibrate(8);
      }, HOLD_MS);
    });
    el.addEventListener('pointermove', e => {
      if (!scrubbing) {
        if (hold && Math.abs(e.clientX - startX) > MOVE_CANCEL) { clearTimeout(hold); hold = null; }
        return;
      }
      e.preventDefault();
      const pos = Math.max(0, Math.min(el.value.length,
        startPos + Math.round((e.clientX - startX) / PX_PER_CHAR)));
      try { el.setSelectionRange(pos, pos); } catch (err) { /* ignore */ }
    });
    el.addEventListener('pointerup', stop);
    el.addEventListener('pointercancel', stop);
    // Beim Schrubben darf Android weder Kontextmenü noch Wortauswahl aufmachen.
    el.addEventListener('contextmenu', e => { if (scrubbing) e.preventDefault(); });
    el.addEventListener('selectstart', e => { if (scrubbing) e.preventDefault(); });
  }
  document.getElementById('dockInput').addEventListener('input', e => autoGrowInput(e.target));
  wireCaretScrub(document.getElementById('dockInput'));
  requestAnimationFrame(syncDockHeight);
  // Die Bridge leert das Feld selbst (dockReset) — sie muss es danach auch
  // wieder schrumpfen lassen, sonst bleibt die Bar dreizeilig stehen.
  window.autoGrowInput = autoGrowInput;

  // Beim Tippen darf das Terminal nicht hinter der Tastatur verschwinden.
  document.getElementById('dockInput').addEventListener('focus', () => {
    dockEl.classList.add('is-typing');
    document.body.classList.add('typing');
    setTimeout(() => window.dispatchEvent(new Event('resize')), 420);
    const card = document.querySelector('.term-card.is-target');
    if (card) setTimeout(() => card.scrollIntoView({ block: 'nearest', behavior: 'smooth' }), 260);
  });
  document.getElementById('dockInput').addEventListener('blur', () => {
    // Erst nach dem Klick: sonst wäre der Senden-Knopf schon weggerückt, wenn
    // der Finger ankommt.
    setTimeout(() => {
      if (document.activeElement !== document.getElementById('dockInput')) {
        dockEl.classList.remove('is-typing');
        document.body.classList.remove('typing');
        setTimeout(() => window.dispatchEvent(new Event('resize')), 420);
      }
    }, 120);
  });
  // Die Knöpfe der Leiste dürfen den Fokus nicht klauen — sonst klappt die
  // Zeile beim Antippen von "Senden" zusammen, bevor der Klick durch ist.
  document.getElementById('dockTerm').addEventListener('pointerdown', e => {
    if (e.target.closest('button') && document.activeElement === document.getElementById('dockInput')) {
      e.preventDefault();
    }
  });

  document.getElementById('dockTerm').addEventListener('click', e => {
    const id = dockTargetId();
    if (!id) return;
    const key = e.target.closest('[data-dock-key]');
    if (key) { handleTermKey(key.dataset.dockKey, id); return; }
    if (e.target.closest('#dockSendBtn')) {
      const input = document.getElementById('dockInput');
      sendTerminalCommand(id, input.value);
      input.value = '';
      autoGrowInput(input);
      input.blur();
    } else if (e.target.closest('#dockMicBtn')) {
      startDictation(id);
    } else if (e.target.closest('#dockKeysBtn')) {
      toggleKeysPanel();
      syncDockTerminal();
    }
  });
  document.getElementById('dockInput').addEventListener('keydown', e => {
    if (e.key !== 'Enter') return;
    // Im Textfeld würde Enter umbrechen statt zu senden — die Zeile wächst nur
    // MIT dem Text (Umbruch), nicht durch selbst gesetzte Zeilenschaltungen.
    e.preventDefault();
    const id = dockTargetId();
    if (!id) return;
    sendTerminalCommand(id, e.target.value);
    e.target.value = '';
    autoGrowInput(e.target);
    e.target.blur();
  });

  // Vom UNTEREN BILDSCHIRMRAND nach oben wischen wechselt die Leiste
  // (Navigation ⇄ Eingabezeile). Vorher musste man sie lange drücken — das lag
  // über jedem Knopf und war nicht zu erraten. Die Geste beginnt bewusst nur
  // unten: alles ab der Oberkante der Leiste abwärts zählt als Rand, überall
  // sonst passiert nichts.
  const DOCK_SWIPE_UP = 34;   // px, ab hier zählt es als Wisch
  let dockSwiping = false, dockSwitched = false, dockStartX = 0, dockStartY = 0, dockSuppressClick = false;

  /** Liegt der Punkt im unteren Rand — also auf der Leiste oder darunter? */
  function inBottomEdge(y) {
    const r = dockEl.getBoundingClientRect();
    if (!r.height) return false;          // Leiste versteckt (Sperrbildschirm)
    return y >= r.top - 8;
  }
  document.addEventListener('pointerdown', e => {
    dockSwiping = false;
    if (document.body.classList.contains('is-locked')) return;
    if (!inBottomEdge(e.clientY)) return;
    // Wer gerade wirklich IM Eingabefeld tippt, wird in Ruhe gelassen — dort
    // gehört das Wischen dem Cursor-Schrubber.
    const input = document.getElementById('dockInput');
    if (document.activeElement === input && e.target.closest('#dockInput')) return;
    dockSwiping = true;
    dockSwitched = false;
    dockStartX = e.clientX;
    dockStartY = e.clientY;
  });
  document.addEventListener('pointermove', e => {
    // Ein Wisch = EIN Wechsel. Ohne die Sperre kippt die Leiste während einer
    // einzigen Bewegung mehrfach hin und her.
    if (!dockSwiping || dockSwitched) return;
    const up = dockStartY - e.clientY;              // nach oben = positiv
    const side = Math.abs(e.clientX - dockStartX);
    if (up < DOCK_SWIPE_UP || up < side) return;    // eindeutig nach oben, nicht quer
    dockSwitched = true;
    dockSuppressClick = true;                       // der Knopf darunter darf nicht mit auslösen
    // Sicherheitsnetz: kommt nach dem Wisch gar kein Klick mehr (Android
    // verschluckt ihn oft), verfällt die Sperre von selbst — sonst fräße sie
    // den nächsten ECHTEN Knopfdruck.
    setTimeout(() => { dockSuppressClick = false; }, 400);
    const input = document.getElementById('dockInput');
    if (input) input.blur();
    dockEl.classList.add('is-switching');
    setTimeout(() => dockEl.classList.remove('is-switching'), 260);
    if (navigator.vibrate) navigator.vibrate(8);
    setDockPage(state.dockPage === 'nav' ? 'term' : 'nav');
  });
  dockEl.addEventListener('click', e => {
    if (!dockSuppressClick) return;
    dockSuppressClick = false;
    e.stopPropagation();
    e.preventDefault();
  }, true);
  function endDockSwipe() { dockSwiping = false; }
  document.addEventListener('pointerup', endDockSwipe);
  document.addEventListener('pointercancel', endDockSwipe);

  // ── Diktat: die Leiste wird zur Aufnahme.
  let recStart = 0, recTick = null;
  function dockRecordingStart() {
    setDockPage('rec');
    dockPages.rec.classList.remove('is-transcribing');
    document.getElementById('recConfirmBtn').disabled = false;
    recStart = Date.now();
    document.getElementById('recTimer').textContent = '0:00';
    clearInterval(recTick);
    recTick = setInterval(() => {
      const s = Math.floor((Date.now() - recStart) / 1000);
      document.getElementById('recTimer').textContent =
        `${Math.floor(s / 60)}:${String(s % 60).padStart(2, '0')}`;
    }, 250);
  }
  function dockRecordingTranscribing() {
    clearInterval(recTick);
    dockPages.rec.classList.add('is-transcribing');
    document.getElementById('recConfirmBtn').disabled = true;
    document.getElementById('recTimer').textContent = '…';
  }
  function dockRecordingEnd(text) {
    clearInterval(recTick);
    dockPages.rec.classList.remove('is-transcribing');
    setDockPage('term');
    if (text) {
      const input = document.getElementById('dockInput');
      // Erst fokussieren, dann schreiben, dann melden: die Bridge schickt die
      // DIFFERENZ zum Feldinhalt an die PTY. Andersherum wäre sie leer — das
      // Diktat stünde im Feld, käme aber nie im Terminal an.
      input.focus();
      input.value = (input.value ? input.value + ' ' : '') + text;
      input.dispatchEvent(new Event('input', { bubbles: true }));
    }
  }
  document.getElementById('recCancelBtn').addEventListener('click', () => {
    cancelDictation();
    dockRecordingEnd('');
  });
  document.getElementById('recConfirmBtn').addEventListener('click', () => {
    confirmDictation();
  });
  // Das Mockup hat keinen echten Recorder — die Bridge ersetzt diese drei.
  function confirmDictation() { dockRecordingTranscribing(); setTimeout(() => dockRecordingEnd('(Demo) Transkript'), 1200); }
  window.dockRecordingStart = dockRecordingStart;
  window.dockRecordingTranscribing = dockRecordingTranscribing;
  window.dockRecordingEnd = dockRecordingEnd;
  window.confirmDictation = confirmDictation;
  window.setDockPage = setDockPage;
  window.syncDockTerminal = syncDockTerminal;
  window.dockTargetId = dockTargetId;

  // Auf dem Terminals-Tab ist die Terminal-Leiste die Voreinstellung.
  SCREEN_HOOKS.terminals = () => { setDockPage('term'); renderTermSwitcher(); };
  setDockPage('nav');


  // ============================================================
  // Terminal-Slider — nur Punkte, ein Daumenzug durch den Stapel.
  // Gezogen wird pro Frame (rAF), nicht pro Pointer-Event: dadurch bleibt es
  // auch bei schnellen Bewegungen flüssig. Der Punkt unter dem Daumen wächst
  // mit der Nähe — wie beim Modus-Wähler der Kamera.
  // ============================================================
  const tsEl = document.getElementById('termSwitcher');
  const tsTrack = document.getElementById('tsTrack');
  const tsLabel = document.getElementById('tsLabel').firstElementChild;
  let tsDots = [];

  function tsVisible() {
    const screen = document.querySelector('[data-screen="terminals"]');
    return !!screen && !screen.hidden && state.terminalView === 'stack' && state.order.length > 1;
  }
  function tsName(i) {
    const s = TMS_DATA.sessions.find(x => x.id === state.order[i]);
    return s ? s.name : '';
  }
  /** Punkte nach Nähe zum Daumen skalieren — ein weicher Bauch, kein Sprung. */
  function tsPaint(f) {
    const n = state.order.length;
    const near = Math.round(clamp(f, 0, n - 1));
    tsDots.forEach((dot, i) => {
      const d = Math.abs(i - f);
      const scale = 1 + Math.max(0, 1 - d) * 0.3 + (d < 1 ? (1 - d) * 0.1 : 0);
      dot.style.transform = `scale(${scale.toFixed(3)})`;
      dot.style.opacity = (0.38 + Math.max(0, 1 - d) * 0.62).toFixed(3);
      dot.parentElement.classList.toggle('is-active', i === near);
    });
    tsLabel.textContent = tsName(near);
  }
  function tsRest(i) {
    tsDots.forEach(d => { d.style.transform = ''; d.style.opacity = ''; });
    tsTrack.querySelectorAll('.ts-seg').forEach((s, k) => s.classList.toggle('is-active', k === i));
    tsLabel.textContent = tsName(i);
  }
  function renderTermSwitcher() {
    const show = tsVisible();
    tsEl.hidden = !show;
    document.body.classList.toggle('has-switcher', show);
    if (!show) return;
    tsTrack.innerHTML = state.order.map((id, i) => {
      const s = TMS_DATA.sessions.find(x => x.id === id);
      const initial = escapeHtml(((s ? s.name : '?').trim()[0] || '?').toUpperCase());
      return `<button class="ts-seg${i === state.activeIndex ? ' is-active' : ''}" data-ts="${i}"
        aria-label="${escapeHtml(s ? s.name : 'Terminal')}"><span class="ts-dot" style="background:${s ? s.colorTag : 'var(--accent)'}">${initial}</span></button>`;
    }).join('');
    tsDots = [...tsTrack.querySelectorAll('.ts-dot')];
    tsRest(state.activeIndex);
  }
  window.renderTermSwitcher = renderTermSwitcher;

  let tsHold = null, tsScrub = false, tsMoved = false, tsFrom = 0, tsRaf = 0, tsX = 0;
  function tsIndexFromX(x) {
    const segs = tsTrack.querySelectorAll('.ts-seg');
    if (!segs.length) return 0;
    const first = segs[0].getBoundingClientRect();
    const step = segs.length > 1
      ? (segs[segs.length - 1].getBoundingClientRect().left - first.left) / (segs.length - 1)
      : 1;
    return clamp((x - (first.left + first.width / 2)) / step, 0, segs.length - 1);
  }
  function tsFrame() {
    tsRaf = 0;
    if (!tsScrub) return;
    const f = tsIndexFromX(tsX);
    tsPaint(f);
    state.activeFloat = f;
    layoutStack(f, { instant: true }); // der Stapel folgt dem Daumen direkt
  }
  tsTrack.addEventListener('pointerdown', e => {
    if (!state.order.length) return;
    tsMoved = false;
    tsFrom = state.activeIndex;
    tsX = e.clientX;
    tsTrack.setPointerCapture(e.pointerId);
    clearTimeout(tsHold);
    tsHold = setTimeout(() => {
      tsScrub = true;
      tsEl.classList.add('is-scrubbing');
      if (navigator.vibrate) navigator.vibrate(6);
      if (!tsRaf) tsRaf = requestAnimationFrame(tsFrame);
    }, 200);
  });
  tsTrack.addEventListener('pointermove', e => {
    if (!tsScrub) return;
    tsMoved = true;
    tsX = e.clientX;                       // nur merken …
    if (!tsRaf) tsRaf = requestAnimationFrame(tsFrame); // … gezeichnet wird pro Frame
  });
  function tsEnd(e) {
    clearTimeout(tsHold);
    if (!tsScrub) return;
    tsScrub = false;
    cancelAnimationFrame(tsRaf); tsRaf = 0;
    tsEl.classList.remove('is-scrubbing');
    const target = tsMoved ? Math.round(tsIndexFromX(e ? e.clientX : tsX)) : tsFrom;
    setActive(target);   // federt in die Ruhelage
    tsRest(target);
    tsEl.classList.add('is-hinting');
    clearTimeout(tsEl._hint);
    tsEl._hint = setTimeout(() => tsEl.classList.remove('is-hinting'), 800);
  }
  tsTrack.addEventListener('pointerup', tsEnd);
  tsTrack.addEventListener('pointercancel', tsEnd);

  // Kurzer Tipp auf einen Punkt springt direkt dorthin.
  tsTrack.addEventListener('click', e => {
    if (tsMoved) return;
    const seg = e.target.closest('.ts-seg');
    if (!seg) return;
    const i = Number(seg.dataset.ts);
    setActive(i);
    tsRest(i);
    tsEl.classList.add('is-hinting');
    clearTimeout(tsEl._hint);
    tsEl._hint = setTimeout(() => tsEl.classList.remove('is-hinting'), 800);
  });

  wireNav();
  wireTermToolsSheet();
  wireSpotlight();

  initLiveSession();
  startLatencyTicker();
  show('lock');
</script>
</body>
</html>

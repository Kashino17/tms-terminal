<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>Liquid Deck — TMS Terminal</title>
<script>
  // Applied BEFORE first paint (blocking, first thing in <head>) so the
  // persisted theme choice is on <html> before any CSS token resolves —
  // avoids a flash of the wrong theme on reload. Kept in lockstep with the
  // THEME_KEY / loadTheme() logic in the main script at the end of <body>.
  (function () {
    var theme = 'dark';
    try {
      if (localStorage.getItem('tms-liquid-deck-theme') === 'light') theme = 'light';
    } catch (e) { /* storage unavailable — fall back to dark */ }
    document.documentElement.setAttribute('data-theme', theme);
  })();
</script>
<style>
  :root {
    /* ===== Metric system (one scale, applied app-wide) =====
       Corner-radius family, icon ramp, touch target, type ramp and an
       8pt spacing rhythm — everything downstream resolves through these
       so nothing is sized ad-hoc. */
    --radius-lg: 22px; --radius-md: 16px; --radius-sm: 12px; --radius-xs: 10px; --radius-pill: 999px;
    --spring: cubic-bezier(0.34, 1.3, 0.5, 1);
    /* Motion tokens — one spring family for the whole app. Snappy for
       chrome (dock pill, island, presses), gentle for large surfaces
       (sheets, morph bodies). Exit curves accelerate out, never bounce. */
    --spring-snappy: cubic-bezier(0.34, 1.56, 0.64, 1);
    --spring-gentle: cubic-bezier(0.30, 1.36, 0.52, 1);
    --dur-snappy: 300ms;
    --dur-gentle: 450ms;
    --ease-exit: cubic-bezier(0.4, 0, 0.7, 0.2);
    /* One shared motion vocabulary — every animated surface picks from these
       four instead of inventing its own curve. */
    --spring-soft: cubic-bezier(.32,1.06,.35,1);   /* page/screens push-back */
    --spring-pop: cubic-bezier(.30,1.18,.34,1);    /* sheets & panels enter  */
    --ease-out: cubic-bezier(.22,1,.36,1);         /* small UI settles       */
    --ease-exit-hard: cubic-bezier(.4,0,.68,.06);  /* sheets & panels leave  */
    --font-ui: -apple-system, BlinkMacSystemFont, "SF Pro Display", "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    --font-mono: ui-monospace, "SF Mono", "Cascadia Code", "JetBrains Mono", Menlo, Consolas, monospace;
    /* Icon ramp — three sizes only */
    --icon-sm: 16px; --icon-md: 20px; --icon-lg: 24px;
    /* Touch target — every interactive control is at least this in both axes */
    --touch: 44px;
    /* Type ramp — fixed sizes per role */
    --fs-title: 26px; --fs-h2: 21px; --fs-section: 15px; --fs-body: 14px;
    --fs-label: 12.5px; --fs-caption: 11px; --fs-micro: 9.5px;
    /* Control heights on the 8pt rhythm */
    --chip-h: 26px; --pill-h: 34px;
    /* Safe areas + chrome bands → drive every screen's padding box */
    --safe-top: env(safe-area-inset-top, 0px);
    --safe-bottom: env(safe-area-inset-bottom, 0px);
    --header-h: 48px; /* island zone: 8px top offset + 40px pill */
    --dock-h: 64px;
    --top-space: calc(var(--safe-top) + var(--header-h) + 12px);
    --bottom-space: calc(var(--safe-bottom) + var(--dock-h) + 24px);
    --term-font-size: 13px;
    /* Modal/sheet scrim + camera-flash white are theme-invariant utility colors —
       tokenized for discipline, not meant to flip with the theme. */
    --scrim-rgb: 10,12,16;
    --sheen-rgb: 255,255,255;
    --flash: #fff;
  }

  /* ============================================================
     Theme tokens — Requirement: two toggleable, persisted themes.
     Dark (default) = soft Kindle-gray, NEVER pure black/near-black.
     Light ("Outdoor") = bright frosted glass, near-black text, for
     sunlight legibility — including a genuinely LIGHT terminal pane.
     Every color in the component CSS below resolves through one of
     these tokens; nothing is hardcoded outside this block (session
     color-tags + the camera-flash white are the sole exceptions —
     both are decorative/theme-invariant, not surfaces).
     ============================================================ */
  :root, [data-theme="dark"] {
    --bg-grad: radial-gradient(120% 90% at 20% 0%, #2a2e35 0%, #23262c 55%, #1e2126 100%);
    --glass-rgb: 255,255,255;              /* frosted surface fill — always a white tint */
    --glass: rgba(var(--glass-rgb),0.10);
    --glass-strong: rgba(var(--glass-rgb),0.15);
    --overlay-rgb: 255,255,255;            /* hairlines / hover / press / dividers — inverts per theme */
    --glass-border: rgba(var(--overlay-rgb),0.26);
    --glass-shadow: 0 10px 30px rgba(0,0,0,.28);
    --blur: blur(24px) saturate(160%);
    --blur-term: blur(20px) saturate(120%);
    --text: #f0f2f6; --text-rgb: 240,242,246; --text-dim: rgba(var(--text-rgb),0.68);
    --accent: #8ab8ff; --accent-rgb: 138,184,255;
    --accent-warm: #ff9f6a; --accent-warm-rgb: 255,159,106;
    --accent-cool-rgb: 154,120,255;         /* ambient blob only, no text use */
    --ok: #4ade80; --ok-rgb: 74,222,128;
    --warn: #fbbf24; --warn-rgb: 251,191,36;
    --err: #ffa0a0; --err-rgb: 255,160,160;
    --on-accent: #071021;                   /* text/icon on a SOLID accent fill */
    --on-err: #3a1210;                      /* text on a SOLID err fill (mic badge) */
    --accent-ink: #d9e6ff;                  /* text on a translucent accent-tinted chip */
    --chip-a: .08;                          /* self-tinted status-chip/badge background */
    --well-rgb: 0,0,0; --well-a: .26;       /* recessed code/input surfaces */
    --term-surface-rgb: 24,26,31; --term-surface-a: .82;   /* terminal pane — darkest, still gray */
    --term-surface: rgba(var(--term-surface-rgb), var(--term-surface-a));
    --scrim-a: .5;                          /* sheet/modal backdrop dimmer */
    --scrim-strong-rgb: 26,29,34; --scrim-strong-a: .86;   /* adhan full-bleed alarm backdrop */
    --sheen-a: .55;
    --blob-a1: .35; --blob-a2: .22; --blob-a3: .20;
  }
  [data-theme="light"] {
    --bg-grad: radial-gradient(120% 90% at 20% 0%, #f3f6fc 0%, #e7ecf5 55%, #dbe2ee 100%);
    --glass-rgb: 255,255,255;              /* still a white tint — just much more opaque */
    --glass: rgba(var(--glass-rgb),0.65);
    --glass-strong: rgba(var(--glass-rgb),0.82);
    --overlay-rgb: 15,23,42;                /* dark slate tint, inverted vs dark theme */
    --glass-border: rgba(var(--overlay-rgb),0.16);
    --glass-shadow: 0 14px 40px rgba(15,23,42,.14), 0 2px 10px rgba(15,23,42,.08);
    --blur: blur(20px) saturate(180%) brightness(1.04);
    --blur-term: blur(16px) saturate(130%) brightness(1.02);
    --text: #1a1d22; --text-rgb: 26,29,34; --text-dim: rgba(var(--text-rgb),0.62);
    --accent: #1e4fa3; --accent-rgb: 30,79,163;
    --accent-warm: #9a4a0a; --accent-warm-rgb: 154,74,10;
    --accent-cool-rgb: 139,124,240;
    --ok: #157a3c; --ok-rgb: 21,122,60;
    --warn: #92400e; --warn-rgb: 146,64,14;
    --err: #b91c1c; --err-rgb: 185,28,28;
    --on-accent: #f3f7ff;
    --on-err: #fff5f5;
    --accent-ink: #123059;
    --chip-a: .06;
    --well-rgb: 15,23,42; --well-a: .06;
    --term-surface-rgb: 252,253,255; --term-surface-a: .90;
    --term-surface: rgba(var(--term-surface-rgb), var(--term-surface-a));
    --scrim-a: .4;
    --scrim-strong-rgb: 238,241,247; --scrim-strong-a: .90;
    --sheen-a: .85;
    --blob-a1: .16; --blob-a2: .12; --blob-a3: .10;
  }
  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  html, body { height: 100%; }
  body {
    margin: 0; overflow: hidden; background: var(--bg-grad); color: var(--text);
    font: 400 14.5px/1.45 var(--font-ui); -webkit-font-smoothing: antialiased;
  }
  button, input { font: inherit; color: inherit; }
  button { background: none; border: none; cursor: pointer; }
  a { color: inherit; }

  /* ============================================================
     Ambient liquid background — soft drifting color blobs behind
     every glass surface, source of the "light" glass refracts.
     ============================================================ */
  .atmosphere { position: fixed; inset: 0; overflow: hidden; z-index: 0; pointer-events: none; }
  /* Static on purpose: a permanently drifting background forces every
     backdrop-filter surface above it to re-blur EVERY frame — the single
     biggest jank source on mobile GPUs. The look is identical when still. */
  .atmosphere .blob { position: absolute; border-radius: 50%; filter: blur(60px); opacity: .55; }
  .blob--a { width: 60vmax; height: 60vmax; left: -20vmax; top: -24vmax; background: radial-gradient(circle at 30% 30%, rgba(var(--accent-rgb),var(--blob-a1)), transparent 65%); }
  .blob--b { width: 52vmax; height: 52vmax; right: -18vmax; top: 10vmax; background: radial-gradient(circle at 60% 40%, rgba(var(--accent-warm-rgb),var(--blob-a2)), transparent 65%); }
  .blob--c { width: 46vmax; height: 46vmax; left: 8vmax; bottom: -20vmax; background: radial-gradient(circle at 50% 50%, rgba(var(--accent-cool-rgb),var(--blob-a3)), transparent 65%); }
  @media (prefers-reduced-motion: reduce) {
    .atmosphere .blob { animation: none; }
  }

  /* ============================================================
     Glass utility — every surface in this concept is one of these.
     ============================================================ */
  .glass {
    position: relative;
    background: var(--glass);
    -webkit-backdrop-filter: var(--blur); backdrop-filter: var(--blur);
    border: 1px solid var(--glass-border);
    border-radius: var(--radius-lg);
    box-shadow: var(--glass-shadow);
  }
  .glass--strong { background: var(--glass-strong); }
  .glass--dark { background: var(--term-surface); -webkit-backdrop-filter: var(--blur-term); backdrop-filter: var(--blur-term); }
  /* WÄRME: Der Terminal-Boden ist der eine Ort, an dem ein Blur nicht sein darf.
     Er ist zu 82% deckend (--term-surface) und liegt VOR einer bereits geblurrten
     Glaskarte — sichtbar trägt der Filter also nichts bei (A/B geprüft: identisch).
     Er kostet aber eine Filter-Fläche unter genau dem Element, das sich bei jeder
     Ausgabe neu befüllt und ans Ende scrollt: der Compositor muss die Fläche dann
     immer wieder anfassen. Blur bleibt auf der Karte, verschwindet vom Inhalt. */
  .card-body.glass, .card-body.glass--dark { -webkit-backdrop-filter: none; backdrop-filter: none; }
  .glass::before {
    content: ''; position: absolute; left: 10%; right: 10%; top: 0; height: 1px;
    background: linear-gradient(90deg, transparent, rgba(var(--sheen-rgb),var(--sheen-a)), transparent);
    pointer-events: none;
  }

  /* ============================================================
     Screens / router
     ============================================================ */
  #screens { position: fixed; inset: 0; z-index: 1; }
  /* Real-touch fix: without this, Chrome/Android claims a downward pull at
     scrollTop 0 for its own pull-to-refresh (reloading the mockup!) and
     chains inner-scroller overscroll up to the viewport — both hijack the
     pull-to-spotlight gesture and end pointer streams mid-gesture. Viewport
     gets none (kills pull-to-refresh), inner scrollers get contain (their
     overscroll never leaves them). */
  html, body { overscroll-behavior-y: none; }
  section[data-screen], .term-list, .card-body, .overview-grid, .browser-content,
  .sheet-scroll-body, .chat-scroll, #managerMemory, .spotlight-results, .question-options { overscroll-behavior-y: contain; }
  section[data-screen] {
    position: absolute; inset: 0; overflow-y: auto; -webkit-overflow-scrolling: touch;
    padding: var(--top-space) 16px var(--bottom-space);
  }
  section[data-screen="terminals"]:not([hidden]) { overflow: hidden; display: flex; flex-direction: column; }

  ::-webkit-scrollbar { width: 0; height: 0; }

  /* ============================================================
     Dynamic Island — global chrome. A compact, centered, floating
     glass pill in a RESERVED top zone (screens keep --top-space free,
     so it never overlaps content). Tap → the pill itself MORPHS into
     the expanded detail card (grid-rows + width interpolation on a
     spring); tap outside or on the compact row → morphs back.
     Carries: session/agent activity, ping latency, prayer countdown.
     ============================================================ */
  /* Composited pulse primitives — transform/opacity only, never box-shadow
     (box-shadow animates on the raster thread and repaints every frame). */
  @keyframes dotBreathe { 0%, 100% { opacity: 1; transform: scale(1); } 50% { opacity: .5; transform: scale(.85); } }
  @keyframes glowBreathe { 0%, 100% { opacity: 1; } 50% { opacity: .72; } }
  @keyframes ringPulse { 0% { opacity: .6; transform: scale(1); } 75%, 100% { opacity: 0; transform: scale(1.55); } }
  /* Ruhemodus: nach 15s ohne Berührung pausieren die Dauer-Pulse. Sie sind
     compositor-only, halten aber Display + GPU permanent auf voller Bildrate
     wach — auf dem Gerät ist das spürbare Wärme. Aktive Zustände (Aufnahme,
     Diktat, Adhan) pulsieren weiter, weil dort ohnehin interagiert wird. */
  body.is-calm .status-dot.is-live, body.is-calm .status-dot.is-warn,
  body.is-calm .dock-badge,
  body.is-calm .status-chip[data-status="running"] .dot,
  body.is-calm .status-chip[data-status="live"] .dot,
  body.is-calm .status-chip[data-status="building"] .dot,
  body.is-calm .jump-bottom-orb.pulse::after,
  body.is-calm .sel-handle { animation: none; }
  @media (prefers-reduced-motion: reduce) {
    *, *::before, *::after { animation-duration: .01ms !important; animation-iteration-count: 1 !important; transition-duration: .01ms !important; }
  }
  #statusHeader {
    position: fixed; top: calc(var(--safe-top) + 8px); left: 50%; z-index: 60;
    transform: translateX(-50%);
    width: max-content; max-width: min(92vw, 400px);
    border-radius: 22px; border: 1px solid var(--glass-border);
    padding: 0; overflow: hidden; cursor: pointer;
    transition: width var(--dur-snappy) var(--spring-snappy),
                border-radius var(--dur-snappy) var(--spring-snappy),
                box-shadow var(--dur-snappy) var(--spring-snappy);
    will-change: width;
  }
  #statusHeader.is-expanded {
    width: min(94vw, 480px);
    border-radius: var(--radius-lg);
    box-shadow: 0 18px 50px rgba(0,0,0,.35);
  }
  #statusHeader::before { left: 14%; right: 14%; }
  /* touch-action:none ist Pflicht für den Long-Press-Swipe unten — sonst
     wertet der Browser das erste Fingerbewegen als Scroll-Versuch, kapert
     die Geste und schickt uns nur ein pointercancel (genau wie beim
     Terminal-Switcher, der das aus demselben Grund schon so macht). */
  .island-compact { display: flex; align-items: center; gap: 8px; height: 36px; padding: 0 12px;
    touch-action: none; -webkit-user-select: none; user-select: none; }
  /* Terminal-Bildschirm: die Aktivitätszeile (Punkt+"Bereit") weicht den
     vier Mini-Aktionen — Ping und Gebetszeit bleiben, wie überall sonst
     auch, einfach stehen. Die Insel selbst ist "fit-content": ohne die
     Aktivitätszeile zieht sie sich von selbst schmaler, statt die Icons in
     eine unverändert breite Hülle zu klatschen. */
  .island-term-actions { display: none; align-items: center; gap: 5px; flex: 1 1 auto;
    justify-content: center; margin: 0 2px; }
  #statusHeader.is-terminal-mode .status-hd__activity { display: none; }
  #statusHeader.is-terminal-mode .island-term-actions { display: flex; }
  /* Alle vier Insel-Knöpfe teilen sich EINE Grundform — gleiche Größe, gleiche
     Rundung, gleicher Glasrahmen. Nur der Zustand (aktiv/gewählt) färbt sie
     ein; vorher war „+" ein Glas-Chip, die Ansichts-Umschalter ein Segment
     ohne Rahmen und die Übersicht wieder etwas anderes. */
  .island-act { flex: none; width: 28px; height: 28px; border-radius: 9px;
    display: flex; align-items: center; justify-content: center; color: var(--text-dim);
    background: rgba(var(--overlay-rgb),.07); border: 1px solid var(--glass-border);
    transition: color 200ms var(--spring), background 200ms var(--spring), transform 150ms var(--spring); }
  .island-act .ic { width: 15px; height: 15px; }
  .island-act:active { transform: scale(.9); }
  .island-act.is-on,
  .island-act[aria-selected="true"] { color: var(--accent); background: rgba(var(--accent-rgb),.2); border-color: rgba(var(--accent-rgb),.42); }
  /* Apple-artiger "Pop": ein kurzer Bounce, wenn der Insel-Inhalt wechselt
     (Bildschirmwechsel rein/raus aus Terminals) — Compositor-only. */
  @keyframes islandPop { 0% { transform: translateX(-50%) scale(1); } 45% { transform: translateX(-50%) scale(1.035); } 100% { transform: translateX(-50%) scale(1); } }
  #statusHeader.is-popping { animation: islandPop 420ms var(--spring-snappy); }

  /* Browser-Badge — grün wenn irgendwo ein Tab aktiv navigiert ist, auf
     jedem Bildschirm sichtbar (auch im Terminal-Modus), Tap springt direkt
     in den Browser. */
  .island-browser-badge { display: none; flex: none; width: 28px; height: 28px; border-radius: 9px;
    align-items: center; justify-content: center; color: #22C55E;
    background: rgba(34,197,94,.16); border: 1px solid rgba(34,197,94,.35);
    transition: transform 150ms var(--spring); }
  .island-browser-badge .ic { width: 15px; height: 15px; }
  .island-browser-badge:active { transform: scale(.9); }
  .island-browser-badge.is-visible { display: flex; }

  /* Long-Press + Ziehen auf der Insel wechselt den Bildschirm — der Hinweis
     schwebt knapp darunter, genau wie das Terminal-Switcher-Label. */
  .island-swipe-hint { position: fixed; top: calc(var(--safe-top) + 8px + 44px); left: 50%; z-index: 61;
    transform: translateX(-50%) translateY(4px) scale(.92); opacity: 0; pointer-events: none;
    transition: opacity 160ms ease-out, transform 220ms var(--ease-out);
    padding: 6px 14px; border-radius: 999px; background: rgba(var(--well-rgb),.92);
    -webkit-backdrop-filter: var(--blur); backdrop-filter: var(--blur); border: 1px solid var(--glass-border);
    font: 600 12px var(--font-ui); color: var(--text); white-space: nowrap; }
  .island-swipe-hint.is-visible { opacity: 1; transform: translateX(-50%) translateY(0) scale(1); }
  .island-body { display: grid; grid-template-rows: 0fr; transition: grid-template-rows var(--dur-gentle) var(--spring-gentle); }
  /* Ohne diese Zeile bleibt die Rasterzeile auf 0fr — der Körper der Insel
     klappte nie auf, sichtbar war nur der Streifen aus seiner Polsterung. */
  #statusHeader.is-expanded .island-body { grid-template-rows: 1fr; }
  .island-body__inner {
    overflow: hidden; min-height: 0;
    opacity: 0; transform: translateY(-6px);
    transition: opacity 180ms var(--ease-exit), transform 220ms var(--ease-exit);
  }
  #statusHeader.is-expanded .island-body__inner {
    opacity: 1; transform: none;
    padding: 2px 16px 14px; max-height: min(58vh, 500px); overflow-y: auto;
    transition: opacity 240ms ease 90ms, transform 300ms var(--spring-snappy) 90ms;
  }
  #islandScrim { position: fixed; inset: 0; z-index: 59; background: rgba(var(--scrim-rgb), .22); opacity: 0; transition: opacity 250ms ease; pointer-events: none; }
  #islandScrim.is-open { opacity: 1; pointer-events: auto; }
  .status-hd__activity { display: flex; align-items: center; gap: 8px; flex: 1 1 auto; min-width: 0; }
  /* Activity is the only piece allowed to ellipsis under pressure — the two
     metrics are short, fixed-format readouts and always stay whole. */
  .status-hd__label { font-size: var(--fs-label); font-weight: 600; letter-spacing: .01em; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .status-dot { width: 8px; height: 8px; border-radius: 50%; flex: none; background: var(--text-dim); }
  .status-dot.is-live { background: var(--accent); animation: dotBreathe 1.4s ease-in-out infinite; }
  .status-dot.is-warn { background: var(--warn); animation: dotBreathe 1.1s ease-in-out infinite; }
  .status-dot.is-ok { background: var(--ok); }
  .status-hd__metrics { display: flex; align-items: center; gap: 10px; flex: none; }
  .status-hd__metric { display: flex; align-items: center; gap: 5px; font-size: var(--fs-caption); font-weight: 600; color: var(--text-dim); font-variant-numeric: tabular-nums; }
  .status-hd__metric .ic { width: var(--icon-sm); height: var(--icon-sm); }
  .status-hd__metric--latency { color: var(--ok); font-family: var(--font-mono); }
  .status-hd__divider { width: 1px; height: 15px; background: var(--glass-border); flex: none; }

  /* Dictation-in-progress badge — pinned to the header's leading edge. */
  .status-mic-badge { position: absolute; top: 11px; left: -2px; width: 18px; height: 18px; border-radius: 50%;
    background: var(--err); color: var(--on-err); display: flex; align-items: center; justify-content: center;
    box-shadow: 0 0 10px rgba(var(--err-rgb),.7); animation: glowBreathe 1s ease-in-out infinite; z-index: 2; }
  .status-mic-badge .ic { width: 11px; height: 11px; }
  .status-mic-badge[hidden] { display: none; }

  /* Island expanded-body content — the .island-* classes below. */
  .island-expanded { padding: 2px; }
  .island-expanded h4 { margin: 14px 0 8px; font-size: 11px; text-transform: uppercase; letter-spacing: .08em; color: var(--text-dim); font-weight: 600; }
  .island-expanded h4:first-child { margin-top: 0; }
  .island-row { display: flex; align-items: center; gap: 10px; padding: 8px 0; border-top: 1px solid rgba(var(--overlay-rgb),.08); }
  .island-row:first-of-type { border-top: none; }
  .island-row__dot { width: 8px; height: 8px; border-radius: 50%; flex: none; }
  .island-row__name { font-weight: 600; font-size: 13.5px; flex: 1; min-width: 0; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .island-row__meta { font-size: 12px; color: var(--text-dim); flex: none; }
  .island-activity-feed { font: 12.5px/1.5 var(--font-mono); color: var(--text-dim); background: rgba(var(--well-rgb),var(--well-a)); border-radius: var(--radius-sm); padding: 10px 12px; white-space: pre-wrap; word-break: break-word; }
  .island-activity-feed .sgr-g { color: var(--ok); } .island-activity-feed .sgr-r { color: var(--err); } .island-activity-feed .sgr-b { font-weight: 700; } .island-activity-feed .sgr-d { opacity: .6; }
  .island-close-hint { text-align: center; font-size: 11px; color: var(--text-dim); padding-top: 12px; opacity: .7; }
  /* ── Aufgeklappte Insel: Kopf, Status-Karte, Menü ────────────────────────
     Die Insel ist jetzt auch das, was früher „Mehr" in der Bottom-Bar war —
     sie trägt deshalb einen echten Kopf (mit ✕), eine zusammengefasste
     Status-Karte und darunter die Menüzeilen mit Chevron. */
  .isl-head { display: flex; align-items: center; gap: 11px; padding: 2px 2px 14px; }
  .isl-head__icon { flex: none; width: 34px; height: 34px; border-radius: 11px; display: flex; align-items: center; justify-content: center;
    background: rgba(var(--accent-rgb),.18); color: var(--accent); }
  .isl-head__text { flex: 1; min-width: 0; display: flex; flex-direction: column; gap: 1px; }
  .isl-head__text strong { font-size: 15px; font-weight: 700; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .isl-head__text small { font-size: 11.5px; color: var(--text-dim); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .isl-close { flex: none; width: 30px; height: 30px; border-radius: 50%; display: flex; align-items: center; justify-content: center;
    color: var(--text-dim); background: rgba(var(--overlay-rgb),.10); transition: background 200ms var(--spring), transform 150ms var(--spring); }
  .isl-close:active { transform: scale(.9); background: rgba(var(--overlay-rgb),.18); }

  .isl-card { border-radius: 16px; overflow: hidden; margin-bottom: 14px;
    background: rgba(var(--overlay-rgb),.05); border: 1px solid var(--glass-border); }
  .isl-stat { display: flex; align-items: center; gap: 10px; padding: 12px 12px;
    border-top: 1px solid rgba(var(--overlay-rgb),.07); }
  .isl-stat:first-child { border-top: none; }
  .isl-stat--live { background: rgba(var(--ok-rgb),.10); }
  .isl-stat__dot { flex: none; width: 8px; height: 8px; border-radius: 50%; }
  .isl-stat__label { font-size: 13.5px; font-weight: 600; }
  .isl-stat__val { margin-left: auto; font-size: 12.5px; color: var(--text-dim); font-variant-numeric: tabular-nums;
    overflow: hidden; text-overflow: ellipsis; white-space: nowrap; max-width: 45%; }
  .isl-stat__act { flex: none; font-size: 12.5px; font-weight: 700; color: var(--text-dim); }
  .isl-stat__act.is-ok { color: var(--ok); }

  .isl-menu { display: flex; flex-direction: column; margin-top: 14px; }
  .isl-item { display: flex; align-items: center; gap: 12px; padding: 12px 8px; border-radius: 12px; text-align: left;
    color: var(--text); transition: background 200ms var(--spring); }
  .isl-item:active { background: rgba(var(--overlay-rgb),.09); }
  .isl-item > .ic { flex: none; color: var(--text-dim); }
  /* Das Label nimmt den Platz — dadurch steht der Wert (falls es einen gibt)
     immer direkt links vom Chevron, egal ob die Zeile einen hat oder nicht. */
  .isl-item__label { flex: 1; min-width: 0; font-size: 14.5px; font-weight: 600; }
  .isl-item__val { flex: none; font-size: 12.5px; color: var(--text-dim); }
  .isl-item__chev { flex: none; display: flex; color: var(--text-dim); opacity: .5; transform: rotate(-90deg); }
  .isl-item--danger > .ic, .isl-item--danger .isl-item__label { color: var(--err); }

  /* Quick-access sun/moon theme toggle inside the expanded island card. */
  .island-theme-toggle { display: flex; align-items: center; gap: 10px; width: 100%; padding: 9px 2px; border-top: 1px solid rgba(var(--overlay-rgb),.08); color: var(--text); font: 600 13.5px var(--font-ui); text-align: left; cursor: pointer; border-radius: 10px; transition: background 200ms var(--spring); }
  .island-theme-toggle:active { background: rgba(var(--overlay-rgb),.08); }
  .island-theme-toggle__icon { flex: none; width: 22px; height: 22px; border-radius: 50%; display: flex; align-items: center; justify-content: center; background: rgba(var(--accent-rgb),.16); color: var(--accent); }
  .island-theme-toggle__icon svg { width: var(--icon-sm); height: var(--icon-sm); }
  .island-theme-toggle__meta { margin-left: auto; font-size: 11.5px; color: var(--text-dim); font-weight: 500; }

  /* ============================================================
     Toasts
     ============================================================ */
  #toasts { position: fixed; left: 50%; bottom: calc(env(safe-area-inset-bottom,0px) + 96px); transform: translateX(-50%); z-index: 100; display: flex; flex-direction: column; gap: 8px; align-items: center; pointer-events: none; }
  .toast { background: var(--glass-strong); -webkit-backdrop-filter: var(--blur); backdrop-filter: var(--blur); border: 1px solid var(--glass-border); color: var(--text); padding: 10px 18px; border-radius: 999px; font-size: 13px; font-weight: 500; opacity: 0; transform: translateY(8px) scale(.96); transition: opacity 260ms var(--spring), transform 260ms var(--spring); white-space: nowrap; }
  .toast.show { opacity: 1; transform: translateY(0) scale(1); }
  .toast--undo { display: flex; align-items: center; gap: 8px; pointer-events: auto; }
  .toast__dash { opacity: .6; }
  .toast__undo-btn { flex: none; font: 700 12px var(--font-ui); color: var(--accent); background: rgba(var(--accent-rgb),.18); padding: 5px 12px; border-radius: 999px; transition: background 200ms var(--spring); }
  .toast__undo-btn:active { background: rgba(var(--accent-rgb),.32); }

  /* ============================================================
     Glass dock — bottom pill navigation
     ============================================================ */
  #dock { position: fixed; left: 50%; bottom: calc(env(safe-area-inset-bottom, 0px) + 16px); transform: translateX(-50%); z-index: 40;
    width: min(calc(100vw - 24px), 520px); padding: 6px; background: var(--glass); -webkit-backdrop-filter: var(--blur); backdrop-filter: var(--blur);
    /* touch-action: none — sonst wertet Android das Hochwischen auf der Leiste
       als Scroll-Versuch, kapert die Geste und schickt nur ein pointercancel.
       Das Eingabefeld setzt sich sein pan-y selbst wieder (siehe .term-input). */
    border: 1px solid var(--glass-border); border-radius: 999px; overflow: hidden; touch-action: none;
    transition: transform 340ms var(--spring), box-shadow 340ms var(--spring); }
  /* Long-press lifts the bar: the sign that it can now be swiped to the other one. */
  /* Langes Drücken darf NIRGENDS Androids Textauswahl oder sein App-Menü öffnen.
     Markiert wird ausschließlich im Terminal — über dessen Auswahlmodus. Nur
     echte Eingabefelder dürfen weiterhin Text auswählen. */
  html, body { -webkit-user-select: none; user-select: none; -webkit-touch-callout: none; -webkit-tap-highlight-color: transparent; }
  input, textarea, .fx-preview { -webkit-user-select: text; user-select: text; }
  #dock { -webkit-user-select: none; user-select: none; }
  /* ^C und Esc sind aus der Zeile ausgezogen — sie wohnen jetzt in der
     Tastenleiste bei den Pfeiltasten. Übrig bleiben Prompt, Feld, Mikro,
     Senden und Tasten; die Zeile darf dafür auf drei Zeilen wachsen, und
     die Knöpfe bleiben dabei unten am Feldrand kleben. */
  .dock-page--term { align-items: flex-end; }
  .dock-page--term > * { transition: max-width 280ms var(--ease-out),
    opacity 160ms ease-out, margin 280ms var(--ease-out), transform 280ms var(--ease-out); }
  .dock-page--term > .term-input-btn { margin-bottom: 1px; }
  .dock-page--term > .term-input-row__prompt { margin-bottom: 8px; }
  #dock.is-typing .term-input { font-size: 15px; }
  #dock.is-typing .term-input-row__prompt { margin-left: 4px; }
  #dockInput { -webkit-user-select: text; user-select: text; }
  #dock.is-switching { transform: translateX(-50%) translateY(-6px) scale(1.03); box-shadow: 0 16px 40px rgba(0,0,0,.42); }
  .dock-page { display: flex; align-items: center; gap: 2px; width: 100%;
    transition: transform 360ms var(--spring), opacity 240ms ease; }
  .dock-page:not(.is-active) { position: absolute; inset: 6px; opacity: 0; pointer-events: none; }
  .dock-page--nav { justify-content: space-between; }
  .dock-page--term, .dock-page--rec { gap: 5px; }
  #dock[data-page="nav"]  .dock-page--term, #dock[data-page="rec"] .dock-page--term { transform: translateX(30%); }
  #dock[data-page="term"] .dock-page--nav,  #dock[data-page="rec"] .dock-page--nav  { transform: translateX(-30%); }
  #dock[data-page="term"] .dock-page--rec,  #dock[data-page="nav"] .dock-page--rec  { transform: translateY(60%); }
  .dock-switch-hint { position: absolute; left: 50%; bottom: 2px; width: 34px; height: 3px; border-radius: 2px;
    background: rgba(var(--overlay-rgb),.22); transform: translateX(-50%); opacity: 0; transition: opacity 200ms ease; }
  #dock.is-switching .dock-switch-hint { opacity: 1; }

  /* Aufnahme-Leiste: Spur, Timer, Abbrechen, Übernehmen. */
  .rec-wave { flex: 1; display: flex; align-items: center; justify-content: center; gap: 3px; height: 34px; min-width: 0; overflow: hidden; }
  .rec-wave span { width: 3px; height: var(--h, 18px); border-radius: 2px; background: var(--accent); opacity: .85;
    animation: rec-bounce 900ms ease-in-out infinite; }
  /* scaleY statt height: die Balken hüpfen auf dem Compositor, nicht im Layout. */
  @keyframes rec-bounce { 0%, 100% { transform: scaleY(.3); } 50% { transform: scaleY(1); } }
  .rec-timer { flex: none; min-width: 44px; text-align: center; font: 700 13px var(--font-mono); color: var(--text); font-variant-numeric: tabular-nums; }
  .rec-btn { flex: none; width: 40px; height: 40px; border-radius: 50%; display: flex; align-items: center; justify-content: center; }
  .rec-btn .ic { width: 20px; height: 20px; }
  .rec-btn--cancel { color: var(--danger); background: rgba(var(--danger-rgb),.14); }
  .rec-btn--confirm { color: var(--ok); background: rgba(var(--ok-rgb),.16); }
  .rec-btn:active { transform: scale(.92); }
  #dock[data-page="rec"] { border-color: rgba(var(--accent-rgb),.5); }
  .dock-page--rec.is-transcribing .rec-wave span { animation: none; height: 5px; opacity: .35; }
  #dock::before { content: ''; position: absolute; left: 14%; right: 14%; top: 0; height: 1px; background: linear-gradient(90deg, transparent, rgba(var(--sheen-rgb),var(--sheen-a)), transparent); }
  .dock-btn { position: relative; display: flex; flex-direction: column; align-items: center; gap: 3px; width: 58px; padding: 7px 2px 6px; border-radius: var(--radius-pill); color: var(--text-dim); transition: color 250ms var(--spring), background 250ms var(--spring); }
  .dock-btn svg { width: var(--icon-md); height: var(--icon-md); }
  .dock-btn span { font-size: var(--fs-micro); font-weight: 600; letter-spacing: .01em; }
  .dock-btn.active { color: var(--text); }
  .dock-btn:active { transform: scale(.94); }
  /* The sliding glass pill IS the active-state background.
     Sie MUSS im selben Koordinatensystem messen wie die Knöpfe, die sie
     unterlegt. Die Nav-Seite ist deshalb immer ein eigener Bezugsrahmen
     (position: relative) — vorher war sie nur als INAKTIVE Seite positioniert
     (inset: 6px) und nur dann bezog sich offsetLeft auf sie. Die Pille wurde
     also mal gegen das Dock, mal gegen die Seite gerechnet und sprang bei
     jeder Rückkehr von den Terminals um die 6px Dock-Polsterung daneben. */
  .dock-page--nav { position: relative; }
  #dockPill { position: absolute; top: 0; bottom: 0; left: 0; width: 58px; border-radius: var(--radius-pill);
    background: rgba(var(--accent-rgb),.16); border: 1px solid rgba(var(--accent-rgb),.22);
    opacity: 0; z-index: 0; pointer-events: none;
    transition: transform var(--dur-snappy) var(--spring-snappy), width var(--dur-snappy) var(--spring-snappy), opacity 200ms ease; }
  #dockPill.is-ready { opacity: 1; }
  .dock-btn { z-index: 1; }
  /* Directional screen transitions — transform/opacity only. */
  @keyframes screenInL { from { opacity: 0; transform: translateX(26px); } to { opacity: 1; transform: none; } }
  @keyframes screenInR { from { opacity: 0; transform: translateX(-26px); } to { opacity: 1; transform: none; } }
  section[data-screen].screen-anim-left:not([hidden]) { animation: screenInL 260ms var(--spring-snappy); }
  section[data-screen].screen-anim-right:not([hidden]) { animation: screenInR 260ms var(--spring-snappy); }
  /* Stack⇄Liste cross-morph. */
  @keyframes viewMorph { from { opacity: 0; transform: scale(.985); } to { opacity: 1; transform: none; } }
  .workspace.view-anim { animation: viewMorph 240ms var(--spring-snappy); }
  /* ⊞ overview tiles stagger in (delay capped via --i, set in JS). */
  @keyframes tileIn { from { opacity: 0; transform: translateY(10px) scale(.96); } to { opacity: 1; transform: none; } }
  .overview-grid.is-open .overview-tile { animation: tileIn 300ms var(--spring-snappy) both; animation-delay: calc(var(--i, 0) * 30ms); }
  /* Keys panel slides in as a keyboard accessory. */
  @keyframes keysIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: none; } }
  .keys-panel:not([hidden]) { animation: keysIn 240ms var(--spring-snappy); }
  /* Die globale Leiste ist per translateX(-50%) zentriert — ihre Keyframes
     MÜSSEN das mitführen, sonst springt sie während der Animation nach rechts
     und plumpst am Ende nach links. Sie wächst federnd aus der Bottom-Bar. */
  .keys-panel--global { transform-origin: 50% 100%; }
  .keys-panel--global:not([hidden]) { animation: keysRise 520ms var(--spring-pop); }
  .keys-panel--global.is-closing { animation: keysFall 220ms var(--ease-exit-hard) forwards; }
  @keyframes keysRise {
    from { opacity: 0; transform: translateX(-50%) translateY(26px) scale(.9); }
    60%  { opacity: 1; }
    to   { opacity: 1; transform: translateX(-50%) translateY(0) scale(1); }
  }
  @keyframes keysFall {
    from { opacity: 1; transform: translateX(-50%) translateY(0) scale(1); }
    to   { opacity: 0; transform: translateX(-50%) translateY(18px) scale(.94); }
  }
  /* Terminal stream lines are exempt from ALL motion — appends must be instant. */
  .term-line { transition: none !important; animation: none !important; }
  /* Scoped theme cross-fade — active only for ~400ms around a toggle. */
  html.theme-anim body, html.theme-anim .glass, html.theme-anim section[data-screen],
  html.theme-anim .term-pre, html.theme-anim .card-body, html.theme-anim #dock, html.theme-anim #statusHeader {
    transition: background 320ms ease, background-color 320ms ease, border-color 320ms ease, color 320ms ease !important; }
  .cloud-row:active, .mehr-item:active { transform: scale(.985); }
  /* Pending-request badge on the Terminals tab — shown when a permission
     prompt is waiting while the user is on another screen. */
  .dock-badge { position: absolute; top: 5px; right: 11px; width: 9px; height: 9px; border-radius: 50%; background: var(--warn); box-shadow: 0 0 0 2px var(--glass), 0 0 8px rgba(var(--warn-rgb),.8); animation: dotBreathe 1.3s ease-in-out infinite; }
  .dock-badge[hidden] { display: none; }

  /* ============================================================
     Bottom sheets (Mehr / permission) — slide up with spring
     ============================================================ */
  .sheet-wrap { position: fixed; inset: 0; z-index: 70; display: flex; align-items: flex-end; justify-content: center; visibility: hidden; }
  .sheet-wrap.is-open { visibility: visible; }
  /* Die hintere Seite weicht zurück, wenn ein Sheet aufgeht: schrumpfen, runden,
     abdunkeln — die iOS-Card-Präsentation. Ein Sheet liegt nicht AUF der Seite,
     es schiebt sie nach hinten. */
  /* Transform-only: border-radius/filter on the whole app content would
     repaint every frame of the 520ms spring (xterm canvases included). The
     dim comes from the sheet scrim above, the rounding snaps unnoticed
     under the scale motion. */
  #screens { transform-origin: 50% 12%; will-change: transform;
    transition: transform 520ms var(--spring-soft); }
  body.sheet-open #screens { transform: scale(.935) translateY(8px); border-radius: 26px; overflow: hidden; }
  body.sheet-open #statusHeader { transition: transform 520ms var(--spring-soft), opacity 380ms ease;
    transform: translateX(-50%) scale(.93) translateY(6px); opacity: .55; }
  #statusHeader { transition: transform 520ms var(--spring-soft), opacity 380ms ease; }
  /* Opacity, not background-color: the fade then runs on the compositor and
     also covers the dim the screens-filter used to provide. */
  .sheet-backdrop { position: absolute; inset: 0; background: rgba(var(--scrim-rgb),var(--scrim-a)); opacity: 0; transition: opacity 350ms var(--spring); }
  .sheet-wrap.is-open .sheet-backdrop { opacity: 1; }
  .sheet-panel { position: relative; width: 100%; max-width: 480px; margin: 0 10px calc(env(safe-area-inset-bottom, 0px) + 10px); padding: 10px 18px calc(18px + env(safe-area-inset-bottom, 0px));
    background: var(--glass-strong); -webkit-backdrop-filter: var(--blur); backdrop-filter: var(--blur); border: 1px solid var(--glass-border); border-radius: var(--radius-lg);
    transform: translateY(110%); transition: transform 260ms var(--ease-exit); will-change: transform; }
  .sheet-wrap.is-open .sheet-panel { transform: translateY(0) scale(1);
    transition: transform 560ms var(--spring-pop); }
  .sheet-wrap:not(.is-open) .sheet-panel { transform: translateY(104%) scale(.97);
    transition: transform 340ms var(--ease-exit-hard); }
  .sheet-grabber { width: 36px; height: 4px; border-radius: 3px; background: var(--glass-border); margin: 4px auto 14px; }
  .sheet-title { font-size: var(--fs-section); font-weight: 700; margin-bottom: 12px; }

  /* Permission sheet — anchored ABOVE the dock so the dock stays visible and
     tappable while a request is pending; its scrim never reaches the dock. */
  .sheet-wrap--perm { pointer-events: none; }
  .sheet-wrap--perm .sheet-backdrop { bottom: calc(var(--safe-bottom) + var(--dock-h) + 18px); border-radius: 0 0 var(--radius-lg) var(--radius-lg); }
  .sheet-wrap--perm .sheet-panel { margin-bottom: calc(var(--safe-bottom) + var(--dock-h) + 22px); pointer-events: auto; }

  .mehr-list { display: flex; flex-direction: column; gap: 4px; }
  .mehr-item { display: flex; align-items: center; gap: 12px; padding: 13px 10px; border-radius: var(--radius-md); text-align: left; transition: background 200ms var(--spring); }
  .mehr-item:active, .mehr-item:hover { background: rgba(var(--overlay-rgb),.06); }
  .mehr-item svg { width: 19px; height: 19px; color: var(--accent); flex: none; }
  .mehr-item span { font-size: 14.5px; font-weight: 500; }

  /* Source terminal (session dot + name) the request comes from. */
  .perm-source { display: flex; align-items: center; gap: 8px; margin-bottom: 10px; }
  .perm-source__dot { width: 10px; height: 10px; border-radius: 50%; flex: none; }
  .perm-source__name { font-weight: 700; font-size: var(--fs-body); min-width: 0; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .perm-source__badge { flex: none; margin-left: auto; font: 700 var(--fs-micro) var(--font-mono); text-transform: uppercase; letter-spacing: .05em; color: var(--warn); background: rgba(var(--warn-rgb),var(--chip-a)); padding: 3px 8px; border-radius: var(--radius-pill); }
  .perm-tool-row { display: flex; align-items: center; gap: 8px; flex-wrap: wrap; }
  .perm-tool-row .ic { width: var(--icon-sm); height: var(--icon-sm); color: var(--accent); flex: none; }
  .perm-tool { font-weight: 700; font-size: var(--fs-section); }
  .perm-target { font: 12.5px var(--font-mono); color: var(--text-dim); background: rgba(var(--well-rgb),var(--well-a)); padding: 2px 7px; border-radius: 6px; }
  .perm-question { color: var(--text-dim); font-size: 13.5px; margin: 8px 0 16px; }
  .perm-actions { display: flex; gap: 8px; flex-wrap: wrap; }
  .perm-actions button { flex: 1; min-width: 96px; padding: 12px 10px; border-radius: var(--radius-md); font-weight: 600; font-size: 13.5px; border: 1px solid var(--glass-border); background: rgba(var(--overlay-rgb),.05); transition: background 200ms var(--spring), border-color 200ms var(--spring), color 200ms var(--spring); }
  .perm-actions button[data-act="yes"] { background: rgba(var(--accent-rgb),.22); border-color: rgba(var(--accent-rgb),.4); color: var(--accent-ink); }
  .perm-actions button[data-act="no"] { color: var(--err); }
  .perm-actions button[data-act="auto"][aria-pressed="true"] { background: rgba(var(--ok-rgb),var(--chip-a)); border-color: rgba(var(--ok-rgb),.4); color: var(--ok); }

  /* Question sheet — same glass/anchoring family as the permission sheet
     (.sheet-wrap--perm), just with selectable option rows + a free-text field
     instead of Ja/Nein. Never auto-resolved, see handlePrompt()'s kind guard. */
  .question-text { font-weight: 600; font-size: 14.5px; margin: 4px 0 14px; }
  .question-options { display: flex; flex-direction: column; gap: 2px; max-height: 38vh; overflow-y: auto; margin-bottom: 12px; }
  .question-option-row { display: flex; align-items: flex-start; gap: 10px; padding: 10px 6px; border-top: 1px solid rgba(var(--overlay-rgb),.08); cursor: pointer; }
  .question-option-row:first-child { border-top: none; }
  .question-option-row input { width: 18px; height: 18px; accent-color: var(--accent); flex: none; margin-top: 1px; }
  .question-option-row__text { display: flex; flex-direction: column; gap: 1px; min-width: 0; }
  .question-option-row__label { font-size: 13.5px; font-weight: 600; }
  .question-option-row__desc { font-size: 12px; color: var(--text-dim); }
  .question-comment-row { margin-bottom: 12px; }
  .question-comment-row textarea { width: 100%; min-height: 52px; padding: 10px 14px; border-radius: 14px; font: 13px var(--font-ui); background: var(--glass); border: 1px solid var(--glass-border); color: var(--text); resize: none; }
  .question-comment-row textarea::placeholder { color: var(--text-dim); }
  .perm-actions button[data-act="submit"] { background: rgba(var(--accent-rgb),.22); border-color: rgba(var(--accent-rgb),.4); color: var(--accent-ink); }
  .perm-actions button[data-act="submit"]:disabled { opacity: .4; pointer-events: none; }

  /* ============================================================
     Servers screen
     ============================================================ */
  .update-pill { display: flex; align-items: center; gap: 10px; padding: 11px 14px; margin-bottom: 18px; border-radius: 999px; }
  .update-pill__text { flex: 1; font-size: 12.5px; }
  .update-pill__text b { color: var(--accent-warm); }
  .update-pill button.cta { font-size: 12px; font-weight: 700; color: var(--accent); padding: 6px 12px; border-radius: 999px; background: rgba(var(--accent-rgb),.16); }
  .update-pill button.x { color: var(--text-dim); font-size: 16px; padding: 2px 4px; }

  .screen-title { font-size: 26px; font-weight: 700; letter-spacing: -0.01em; margin: 4px 0 16px; }

  .server-grid { display: grid; grid-template-columns: 1fr; gap: 12px; }
  .server-card { padding: 18px; display: flex; align-items: center; gap: 14px; transition: transform 300ms var(--spring), background 300ms var(--spring); }
  .server-card[data-status="online"] { cursor: pointer; }
  .server-card[data-status="online"]:active { transform: scale(.98); }
  .server-card[data-status="offline"] { opacity: .55; }
  .server-orb { position: relative; width: 46px; height: 46px; border-radius: 50%; flex: none; display: flex; align-items: center; justify-content: center; background: rgba(var(--overlay-rgb),.06); border: 1px solid var(--glass-border); }
  .server-orb svg { width: 22px; height: 22px; }
  .server-card[data-status="online"] .server-orb { box-shadow: 0 0 0 1px rgba(var(--ok-rgb),.4), 0 0 30px 6px rgba(var(--ok-rgb),.30); color: var(--ok); }
  .server-card[data-status="offline"] .server-orb { color: var(--text-dim); }
  .server-info { flex: 1; min-width: 0; }
  .server-name { font-size: 17px; font-weight: 700; letter-spacing: -0.01em; }
  .server-host { font: 12px var(--font-mono); color: var(--text-dim); margin-top: 2px; }
  .server-meta { display: flex; gap: 8px; margin-top: 8px; flex-wrap: wrap; }
  .server-chip { font-size: 11px; font-weight: 600; padding: 4px 9px; border-radius: 999px; background: rgba(var(--overlay-rgb),.06); color: var(--text-dim); }
  .server-chip.ok { color: var(--ok); }

  /* ============================================================
     Terminal workspace — spatial swipeable stack
     ============================================================ */
  .overview-btn { width: var(--touch); height: var(--touch); border-radius: var(--radius-sm); display: flex; align-items: center; justify-content: center; color: var(--text-dim); transition: color 200ms var(--spring), background 200ms var(--spring), transform 150ms var(--spring); }
  .overview-btn .ic { width: var(--icon-md); height: var(--icon-md); }
  .overview-btn:active { transform: scale(.94); }
  .overview-btn.is-on { background: rgba(var(--accent-rgb),.2); color: var(--accent); }

  /* Stack ⇄ Liste segmented view toggle */
  .view-toggle { display: inline-flex; gap: 3px; padding: 4px; border-radius: var(--radius-pill); align-self: flex-start; }
  .view-toggle__btn { display: flex; align-items: center; gap: 6px; min-height: 36px; padding: 8px 15px; border-radius: var(--radius-pill); font: 600 var(--fs-label) var(--font-ui); color: var(--text-dim); transition: background 220ms var(--spring), color 220ms var(--spring); }
  .view-toggle__btn .ic { width: var(--icon-sm); height: var(--icon-sm); flex: none; }
  .view-toggle__btn[aria-selected="true"] { color: var(--text); background: rgba(var(--accent-rgb),.2); }

  .term-body-wrap { position: relative; flex: 1; min-height: 0; display: flex; flex-direction: column; }
  .term-body { flex: 1; min-height: 0; display: flex; flex-direction: column; }
  .term-body-wrap.overview-active .term-body { visibility: hidden; }

  .workspace { flex: 1; min-height: 0; display: flex; gap: 14px; padding: 0 16px; }
  .stack-pane { position: relative; flex: 1; min-width: 0; min-height: 0; overflow: hidden; border-radius: var(--radius-lg); }
  .stack { position: absolute; inset: 0; touch-action: pan-y; }
  .stack.is-dragging .stack-card { transition: none !important; }

  .stack-card { position: absolute; inset: 0; margin: 0 auto; width: 100%; max-width: 480px; display: flex; flex-direction: column; overflow: hidden;
    transition: transform 380ms var(--spring), opacity 380ms var(--spring); }
  /* will-change nur während der Geste: dauerhaft gesetzt hält es für JEDE
     Karte einen bildschirmgroßen GPU-Layer am Leben (≥10 MB VRAM pro Karte,
     Compositing-Arbeit in jedem Frame). Transitionen promoten sich selbst. */
  .stack.is-dragging .stack-card { will-change: transform, opacity; }
  .card-header { flex: none; display: flex; align-items: center; gap: 8px; padding: 12px 14px 10px; cursor: grab; }
  .card-tag { width: 10px; height: 10px; border-radius: 50%; flex: none; }
  /* Die Terminalfarbe ist der obere Rand der Karte: halbtransparent, folgt der
     Rundung der oberen Ecken und verläuft an den Seiten sanft aus. */
  .stack-card.term-card::before, .list-card.term-card .list-card__surface::before {
    content: ''; position: absolute; inset: 0; border-radius: inherit; pointer-events: none; z-index: 4;
    border: 2px solid color-mix(in srgb, var(--tag, transparent) 50%, transparent);
    background: linear-gradient(to bottom, color-mix(in srgb, var(--tag, transparent) 16%, transparent), transparent 26%);
    -webkit-mask-image: linear-gradient(to bottom, #000 0, #000 12%, transparent 38%);
    mask-image: linear-gradient(to bottom, #000 0, #000 12%, transparent 38%);
  }
  .card-name-wrap { flex: 1 1 0%; min-width: 0; }
  /* Name + description are both readonly inputs; triple-tap unlocks editing
     (see wireTripleTapEdit) so single taps never pop the keyboard. */
  .card-name { display: block; min-width: 0; overflow: hidden; text-overflow: ellipsis; font-size: var(--fs-section); font-weight: 700; letter-spacing: -.005em; background: none; border: none; padding: 1px 0; width: 100%; border-bottom: 1px solid transparent; cursor: default; }
  .card-desc { display: block; min-width: 0; width: 100%; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; font-size: var(--fs-caption); color: var(--text-dim); margin-top: 1px; background: none; border: none; padding: 1px 0; border-bottom: 1px solid transparent; cursor: default; }
  .card-name[data-editing="1"], .card-desc[data-editing="1"] { border-bottom: 1px solid var(--accent); outline: none; cursor: text; }
  .card-name[data-editing="1"] { text-overflow: clip; }
  .card-desc[data-editing="1"] { text-overflow: clip; }

  /* Per-terminal Auto-Approve — 1-tap header pill, default ON. */
  .auto-toggle { flex: none; display: flex; align-items: center; justify-content: center; height: 30px; width: 34px; padding: 0; border-radius: var(--radius-pill); color: var(--text-dim); background: rgba(var(--overlay-rgb),.06); border: 1px solid var(--glass-border); transition: color 200ms var(--spring), background 200ms var(--spring), border-color 200ms var(--spring); }
  .auto-toggle .ic { width: var(--icon-sm); height: var(--icon-sm); flex: none; }
  .auto-toggle__label { letter-spacing: .01em; }
  .auto-toggle.is-on { color: var(--ok); background: rgba(var(--ok-rgb),var(--chip-a)); border-color: rgba(var(--ok-rgb),.4); }
  .auto-toggle:active { transform: scale(.94); }
  .status-chip { flex: none; font-size: 10.5px; font-weight: 700; letter-spacing: .02em; padding: 4px 9px; border-radius: 999px; display: flex; align-items: center; gap: 5px; text-transform: uppercase; }
  .status-chip .dot { width: 6px; height: 6px; border-radius: 50%; }
  .status-chip[data-status="running"] { color: var(--accent); background: rgba(var(--accent-rgb),var(--chip-a)); }
  .status-chip[data-status="running"] .dot { background: var(--accent); animation: dotBreathe 1.3s ease-in-out infinite; }
  .status-chip[data-status="waiting"] { color: var(--warn); background: rgba(var(--warn-rgb),var(--chip-a)); }
  .status-chip[data-status="waiting"] .dot { background: var(--warn); }
  .status-chip[data-status="done"] { color: var(--ok); background: rgba(var(--ok-rgb),var(--chip-a)); }
  .status-chip[data-status="done"] .dot { background: var(--ok); }
  .status-chip[data-status="idle"] { color: var(--text-dim); background: rgba(var(--overlay-rgb),.06); }
  .status-chip[data-status="idle"] .dot { background: var(--text-dim); }

  .card-body { flex: 1; min-height: 0; overflow-y: auto; margin: 0 4px 5px; border-radius: var(--radius-md); padding: 12px 14px; font-size: var(--term-font-size); line-height: 1.6; font-family: var(--font-mono); position: relative; }
  .card-body::before { display: none; }

  /* Shell wraps .card-body + the ⏬ jump-to-bottom orb — the orb lives
     OUTSIDE the <pre> so renderCardLines()'s innerHTML rewrite (every
     streamed line) never tears down its listeners/animation state. */
  .card-body-shell { position: relative; flex: 1; min-height: 0; display: flex; flex-direction: column; }
  .tt-key--icon { padding: 0; width: 36px; flex: none; justify-content: center; }
  /* Die Werkzeug-Reihe darf nie über den Rand laufen — lieber schiebbar. */
  .keys-panel__row--tools { gap: 5px; overflow-x: auto; scrollbar-width: none; -webkit-overflow-scrolling: touch; }
  .keys-panel__row--tools::-webkit-scrollbar { display: none; }
  .keys-panel__row { min-width: 0; }
  .keys-panel__arrows { flex: none; }
  .keys-panel__row--tools .keys-panel__spacer { min-width: 8px; }
  /* Welches Terminal die Leiste bedient, muss man SEHEN. */
  .term-card.is-target { border-color: rgba(var(--accent-rgb),.55) !important; box-shadow: 0 0 0 1px rgba(var(--accent-rgb),.35), 0 10px 30px rgba(0,0,0,.3); }
  .jump-bottom-orb { position: absolute; right: 10px; bottom: 10px; width: var(--touch); height: var(--touch); border-radius: 50%; display: flex; align-items: center; justify-content: center; color: var(--accent); background: rgba(var(--accent-rgb),.2); border: 1px solid rgba(var(--accent-rgb),.4); box-shadow: 0 6px 18px rgba(0,0,0,.24); opacity: 0; transform: translateY(6px) scale(.9); pointer-events: none; transition: opacity 200ms var(--spring), transform 200ms var(--spring); z-index: 4; }
  .jump-bottom-orb .ic { width: var(--icon-md); height: var(--icon-md); }
  .jump-bottom-orb.show { opacity: 1; transform: translateY(0) scale(1); pointer-events: auto; }
  .jump-bottom-orb:active { transform: scale(.92); }
  .jump-bottom-orb.pulse::after { content: ''; position: absolute; inset: -3px; border-radius: 50%; border: 2px solid rgba(var(--accent-rgb),.55); animation: ringPulse 1.3s ease-out infinite; pointer-events: none; }
  .term-line { display: block; white-space: pre-wrap; word-break: break-word; padding: 1px 0; border-radius: 4px; }
  .term-line.is-selected { background: rgba(var(--accent-rgb),.22); }
  .selection-mode .term-line { cursor: pointer; }
  .selection-mode .term-line:active { background: rgba(var(--accent-rgb),.12); }
  .sgr-b { font-weight: 700; } .sgr-d { opacity: .58; } .sgr-g { color: var(--ok); } .sgr-r { color: var(--err); }
  .wrapped-link { color: var(--accent); text-decoration: underline; text-decoration-color: rgba(var(--accent-rgb),.4); text-underline-offset: 2px; cursor: pointer; word-break: break-all; }

  .replay-pill { flex: none; margin: 0 8px 10px; padding: 10px; border: 1px dashed var(--glass-border); border-radius: var(--radius-md); text-align: center; font-size: 12.5px; font-weight: 600; color: var(--text-dim); transition: border-color 250ms var(--spring), color 250ms var(--spring); }
  .replay-pill:hover { border-color: var(--accent); color: var(--accent); }
  .replay-pill[hidden] { display: none; }

  /* glowing selection handles + copy bubble */
  .sel-handle { position: absolute; width: 16px; height: 16px; border-radius: 50%; background: var(--accent); transform: translate(-50%, 0); touch-action: none; z-index: 5;
    box-shadow: 0 0 0 4px rgba(var(--accent-rgb),.22), 0 0 16px 3px rgba(var(--accent-rgb),.65); animation: glowBreathe 1.6s ease-in-out infinite; }
  .sel-handle::before { content: ''; position: absolute; left: 50%; bottom: 100%; width: 2px; height: 18px; background: var(--accent); transform: translateX(-50%); box-shadow: 0 0 8px rgba(var(--accent-rgb),.7); }
  .copy-bubble { position: absolute; transform: translateX(-8px); background: var(--glass-strong); -webkit-backdrop-filter: var(--blur); backdrop-filter: var(--blur); border: 1px solid var(--glass-border); color: var(--text); font: 600 12px var(--font-ui); padding: 7px 14px; border-radius: 999px; cursor: pointer; z-index: 6; white-space: nowrap; }

  /* rail (expanded ≥700px) */
  .rail { display: none; }
  .rail-item { padding: 10px 12px; margin-bottom: 8px; cursor: grab; transition: transform 300ms var(--spring), border-color 300ms var(--spring); border-radius: var(--radius-md); touch-action: none; }
  .rail-item.is-active { border-color: rgba(var(--accent-rgb),.5); background: rgba(var(--accent-rgb),.08); }
  .rail-item.is-dragging { opacity: .35; }
  .rail-item__top { display: flex; align-items: center; gap: 8px; }
  .rail-item__name { font-size: 12.5px; font-weight: 700; flex: 1; min-width: 0; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .rail-item__preview { margin-top: 6px; font: 10.5px/1.4 var(--font-mono); color: var(--text-dim); max-height: 42px; overflow: hidden; word-break: break-word; overflow-wrap: anywhere; }
  .rail-drop-ghost { position: fixed; z-index: 90; pointer-events: none; opacity: .9; padding: 10px 14px; border-radius: var(--radius-md); font-size: 12.5px; font-weight: 700; }
  .rail-item.drop-target, .stack-pane.drop-target { outline: 2px solid var(--accent); outline-offset: -2px; border-radius: var(--radius-md); }
  .overview-tile .status-chip { padding: 4px 6px; }

  /* overview grid — strict 2 equal columns of ALL sessions, equal-size tiles,
     unlimited rows, vertically scrollable. A lone last tile keeps its
     half-width cell (never stretches). Layered over whichever view is active. */
  .overview-grid { display: none; position: absolute; inset: 0; z-index: 150; grid-template-columns: 1fr 1fr; grid-auto-rows: 150px; align-content: start; gap: 10px; padding: 2px 2px 8px; overflow-y: auto; -webkit-overflow-scrolling: touch; }
  .overview-grid.is-open { display: grid; }
  .overview-tile { min-width: 0; min-height: 0; padding: 12px; display: flex; flex-direction: column; gap: 6px; text-align: left; transition: transform 200ms var(--spring); cursor: pointer; }
  .overview-tile:active { transform: scale(.96); }
  .overview-tile__head { display: flex; align-items: center; gap: 6px; min-width: 0; }
  .overview-tile__name { font-size: 12.5px; font-weight: 700; flex: 1; min-width: 0; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .overview-tile__body { flex: 1; min-width: 0; min-height: 0; overflow: hidden; font: 10px/1.4 var(--font-mono); color: var(--text-dim); word-break: break-word; overflow-wrap: anywhere; }
  .overview-tile__close { flex: none; width: 22px; height: 22px; border-radius: 50%; display: flex; align-items: center; justify-content: center; color: var(--text-dim); background: rgba(var(--overlay-rgb),.08); border: 1px solid var(--glass-border); transition: color 200ms var(--spring), background 200ms var(--spring), border-color 200ms var(--spring); }
  .overview-tile__close .ic { width: 11px; height: 11px; }
  .overview-tile__close:active { transform: scale(.9); }
  .overview-tile__close.is-armed { color: var(--err); background: rgba(var(--err-rgb),.18); border-color: rgba(var(--err-rgb),.4); }

  /* ============================================================
     Liste view — vertical terminal stack (Command-Deck ergonomics,
     Liquid glass styling). Cards reuse .card-header/.card-body/
     .term-input-row/.card-note-btn verbatim from Stack so both views
     render off the exact same cardState/TMS_DATA — never a copy.
     ============================================================ */
  .term-list { flex: 1; min-height: 0; overflow-y: auto; -webkit-overflow-scrolling: touch; }
  .term-list__inner { max-width: 640px; margin: 0 auto; padding: 2px 16px 8px; display: flex; flex-direction: column; gap: 14px; }
  /* Container clips the swipe reveal + carries the drop shadow; the glass
     surface (JS adds .glass) slides over the rail behind it. */
  .list-card { position: relative; flex: none; border-radius: var(--radius-lg); overflow: hidden; box-shadow: var(--glass-shadow); }
  .list-card .card-header { cursor: default; }
  /* Block, not flex: .card-body-shell inherits flex:1/min-height:0 from the
     Stack context, which would collapse to ~0px inside an auto-height flex
     column. max-height below (not flex-grow) is what bounds it here. */
  .list-card__collapsible { border-top: 1px solid rgba(var(--overlay-rgb),.08); padding-top: 10px; }
  .list-card[data-collapsed="true"] .list-card__collapsible { display: none; }
  .list-card__body-shell { flex: none; max-height: min(300px, 42vh); }
  .chevron-btn { flex: none; width: 26px; height: 26px; display: flex; align-items: center; justify-content: center; border-radius: 8px; color: var(--text-dim); font-size: 12px; transition: transform 220ms var(--spring), color 200ms var(--spring), background 200ms var(--spring); }
  .chevron-btn:active { background: rgba(var(--overlay-rgb),.1); }
  .list-card[data-collapsed="true"] .chevron-btn { transform: rotate(-90deg); }

  .add-terminal-cta { flex: none; display: flex; align-items: center; justify-content: center; gap: 8px; padding: 16px; border-radius: 999px; font: 700 14.5px var(--font-ui); color: var(--accent); margin-top: 2px; transition: background 220ms var(--spring), transform 150ms var(--spring); }
  .add-terminal-cta:active { transform: scale(.98); background: rgba(var(--accent-rgb),.14); }
  .add-terminal-cta__icon { font-size: 18px; line-height: 1; }

  /* ===== Global key-echo chip — brief flash for Esc / Tab / cursor keys
     (no PTY in this mockup). Fixed just above the dock, centered. ===== */
  #keyEcho { position: fixed; left: 50%; bottom: calc(var(--safe-bottom) + var(--dock-h) + 30px); transform: translateX(-50%); z-index: 58; display: flex; gap: 6px; pointer-events: none; }
  .key-echo { background: var(--glass-strong); -webkit-backdrop-filter: var(--blur); backdrop-filter: var(--blur); border: 1px solid var(--glass-border); padding: 6px 14px; border-radius: var(--radius-pill); font: 700 var(--fs-caption) var(--font-mono); color: var(--text); opacity: 0; transform: translateY(6px); transition: opacity 180ms var(--spring), transform 180ms var(--spring); }
  .key-echo.show { opacity: 1; transform: translateY(0); }

  /* ===== Liste swipe-action rail (iOS-Mail style). Hidden behind each list
     card's surface; a leftward swipe reveals a per-card action cluster.
     Only one open at a time (see wireListSwipe). ===== */
  .list-card__rail { position: absolute; top: 0; right: 0; bottom: 0; display: flex; align-items: flex-start; gap: 7px; padding: 13px 12px 0 18px; z-index: 0; background: linear-gradient(90deg, transparent, rgba(var(--overlay-rgb),.05) 22%); }
  .list-swipe-btn { flex: none; width: var(--touch); height: var(--touch); border-radius: 50%; display: flex; align-items: center; justify-content: center; color: var(--text-dim); background: rgba(var(--overlay-rgb),.09); border: 1px solid var(--glass-border); transition: transform 150ms var(--spring), color 200ms var(--spring), background 200ms var(--spring); }
  .list-swipe-btn .ic { width: var(--icon-md); height: var(--icon-md); }
  .list-swipe-btn:active { transform: scale(.9); }
  .list-swipe-btn--danger { color: var(--err); background: rgba(var(--err-rgb),.16); border-color: rgba(var(--err-rgb),.34); }
  .tt-close-terminal { width: 100%; margin-top: 12px; padding: 13px; border-radius: 14px;
    font: 600 13.5px var(--font-ui); color: var(--err);
    background: rgba(var(--err-rgb),.12); border: 1px solid rgba(var(--err-rgb),.34); }
  .tt-close-terminal:active { transform: scale(.98); }
  .list-swipe-btn--accent { color: var(--accent); background: rgba(var(--accent-rgb),.16); border-color: rgba(var(--accent-rgb),.4); }
  .list-swipe-btn.is-on { color: var(--accent); background: rgba(var(--accent-rgb),.2); border-color: rgba(var(--accent-rgb),.4); }
  .list-card__surface { position: relative; z-index: 1; display: flex; flex-direction: column; border-radius: inherit; transition: transform 320ms var(--spring); touch-action: pan-y; }
  .list-card.is-swiping .list-card__surface { transition: none; }

  /* ===== Terminal keys chip — shared by the Werkzeuge sheet's legacy
     markup and the non-modal Tasten accessory panel below. ===== */
  .tt-keys { display: flex; align-items: center; gap: 8px; flex-wrap: wrap; }
  .tt-key { height: var(--touch); min-width: var(--touch); padding: 0 15px; border-radius: var(--radius-md); display: flex; align-items: center; justify-content: center; gap: 7px; font: 700 var(--fs-label) var(--font-ui); color: var(--text-dim); background: rgba(var(--overlay-rgb),.06); border: 1px solid var(--glass-border); transition: color 200ms var(--spring), background 200ms var(--spring), border-color 200ms var(--spring), transform 150ms var(--spring); }
  .tt-key .ic { width: var(--icon-sm); height: var(--icon-sm); }
  .tt-key.is-on { color: var(--accent); background: rgba(var(--accent-rgb),.2); border-color: rgba(var(--accent-rgb),.4); }
  .tt-key--danger { color: var(--err); background: rgba(var(--err-rgb),.14); border-color: rgba(var(--err-rgb),.34); }
  .tt-key:active { transform: scale(.96); }

  /* ============================================================
     Terminal keys accessory panel (Tasten/Cursor) — Feedback fix: this
     content used to live inside the full-screen 🔧 Werkzeuge sheet, which
     covered the very terminal it acts on. It is now a compact, NON-MODAL
     bar rendered as a normal flex sibling directly above the input
     cluster (below the terminal content) so it RESERVES space instead of
     overlapping it — no scrim, never auto-closes on terminal taps or key
     presses, only via its own ✕ or the „Tasten" toggle. See
     toggleKeysPanel()/keysPanelHtml() in the script. ============================================================ */
  .keys-panel[hidden] { display: none; }
  /* Die Tastenleiste schwebt über der Bottom-Bar, statt die Karte zu stauchen. */
  /* --dock-h ist die ECHTE Höhe der Bottom-Bar; sie ändert sich, sobald die
     Eingabezeile auf zwei oder drei Zeilen wächst (siehe autoGrowInput). */
  .keys-panel--global { position: fixed; left: 50%; transform: translateX(-50%); z-index: 39;
    bottom: calc(env(safe-area-inset-bottom, 0px) + 16px + var(--dock-h, 62px));
    width: min(calc(100vw - 24px), 520px); margin: 0 !important;
    /* bottom hängt an --dock-h und springt mit der Bar im selben Frame um —
       eine eigene Transition hier würde die Leiste von der Bar abkoppeln. */
    transition: transform 380ms var(--spring); }
  body.has-switcher .keys-panel--global { transform: translateX(-50%) translateY(-34px); }
  /* Der Stapel endet ÜBER dem Slider, nicht darunter. Der Wechsel ist bewusst
     NICHT animiert: eine bottom-Transition würde die Karte (und damit das
     xterm) jeden Frame neu layouten — ein SIGWINCH-Sturm für die PTY. */
  body.has-switcher .stack { bottom: 52px; }
  /* Die Tastenleiste liegt nicht AUF dem Terminal — es macht ihr Platz.
     --keys-h ist die ECHTE Panelhöhe (gesetzt beim Öffnen); statische Werte
     gingen auseinander, sobald die Tastatur den Viewport verkürzte. */
  body.keys-open .stack { bottom: calc(var(--keys-h, 100px) + 12px); }
  body.keys-open.has-switcher .stack { bottom: calc(var(--keys-h, 100px) + 12px + 40px); }
  body.keys-open .term-list { padding-bottom: calc(var(--keys-h, 100px) + 20px); }
  /* Tastatur offen: die Slider-Punkte weichen, das Terminal wird größer. */
  #termSwitcher { transition: opacity 220ms ease-out, transform 380ms var(--spring-pop); }
  body.typing #termSwitcher { opacity: 0; pointer-events: none; transform: translateX(-50%) translateY(24px) scale(.9); }
  body.typing.has-switcher .stack { bottom: 0; }
  /* Beim Tippen sind die Punkte weg — die Leiste rückt nach unten nach,
     und die Karte muss nur noch die Leiste selbst freihalten. */
  body.typing .keys-panel--global { bottom: calc(env(safe-area-inset-bottom, 0px) + 16px + var(--dock-h, 62px)); }
  body.typing.keys-open .stack,
  body.typing.keys-open.has-switcher .stack { bottom: calc(var(--keys-h, 100px) + 12px); }

  /* ── Terminal-Slider ──────────────────────────────────────────────────────
     Nur Punkte. Antippen springt, gedrückt halten und ziehen schiebt den Stapel
     kontinuierlich mit — und der Punkt unter dem Daumen wächst mit der Nähe,
     wie der Modus-Wähler der Kamera. Nichts hier hat einen Hintergrund: die
     Leiste soll man kaum bemerken, bis man sie anfasst. */
  .term-switcher { position: fixed; left: 50%; transform: translateX(-50%); z-index: 38;
    bottom: calc(env(safe-area-inset-bottom, 0px) + 16px + 62px);
    width: min(calc(100vw - 24px), 520px);
    display: flex; flex-direction: column; align-items: center;
    touch-action: none; -webkit-user-select: none; user-select: none; }
  .term-switcher[hidden] { display: none; }

  .term-switcher__label { pointer-events: none; margin-bottom: 5px;
    opacity: 0; transform: translateY(4px) scale(.9);
    transition: opacity 160ms ease-out, transform 260ms var(--ease-out); }
  .term-switcher__label span { display: inline-block; padding: 4px 11px; border-radius: 999px;
    background: rgba(var(--well-rgb),.92); -webkit-backdrop-filter: var(--blur); backdrop-filter: var(--blur);
    border: 1px solid var(--glass-border); color: var(--text);
    font: 600 11.5px var(--font-ui); letter-spacing: -.01em; white-space: nowrap; }
  .term-switcher.is-scrubbing .term-switcher__label,
  .term-switcher.is-hinting  .term-switcher__label { opacity: 1; transform: translateY(0) scale(1); }

  .term-switcher__track { display: flex; align-items: center; justify-content: center;
    width: 100%; height: 26px; }

  .ts-seg { flex: 0 0 34px; height: 100%; display: flex; align-items: center; justify-content: center; }
  /* War ein bloßer Farbpunkt — jetzt ein Mini-Icon-Chip mit dem Anfangs-
     buchstaben der Sitzung, damit man auf einen Blick sieht, welches
     Terminal unter dem Daumen liegt, nicht nur seine Farbe. */
  .ts-dot { width: 18px; height: 18px; border-radius: 7px; opacity: .45;
    display: flex; align-items: center; justify-content: center;
    font: 700 9.5px var(--font-ui); color: #fff; text-shadow: 0 1px 2px rgba(0,0,0,.35);
    transform: scale(1); will-change: transform;
    transition: transform 260ms var(--ease-out), opacity 160ms ease-out; }
  .ts-seg.is-active .ts-dot { opacity: 1; transform: scale(1.3); }
  /* Beim Ziehen wird die Größe pro Frame gesetzt — Übergänge würden nachhinken. */
  .term-switcher.is-scrubbing .ts-dot { transition: opacity 120ms ease-out; }
  .keys-panel:not([hidden]) { flex: none; margin: 0 8px 8px; padding: 7px 8px; border-radius: var(--radius-md); display: flex; flex-direction: column; gap: 6px; }
  .keys-panel__row { display: flex; align-items: center; gap: 7px; }
  .keys-panel__spacer { flex: 1 1 auto; }
  /* In der Leiste sitzen jetzt auch ^C, Esc und ⇧Tab — die Chips rücken enger
     zusammen, und wenn es trotzdem eng wird (schmale Geräte), schiebt sich die
     Tastengruppe seitlich; das ✕ bleibt dabei stehen, wo es hingehört. */
  .keys-panel .tt-key { height: 34px; min-width: 32px; padding: 0 8px; font-size: var(--fs-caption); border-radius: var(--radius-sm); flex: none; }
  .keys-panel .tt-key--icon { width: 32px; padding: 0; }
  .keys-panel__keys { flex: 1 1 auto; min-width: 0; display: flex; align-items: center; gap: 6px;
    overflow-x: auto; scrollbar-width: none; -webkit-overflow-scrolling: touch; }
  .keys-panel__keys::-webkit-scrollbar { display: none; }
  .keys-panel__arrows { display: flex; align-items: center; gap: 6px; }
  .keys-panel__arrows button { width: 34px; height: 34px; flex: none; border-radius: var(--radius-sm); display: flex; align-items: center; justify-content: center; color: var(--text-dim); background: rgba(var(--overlay-rgb),.06); border: 1px solid var(--glass-border); transition: color 200ms var(--spring), background 200ms var(--spring); }
  .keys-panel__arrows button .ic { width: var(--icon-sm); height: var(--icon-sm); }
  .keys-panel__arrows button:active { background: rgba(var(--accent-rgb),.18); color: var(--accent); }
  .keys-panel__close { flex: none; width: 30px; height: 30px; border-radius: 50%; display: flex; align-items: center; justify-content: center; color: var(--text-dim); background: rgba(var(--overlay-rgb),.06); border: 1px solid var(--glass-border); transition: color 200ms var(--spring), background 200ms var(--spring); }
  .keys-panel__close .ic { width: var(--icon-sm); height: var(--icon-sm); }
  .keys-panel__close:active { background: rgba(var(--overlay-rgb),.14); }

  /* ============================================================
     Breakpoints — compact <400, medium 400-699, expanded >=700
     ============================================================ */
  @media (min-width: 700px) {
    .server-grid { grid-template-columns: 1fr 1fr; }
    .rail { display: block; flex: 0 0 38%; max-width: 320px; overflow-y: auto; padding-right: 2px; }
    .stack-pane { flex: 1 1 60%; }
  }
  @media (max-width: 699.98px) {
    .stack-card { max-width: 520px; }
  }

  /* ============================================================
     Task 6 — Tools, Manager, Cloud, Settings, Prayer, Lock, Spotlight
     ============================================================ */

  .screen-col { max-width: 640px; margin: 0 auto; }
  .screen-title-row { display: flex; align-items: center; justify-content: space-between; gap: 10px; }
  .icon-btn { flex: none; width: 38px; height: 38px; border-radius: 12px; display: flex; align-items: center; justify-content: center; font-size: 16px; color: var(--text-dim); cursor: pointer; transition: color 200ms var(--spring), background 200ms var(--spring); }
  .icon-btn:hover, .icon-btn:active { color: var(--accent); }
  .mono-text { font: 12.5px var(--font-mono); }
  .table-scroll { overflow-x: auto; }

  /* Toggle switch (ports, watchers) */
  .switch { position: relative; display: inline-block; width: 40px; height: 24px; flex: none; }
  .switch input { position: absolute; inset: 0; opacity: 0; margin: 0; cursor: pointer; z-index: 1; }
  .switch__track { position: absolute; inset: 0; background: rgba(var(--overlay-rgb),.08); border: 1px solid var(--glass-border); border-radius: 20px; transition: background 250ms var(--spring), border-color 250ms var(--spring); }
  .switch__thumb { position: absolute; top: 2px; left: 2px; width: 18px; height: 18px; border-radius: 50%; background: var(--text-dim); transition: transform 250ms var(--spring), background 250ms var(--spring); }
  .switch input:checked + .switch__track { background: rgba(var(--accent-rgb),.25); border-color: rgba(var(--accent-rgb),.5); }
  .switch input:checked + .switch__track .switch__thumb { transform: translateX(16px); background: var(--accent); box-shadow: 0 0 8px rgba(var(--accent-rgb),.6); }

  /* Reusable status-chip dataset values for cloud project statuses */
  .status-chip[data-status="ready"] { color: var(--ok); background: rgba(var(--ok-rgb),var(--chip-a)); }
  .status-chip[data-status="ready"] .dot { background: var(--ok); }
  .status-chip[data-status="live"] { color: var(--ok); background: rgba(var(--ok-rgb),var(--chip-a)); }
  .status-chip[data-status="live"] .dot { background: var(--ok); animation: dotBreathe 1.4s ease-in-out infinite; }
  .status-chip[data-status="building"] { color: var(--accent); background: rgba(var(--accent-rgb),var(--chip-a)); }
  .status-chip[data-status="building"] .dot { background: var(--accent); animation: dotBreathe 1.4s ease-in-out infinite; }
  .status-chip[data-status="suspended"] { color: var(--text-dim); background: rgba(var(--overlay-rgb),.06); }
  .status-chip[data-status="suspended"] .dot { background: var(--text-dim); }

  /* ---------- Tools screen + tool sheet ---------- */
  .tool-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; }
  @media (min-width: 700px) { .tool-grid { grid-template-columns: repeat(5, 1fr); } }
  .tool-tile { display: flex; flex-direction: column; align-items: center; gap: 9px; padding: 18px 8px; cursor: pointer; transition: transform 220ms var(--spring), background 220ms var(--spring); }
  .tool-tile:active { transform: scale(.95); }
  .tool-tile__glyph { display: flex; align-items: center; justify-content: center; width: 40px; height: 40px; border-radius: var(--radius-sm); background: rgba(var(--accent-rgb),.12); border: 1px solid var(--glass-border); color: var(--accent); }
  .tool-tile__glyph .ic { width: var(--icon-md); height: var(--icon-md); }
  .tool-tile__label { font: 600 12px var(--font-ui); color: var(--text); text-align: center; }

  .sheet-panel--tall { max-width: 640px; max-height: 82vh; display: flex; flex-direction: column; }
  .sheet-head-row { display: flex; align-items: center; gap: 10px; margin-bottom: 4px; }
  .sheet-head-row .sheet-title { flex: 1; margin-bottom: 0; }
  .sheet-close-btn { flex: none; font: 700 11px var(--font-mono); color: var(--text-dim); padding: 6px 13px; border-radius: 999px; background: rgba(var(--overlay-rgb),.06); border: 1px solid var(--glass-border); cursor: pointer; transition: color 200ms var(--spring), border-color 200ms var(--spring); }
  .sheet-close-btn:hover { color: var(--accent); border-color: rgba(var(--accent-rgb),.4); }
  .sheet-scroll-body { overflow-y: auto; flex: 1; min-height: 0; padding-top: 6px; }

  .tool-row { display: flex; align-items: center; gap: 10px; width: 100%; padding: 12px 4px; border-top: 1px solid rgba(var(--overlay-rgb),.08); text-align: left; }
  .tool-row:first-child { border-top: none; }
  .tool-row.is-tap { cursor: pointer; border-radius: 10px; transition: background 200ms var(--spring); }
  .tool-row.is-tap:active { background: rgba(var(--overlay-rgb),.06); }
  .tool-row__icon { font: 12px var(--font-mono); color: var(--text-dim); width: 14px; text-align: center; flex: none; }
  .tool-row__name { flex: 1; font: 13px var(--font-ui); min-width: 0; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .tool-row__meta { font: 12px var(--font-mono); color: var(--text-dim); flex: none; }
  .tool-row__info { flex: 1; min-width: 0; }
  .tool-row__title { font: 13px var(--font-ui); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .tool-row__sub { margin-top: 2px; font: 11px var(--font-mono); color: var(--text-dim); }

  .sql-query { font: 12.5px/1.6 var(--font-mono); background: rgba(var(--well-rgb),var(--well-a)); border: 1px solid var(--glass-border); border-radius: 12px; padding: 11px 13px; margin-bottom: 14px; overflow-x: auto; white-space: pre; }
  .data-table { width: 100%; border-collapse: collapse; font: 12.5px var(--font-mono); }
  .data-table th, .data-table td { text-align: left; padding: 8px 10px; border-top: 1px solid rgba(var(--overlay-rgb),.08); white-space: nowrap; }
  .data-table th { color: var(--text-dim); font-weight: 600; font-size: 11px; text-transform: uppercase; letter-spacing: .04em; }
  .data-table tr:first-child td { border-top: none; }
  .cpu-cell { display: flex; align-items: center; gap: 8px; }
  .cpu-bar { position: relative; width: 56px; height: 6px; background: rgba(var(--well-rgb),var(--well-a)); border-radius: 3px; overflow: hidden; flex: none; }

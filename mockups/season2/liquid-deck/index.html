<script src="../shared/data.js" charset="utf-8"></script>
<script src="../shared/sim.js" charset="utf-8"></script>
<script>
  // ============================================================
  // Charset workaround: the static dev server sends `../shared/*.js`
  // without a charset in Content-Type, so Chromium falls back to
  // windows-1252 for those two files regardless of this document's
  // UTF-8 meta tag — every non-ASCII byte in TMS_DATA (—, ●, ⎿, ä/ö/ü…)
  // arrives mis-decoded. Losslessly re-interpret the affected strings:
  // walk each char back to its original byte via the windows-1252
  // table, then re-decode that byte sequence as UTF-8. Already-correct
  // strings fail the strict re-decode and are returned untouched.
  // ============================================================
  (function fixSharedDataEncoding() {
    const CP1252_REV = { 0x20AC:0x80, 0x201A:0x82, 0x0192:0x83, 0x201E:0x84, 0x2026:0x85, 0x2020:0x86, 0x2021:0x87, 0x02C6:0x88, 0x2030:0x89, 0x0160:0x8A, 0x2039:0x8B, 0x0152:0x8C, 0x017D:0x8E, 0x2018:0x91, 0x2019:0x92, 0x201C:0x93, 0x201D:0x94, 0x2022:0x95, 0x2013:0x96, 0x2014:0x97, 0x02DC:0x98, 0x2122:0x99, 0x0161:0x9A, 0x203A:0x9B, 0x0153:0x9C, 0x017E:0x9E, 0x0178:0x9F };
    const decoder = (typeof TextDecoder !== 'undefined') ? new TextDecoder('utf-8', { fatal: true }) : null;
    function fixString(str) {
      if (!decoder || !/[-￿]/.test(str)) return str;
      try {
        const bytes = new Uint8Array(str.length);
        for (let i = 0; i < str.length; i++) {
          const code = str.charCodeAt(i);
          const byte = CP1252_REV[code] !== undefined ? CP1252_REV[code] : code;
          if (byte > 0xff) return str; // genuinely not a byte value -> already real unicode, leave alone
          bytes[i] = byte;
        }
        return decoder.decode(bytes);
      } catch (e) { return str; } // not a mis-decoded UTF-8 sequence -> leave untouched
    }
    function walk(node) {
      if (Array.isArray(node)) { for (let i = 0; i < node.length; i++) node[i] = walk(node[i]); return node; }
      if (node && typeof node === 'object') { for (const k in node) node[k] = walk(node[k]); return node; }
      if (typeof node === 'string') return fixString(node);
      return node;
    }
    if (typeof TMS_DATA === 'object') walk(TMS_DATA);
  })();

  // ============================================================
  // State
  // ============================================================
  // Phase 2 — Stack ⇄ Liste view preference persists across reloads; the
  // chosen view is the only piece of terminal-screen state that survives.
  const TERM_VIEW_KEY = 'tms-liquid-deck-terminal-view';
  function loadTerminalView() {
    try { return localStorage.getItem(TERM_VIEW_KEY) === 'list' ? 'list' : 'stack'; } catch (e) { return 'stack'; }
  }

  const state = {
    order: TMS_DATA.sessions.map(s => s.id),   // logical stack position -> session id (mutable via rail swap)
    activeIndex: 0,
    activeFloat: 0,
    activeCardId: null, // last-interacted-with terminal, kept in sync across Stack + Liste (used by the Aa selection toolbar)
    terminalView: loadTerminalView(),
    overviewOpen: false,
    islandOpen: false,
    pendingPromptId: null,
    suppressClick: false,
    // Task 6
    managerTab: 'chat',
    cloudView: 'folder', cloudProviderFilter: 'all', cloudDetailId: null, cloudDetailTab: 'env', cloudBuildTimer: null,
    autoLock: false, pushNotif: true, adhanNotif: true,
    pin: TMS_DATA.demo.pin, lockDigits: '',
    // Feature 2 — dictation is a single-flight flow: only one card's mic can
    // be recording/transcribing at a time.
    dictation: { active: false, cardId: null, phase: null },
  };
  const cardState = {}; // id -> { lines, sim, autoApprove, pendingPrompt, autoTimer, selectionMode, selection, collapsed, showReplay }
  TMS_DATA.sessions.forEach(s => {
    cardState[s.id] = { lines: s.buffer.slice(), sim: null, autoApprove: false, pendingPrompt: null, autoTimer: null, selectionMode: false, selection: null, collapsed: false, showReplay: false };
  });
  state.activeCardId = state.order[0] || null;

  // ============================================================
  // Requirement 2 — unlimited terminals ("+ Neues Terminal"). New sessions
  // are pushed straight into TMS_DATA.sessions (in-memory, mockup-only) so
  // every renderer that already reads TMS_DATA.sessions/state.order picks
  // them up automatically: Liste, Stack, ⊞ overview, the ≥700px rail and
  // the Spotlight index all share this exact same array — never a copy.
  // ============================================================
  const NEW_TERMINAL_COLORS = ['#e8590c', '#1971c2', '#2f9e44', '#9c36b5', '#0c8599', '#e64980'];
  let newTerminalCounter = TMS_DATA.sessions.reduce((max, s) => {
    const m = /^t(\d+)$/.exec(s.id);
    return m ? Math.max(max, Number(m[1])) : max;
  }, 0);
  function createTerminalSession() {
    newTerminalCounter++;
    const num = newTerminalCounter;
    const id = 't' + num;
    const session = {
      id, name: 'Terminal ' + num, description: 'Neues Terminal',
      colorTag: NEW_TERMINAL_COLORS[(num - 1) % NEW_TERMINAL_COLORS.length],
      status: 'idle', live: false,
      buffer: ['\x1b[2m~\x1b[0m $ '],
      notes: [], todos: [],
    };
    TMS_DATA.sessions.push(session);
    state.order.push(id);
    cardState[id] = { lines: session.buffer.slice(), sim: null, autoApprove: false, pendingPrompt: null, autoTimer: null, selectionMode: false, selection: null, collapsed: false, showReplay: false };
    return session;
  }

  // ============================================================
  // Generic helpers
  // ============================================================
  function escapeHtml(s) {
    return String(s).replace(/[&<>"']/g, c => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;' }[c]));
  }

  // Minimal ANSI SGR renderer: bold(1) dim(2) red(31) green(32) reset(0), incl. multi-param
  // sequences like \x1b[1;32m. Every other escape sequence (non-SGR CSI, OSC, lone ESC) is
  // stripped so no raw escape ever leaks into the DOM.
  function ansiToHtml(str) {
    const CLASS = { '1': 'sgr-b', '2': 'sgr-d', '31': 'sgr-r', '32': 'sgr-g' };
    let out = '', open = 0, last = 0, m;
    const re = /\x1b\[([0-9;]*)m/g;
    const emitText = chunk => {
      chunk = chunk
        .replace(/\x1b\][^\x07\x1b]*(?:\x07|\x1b\\)/g, '') // OSC (…BEL or …ESC\)
        .replace(/\x1b\[[0-9;?]*[ -\/]*[@-~]/g, '')        // any other CSI
        .replace(/\x1b./g, '');                            // lone ESC + follow byte
      out += escapeHtml(chunk);
    };
    while ((m = re.exec(str))) {
      emitText(str.slice(last, m.index));
      last = re.lastIndex;
      for (const code of (m[1] === '' ? '0' : m[1]).split(';')) {
        const c = code === '' ? '0' : code;
        if (c === '0') { while (open) { out += '</span>'; open--; } }
        else if (CLASS[c]) { out += `<span class="${CLASS[c]}">`; open++; }
      }
    }
    emitText(str.slice(last));
    while (open) { out += '</span>'; open--; }
    return out;
  }

  // Renders one buffer line, special-casing the wrapped deploy link so it always stays a
  // single inline element (the browser wraps it visually, it is never split in the DOM).
  function renderBufferLine(line) {
    const url = TMS_DATA.demo.wrappedLinkUrl;
    const idx = line.indexOf(url);
    if (idx === -1) return ansiToHtml(line);
    const idMatch = url.match(/dpl_\w+/);
    const shortId = idMatch ? idMatch[0].slice(0, 12) : url.slice(-12);
    const before = ansiToHtml(line.slice(0, idx));
    const after = ansiToHtml(line.slice(idx + url.length));
    const link = `<span class="wrapped-link" data-url="${escapeHtml(url)}" data-short="${escapeHtml(shortId)}" role="link" tabindex="0">${escapeHtml(url)}</span>`;
    return before + link + after;
  }

  function toast(message) {
    const host = document.getElementById('toasts');
    const el = document.createElement('div');
    el.className = 'toast';
    el.textContent = message;
    host.appendChild(el);
    requestAnimationFrame(() => el.classList.add('show'));
    setTimeout(() => {
      el.classList.remove('show');
      setTimeout(() => el.remove(), 220);
    }, 2400);
  }

  function fallbackCopy(text) {
    const ta = document.createElement('textarea');
    ta.value = text; ta.style.position = 'fixed'; ta.style.opacity = '0';
    document.body.appendChild(ta); ta.select();
    try { document.execCommand('copy'); } catch (e) { /* best effort */ }
    ta.remove();
  }
  function copyText(text) {
    try {
      if (navigator.clipboard && navigator.clipboard.writeText) {
        navigator.clipboard.writeText(text).catch(() => fallbackCopy(text));
        return;
      }
    } catch (e) { /* fall through */ }
    fallbackCopy(text);
  }

  // ============================================================
  // Prayer countdown — computed from the real current time, same
  // pattern as command-deck/mission-control: parse each prayer's
  // HH:MM against today's date, take the first one after "now",
  // and wrap to Fajr tomorrow once we're past Isha.
  // ============================================================
  function parsePrayerTime(t) {
    const [h, m] = t.split(':').map(Number);
    const d = new Date();
    d.setHours(h, m, 0, 0);
    return d;
  }
  function nextPrayer() {
    const now = new Date();
    const upcoming = TMS_DATA.prayerTimes.map(p => ({ ...p, date: parsePrayerTime(p.time) })).find(p => p.date > now);
    const next = upcoming || (() => {
      const first = TMS_DATA.prayerTimes[0];
      const d = parsePrayerTime(first.time);
      d.setDate(d.getDate() + 1);
      return { ...first, date: d, tomorrow: true };
    })();
    const diffMin = Math.max(0, next.date - now) / 60000;
    const h = Math.floor(diffMin / 60), m = Math.floor(diffMin % 60);
    return { ...next, diffMin, countdown: `${h}:${String(m).padStart(2, '0')}h` };
  }

  // ============================================================
  // Dynamic Island
  // ============================================================
  const islandShell = document.getElementById('islandShell');
  const islandDot = document.getElementById('islandDot');
  const islandActivityLabel = document.getElementById('islandActivityLabel');
  const islandPrayerLabel = document.getElementById('islandPrayerLabel');
  const islandExpanded = document.getElementById('islandExpanded');

  function setIslandActivity(kind, label) {
    islandDot.className = 'island-dot' + (kind === 'live' ? ' is-live' : kind === 'warn' ? ' is-warn' : kind === 'ok' ? ' is-ok' : '');
    islandActivityLabel.textContent = label;
  }

  function renderIslandExpanded() {
    const np = nextPrayer();
    const live = TMS_DATA.sessions.find(s => s.live);
    const cs = cardState[live.id];
    const lastLine = cs.lines[cs.lines.length - 1] || '';
    const building = TMS_DATA.cloudProjects.find(p => p.status === 'building');
    const connSrv = TMS_DATA.servers[0];
    const sessionRows = TMS_DATA.sessions.map(s => `
      <div class="island-row" data-session="${s.id}" role="button" tabindex="0">
        <span class="island-row__dot" style="background:${s.colorTag}"></span>
        <span class="island-row__name">${escapeHtml(s.name)}</span>
        <span class="island-row__meta">${escapeHtml(s.status)}</span>
      </div>`).join('');
    islandExpanded.innerHTML = `
      <h4>Aktive Sitzungen</h4>
      ${sessionRows}
      <h4>Agent-Aktivität</h4>
      <div class="island-activity-feed">${renderBufferLine(lastLine) || '—'}</div>
      <h4>Verbindung</h4>
      <div class="island-row"><span class="island-row__dot" style="background:var(--ok)"></span><span class="island-row__name">Verbindung — ${escapeHtml(connSrv.name)} · ${connSrv.latency != null ? connSrv.latency + ' ms' : '—'}</span><span class="island-row__meta">${connSrv.status === 'online' ? 'Online' : 'Offline'}</span></div>
      <h4>Nächstes Gebet</h4>
      <div class="island-row"><span class="island-row__dot" style="background:var(--accent-warm)"></span><span class="island-row__name">${escapeHtml(np.name)} · ${escapeHtml(np.time)}</span><span class="island-row__meta">in ${np.countdown}</span></div>
      <h4>Deploy</h4>
      <div class="island-row"><span class="island-row__dot" style="background:var(--warn)"></span><span class="island-row__name">${building ? escapeHtml(building.name) : 'Keine aktiven Builds'}</span><span class="island-row__meta">${building ? 'Build läuft…' : ''}</span></div>
      <div class="island-close-hint">Antippen zum Schließen</div>
    `;
    islandExpanded.querySelectorAll('[data-session]').forEach(row => {
      row.addEventListener('click', e => {
        e.stopPropagation();
        const id = row.dataset.session;
        closeIsland();
        goToTerminals();
        focusTerminal(id);
      });
    });
  }

  function openIsland() {
    state.islandOpen = true;
    renderIslandExpanded();
    islandShell.classList.add('is-open');
    islandShell.setAttribute('aria-expanded', 'true');
  }
  function closeIsland() {
    state.islandOpen = false;
    islandShell.classList.remove('is-open');
    islandShell.setAttribute('aria-expanded', 'false');
  }
  function toggleIsland() { state.islandOpen ? closeIsland() : openIsland(); }

  islandShell.addEventListener('click', toggleIsland);
  islandShell.addEventListener('keydown', e => { if (e.key === 'Enter' || e.key === ' ') { e.preventDefault(); toggleIsland(); } });
  document.addEventListener('keydown', e => { if (e.key === 'Escape' && state.islandOpen) closeIsland(); });

  islandPrayerLabel.textContent = (() => { const np = nextPrayer(); return `${np.name} in ${np.countdown}`; })();

  // ============================================================
  // Ping / connection latency — compact island segment + expanded row.
  // Anchored to a fixed baseline (not a random walk) so it jitters ±1-4ms
  // around a stable center instead of drifting. Single global interval,
  // started once at boot (see Init) — never re-armed on screen navigation.
  // ============================================================
  const islandLatencyLabel = document.getElementById('islandLatencyLabel');
  function updateLatencyDisplay() {
    const val = TMS_DATA.servers[0].latency;
    if (islandLatencyLabel) islandLatencyLabel.textContent = (val != null ? val : '—') + ' ms';
    const chip = document.querySelector(`[data-latency-chip="${TMS_DATA.servers[0].id}"]`);
    if (chip) chip.textContent = (val != null ? val : '—') + ' ms';
    if (state.islandOpen) renderIslandExpanded();
  }
  let latencyTickerStarted = false;
  function startLatencyTicker() {
    if (latencyTickerStarted) return;
    latencyTickerStarted = true;
    const baseline = TMS_DATA.servers[0].latency;
    updateLatencyDisplay();
    setInterval(() => {
      if (document.body.classList.contains('is-locked')) return; // paused while locked
      const mag = 1 + Math.floor(Math.random() * 4); // 1..4
      const jitter = Math.random() < 0.5 ? -mag : mag;
      TMS_DATA.servers[0].latency = Math.max(3, baseline + jitter);
      updateLatencyDisplay();
    }, 4000);
  }

  // ============================================================
  // Bottom sheets (Mehr / permission)
  // ============================================================
  function openSheet(wrapEl) { wrapEl.hidden = false; requestAnimationFrame(() => wrapEl.classList.add('is-open')); }
  function closeSheet(wrapEl) {
    wrapEl.classList.remove('is-open');
    setTimeout(() => { wrapEl.hidden = true; }, 420);
  }

  const mehrWrap = document.getElementById('mehrSheetWrap');
  document.querySelectorAll('.mehr-item').forEach(btn => {
    btn.addEventListener('click', () => {
      closeSheet(mehrWrap);
      const target = btn.dataset.target;
      if (target === 'lock') { lockApp(); return; }
      show(target);
    });
  });
  mehrWrap.querySelector('[data-close-mehr]').addEventListener('click', () => closeSheet(mehrWrap));

  const toolSheetWrap = document.getElementById('toolSheetWrap');
  document.getElementById('toolSheetClose').addEventListener('click', () => closeSheet(toolSheetWrap));
  toolSheetWrap.querySelector('[data-close-tool]').addEventListener('click', () => closeSheet(toolSheetWrap));

  const spotlightWrap = document.getElementById('spotlightWrap');
  spotlightWrap.querySelector('[data-close-spotlight]').addEventListener('click', () => closeSheet(spotlightWrap));
  document.getElementById('spotlightClose').addEventListener('click', () => closeSheet(spotlightWrap));

  const permWrap = document.getElementById('permSheetWrap');
  permWrap.querySelector('[data-close-perm]').addEventListener('click', () => { /* modal — backdrop tap does not dismiss a pending decision */ });

  // ============================================================
  // Router
  // ============================================================
  const SCREEN_HOOKS = {
    terminals() { document.getElementById('toolbarHost').classList.add('is-visible'); },
  };
  function show(name) {
    if (name !== 'cloud') stopCloudBuildTimer();
    if (name !== 'prayer') stopPrayerTick();
    if (name !== 'terminals') cancelDictation();
    document.querySelectorAll('[data-screen]').forEach(s => s.hidden = s.dataset.screen !== name);
    document.querySelectorAll('#dock [data-nav]').forEach(b => b.classList.toggle('active', b.dataset.nav === name));
    if (name !== 'terminals') document.getElementById('toolbarHost').classList.remove('is-visible');
    if (SCREEN_HOOKS[name]) SCREEN_HOOKS[name]();
  }
  function goToTerminals() { show('terminals'); }

  function handleDockTap(name) {
    if (name === 'mehr') { openSheet(mehrWrap); return; }
    if (document.querySelector(`[data-screen="${name}"]`)) { show(name); return; }
    toast('Kommt in Teil 2');
  }

  // Dock buttons: short tap navigates as usual; long-press (550ms) on ANY
  // dock button opens Spotlight instead — a secondary universal-search
  // gesture living alongside the primary pull-down-to-search gesture.
  function wireNav() {
    const LONG_PRESS_MS = 550;
    document.querySelectorAll('#dock [data-nav]').forEach(btn => {
      const name = btn.dataset.nav;
      let timer = null, longPressed = false;
      btn.addEventListener('pointerdown', () => {
        longPressed = false;
        timer = setTimeout(() => { longPressed = true; openSpotlight(); }, LONG_PRESS_MS);
      });
      const cancelTimer = () => clearTimeout(timer);
      btn.addEventListener('pointerup', cancelTimer);
      btn.addEventListener('pointerleave', cancelTimer);
      btn.addEventListener('pointercancel', cancelTimer);
      btn.addEventListener('click', e => {
        if (longPressed) { e.preventDefault(); longPressed = false; return; }
        handleDockTap(name);
      });
    });
  }

  // ============================================================
  // Servers screen
  // ============================================================
  function renderUpdateBanner(host) {
    const u = TMS_DATA.update;
    const pill = document.createElement('div');
    pill.className = 'update-pill glass';
    pill.innerHTML = `
      <div class="update-pill__text"><b>v${u.latest}</b> verfügbar — ${escapeHtml(u.notes)}</div>
      <button class="cta">Jetzt updaten</button>
      <button class="x" aria-label="Schließen">✕</button>
    `;
    pill.querySelector('.cta').addEventListener('click', () => toast('Mockup: Update-Vorgang wird nicht simuliert'));
    pill.querySelector('.x').addEventListener('click', () => pill.remove());
    host.appendChild(pill);
  }

  const SERVER_ICON = `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="4" width="18" height="6" rx="2"/><rect x="3" y="14" width="18" height="6" rx="2"/><circle cx="7" cy="7" r=".6" fill="currentColor" stroke="none"/><circle cx="7" cy="17" r=".6" fill="currentColor" stroke="none"/></svg>`;

  function renderServers() {
    const host = document.querySelector('[data-screen="servers"]');
    host.innerHTML = '';
    renderUpdateBanner(host);
    const titleRow = document.createElement('div');
    titleRow.className = 'screen-title-row';
    titleRow.innerHTML = `<h1 class="screen-title">Server</h1><button class="icon-btn glass" id="settingsBtn" aria-label="Einstellungen öffnen">⚙</button>`;
    host.appendChild(titleRow);
    titleRow.querySelector('#settingsBtn').addEventListener('click', () => show('settings'));
    const grid = document.createElement('div');
    grid.className = 'server-grid';
    TMS_DATA.servers.forEach(srv => {
      const online = srv.status === 'online';
      const card = document.createElement('div');
      card.className = 'glass server-card';
      card.dataset.status = srv.status;
      card.innerHTML = `
        <div class="server-orb">${SERVER_ICON}</div>
        <div class="server-info">
          <div class="server-name">${escapeHtml(srv.name)}</div>
          <div class="server-host">${escapeHtml(srv.host)}:${srv.port}</div>
          <div class="server-meta">
            <span class="server-chip ${online ? 'ok' : ''}">${online ? '● online' : '○ offline'}</span>
            <span class="server-chip" data-latency-chip="${srv.id}">${srv.latency != null ? srv.latency + ' ms' : '—'}</span>
            <span class="server-chip">${srv.sessions} Terminals</span>
            <span class="server-chip">${escapeHtml(srv.os)}</span>
          </div>
        </div>
      `;
      card.addEventListener('click', () => {
        if (online) { goToTerminals(); }
        else { toast('Server offline — zuletzt gesehen vor 2 Std'); }
      });
      grid.appendChild(card);
    });
    host.appendChild(grid);
  }

  // ============================================================
  // Terminal workspace — spatial swipeable stack
  // ============================================================
  const STATUS_LABELS = { running: 'Läuft', waiting: 'Wartet', done: 'Fertig', idle: 'Bereit' };
  function clamp(v, lo, hi) { return Math.max(lo, Math.min(hi, v)); }

  function buildTerminalScreen() {
    const host = document.querySelector('[data-screen="terminals"]');
    host.innerHTML = `
      <div class="term-header">
        <div class="term-header__top">
          <h2>Terminals</h2>
          <div class="term-header__actions">
            <button class="overview-btn glass" id="addTerminalBtn" aria-label="Neues Terminal" title="Neues Terminal">+</button>
            <button class="overview-btn glass" id="overviewBtn" aria-label="Übersicht" title="Übersicht">⊞</button>
          </div>
        </div>
        <div class="view-toggle glass" id="viewToggle" role="tablist" aria-label="Ansicht">
          <button class="view-toggle__btn" data-view="stack" role="tab" aria-selected="true">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"><rect x="6.5" y="7.5" width="13" height="13" rx="2.5" opacity=".5"/><rect x="4.5" y="4.5" width="13" height="13" rx="2.5"/></svg>
            <span>Stack</span>
          </button>
          <button class="view-toggle__btn" data-view="list" role="tab" aria-selected="false">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"><rect x="4" y="4.5" width="16" height="4.2" rx="1.3"/><rect x="4" y="10" width="16" height="4.2" rx="1.3"/><rect x="4" y="15.5" width="16" height="4.2" rx="1.3"/></svg>
            <span>Liste</span>
          </button>
        </div>
      </div>
      <div class="term-body-wrap" id="termBodyWrap">
        <div class="term-body" id="termBody"></div>
        <div class="overview-grid" id="overviewGrid"></div>
      </div>
    `;
    document.getElementById('overviewBtn').addEventListener('click', () => toggleOverview());
    document.getElementById('addTerminalBtn').addEventListener('click', () => addTerminal());
    wireViewToggle();
    renderTerminalWorkspace();
  }

  // Renders whichever of Stack / Liste is the current terminalView into
  // #termBody. Both are pure renderers over the same TMS_DATA.sessions +
  // cardState — nothing session-shaped is ever duplicated, so toggling is
  // just "throw the old view's DOM away and repaint the other one from
  // state", instant at this card count.
  function renderTerminalWorkspace() {
    cancelDictation(); // never leave a mic mid-flight pointed at a DOM node we're about to discard
    const body = document.getElementById('termBody');
    if (!body) return;
    if (state.terminalView === 'list') {
      body.innerHTML = `
        <div class="term-list" id="termList">
          <div class="term-list__inner" id="termListCards">
            <button class="add-terminal-cta glass" id="addTerminalCta" type="button">
              <span class="add-terminal-cta__icon">+</span><span>Neues Terminal</span>
            </button>
          </div>
        </div>
      `;
      buildList();
      document.getElementById('addTerminalCta').addEventListener('click', () => addTerminal());
    } else {
      body.innerHTML = `
        <div class="workspace">
          <div class="stack-pane"><div class="stack" id="stack"></div></div>
          <div class="rail" id="rail"></div>
        </div>
      `;
      buildStack();
      renderRail();
      wireStackDrag();
    }
    updateViewToggleUI();
  }

  function wireViewToggle() {
    const toggle = document.getElementById('viewToggle');
    if (!toggle) return;
    toggle.addEventListener('click', e => {
      const btn = e.target.closest('.view-toggle__btn');
      if (!btn) return;
      setTerminalView(btn.dataset.view);
    });
  }
  function setTerminalView(view) {
    if (view !== 'stack' && view !== 'list') return;
    if (state.terminalView === view) return;
    state.terminalView = view;
    try { localStorage.setItem(TERM_VIEW_KEY, view); } catch (e) { /* storage unavailable */ }
    if (state.overviewOpen) toggleOverview(false);
    renderTerminalWorkspace();
  }
  function updateViewToggleUI() {
    document.querySelectorAll('.view-toggle__btn').forEach(btn => {
      btn.setAttribute('aria-selected', String(btn.dataset.view === state.terminalView));
    });
  }

  // Restores the imperative "replay session" pill visibility from cardState
  // (see showReplay/replaySession) onto a freshly-built card — needed
  // because a card can be rebuilt fresh (view toggle, new terminal) well
  // after its session finished, and that pill has no other backing markup.
  function restoreReplayPill(card, id) {
    const cs = cardState[id];
    if (!cs || !cs.showReplay) return;
    const pill = card.querySelector('.replay-pill');
    if (pill) { pill.hidden = false; pill.onclick = () => replaySession(id); }
  }

  function buildOneStackCard(session) {
    const id = session.id;
    const card = document.createElement('div');
    card.className = 'stack-card term-card glass';
    card.dataset.id = id;
    card.innerHTML = `
        <div class="card-header">
          <span class="card-tag" style="background:${session.colorTag}"></span>
          <div class="card-name-wrap">
            <input class="card-name" value="${escapeHtml(session.name)}" readonly>
            <div class="card-desc">${escapeHtml(session.description)}</div>
          </div>
          <span class="status-chip" data-status="${session.status}"><span class="dot"></span><span class="status-chip__label">${STATUS_LABELS[session.status] || session.status}</span></span>
          <button class="card-note-btn" data-note-btn aria-label="Notizen & Todos" title="Notizen & Todos">📝</button>
        </div>
        <pre class="card-body glass glass--dark" data-card-id="${id}"></pre>
        <button class="replay-pill" hidden>↻ Session erneut abspielen</button>
        <div class="term-input-row glass">
          <span class="term-input-row__prompt">$</span>
          <input type="text" class="term-input" placeholder="Befehl eingeben…" autocomplete="off" autocapitalize="off" autocorrect="off" spellcheck="false" aria-label="Befehl eingeben">
          <button class="term-input-btn term-mic-btn" data-act="mic" aria-label="Diktieren">●</button>
          <button class="term-input-btn term-send-btn" data-act="send" aria-label="Senden">↵</button>
        </div>
      `;
    wireCardHeader(card, id);
    wireCardNoteBtn(card, id);
    wireTerminalInputRow(card, id);
    restoreReplayPill(card, id);
    return card;
  }

  function buildStack() {
    const stackEl = document.getElementById('stack');
    if (!stackEl) return;
    stackEl.innerHTML = '';
    state.order.forEach(id => {
      const session = TMS_DATA.sessions.find(s => s.id === id);
      const card = buildOneStackCard(session);
      stackEl.appendChild(card);
      renderCardLines(id);
    });
    layoutStack(state.activeIndex, { instant: true });
    state.activeCardId = state.order[state.activeIndex];
  }

  // ============================================================
  // Liste view (Requirement 1) — vertical glass terminal cards, Command-
  // Deck ergonomics (chevron-collapsible, one card per row) rendered with
  // Liquid Deck's own header/body/input-row markup so every affordance
  // (name edit, 📝 notes, mic dictation, selection, wrapped links) is
  // shared code with Stack, not a parallel implementation.
  // ============================================================
  function toggleListCardCollapse(id) {
    const cs = cardState[id];
    if (!cs) return;
    cs.collapsed = !cs.collapsed;
    const card = document.querySelector(`.list-card[data-id="${id}"]`);
    if (card) card.dataset.collapsed = String(cs.collapsed);
  }

  function buildOneListCard(session) {
    const id = session.id;
    const cs = cardState[id];
    const card = document.createElement('article');
    card.className = 'list-card term-card glass';
    card.dataset.id = id;
    card.dataset.collapsed = String(!!(cs && cs.collapsed));
    card.innerHTML = `
        <div class="card-header list-card__header">
          <button class="chevron-btn" data-act="toggle" aria-label="Ein-/Ausklappen" title="Ein-/Ausklappen">⌄</button>
          <span class="card-tag" style="background:${session.colorTag}"></span>
          <div class="card-name-wrap">
            <input class="card-name" value="${escapeHtml(session.name)}" readonly>
            <div class="card-desc">${escapeHtml(session.description)}</div>
          </div>
          <span class="status-chip" data-status="${session.status}"><span class="dot"></span><span class="status-chip__label">${STATUS_LABELS[session.status] || session.status}</span></span>
          <button class="card-note-btn" data-note-btn aria-label="Notizen & Todos" title="Notizen & Todos">📝</button>
        </div>
        <div class="list-card__collapsible">
          <pre class="card-body glass glass--dark list-card__body" data-card-id="${id}"></pre>
          <button class="replay-pill" hidden>↻ Session erneut abspielen</button>
          <div class="term-input-row glass">
            <span class="term-input-row__prompt">$</span>
            <input type="text" class="term-input" placeholder="Befehl eingeben…" autocomplete="off" autocapitalize="off" autocorrect="off" spellcheck="false" aria-label="Befehl eingeben">
            <button class="term-input-btn term-mic-btn" data-act="mic" aria-label="Diktieren">●</button>
            <button class="term-input-btn term-send-btn" data-act="send" aria-label="Senden">↵</button>
          </div>
        </div>
      `;
    wireCardHeader(card, id);
    wireCardNoteBtn(card, id);
    wireTerminalInputRow(card, id);
    restoreReplayPill(card, id);
    card.querySelector('.chevron-btn').addEventListener('click', e => { e.stopPropagation(); toggleListCardCollapse(id); });
    // Tapping anywhere in a list card marks it "current" for the floating
    // Aa selection-mode toolbar — mirrors Stack's setActive()-driven target.
    card.addEventListener('pointerdown', () => { state.activeCardId = id; });
    return card;
  }

  function buildList() {
    const cardsHost = document.getElementById('termListCards');
    const cta = document.getElementById('addTerminalCta');
    if (!cardsHost || !cta) return;
    state.order.forEach(id => {
      const session = TMS_DATA.sessions.find(s => s.id === id);
      const card = buildOneListCard(session);
      cardsHost.insertBefore(card, cta);
      renderCardLines(id);
    });
    if (!state.activeCardId || state.order.indexOf(state.activeCardId) === -1) state.activeCardId = state.order[0] || null;
  }

  // Brings a terminal into view regardless of which view is active —
  // used by Spotlight's "Terminal" entries and the Dynamic Island's
  // session rows, both of which can fire from Stack or Liste.
  function focusTerminal(id) {
    if (state.order.indexOf(id) === -1) return;
    if (state.terminalView === 'list') {
      state.activeIndex = state.order.indexOf(id);
      state.activeFloat = state.activeIndex;
      state.activeCardId = id;
      const cs = cardState[id];
      if (cs && cs.collapsed) toggleListCardCollapse(id);
      const card = document.querySelector(`.list-card[data-id="${id}"]`);
      if (card) card.scrollIntoView({ block: 'center', behavior: 'smooth' });
    } else {
      setActive(state.order.indexOf(id));
    }
  }

  // Requirement 2 — "+ Neues Terminal": pushes a fresh session, paints it
  // into whichever view is mounted, and drops straight into inline rename
  // (same click-to-edit flow as an existing card's name field).
  function addTerminal() {
    cancelDictation();
    const session = createTerminalSession();
    if (state.terminalView === 'list') {
      const cardsHost = document.getElementById('termListCards');
      const cta = document.getElementById('addTerminalCta');
      if (cardsHost && cta) {
        const card = buildOneListCard(session);
        cardsHost.insertBefore(card, cta);
        renderCardLines(session.id);
      }
      const scroller = document.getElementById('termList');
      if (scroller) scroller.scrollTo({ top: scroller.scrollHeight, behavior: 'smooth' });
      state.activeCardId = session.id;
    } else {
      const stackEl = document.getElementById('stack');
      if (stackEl) {
        const card = buildOneStackCard(session);
        stackEl.appendChild(card);
        renderCardLines(session.id);
      }
      setActive(state.order.length - 1);
    }
    renderRail();
    if (state.overviewOpen) renderOverview();
    toast(`${session.name} erstellt`);
    focusRenameForCard(session.id);
  }

  function focusRenameForCard(id) {
    const input = document.querySelector(`.term-card[data-id="${id}"] .card-name`);
    if (!input) return;
    input.readOnly = false;
    input.dataset.editing = '1';
    input.focus();
    input.select();
  }

  function wireCardHeader(card, id) {
    const input = card.querySelector('.card-name');
    const session = TMS_DATA.sessions.find(s => s.id === id);
    input.addEventListener('click', e => {
      e.stopPropagation();
      if (input.readOnly) { input.readOnly = false; input.dataset.editing = '1'; input.focus(); input.select(); }
    });
    function commit() {
      input.readOnly = true;
      delete input.dataset.editing;
      const val = input.value.trim();
      session.name = val || session.name;
      input.value = session.name;
      renderRail();
      if (state.overviewOpen) renderOverview();
    }
    input.addEventListener('blur', commit);
    input.addEventListener('keydown', e => {
      e.stopPropagation();
      if (e.key === 'Enter') input.blur();
      if (e.key === 'Escape') { input.value = session.name; input.blur(); }
    });
  }

  // ============================================================
  // Feature 1 — terminal input row ($ command echo)
  // ============================================================
  function sendTerminalCommand(id, cmd) {
    cmd = cmd.trim();
    if (!cmd) return;
    const cs = cardState[id];
    cs.lines.push(`\x1b[2m$\x1b[0m ${cmd}`);
    cs.lines.push('\x1b[2m(Demo) Befehl an PTY gesendet\x1b[0m');
    renderCardLines(id); // reuses the existing escaped render + at-bottom auto-scroll pipeline
  }

  function wireTerminalInputRow(card, id) {
    const row = card.querySelector('.term-input-row');
    const input = row.querySelector('.term-input');
    const sendBtn = row.querySelector('.term-send-btn');
    const micBtn = row.querySelector('.term-mic-btn');
    function doSend() {
      if (input.disabled) return; // mid-dictation
      sendTerminalCommand(id, input.value);
      input.value = '';
    }
    sendBtn.addEventListener('click', e => { e.stopPropagation(); doSend(); });
    input.addEventListener('click', e => e.stopPropagation());
    input.addEventListener('keydown', e => {
      e.stopPropagation();
      if (e.key === 'Enter') { e.preventDefault(); doSend(); }
    });
    micBtn.addEventListener('click', e => { e.stopPropagation(); startDictation(id); });
  }

  // ============================================================
  // Feature 2 — Diktierfunktion (per-card mic, distinct from the
  // Manager chat mic: own timers, own state, single-flight across cards).
  // ============================================================
  let dictationTimers = [];
  function setIslandMicBadge(show) {
    const badge = document.getElementById('islandMicBadge');
    if (badge) badge.hidden = !show;
  }
  function startDictation(cardId) {
    if (state.dictation.active) return; // one at a time
    const card = document.querySelector(`.term-card[data-id="${cardId}"]`);
    if (!card) return;
    const input = card.querySelector('.term-input');
    const micBtn = card.querySelector('.term-mic-btn');
    if (!input || !micBtn) return;
    const prevPlaceholder = input.placeholder;
    state.dictation = { active: true, cardId, phase: 'recording' };
    input.disabled = true;
    input.placeholder = 'Höre zu…';
    micBtn.classList.add('is-recording');
    setIslandMicBadge(true);
    const t1 = setTimeout(() => {
      state.dictation.phase = 'transcribing';
      micBtn.classList.remove('is-recording');
      micBtn.classList.add('is-transcribing');
      input.placeholder = 'Transkribiere…';
      setIslandMicBadge(false);
      const t2 = setTimeout(() => {
        micBtn.classList.remove('is-transcribing');
        input.disabled = false;
        input.placeholder = prevPlaceholder;
        input.value = TMS_DATA.demo.dictation;
        input.focus();
        try { input.setSelectionRange(input.value.length, input.value.length); } catch (e) { /* ignore */ }
        toast('Diktat eingefügt');
        state.dictation = { active: false, cardId: null, phase: null };
        dictationTimers = [];
      }, 700);
      dictationTimers = [t2];
    }, 1800);
    dictationTimers = [t1];
  }
  // Called whenever the Terminals screen is left (see show()) so an
  // in-flight recording/transcribing flow never resolves onto a screen
  // the user has already navigated away from.
  function cancelDictation() {
    if (!state.dictation.active) return;
    dictationTimers.forEach(t => clearTimeout(t));
    dictationTimers = [];
    const { cardId } = state.dictation;
    const card = document.querySelector(`.term-card[data-id="${cardId}"]`);
    if (card) {
      const micBtn = card.querySelector('.term-mic-btn');
      const input = card.querySelector('.term-input');
      if (micBtn) micBtn.classList.remove('is-recording', 'is-transcribing');
      if (input) { input.disabled = false; input.placeholder = 'Befehl eingeben…'; }
    }
    setIslandMicBadge(false);
    state.dictation = { active: false, cardId: null, phase: null };
  }

  // ============================================================
  // Feature 4 — per-session Notizen & Todos (📝 in the card header)
  // ============================================================
  function wireCardNoteBtn(card, id) {
    card.querySelector('[data-note-btn]').addEventListener('click', e => {
      e.stopPropagation();
      openSessionSheet(id);
    });
  }

  const sessionSheetState = { sessionId: null, tab: 'notes' };

  function renderSessionSheetBody() {
    const session = TMS_DATA.sessions.find(s => s.id === sessionSheetState.sessionId);
    const body = document.getElementById('sessionSheetBody');
    if (!session || !body) return;
    if (sessionSheetState.tab === 'notes') {
      body.innerHTML = `
        <div class="notes-grid" id="sessionNotesList">${session.notes.length ? session.notes.map(n => `
          <div class="note-card">
            <div class="note-card__body">${escapeHtml(n.text)}</div>
            <div class="note-card__time">${escapeHtml(n.time)}</div>
          </div>`).join('') : '<div class="sheet-empty-hint">Noch keine Notizen</div>'}
        </div>
        <div class="sheet-add-row">
          <input type="text" id="sessionNoteInput" placeholder="Notiz hinzufügen…" autocomplete="off">
          <button class="sheet-add-btn" id="sessionNoteAddBtn" aria-label="Notiz hinzufügen">+</button>
        </div>
      `;
      document.getElementById('sessionNoteAddBtn').addEventListener('click', addSessionNote);
      document.getElementById('sessionNoteInput').addEventListener('keydown', e => { if (e.key === 'Enter') addSessionNote(); });
    } else {
      body.innerHTML = `
        <div class="todo-list" id="sessionTodosList">${session.todos.length ? session.todos.map(t => `
          <label class="todo-row">
            <input type="checkbox" data-todo="${t.id}" ${t.done ? 'checked' : ''}>
            <span class="todo-row__text${t.done ? ' is-done' : ''}">${escapeHtml(t.text)}</span>
          </label>`).join('') : '<div class="sheet-empty-hint">Noch keine Todos</div>'}
        </div>
        <div class="sheet-add-row">
          <input type="text" id="sessionTodoInput" placeholder="Todo hinzufügen…" autocomplete="off">
          <button class="sheet-add-btn" id="sessionTodoAddBtn" aria-label="Todo hinzufügen">+</button>
        </div>
      `;
      document.getElementById('sessionTodoAddBtn').addEventListener('click', addSessionTodo);
      document.getElementById('sessionTodoInput').addEventListener('keydown', e => { if (e.key === 'Enter') addSessionTodo(); });
      document.querySelectorAll('#sessionTodosList [data-todo]').forEach(cb => {
        cb.addEventListener('change', () => {
          const todo = session.todos.find(t => t.id === cb.dataset.todo);
          if (!todo) return;
          todo.done = cb.checked;
          cb.nextElementSibling.classList.toggle('is-done', todo.done);
        });
      });
    }
  }
  function addSessionNote() {
    const input = document.getElementById('sessionNoteInput');
    const text = input.value.trim();
    if (!text) return;
    const session = TMS_DATA.sessions.find(s => s.id === sessionSheetState.sessionId);
    session.notes.push({ id: 'n' + Date.now(), text, time: 'jetzt' });
    renderSessionSheetBody();
    document.getElementById('sessionNoteInput').focus();
  }
  function addSessionTodo() {
    const input = document.getElementById('sessionTodoInput');
    const text = input.value.trim();
    if (!text) return;
    const session = TMS_DATA.sessions.find(s => s.id === sessionSheetState.sessionId);
    session.todos.push({ id: 'd' + Date.now(), text, done: false });
    renderSessionSheetBody();
    document.getElementById('sessionTodoInput').focus();
  }
  function openSessionSheet(sessionId) {
    const session = TMS_DATA.sessions.find(s => s.id === sessionId);
    if (!session) return;
    sessionSheetState.sessionId = sessionId;
    sessionSheetState.tab = 'notes';
    document.querySelectorAll('#sessionSheetTabs button').forEach(b => b.classList.toggle('active', b.dataset.tab === 'notes'));
    document.getElementById('sessionSheetTitle').textContent = `${session.name} — Notizen & Todos`;
    renderSessionSheetBody();
    openSheet(document.getElementById('sessionSheetWrap'));
  }
  function wireSessionSheet() {
    const wrap = document.getElementById('sessionSheetWrap');
    document.getElementById('sessionSheetTabs').addEventListener('click', e => {
      const btn = e.target.closest('button[data-tab]');
      if (!btn) return;
      sessionSheetState.tab = btn.dataset.tab;
      document.querySelectorAll('#sessionSheetTabs button').forEach(b => b.classList.toggle('active', b === btn));
      renderSessionSheetBody();
    });
    document.getElementById('sessionSheetClose').addEventListener('click', () => closeSheet(wrap));
    wrap.querySelector('[data-close-session]').addEventListener('click', () => closeSheet(wrap));
  }

  function renderCardLines(id) {
    const pre = document.querySelector(`.card-body[data-card-id="${id}"]`);
    if (!pre) return;
    const cs = cardState[id];
    const atBottom = pre.scrollHeight - pre.scrollTop - pre.clientHeight < 24;
    pre.innerHTML = cs.lines.map((line, i) => `<span class="term-line" data-i="${i}"><span class="term-line__text">${renderBufferLine(line)}</span></span>`).join('');
    // A card can be rebuilt fresh (view toggle, new terminal appended) well
    // after selection mode was toggled on — reapply it from cardState so
    // Stack ⇄ Liste never desyncs the "Aa" state visually.
    pre.classList.toggle('selection-mode', !!cs.selectionMode);
    if (cs.selection) {
      if (cs.selection.end >= cs.lines.length) { cs.selection = null; }
      else pre.querySelectorAll('.term-line').forEach((l, i) => l.classList.toggle('is-selected', i >= cs.selection.start && i <= cs.selection.end));
    }
    positionHandlesAndBubble(id);
    if (atBottom) pre.scrollTop = pre.scrollHeight;
    // Only real terminal sessions feed the rail/overview previews — this same
    // function is reused for Cloud's XXL log viewer (id "cloud-<projectId>"),
    // whose 2s building-log appends would otherwise re-render the rail for nothing.
    if (TMS_DATA.sessions.some(s => s.id === id)) refreshPreviews();
  }

  function updateStatusChip(id, status) {
    const session = TMS_DATA.sessions.find(s => s.id === id);
    session.status = status;
    const chip = document.querySelector(`.term-card[data-id="${id}"] .status-chip`);
    if (chip) { chip.dataset.status = status; chip.querySelector('.status-chip__label').textContent = STATUS_LABELS[status] || status; }
    refreshPreviews();
  }

  function refreshPreviews() {
    renderRail();
    if (state.overviewOpen) renderOverview();
  }

  function layoutStack(floatIndex, opts) {
    opts = opts || {};
    const stackEl = document.getElementById('stack');
    if (!stackEl) return; // Liste is the active view — nothing to lay out
    if (opts.instant) stackEl.classList.add('is-dragging');
    state.order.forEach((id, i) => {
      const card = stackEl.querySelector(`.stack-card[data-id="${id}"]`);
      if (!card) return;
      const off = i - floatIndex;
      const ao = Math.min(Math.abs(off), 3);
      const tx = off * 42, ty = ao * 14, scale = 1 - ao * 0.075;
      const opacity = ao < 0.05 ? 1 : Math.max(0.12, 1 - ao * 0.42);
      card.style.transform = `translate3d(${tx}%, ${ty}px, 0) scale(${scale})`;
      card.style.opacity = opacity;
      card.style.zIndex = 100 - Math.round(ao * 10);
      card.classList.toggle('is-active', ao < 0.05);
      card.style.pointerEvents = ao < 1.5 ? 'auto' : 'none';
      const body = card.querySelector('.card-body');
      if (body) body.style.pointerEvents = ao < 0.05 ? 'auto' : 'none';
    });
    if (opts.instant) requestAnimationFrame(() => stackEl.classList.remove('is-dragging'));
  }

  function setActive(index) {
    index = clamp(index, 0, state.order.length - 1);
    state.activeIndex = index;
    state.activeFloat = index;
    state.activeCardId = state.order[index];
    layoutStack(index);
    renderRail();
  }

  function wireStackDrag() {
    const stackEl = document.getElementById('stack');
    let dragging = false, pointerId = null, startX = 0, startY = 0, startFloat = 0, moved = false, cardWidthPx = 300;

    stackEl.addEventListener('pointerdown', e => {
      if (state.overviewOpen) return;
      const card = e.target.closest('.stack-card');
      if (!card) return;
      const idx = state.order.indexOf(card.dataset.id);
      const isActiveCard = idx === Math.round(state.activeFloat);
      if (isActiveCard && e.target.closest('.card-body, .card-name, .status-chip, .replay-pill, .card-note-btn, .term-input-row')) return;
      pointerId = e.pointerId; startX = e.clientX; startY = e.clientY; startFloat = state.activeFloat; moved = false;
      cardWidthPx = card.getBoundingClientRect().width || 300;
      dragging = true;
      stackEl.setPointerCapture(pointerId);
    });
    stackEl.addEventListener('pointermove', e => {
      if (!dragging || e.pointerId !== pointerId) return;
      const dx = e.clientX - startX, dy = e.clientY - startY;
      if (!moved) {
        if (Math.abs(dx) < 6 || Math.abs(dx) < Math.abs(dy)) return;
        moved = true;
        stackEl.classList.add('is-dragging');
      }
      state.activeFloat = clamp(startFloat - dx / cardWidthPx, -0.4, state.order.length - 1 + 0.4);
      layoutStack(state.activeFloat);
    });
    function endDrag(e) {
      if (!dragging) return;
      dragging = false;
      try { stackEl.releasePointerCapture(pointerId); } catch (err) { /* already released */ }
      stackEl.classList.remove('is-dragging');
      if (moved) {
        state.suppressClick = true;
        setTimeout(() => { state.suppressClick = false; }, 30);
        setActive(Math.round(state.activeFloat));
      } else {
        const card = e.target.closest && e.target.closest('.stack-card');
        if (card) {
          const idx = state.order.indexOf(card.dataset.id);
          if (idx !== state.activeIndex) setActive(idx);
        }
      }
    }
    stackEl.addEventListener('pointerup', endDrag);
    stackEl.addEventListener('pointercancel', endDrag);
  }

  document.addEventListener('keydown', e => {
    const screen = document.querySelector('[data-screen="terminals"]');
    if (screen.hidden || state.overviewOpen || state.terminalView !== 'stack') return;
    if (document.activeElement && document.activeElement.tagName === 'INPUT') return;
    if (e.key === 'ArrowRight') setActive(state.activeIndex + 1);
    else if (e.key === 'ArrowLeft') setActive(state.activeIndex - 1);
  });

  // ============================================================
  // Overview (⊞) — 2x2 grid
  // ============================================================
  function renderOverview() {
    const grid = document.getElementById('overviewGrid');
    grid.innerHTML = '';
    state.order.forEach((id, i) => {
      const session = TMS_DATA.sessions.find(s => s.id === id);
      const cs = cardState[id];
      const tile = document.createElement('div');
      tile.className = 'overview-tile glass';
      const previewLines = cs.lines.slice(-4).map(l => ansiToHtml(l)).join('<br>');
      tile.innerHTML = `
        <div class="overview-tile__head"><span class="card-tag" style="background:${session.colorTag}"></span><span class="overview-tile__name">${escapeHtml(session.name)}</span><span class="status-chip" data-status="${session.status}"><span class="dot"></span></span></div>
        <div class="overview-tile__body">${previewLines}</div>
      `;
      tile.addEventListener('click', () => { toggleOverview(false); focusTerminal(id); });
      grid.appendChild(tile);

  function toggleOverview(force) {
    state.overviewOpen = typeof force === 'boolean' ? force : !state.overviewOpen;
    const grid = document.getElementById('overviewGrid');
    const btn = document.getElementById('overviewBtn');
    const wrap = document.getElementById('termBodyWrap');
    if (state.overviewOpen) { renderOverview(); grid.classList.add('is-open'); btn.classList.add('is-on'); if (wrap) wrap.classList.add('overview-active'); }
    else { grid.classList.remove('is-open'); btn.classList.remove('is-on'); if (wrap) wrap.classList.remove('overview-active'); }
  }

  // ============================================================
  // Rail (expanded ≥700px) — mini previews, drag-to-swap
  // ============================================================
  function renderRail() {
    const rail = document.getElementById('rail');
    if (!rail) return;
    rail.innerHTML = '';
    state.order.forEach((id, i) => {
      const session = TMS_DATA.sessions.find(s => s.id === id);
      const cs = cardState[id];
      const isActive = i === state.activeIndex;
      const item = document.createElement('div');
      item.className = 'rail-item glass' + (isActive ? ' is-active' : '');
      item.dataset.id = id; item.dataset.index = i;
      const preview = cs.lines.slice(-2).map(l => ansiToHtml(l)).join('<br>');
      item.innerHTML = `
        <div class="rail-item__top"><span class="card-tag" style="background:${session.colorTag}"></span><span class="rail-item__name">${escapeHtml(session.name)}</span></div>
        <div class="rail-item__preview">${preview}</div>
      `;
      item.addEventListener('click', () => { if (!isActive) setActive(i); });
      if (!isActive) wireRailDrag(item);
      rail.appendChild(item);
    });
  }

  function wireRailDrag(item) {
    item.addEventListener('pointerdown', e => {
      const startX = e.clientX, startY = e.clientY;
      const pointerId = e.pointerId;
      let dragging = false, ghost = null, cleaned = false;
      const fromId = item.dataset.id;
      const fromIndex = state.order.indexOf(fromId);
      function clearDropTargets() { document.querySelectorAll('.rail-item.drop-target, .stack-pane.drop-target').forEach(el => el.classList.remove('drop-target')); }
      function onMove(ev) {
        if (ev.pointerId !== pointerId) return;
        const dx = ev.clientX - startX, dy = ev.clientY - startY;
        if (!dragging) {
          if (Math.abs(dx) < 6 && Math.abs(dy) < 6) return;
          dragging = true;
          item.classList.add('is-dragging');
          ghost = document.createElement('div');
          ghost.className = 'rail-drop-ghost glass glass--strong';
          ghost.textContent = TMS_DATA.sessions.find(s => s.id === fromId).name;
          document.body.appendChild(ghost);
        }
        if (ghost) { ghost.style.left = ev.clientX + 12 + 'px'; ghost.style.top = ev.clientY + 8 + 'px'; }
        clearDropTargets();
        const under = document.elementFromPoint(ev.clientX, ev.clientY);
        const targetItem = under && under.closest('.rail-item');
        const targetPane = under && under.closest('.stack-pane');
        if (targetItem && targetItem !== item) targetItem.classList.add('drop-target');
        else if (targetPane) targetPane.classList.add('drop-target');
      }
      function cleanup() {
        if (cleaned) return;
        cleaned = true;
        document.removeEventListener('pointermove', onMove);
        document.removeEventListener('pointerup', onUp);
        document.removeEventListener('pointercancel', onCancel);
        item.removeEventListener('lostpointercapture', onLostCapture);
        try { item.releasePointerCapture(pointerId); } catch (err) { /* already released */ }
        if (ghost) { ghost.remove(); ghost = null; }
        item.classList.remove('is-dragging');
        clearDropTargets();
      }
      function onUp(ev) {
        const wasDragging = dragging;
        cleanup();
        if (!wasDragging) return;
        const under = document.elementFromPoint(ev.clientX, ev.clientY);
        const targetItem = under && under.closest('.rail-item');
        const targetPane = under && under.closest('.stack-pane');
        if (targetItem && targetItem !== item) { swapOrder(fromIndex, Number(targetItem.dataset.index)); toast('Getauscht ✓'); }
        else if (targetPane) { swapOrder(fromIndex, state.activeIndex); toast('Getauscht ✓'); }
      }
      function onCancel() { cleanup(); }
      function onLostCapture() { cleanup(); }
      try { item.setPointerCapture(pointerId); } catch (err) { /* unsupported */ }
      document.addEventListener('pointermove', onMove);
      document.addEventListener('pointerup', onUp);
      document.addEventListener('pointercancel', onCancel);
      item.addEventListener('lostpointercapture', onLostCapture);
    });
  }

  function swapOrder(a, b) {
    if (a === b) return;
    const tmp = state.order[a]; state.order[a] = state.order[b]; state.order[b] = tmp;
    layoutStack(state.activeIndex, { instant: true });
    renderRail();
    if (state.overviewOpen) renderOverview();
  }

  // ============================================================
  // Live Claude session (TMSSim) — session t1, auto-starts on load
  // so the Dynamic Island has something to report from any screen.
  // ============================================================
  function appendOutChunk(cs, chunk) {
    const pieces = chunk.split('\n');
    if (pieces[pieces.length - 1] === '') pieces.pop();
    cs.lines.push(...pieces);
  }

  let liveSimStarted = false;
  function initLiveSession() {
    if (liveSimStarted) return;
    liveSimStarted = true;
    const session = TMS_DATA.sessions.find(s => s.live);
    const id = session.id;
    const cs = cardState[id];
    const sim = TMSSim.createSession(session.script, { autoApprove: false });
    cs.sim = sim;
    sim.on('out', chunk => {
      appendOutChunk(cs, chunk);
      renderCardLines(id);
      if (state.islandOpen) renderIslandExpanded();
    });
    sim.on('status', status => {
      updateStatusChip(id, status);
      if (status === 'running') setIslandActivity('live', `Claude arbeitet · ${session.name}`);
      else if (status === 'done') setIslandActivity('ok', '✓ Fertig');
      if (state.islandOpen) renderIslandExpanded();
    });
    sim.on('prompt', data => {
      showPermSheet(id, data);
      setIslandActivity('warn', `Claude wartet · ${session.name}`);
    });
    sim.on('done', () => showReplay(id));
    sim.start();
  }

  function showPermSheet(id, data) {
    state.pendingPromptId = id;
    const cs = cardState[id];
    cs.pendingPrompt = data;
    document.getElementById('permTool').textContent = data.tool;
    document.getElementById('permTarget').textContent = data.target || '';
    document.getElementById('permQuestion').textContent = data.question || 'Erlauben?';
    document.getElementById('permAutoBtn').setAttribute('aria-pressed', String(cs.autoApprove));
    openSheet(permWrap);
    if (cs.autoApprove) armAutoApprove(id);
  }
  function armAutoApprove(id) {
    const cs = cardState[id];
    clearTimeout(cs.autoTimer);
    cs.autoTimer = setTimeout(() => {
      if (!cs.pendingPrompt || !cs.sim) return;
      appendOutChunk(cs, '  ⎿ ✔ Auto-Approve\n');
      renderCardLines(id);
      cs.pendingPrompt = null;
      closeSheet(permWrap);
      state.pendingPromptId = null;
      cs.sim.respond();
    }, 600);
  }
  function resolvePrompt(approved) {
    const id = state.pendingPromptId;
    if (!id) return;
    const cs = cardState[id];
    clearTimeout(cs.autoTimer);
    cs.pendingPrompt = null;
    state.pendingPromptId = null;
    closeSheet(permWrap);
    if (approved) {
      cs.sim.respond();
    } else {
      appendOutChunk(cs, '  ⎿ ✖ Abgelehnt — Aktion gestoppt\n');
      renderCardLines(id);
      updateStatusChip(id, 'idle');
      setIslandActivity('', 'Bereit');
      showReplay(id);
    }
  }
  function toggleAutoApprove() {
    const id = state.pendingPromptId;
    if (!id) return;
    const cs = cardState[id];
    cs.autoApprove = !cs.autoApprove;
    document.getElementById('permAutoBtn').setAttribute('aria-pressed', String(cs.autoApprove));
    if (cs.autoApprove && cs.pendingPrompt) armAutoApprove(id);
    else clearTimeout(cs.autoTimer);
  }
  document.querySelector('#permSheetWrap [data-act="yes"]').addEventListener('click', () => resolvePrompt(true));
  document.querySelector('#permSheetWrap [data-act="no"]').addEventListener('click', () => resolvePrompt(false));
  document.getElementById('permAutoBtn').addEventListener('click', toggleAutoApprove);

  function showReplay(id) {
    const cs = cardState[id];
    if (cs) cs.showReplay = true; // persisted so a rebuilt card (view toggle) restores this affordance
    const btn = document.querySelector(`.term-card[data-id="${id}"] .replay-pill`);
    if (!btn) return;
    btn.hidden = false;
    btn.onclick = () => replaySession(id);
  }
  function replaySession(id) {
    const cs = cardState[id];
    const session = TMS_DATA.sessions.find(s => s.id === id);
    clearTimeout(cs.autoTimer);
    cs.lines = session.buffer.slice();
    cs.pendingPrompt = null;
    cs.showReplay = false;
    clearSelection(id);
    const card = document.querySelector(`.term-card[data-id="${id}"]`);
    if (card) { const pill = card.querySelector('.replay-pill'); if (pill) pill.hidden = true; }
    renderCardLines(id);
    updateStatusChip(id, 'running');
    setIslandActivity('live', `Claude arbeitet · ${session.name}`);
    cs.sim.reset();
    cs.sim.start();
  }

  // ============================================================
  // Touch text-selection: glowing handles + copy bubble
  // ============================================================
  function handleLineTap(pre, line) {
    const id = pre.dataset.cardId;
    const cs = cardState[id];
    const i = Number(line.dataset.i);
    if (cs.selection && cs.selection.start === i && cs.selection.end === i) { clearSelection(id); return; }
    cs.selection = { start: i, end: i };
    pre.querySelectorAll('.term-line').forEach((l, idx) => l.classList.toggle('is-selected', idx === i));
    positionHandlesAndBubble(id);
  }
  function makeHandle(kind, cardId) {
    const el = document.createElement('div');
    el.className = `sel-handle sel-handle--${kind}`;
    el.addEventListener('pointerdown', e => startHandleDrag(e, cardId, kind));
    return el;
  }
  function startHandleDrag(e, cardId, kind) {
    e.stopPropagation();
    const handle = e.currentTarget;
    handle.setPointerCapture(e.pointerId);
    const pre = document.querySelector(`.card-body[data-card-id="${cardId}"]`);
    function onMove(ev) {
      const el = document.elementFromPoint(ev.clientX, ev.clientY);
      const line = el && el.closest && el.closest('.term-line');
      if (!line) return;
      const idx = Number(line.dataset.i);
      const cs = cardState[cardId];
      if (!cs.selection) return;
      if (kind === 'start') cs.selection.start = Math.min(idx, cs.selection.end);
      else cs.selection.end = Math.max(idx, cs.selection.start);
      pre.querySelectorAll('.term-line').forEach((l, i) => l.classList.toggle('is-selected', i >= cs.selection.start && i <= cs.selection.end));
      positionHandlesAndBubble(cardId);
    }
    function onUp(ev) {
      try { handle.releasePointerCapture(ev.pointerId); } catch (err) { /* already released */ }
      handle.removeEventListener('pointermove', onMove);
      handle.removeEventListener('pointerup', onUp);
    }
    handle.addEventListener('pointermove', onMove);
    handle.addEventListener('pointerup', onUp);
  }
  function makeBubble(cardId) {
    const el = document.createElement('button');
    el.className = 'copy-bubble';
    el.textContent = 'Kopieren';
    el.addEventListener('click', e => {
      e.stopPropagation();
      const cs = cardState[cardId];
      if (!cs.selection) return;
      const pre = document.querySelector(`.card-body[data-card-id="${cardId}"]`);
      const lines = [...pre.querySelectorAll('.term-line')].slice(cs.selection.start, cs.selection.end + 1);
      const text = lines.map(l => l.querySelector('.term-line__text').textContent).join('\n');
      copyText(text);
      toast('Kopiert ✓');
      clearSelection(cardId);
    });
    return el;
  }
  function positionHandlesAndBubble(cardId) {
    const pre = document.querySelector(`.card-body[data-card-id="${cardId}"]`);
    if (!pre) return;
    const cs = cardState[cardId];
    let hs = pre.querySelector('.sel-handle--start');
    let he = pre.querySelector('.sel-handle--end');
    let bubble = pre.querySelector('.copy-bubble');
    if (!cs.selection) { [hs, he, bubble].forEach(el => el && el.remove()); return; }
    if (!hs) { hs = makeHandle('start', cardId); pre.appendChild(hs); }
    if (!he) { he = makeHandle('end', cardId); pre.appendChild(he); }
    if (!bubble) { bubble = makeBubble(cardId); pre.appendChild(bubble); }
    const startLine = pre.querySelector(`.term-line[data-i="${cs.selection.start}"]`);
    const endLine = pre.querySelector(`.term-line[data-i="${cs.selection.end}"]`);
    if (!startLine || !endLine) return;
    const startText = startLine.querySelector('.term-line__text');
    const endText = endLine.querySelector('.term-line__text');
    hs.style.top = (startLine.offsetTop + startLine.offsetHeight) + 'px';
    hs.style.left = startText.offsetLeft + 'px';
    he.style.top = (endLine.offsetTop + endLine.offsetHeight) + 'px';
    he.style.left = (endText.offsetLeft + endText.offsetWidth) + 'px';
    bubble.style.top = Math.max(0, startLine.offsetTop - 38) + 'px';
    bubble.style.left = Math.min(startText.offsetLeft, endText.offsetLeft) + 'px';
  }
  function clearSelection(cardId) {
    const cs = cardState[cardId];
    cs.selection = null;
    const pre = document.querySelector(`.card-body[data-card-id="${cardId}"]`);
    if (!pre) return;
    pre.querySelectorAll('.term-line.is-selected').forEach(l => l.classList.remove('is-selected'));
    positionHandlesAndBubble(cardId);
  }

  // Delegated: wrapped-link copy (outside selection mode) + line-tap selection (inside selection mode)
  document.addEventListener('click', e => {
    if (state.suppressClick) return;
    const link = e.target.closest('.wrapped-link');
    if (link) {
      const inSelectionMode = link.closest('.card-body.selection-mode');
      if (!inSelectionMode) {
        copyText(link.dataset.url);
        toast(`Vollständiger Link kopiert ✓ (…${link.dataset.short}…)`);
        return;
      }
    }
    const pre = e.target.closest('.card-body.selection-mode');
    if (pre) {
      const line = e.target.closest('.term-line');
      if (line) handleLineTap(pre, line);
    }
  });

  // ============================================================
  // Terminal toolbar — floating glass pill above the dock
  // ============================================================
  function flashKeyEcho(label) {
    const host = document.getElementById('keyEchoHost');
    const chip = document.createElement('span');
    chip.className = 'key-echo';
    chip.textContent = label;
    host.appendChild(chip);
    requestAnimationFrame(() => chip.classList.add('show'));
    setTimeout(() => { chip.classList.remove('show'); setTimeout(() => chip.remove(), 200); }, 550);
  }
  // Generic selection-mode toggle keyed by any cardState id — used by the
  // terminal toolbar's Aa button (session cards) AND Cloud's XXL log viewer
  // "Selektieren" button (cloud-<projectId> pseudo-cards), so both share the
  // exact same handle/copy-bubble machinery instead of two parallel systems.
  function toggleCardSelectionMode(cardId, btnEl) {
    const cs = cardState[cardId];
    cs.selectionMode = !cs.selectionMode;
    if (btnEl) btnEl.classList.toggle('is-on', cs.selectionMode);
    const pre = document.querySelector(`.card-body[data-card-id="${cardId}"]`);
    if (pre) pre.classList.toggle('selection-mode', cs.selectionMode);
    if (!cs.selectionMode) clearSelection(cardId);
  }
  function toggleSelectionMode() {
    const id = state.activeCardId || state.order[state.activeIndex];
    toggleCardSelectionMode(id, document.getElementById('selToggleBtn'));
  }
  function wireToolbar() {
    document.querySelectorAll('#toolbarPill button').forEach(btn => {
      btn.addEventListener('click', () => {
        const key = btn.dataset.key;
        if (key === 'Aa') { toggleSelectionMode(); return; }
        flashKeyEcho(key);
      });
    });
  }

  // ============================================================
  // Tools screen + tool sheet (Dateien, SQL, Ports, Prozesse,
  // Snippets, Notizen, Screenshots, Browser, Watchers)
  // ============================================================
  const TOOL_DEFS = [
    { id: 'files', code: 'FS', label: 'Dateien' },
    { id: 'sql', code: 'DB', label: 'SQL' },
    { id: 'ports', code: 'PT', label: 'Ports' },
    { id: 'processes', code: 'PS', label: 'Prozesse' },
    { id: 'snippets', code: 'SN', label: 'Snippets' },
    { id: 'notes', code: 'NT', label: 'Notizen' },
    { id: 'screenshots', code: 'SC', label: 'Screenshots' },
    { id: 'browser', code: 'BR', label: 'Browser' },
    { id: 'watchers', code: 'WA', label: 'Watchers' },
  ];

  function renderTools() {
    const host = document.querySelector('[data-screen="tools"]');
    host.innerHTML = `<h1 class="screen-title">Werkzeuge</h1><div class="screen-col"><div class="tool-grid" id="toolGrid"></div></div>`;
    const grid = document.getElementById('toolGrid');
    grid.innerHTML = TOOL_DEFS.map(t => `
      <button class="tool-tile glass" data-tool="${t.id}">
        <span class="tool-tile__glyph">${t.code}</span>
        <span class="tool-tile__label">${t.label}</span>
      </button>`).join('');
    grid.addEventListener('click', e => {
      const tile = e.target.closest('.tool-tile');
      if (tile) openToolSheet(tile.dataset.tool);
    });
  }

  function openToolSheet(id) {
    const def = TOOL_DEFS.find(t => t.id === id);
    const builders = {
      files: buildFilesSheet, sql: buildSqlSheet, ports: buildPortsSheet, processes: buildProcessesSheet,
      snippets: buildSnippetsSheet, notes: buildNotesSheet, screenshots: buildScreenshotsSheet,
      browser: buildBrowserSheet, watchers: buildWatchersSheet,
    };
    if (!def || !builders[id]) return;
    const { html, wire } = builders[id]();
    document.getElementById('toolSheetTitle').textContent = def.label;
    document.getElementById('toolSheetBody').innerHTML = html;
    openSheet(document.getElementById('toolSheetWrap'));
    if (wire) wire();
  }

  function buildFilesSheet() {
    const html = `<div class="tool-list">${TMS_DATA.files.map(f => `
      <div class="tool-row">
        <span class="tool-row__icon">${f.type === 'dir' ? '▸' : '·'}</span>
        <span class="tool-row__name">${escapeHtml(f.name)}</span>
        <span class="tool-row__meta">${f.size ? escapeHtml(f.size) : ''}</span>
      </div>`).join('')}</div>`;
    return { html };
  }

  function buildSqlSheet() {
    const cols = Object.keys(TMS_DATA.sql.rows[0] || {});
    const html = `
      <div class="sql-query">${ansiToHtml(TMS_DATA.sql.query)}</div>
      <div class="table-scroll">
        <table class="data-table">
          <thead><tr>${cols.map(c => `<th>${escapeHtml(c)}</th>`).join('')}</tr></thead>
          <tbody>${TMS_DATA.sql.rows.map(r => `<tr>${cols.map(c => `<td>${escapeHtml(String(r[c]))}</td>`).join('')}</tr>`).join('')}</tbody>
        </table>
      </div>`;
    return { html };
  }

  function buildPortsSheet() {
    const html = `<div class="tool-list">${TMS_DATA.ports.map(p => `
      <div class="tool-row" data-port="${p.port}">
        <span class="tool-row__name">:${p.port} — ${escapeHtml(p.service)}</span>
        <label class="switch"><input type="checkbox" data-act="forward" ${p.forwarded ? 'checked' : ''}><span class="switch__track"><span class="switch__thumb"></span></span></label>
      </div>`).join('')}</div>`;
    const wire = () => {
      document.querySelectorAll('#toolSheetBody [data-act="forward"]').forEach(inp => {
        inp.addEventListener('change', () => {
          const row = inp.closest('[data-port]');
          const port = TMS_DATA.ports.find(p => String(p.port) === row.dataset.port);
          if (!port) return;
          port.forwarded = inp.checked;
          toast(port.forwarded ? `Port ${port.port} weitergeleitet` : `Port ${port.port} nicht mehr weitergeleitet`);
        });
      });

    return { html, wire };

  function buildProcessesSheet() {
    const maxCpu = Math.max(...TMS_DATA.processes.map(p => p.cpu), 1);
    const html = `
      <div class="table-scroll">
        <table class="data-table">
          <thead><tr><th>PID</th><th>Prozess</th><th>CPU</th><th>Mem</th></tr></thead>
          <tbody>${TMS_DATA.processes.map(p => `
            <tr>
              <td>${p.pid}</td>
              <td>${escapeHtml(p.name)}</td>
              <td><div class="cpu-cell"><div class="cpu-bar" style="--pct:${Math.round(Math.min(100, (p.cpu / maxCpu) * 100))}%"><div class="cpu-bar__fill"></div></div><span>${p.cpu.toFixed(1)}%</span></div></td>
              <td>${p.mem} MB</td>
            </tr>`).join('')}</tbody>
        </table>
      </div>`;
    return { html };
  }

  function buildSnippetsSheet() {
    const html = `<div class="tool-list">${TMS_DATA.snippets.map(s => `
      <button class="tool-row is-tap" data-snippet="${s.id}">
        <span class="tool-row__name">${escapeHtml(s.label)}</span>
        <span class="tool-row__meta">${escapeHtml(s.cmd)}</span>
      </button>`).join('')}</div>`;
    const wire = () => {

  // per session that actually has notes (session-scoped editing itself lives
  // in the 📝 sheet on each terminal card — this view is just an overview).
  function buildNotesSheet() {
    const groups = [
      { label: 'Allgemein', cards: TMS_DATA.notes.map(n => ({ title: n.title, text: n.body, time: n.time })) },
      ...TMS_DATA.sessions.filter(s => s.notes.length).map(s => ({
        label: s.name, cards: s.notes.map(n => ({ title: '', text: n.text, time: n.time })),
      })),
    ];
    const html = groups.map(g => `
      <h4 class="tool-group-title">${escapeHtml(g.label)}</h4>
      <div class="notes-grid">${g.cards.length ? g.cards.map(n => `
        <div class="note-card">
          ${n.title ? `<div class="note-card__title">${escapeHtml(n.title)}</div>` : ''}
          <div class="note-card__body">${escapeHtml(n.text)}</div>
          <div class="note-card__time">${escapeHtml(n.time)}</div>
        </div>`).join('') : '<div class="sheet-empty-hint">Keine Notizen</div>'}
      </div>`).join('');
    return { html };
  }

  function buildWatchersSheet() {

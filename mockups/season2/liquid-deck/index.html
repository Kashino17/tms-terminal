  // ============================================================
  // Terminal workspace — spatial swipeable stack
  // ============================================================
  const STATUS_LABELS = { running: 'Läuft', waiting: 'Wartet', done: 'Fertig', idle: 'Bereit' };
  function clamp(v, lo, hi) { return Math.max(lo, Math.min(hi, v)); }

  function buildTerminalScreen() {
    // The old title + action row now lives in the Dynamic Island (see
    // #islandTermActions in the static header) — its buttons/ids are
    // unchanged, so wireViewToggle() and the listeners below still just work
    // wherever the elements physically sit. Freeing this row hands the extra
    // height straight to .term-body-wrap (flex: 1 fills whatever is left).
    const host = document.querySelector('[data-screen="terminals"]');
    host.innerHTML = `
      <div class="term-body-wrap" id="termBodyWrap">
        <div class="term-body" id="termBody"></div>
        <div class="overview-grid" id="overviewGrid"></div>
      </div>
    `;
    document.getElementById('overviewBtn').addEventListener('click', e => { e.stopPropagation(); toggleOverview(); });
    document.getElementById('addTerminalBtn').addEventListener('click', e => { e.stopPropagation(); addTerminal(); });
    wireViewToggle();
    renderTerminalWorkspace();
  }

  // Renders whichever of Stack / Liste is the current terminalView into
  // #termBody. Both are pure renderers over the same TMS_DATA.sessions +
  // cardState — nothing session-shaped is ever duplicated, so toggling is
  // just "throw the old view's DOM away and repaint the other one from
  // state", instant at this card count.
  function renderTerminalWorkspace() {
    cancelDictation();
    setTimeout(() => { if (typeof renderTermSwitcher === 'function') renderTermSwitcher(); }, 0); // never leave a mic mid-flight pointed at a DOM node we're about to discard
    const body = document.getElementById('termBody');
    if (!body) return;
    if (state.terminalView === 'list') {
      body.innerHTML = `
        <div class="term-list" id="termList">
          <div class="term-list__inner" id="termListCards">
            <button class="add-terminal-cta glass" id="addTerminalCta" type="button">
              <span class="add-terminal-cta__icon">${icon('plus')}</span><span>Neues Terminal</span>
            </button>
          </div>
        </div>
      `;
      buildList();
      document.getElementById('addTerminalCta').addEventListener('click', () => addTerminal());
    } else {
      body.innerHTML = `
        <div class="workspace">
          <div class="stack-pane"><div class="stack" id="stack"></div></div>
          <div class="rail" id="rail"></div>
        </div>
      `;
      buildStack();
      renderRail();
      wireStackDrag();
    }
    updateViewToggleUI();
  }

  function wireViewToggle() {
    const toggle = document.getElementById('islandTermActions');
    if (!toggle) return;
    toggle.addEventListener('click', e => {
      const btn = e.target.closest('.island-act[data-view]');
      if (!btn) return;
      e.stopPropagation(); // lives inside the island now — a tap must not also expand it
      setTerminalView(btn.dataset.view);
    });
  }
  function setTerminalView(view) {
    if (view !== 'stack' && view !== 'list') return;
    if (state.terminalView === view) return;
    state.terminalView = view;
    try { localStorage.setItem(TERM_VIEW_KEY, view); } catch (e) { /* storage unavailable */ }
    if (state.overviewOpen) toggleOverview(false);
    renderTerminalWorkspace();
    // Stack⇄Liste cross-morph: animate the freshly rendered workspace in.
    const ws = document.querySelector('section[data-screen="terminals"] .workspace');
    if (ws) {
      ws.classList.remove('view-anim');
      void ws.offsetWidth;
      ws.classList.add('view-anim');
      ws.addEventListener('animationend', () => ws.classList.remove('view-anim'), { once: true });
    }
  }
  function updateViewToggleUI() {
    document.querySelectorAll('#islandTermActions .island-act[data-view]').forEach(btn => {
      btn.setAttribute('aria-selected', String(btn.dataset.view === state.terminalView));
    });
  }

  // Restores the imperative "replay session" pill visibility from cardState
  // (see showReplay/replaySession) onto a freshly-built card — needed
  // because a card can be rebuilt fresh (view toggle, new terminal) well
  // after its session finished, and that pill has no other backing markup.
  function restoreReplayPill(card, id) {
    const cs = cardState[id];
    if (!cs || !cs.showReplay) return;
    const pill = card.querySelector('.replay-pill');
    if (pill) { pill.hidden = false; pill.onclick = () => replaySession(id); }
  }

  // Shared by Stack + Liste (Requirement 2 — ⏬ Schnell-nach-unten): the
  // jump-to-bottom orb is a SIBLING of <pre class="card-body">, not a
  // child, so renderCardLines()'s per-line innerHTML rewrite never tears
  // it (and its listeners) down.
  function cardBodyBlockHtml(id, isList) {
    return `
        <div class="card-body-shell${isList ? ' list-card__body-shell' : ''}">
          <pre class="card-body glass glass--dark" data-card-id="${id}"></pre>
          <button class="jump-bottom-orb" data-jump-btn aria-label="Nach unten springen" title="Neue Ausgabe – nach unten springen">${icon('jumpDown')}</button>
        </div>`;
  }

  // Shared header markup for Stack + Liste. Name + description are readonly
  // inputs unlocked by triple-tap (wireTripleTapEdit); the Auto-Approve pill
  // is a 1-tap per-terminal control (default ON).
  function cardHeaderHtml(session, id, isList) {
    const cs = cardState[id];
    return `
        <div class="card-header${isList ? ' list-card__header' : ''}">
          ${isList ? `<button class="chevron-btn" data-act="toggle" aria-label="Ein-/Ausklappen" title="Ein-/Ausklappen">${icon('chevron', 16)}</button>` : ''}
          <div class="card-name-wrap">
            <input class="card-name" value="${escapeHtml(session.name)}" readonly aria-label="Terminal-Name">
          </div>
          <span class="status-chip" data-status="${session.status}"><span class="dot"></span><span class="status-chip__label">${STATUS_LABELS[session.status] || session.status}</span></span>
          <button class="auto-toggle${cs.autoApprove ? ' is-on' : ''}" data-act="auto" aria-pressed="${cs.autoApprove}" aria-label="Auto-Approve umschalten" title="Auto-Approve">${icon('bolt', 15)}</button>
        </div>`;
  }

  // ============================================================
  // Tasten/Cursor accessory panel — a compact, NON-MODAL keyboard-accessory
  // bar shared by Stack + Liste. Rendered as a normal flex sibling right
  // above the input row (below the terminal content), so it reserves space
  // rather than covering the terminal. Its own `hidden` state is baked in
  // at build time from the ONE shared state.keysPanelOpen flag; runtime
  // toggles flip every card's panel in lockstep via applyKeysPanelVisibility().
  // Never closes itself on key presses — only its ✕ or the „Tasten" toggle
  // (see wireKeysPanel/closeKeysPanel).
  // ============================================================
  function keysPanelHtml(id) {
    const cs = cardState[id];
    const arrow = (deg) => `<span style="display:flex;transform:rotate(${deg}deg)">${icon('chevron', 16)}</span>`;
    return `
        <div class="keys-panel glass" data-keys-panel${state.keysPanelOpen ? '' : ' hidden'}>
          <div class="keys-panel__row">
            <div class="keys-panel__keys">
              <button class="tt-key tt-key--danger" data-tt-key="ctrlc" aria-label="Strg+C senden" title="Strg+C">^C</button>
              <button class="tt-key" data-tt-key="esc" aria-label="Escape" title="Esc">Esc</button>
              <button class="tt-key" data-tt-key="tab">Tab</button>
              <button class="tt-key" data-tt-key="shifttab" aria-label="Umschalt+Tab" title="Umschalt+Tab (rückwärts)">⇧Tab</button>
              <button class="tt-key${cs.selectionMode ? ' is-on' : ''}" data-tt-key="selectmode" aria-label="Auswahlmodus" title="Auswahl">Aa</button>
              <button class="tt-key tt-key--icon" data-tt-key="backspace" aria-label="Zeichen löschen" title="Löschen (⌫)">${icon('backspace', 17)}</button>
              <button class="tt-key tt-key--danger tt-key--icon" data-tt-key="clear" aria-label="Terminal leeren" title="Leeren">${icon('trash', 16)}</button>
            </div>
            <button class="keys-panel__close" data-tt-key="closepanel" aria-label="Tasten schließen" title="Schließen">${icon('x', 15)}</button>
          </div>
          <div class="keys-panel__row keys-panel__row--tools">
            <div class="keys-panel__arrows">
              <button data-tt-cursor="←" aria-label="Links">${arrow(90)}</button>
              <button data-tt-cursor="↑" aria-label="Hoch">${arrow(180)}</button>
              <button data-tt-cursor="↓" aria-label="Runter">${arrow(0)}</button>
              <button data-tt-cursor="→" aria-label="Rechts">${arrow(-90)}</button>
            </div>
            <span class="keys-panel__spacer"></span>
            <button class="tt-key tt-key--icon" data-tt-key="mic" aria-label="Diktieren" title="Diktieren">${icon('mic', 17)}</button>
            <button class="tt-key tt-key--icon" data-tt-tool="screenshots" aria-label="Screenshots" title="Screenshots">${icon('camera', 17)}</button>
            <button class="tt-key tt-key--icon" data-tt-tool="files" aria-label="Dateien" title="Dateien">${icon('folder', 17)}</button>
            <button class="tt-key tt-key--icon" data-tt-tool="notes" aria-label="Notizen" title="Notizen">${icon('note', 17)}</button>
            <button class="tt-key tt-key--icon" data-tt-key="werkzeuge" aria-label="Alle Werkzeuge" title="Alle Werkzeuge">${icon('tools', 17)}</button>
          </div>
        </div>`;
  }
  // Wires one card's panel to act ONLY on that card's id — "acts on the
  // active/focused card" (spec) falls out naturally since each panel
  // instance targets its own terminal, whichever view renders it.
  function wireKeysPanelTools(panel, id) {
    panel.querySelectorAll('[data-tt-tool]').forEach(btn => {
      btn.addEventListener('click', e => { e.stopPropagation(); openToolSheet(btn.dataset.ttTool); });
    });
  }
  function wireKeysPanel(card, id) {
    const panel = card.querySelector('.keys-panel');
    if (!panel) return;
    wireKeysPanelTools(panel, id);
    panel.querySelectorAll('[data-tt-key]').forEach(btn => {
      btn.addEventListener('click', e => {
        e.stopPropagation();
        const k = btn.dataset.ttKey;
        // Tab hat im Mockup nur geblinkt — die Taste muss das Terminal erreichen.
        if (k === 'tab' || k === 'shifttab') handleTermKey(k, id);
        // ^C und Esc wohnen jetzt hier statt links in der Eingabezeile.
        else if (k === 'ctrlc' || k === 'esc') handleTermKey(k, id);
        else if (k === 'backspace') handleTermKey('backspace', id);
        else if (k === 'clear') clearActiveTerminal(id);
        else if (k === 'selectmode') {
          toggleCardSelectionMode(id, null);
          const on = cardState[id].selectionMode;
          btn.classList.toggle('is-on', on);
          toast(on ? 'Auswahlmodus an' : 'Auswahlmodus aus');
        } else if (k === 'mic') startDictation(id);
        else if (k === 'werkzeuge') openTermToolsSheet(id);
        else if (k === 'closepanel') closeKeysPanel();
      });
    });
    // Ebenso die Pfeiltasten: sie schickten bisher gar nichts, sondern zeigten
    // nur ein Echo an. Sie steuern jetzt wirklich den Cursor im Terminal.
    const CURSOR_KEYS = { '←': 'left', '↑': 'up', '↓': 'down', '→': 'right' };
    panel.querySelectorAll('[data-tt-cursor]').forEach(btn => {
      btn.addEventListener('click', e => {
        e.stopPropagation();
        handleTermKey(CURSOR_KEYS[btn.dataset.ttCursor] || btn.dataset.ttCursor, id);
      });
    });
  }
  // Single shared open/closed flag (kept intentionally simple per spec):
  // flipping it shows/hides every card's panel at once, in both views.
  function applyKeysPanelVisibility() {
    // Eine einzige Tastenleiste, über der Bottom-Bar — nicht mehr eine pro Karte.
    // Sie gilt immer dem Terminal, das die Leiste gerade bedient.
    const host = document.getElementById('globalKeys');
    const id = typeof dockTargetId === 'function' ? dockTargetId() : state.activeCardId;
    if (host) {
      const show = !!state.keysPanelOpen && !!id && !!cardState[id];
      if (show) {
        host.hidden = false;
        host.classList.remove('is-closing');
        const tmp = document.createElement('div');
        tmp.innerHTML = keysPanelHtml(id);
        const inner = tmp.querySelector('.keys-panel');
        host.innerHTML = inner ? inner.innerHTML : '';
        wireKeysPanel(document, id); // document.querySelector('.keys-panel') === #globalKeys
        requestAnimationFrame(() => {
          document.documentElement.style.setProperty('--keys-h', host.offsetHeight + 'px');
        });
      } else if (!host.hidden) {
        host.classList.add('is-closing');
        clearTimeout(host._closeT);
        host._closeT = setTimeout(() => { host.hidden = true; host.classList.remove('is-closing'); }, 220);
      }
      document.body.classList.toggle('keys-open', show);
      // Die Karte ist jetzt größer/kleiner — das Terminal neu vermessen.
      clearTimeout(host._fitT);
      host._fitT = setTimeout(() => window.dispatchEvent(new Event('resize')), 540);
    }
    document.querySelectorAll('.term-keys-btn, #dockKeysBtn').forEach(btn => {
      btn.classList.toggle('is-on', state.keysPanelOpen);
      btn.setAttribute('aria-pressed', String(state.keysPanelOpen));
    });
    document.querySelectorAll('.list-swipe-btn[data-rail="keys"]').forEach(btn => btn.classList.toggle('is-on', state.keysPanelOpen));
  }
  function toggleKeysPanel() {
    state.keysPanelOpen = !state.keysPanelOpen;
    applyKeysPanelVisibility();
  }
  function closeKeysPanel() {
    if (!state.keysPanelOpen) return;
    state.keysPanelOpen = false;
    applyKeysPanelVisibility();
  }

  // Stack input cluster — primary tier keys (^C, Esc) + input + mic + send +
  // „Tasten" toggle (secondary tier), all in one glass row. The toggle no
  // longer opens the Werkzeuge sheet — it shows/hides the non-modal
  // .keys-panel docked just above this row (see keysPanelHtml/toggleKeysPanel).
  function stackInputRowHtml() {
    return ``; /* die Eingabezeile ist jetzt die Bottom-Bar */ return `
        <div class="term-input-row glass">
          <button class="term-key term-key--danger" data-key="ctrlc" aria-label="Strg+C senden" title="Strg+C">^C</button>
          <button class="term-key" data-key="esc" aria-label="Escape" title="Esc">Esc</button>
          <span class="term-input-row__prompt">$</span>
          <input type="text" class="term-input" placeholder="Befehl eingeben…" autocomplete="off" autocapitalize="off" autocorrect="off" spellcheck="false" aria-label="Befehl eingeben">
          <button class="term-input-btn term-mic-btn" data-act="mic" aria-label="Diktieren">${icon('mic')}</button>
          <button class="term-input-btn term-send-btn" data-act="send" aria-label="Senden">${icon('enter')}</button>
          <button class="term-input-btn term-keys-btn${state.keysPanelOpen ? ' is-on' : ''}" data-act="keys" aria-label="Tasten" title="Tasten" aria-pressed="${state.keysPanelOpen}">${icon('keyboard')}</button>
        </div>`;
  }

  // Liste input cluster — lean (input + mic + send); quick-keys live in the
  // per-card swipe rail instead.
  function listInputRowHtml() { return ''; } // die Eingabezeile ist jetzt die Bottom-Bar
  function listInputRowHtml_unused() {
    return `
        <div class="term-input-row glass">
          <span class="term-input-row__prompt">$</span>
          <input type="text" class="term-input" placeholder="Befehl eingeben…" autocomplete="off" autocapitalize="off" autocorrect="off" spellcheck="false" aria-label="Befehl eingeben">
          <button class="term-input-btn term-mic-btn" data-act="mic" aria-label="Diktieren">${icon('mic')}</button>
          <button class="term-input-btn term-send-btn" data-act="send" aria-label="Senden">${icon('enter')}</button>
        </div>`;
  }

  function buildOneStackCard(session) {
    const id = session.id;
    const card = document.createElement('div');
    card.className = 'stack-card term-card glass';
    card.dataset.id = id;
    card.style.setProperty('--tag', session.colorTag);
    card.innerHTML = `
        ${cardHeaderHtml(session, id, false)}
        ${cardBodyBlockHtml(id, false)}
        <button class="replay-pill" hidden>${icon('replay', 14)}<span>Session erneut abspielen</span></button>
        
        ${stackInputRowHtml()}
      `;
    wireCardHeader(card, id);
    wireTerminalInputRow(card, id);
    wireKeysPanel(card, id);
    wireJumpOrb(card, id);
    restoreReplayPill(card, id);
    return card;
  }

  function buildStack() {
    const stackEl = document.getElementById('stack');
    if (!stackEl) return;
    stackEl.innerHTML = '';
    state.order.forEach(id => {
      const session = TMS_DATA.sessions.find(s => s.id === id);
      const card = buildOneStackCard(session);
      stackEl.appendChild(card);
      renderCardLines(id);
    });
    layoutStack(state.activeIndex, { instant: true });
    state.activeCardId = state.order[state.activeIndex];
    setActive_syncDock();
  }

  // ============================================================
  // Liste view (Requirement 1) — vertical glass terminal cards, Command-
  // Deck ergonomics (chevron-collapsible, one card per row) rendered with
  // Liquid Deck's own header/body/input-row markup so every affordance
  // (name edit, 📝 notes, mic dictation, selection, wrapped links) is
  // shared code with Stack, not a parallel implementation.
  // ============================================================
  function toggleListCardCollapse(id) {
    const cs = cardState[id];
    if (!cs) return;
    cs.collapsed = !cs.collapsed;
    const card = document.querySelector(`.list-card[data-id="${id}"]`);
    if (card) card.dataset.collapsed = String(cs.collapsed);
  }

  function buildOneListCard(session) {
    const id = session.id;
    const cs = cardState[id];
    const card = document.createElement('article');
    card.className = 'list-card term-card';
    card.dataset.id = id;
    card.style.setProperty('--tag', session.colorTag);
    card.dataset.collapsed = String(!!(cs && cs.collapsed));
    card.innerHTML = `
        <div class="list-card__rail" aria-hidden="true">
          <button class="list-swipe-btn list-swipe-btn--danger" data-rail="ctrlc" aria-label="Strg+C senden" title="Strg+C"><span class="rail-key">^C</span></button>
          <button class="list-swipe-btn" data-rail="clear" aria-label="Terminal leeren" title="Leeren">${icon('trash')}</button>
          <button class="list-swipe-btn" data-rail="notes" aria-label="Notizen & Todos" title="Notizen">${icon('note')}</button>
          <button class="list-swipe-btn list-swipe-btn--danger" data-rail="close" aria-label="Terminal beenden" title="Beenden">${icon('x')}</button>
          <button class="list-swipe-btn list-swipe-btn--accent" data-rail="files" aria-label="Dateien" title="Dateien">${icon('folder')}</button>
          <button class="list-swipe-btn${state.keysPanelOpen ? ' is-on' : ''}" data-rail="keys" aria-label="Tasten" title="Tasten">${icon('keyboard')}</button>
        </div>
        <div class="list-card__surface glass">
          ${cardHeaderHtml(session, id, true)}
          <div class="list-card__collapsible">
            ${cardBodyBlockHtml(id, true)}
            <button class="replay-pill" hidden>${icon('replay', 14)}<span>Session erneut abspielen</span></button>
            
            ${listInputRowHtml()}
          </div>
        </div>
      `;
    wireCardHeader(card, id);
    wireTerminalInputRow(card, id);
    wireKeysPanel(card, id);
    wireJumpOrb(card, id);
    restoreReplayPill(card, id);
    card.querySelector('.chevron-btn').addEventListener('click', e => { e.stopPropagation(); toggleListCardCollapse(id); });
    // Tapping anywhere in a list card marks it "current" for orb/tool actions.
    card.addEventListener('pointerdown', () => { state.activeCardId = id; setActive_syncDock(); });
    wireListSwipe(card, id);
    card.querySelector('.list-card__rail').addEventListener('click', e => {
      const btn = e.target.closest('[data-rail]');
      if (!btn) return;
      e.stopPropagation();
      handleRailAction(btn.dataset.rail, id);
      if (btn.dataset.rail !== 'jump') closeListRail(card);
    });
    return card;
  }

  function buildList() {
    const cardsHost = document.getElementById('termListCards');
    const cta = document.getElementById('addTerminalCta');
    if (!cardsHost || !cta) return;
    state.order.forEach(id => {
      const session = TMS_DATA.sessions.find(s => s.id === id);
      const card = buildOneListCard(session);
      cardsHost.insertBefore(card, cta);
      renderCardLines(id);
    });
    if (!state.activeCardId || state.order.indexOf(state.activeCardId) === -1) state.activeCardId = state.order[0] || null;
  }

  // Brings a terminal into view regardless of which view is active —
  // used by Spotlight's "Terminal" entries and the Dynamic Island's
  // session rows, both of which can fire from Stack or Liste.
  function focusTerminal(id) {
    if (state.order.indexOf(id) === -1) return;
    if (state.terminalView === 'list') {
      state.activeIndex = state.order.indexOf(id);
      state.activeFloat = state.activeIndex;
      state.activeCardId = id;
      const cs = cardState[id];
      if (cs && cs.collapsed) toggleListCardCollapse(id);
      const card = document.querySelector(`.list-card[data-id="${id}"]`);
      if (card) card.scrollIntoView({ block: 'center', behavior: 'smooth' });
    } else {
      setActive(state.order.indexOf(id));
    }
  }

  // Requirement 2 — "+ Neues Terminal": pushes a fresh session, paints it
  // into whichever view is mounted, and drops straight into inline rename
  // (same click-to-edit flow as an existing card's name field).
  function removeTerminalCard(id) {
    const idx = state.order.indexOf(id);
    if (idx === -1) return;
    state.order.splice(idx, 1);
    const si = TMS_DATA.sessions.findIndex(s => s.id === id);
    if (si !== -1) TMS_DATA.sessions.splice(si, 1);
    delete cardState[id];
    if (!state.order.length) { state.activeCardId = null; state.activeIndex = 0; }
    else {
      state.activeIndex = Math.min(idx, state.order.length - 1);
      state.activeCardId = state.order[state.activeIndex];
    }
    state.activeFloat = state.activeIndex;
    renderTerminalWorkspace();
    if (typeof syncDockTerminal === 'function') syncDockTerminal();
    if (typeof renderTermSwitcher === 'function') renderTermSwitcher();
    // The overview grid isn't rebuilt on every status tick (see the
    // no-flicker note below) — a closed card would sit as a ghost tile
    // until the panel was toggled shut and reopened.
    if (state.overviewOpen) renderOverview();
  }
  function closeTerminal(id) {
    // Demo: Karte weg. Die App beendet stattdessen die echte PTY-Session.
    removeTerminalCard(id);
    toast('Terminal beendet');
  }

  function addTerminal() {
    cancelDictation();
    setTimeout(() => {
      if (typeof syncDockTerminal === 'function') syncDockTerminal();
      if (typeof renderTermSwitcher === 'function') renderTermSwitcher();
    }, 0);
    const session = createTerminalSession();
    if (state.terminalView === 'list') {
      const cardsHost = document.getElementById('termListCards');
      const cta = document.getElementById('addTerminalCta');
      if (cardsHost && cta) {
        const card = buildOneListCard(session);
        cardsHost.insertBefore(card, cta);
        renderCardLines(session.id);
      }
      const scroller = document.getElementById('termList');
      if (scroller) scroller.scrollTo({ top: scroller.scrollHeight, behavior: 'smooth' });
      state.activeCardId = session.id;
    } else {
      const stackEl = document.getElementById('stack');
      if (stackEl) {
        const card = buildOneStackCard(session);
        stackEl.appendChild(card);
        renderCardLines(session.id);
      }
      setActive(state.order.length - 1);
    }
    renderRail();
    if (state.overviewOpen) renderOverview();
    toast(`${session.name} erstellt`);
    focusRenameForCard(session.id);
  }

  function focusRenameForCard(id) {
    const input = document.querySelector(`.term-card[data-id="${id}"] .card-name`);
    if (!input) return;
    input.readOnly = false;
    input.dataset.editing = '1';
    input.focus();
    input.select();
  }

  // Triple-tap (3 taps within ~600ms) unlocks inline editing of a readonly
  // field; single/double taps do nothing edit-related (double-tap hints).
  // Movement between taps resets the counter, so it never conflicts with the
  // Liste swipe-rail drag.
  function wireTripleTapEdit(el, onTriple) {
    if (!el) return;
    let taps = 0, timer = null, downX = 0, downY = 0, moved = false;
    el.addEventListener('pointerdown', e => { downX = e.clientX; downY = e.clientY; moved = false; });
    el.addEventListener('pointermove', e => { if (Math.abs(e.clientX - downX) > 8 || Math.abs(e.clientY - downY) > 8) moved = true; });
    el.addEventListener('click', e => {
      if (!el.readOnly) return; // already editing — let the tap place the caret
      e.stopPropagation();
      if (moved) { taps = 0; clearTimeout(timer); return; }
      taps++;
      clearTimeout(timer);
      if (taps >= 3) { taps = 0; onTriple(); return; }
      if (taps === 2) toast('Dreifach tippen zum Umbenennen');
      timer = setTimeout(() => { taps = 0; }, 600);
    });
  }

  function wireEditableField(input, field, session) {
    if (!input) return;
    wireTripleTapEdit(input, () => {
      input.readOnly = false;
      input.dataset.editing = '1';
      input.focus();
      input.select();
    });
    input.addEventListener('blur', () => {
      if (input.readOnly) return;
      input.readOnly = true;
      delete input.dataset.editing;
      const val = input.value.trim();
      session[field] = val || session[field];
      input.value = session[field];
      renderRail();
      if (state.overviewOpen) renderOverview();
    });
    input.addEventListener('keydown', e => {
      e.stopPropagation();
      if (e.key === 'Enter') input.blur();
      if (e.key === 'Escape') { input.value = session[field]; input.blur(); }
    });
  }

  function wireCardHeader(card, id) {
    const session = TMS_DATA.sessions.find(s => s.id === id);
    wireEditableField(card.querySelector('.card-name'), 'name', session);
    wireEditableField(card.querySelector('.card-desc'), 'description', session);
    const auto = card.querySelector('.auto-toggle');
    if (auto) auto.addEventListener('click', e => { e.stopPropagation(); toggleCardAutoApprove(id); });
  }

  // ============================================================
  // Feature 1 — terminal input row ($ command echo)
  // ============================================================
  function sendTerminalCommand(id, cmd) {
    cmd = cmd.trim();
    if (!cmd) return;
    const cs = cardState[id];
    cs.lines.push(`\x1b[2m$\x1b[0m ${cmd}`);
    cs.lines.push('\x1b[2m(Demo) Befehl an PTY gesendet\x1b[0m');
    renderCardLines(id); // reuses the existing escaped render + at-bottom auto-scroll pipeline
  }

  function wireTerminalInputRow(card, id) {
    const row = card.querySelector('.term-input-row');
    if (!row) return;
    const input = row.querySelector('.term-input');
    const sendBtn = row.querySelector('.term-send-btn');
    const micBtn = row.querySelector('.term-mic-btn');
    function doSend() {
      if (input.disabled) return; // mid-dictation
      sendTerminalCommand(id, input.value);
      input.value = '';
    }
    sendBtn.addEventListener('click', e => { e.stopPropagation(); doSend(); });
    input.addEventListener('click', e => e.stopPropagation());
    input.addEventListener('keydown', e => {
      e.stopPropagation();
      if (e.key === 'Enter') { e.preventDefault(); doSend(); }
    });
    micBtn.addEventListener('click', e => { e.stopPropagation(); startDictation(id); });
    // Stack primary-tier inline keys (^C / Esc) + „Tasten" toggle.
    row.querySelectorAll('.term-key[data-key]').forEach(btn => {
      btn.addEventListener('click', e => { e.stopPropagation(); handleTermKey(btn.dataset.key, id); });
    });
    const keysBtn = row.querySelector('.term-keys-btn');
    if (keysBtn) keysBtn.addEventListener('click', e => { e.stopPropagation(); toggleKeysPanel(); });
  }
  function handleTermKey(key, id) {
    if (key === 'ctrlc') sendCtrlC(id);
    else if (key === 'esc') flashKeyEcho('Esc');
    else if (key === 'tab') flashKeyEcho('Tab');
    else if (key === 'shifttab') flashKeyEcho('⇧Tab');
    else flashKeyEcho(key);
  }

  // ============================================================
  // Feature 2 — Diktierfunktion (per-card mic, distinct from the
  // Manager chat mic: own timers, own state, single-flight across cards).
  // ============================================================
  let dictationTimers = [];
  function setIslandMicBadge(show) {
    const badge = document.getElementById('statusMicBadge');
    if (badge) badge.hidden = !show;
  }
  function startDictation(cardId) {
    if (state.dictation.active) return; // one at a time
    const card = document.querySelector(`.term-card[data-id="${cardId}"]`);
    if (!card) return;
    const input = card.querySelector('.term-input');
    const micBtn = card.querySelector('.term-mic-btn');
    if (!input || !micBtn) return;
    const prevPlaceholder = input.placeholder;
    state.dictation = { active: true, cardId, phase: 'recording' };
    input.disabled = true;
    input.placeholder = 'Höre zu…';
    micBtn.classList.add('is-recording');
    setIslandMicBadge(true);
    const t1 = setTimeout(() => {
      state.dictation.phase = 'transcribing';
      micBtn.classList.remove('is-recording');
      micBtn.classList.add('is-transcribing');
      input.placeholder = 'Transkribiere…';
      setIslandMicBadge(false);
      const t2 = setTimeout(() => {
        micBtn.classList.remove('is-transcribing');
        input.disabled = false;
        input.placeholder = prevPlaceholder;
        input.value = TMS_DATA.demo.dictation;
        input.focus();
        try { input.setSelectionRange(input.value.length, input.value.length); } catch (e) { /* ignore */ }
        toast('Diktat eingefügt');
        state.dictation = { active: false, cardId: null, phase: null };
        dictationTimers = [];
      }, 700);
      dictationTimers = [t2];
    }, 1800);
    dictationTimers = [t1];
  }
  // Called whenever the Terminals screen is left (see show()) so an
  // in-flight recording/transcribing flow never resolves onto a screen
  // the user has already navigated away from.
  function cancelDictation() {
    if (!state.dictation.active) return;
    dictationTimers.forEach(t => clearTimeout(t));
    dictationTimers = [];
    const { cardId } = state.dictation;
    const card = document.querySelector(`.term-card[data-id="${cardId}"]`);
    if (card) {
      const micBtn = card.querySelector('.term-mic-btn');
      const input = card.querySelector('.term-input');
      if (micBtn) micBtn.classList.remove('is-recording', 'is-transcribing');
      if (input) { input.disabled = false; input.placeholder = 'Befehl eingeben…'; }
    }
    setIslandMicBadge(false);
    state.dictation = { active: false, cardId: null, phase: null };
  }

  // ============================================================
  // Feature 4 — per-session Notizen & Todos. Opened from the Liste swipe
  // rail (Notizen) and the 🔧 Werkzeuge sheet.
  // ============================================================
  const sessionSheetState = { sessionId: null, tab: 'notes' };

  function renderSessionSheetBody() {
    const session = TMS_DATA.sessions.find(s => s.id === sessionSheetState.sessionId);
    const body = document.getElementById('sessionSheetBody');
    if (!session || !body) return;
    if (sessionSheetState.tab === 'notes') {
      body.innerHTML = `
        <div class="notes-grid" id="sessionNotesList">${session.notes.length ? session.notes.map(n => `
          <div class="note-card">
            <div class="note-card__body">${escapeHtml(n.text)}</div>
            <div class="note-card__time">${escapeHtml(n.time)}</div>
          </div>`).join('') : '<div class="sheet-empty-hint">Noch keine Notizen</div>'}
        </div>
        <div class="sheet-add-row">
          <input type="text" id="sessionNoteInput" placeholder="Notiz hinzufügen…" autocomplete="off">
          <button class="sheet-add-btn" id="sessionNoteAddBtn" aria-label="Notiz hinzufügen">+</button>
        </div>
      `;
      document.getElementById('sessionNoteAddBtn').addEventListener('click', addSessionNote);
      document.getElementById('sessionNoteInput').addEventListener('keydown', e => { if (e.key === 'Enter') addSessionNote(); });
    } else {
      body.innerHTML = `
        <div class="todo-list" id="sessionTodosList">${session.todos.length ? session.todos.map(t => `
          <label class="todo-row">
            <input type="checkbox" data-todo="${t.id}" ${t.done ? 'checked' : ''}>
            <span class="todo-row__text${t.done ? ' is-done' : ''}">${escapeHtml(t.text)}</span>
          </label>`).join('') : '<div class="sheet-empty-hint">Noch keine Todos</div>'}
        </div>
        <div class="sheet-add-row">
          <input type="text" id="sessionTodoInput" placeholder="Todo hinzufügen…" autocomplete="off">
          <button class="sheet-add-btn" id="sessionTodoAddBtn" aria-label="Todo hinzufügen">+</button>
        </div>
      `;
      document.getElementById('sessionTodoAddBtn').addEventListener('click', addSessionTodo);
      document.getElementById('sessionTodoInput').addEventListener('keydown', e => { if (e.key === 'Enter') addSessionTodo(); });
      document.querySelectorAll('#sessionTodosList [data-todo]').forEach(cb => {
        cb.addEventListener('change', () => {
          const todo = session.todos.find(t => t.id === cb.dataset.todo);
          if (!todo) return;
          todo.done = cb.checked;
          cb.nextElementSibling.classList.toggle('is-done', todo.done);
        });
      });
    }
  }
  function addSessionNote() {
    const input = document.getElementById('sessionNoteInput');
    const text = input.value.trim();
    if (!text) return;
    const session = TMS_DATA.sessions.find(s => s.id === sessionSheetState.sessionId);
    session.notes.push({ id: 'n' + Date.now(), text, time: 'jetzt' });
    renderSessionSheetBody();
    document.getElementById('sessionNoteInput').focus();
  }
  function addSessionTodo() {
    const input = document.getElementById('sessionTodoInput');
    const text = input.value.trim();
    if (!text) return;
    const session = TMS_DATA.sessions.find(s => s.id === sessionSheetState.sessionId);
    session.todos.push({ id: 'd' + Date.now(), text, done: false });
    renderSessionSheetBody();
    document.getElementById('sessionTodoInput').focus();
  }
  function openSessionSheet(sessionId) {
    const session = TMS_DATA.sessions.find(s => s.id === sessionId);
    if (!session) return;
    sessionSheetState.sessionId = sessionId;
    sessionSheetState.tab = 'notes';
    document.querySelectorAll('#sessionSheetTabs button').forEach(b => b.classList.toggle('active', b.dataset.tab === 'notes'));
    document.getElementById('sessionSheetTitle').textContent = `${session.name} — Notizen & Todos`;
    renderSessionSheetBody();
    openSheet(document.getElementById('sessionSheetWrap'));
  }
  function wireSessionSheet() {
    const wrap = document.getElementById('sessionSheetWrap');
    document.getElementById('sessionSheetTabs').addEventListener('click', e => {
      const btn = e.target.closest('button[data-tab]');
      if (!btn) return;
      sessionSheetState.tab = btn.dataset.tab;
      document.querySelectorAll('#sessionSheetTabs button').forEach(b => b.classList.toggle('active', b === btn));
      renderSessionSheetBody();
    });
    document.getElementById('sessionSheetClose').addEventListener('click', () => closeSheet(wrap));
    wrap.querySelector('[data-close-session]').addEventListener('click', () => closeSheet(wrap));
  }

  // ── Sichtbarkeits-Gating ─────────────────────────────────────────────────
  // Nur sichtbare Karten werden ins DOM gemalt: der volle innerHTML-Rebuild
  // unter Backdrop-Blur ist der teuerste Dauerposten auf dem Gerät (Wärme).
  // Die Puffer ALLER Sessions laufen ungebremst weiter — was verdeckt Output
  // bekam, landet in __tmsPendingHidden und wird beim Sichtbarwerden über
  // flushHiddenCards() in einem Rutsch nachgezeichnet.
  function pendingHiddenCards() { return window.__tmsPendingHidden || (window.__tmsPendingHidden = {}); }
  window.__tmsCardVisible = function (id) {
    // WÄRME: Liegt das Handy in der Tasche, während Claude weiterläuft, malte die
    // Seite trotzdem jede Ausgabe — Rendern, Scrollen, Compositing für niemanden.
    // Der Emulator-Puffer läuft weiter (die Historie bleibt vollständig); gemalt
    // wird erst wieder beim Aufwachen, über denselben Weg wie unsichtbare Karten.
    //
    // NUR das native AppState-Signal aus React Native (TMSBridge.setAppActive)
    // zählt hier — bewusst NICHT document.hidden: dessen Semantik schwankt je
    // nach Android-WebView, und ein falsches "hidden" hieße: das Terminal malt
    // im Vordergrund nichts mehr. Im Zweifel wird gemalt, nicht eingefroren.
    if (window.__tmsAppInactive) return false;
    const pre = document.querySelector(`.card-body[data-card-id="${id}"]`);
    if (!pre) return false;
    const idx = state.order.indexOf(id);
    if (idx !== -1) {
      const screen = document.querySelector('[data-screen="terminals"]');
      if (!screen || screen.hidden) return false;
      // Im Stack zählt die Wisch-Position: beim Ziehen wird die Nachbarkarte
      // ab der Hälfte des Wegs lebendig, im Ruhezustand malt nur die aktive.
      if (state.terminalView === 'stack') return Math.abs(idx - state.activeFloat) < 0.75;
    }
    // Liste (und Cloud-Log-Viewer): alles außerhalb des Viewports ruht.
    const r = pre.getBoundingClientRect();
    return r.width > 0 && r.bottom > 0 && r.top < window.innerHeight;
  };
  function flushHiddenCards() {
    const pending = pendingHiddenCards();
    Object.keys(pending).forEach(id => {
      if (!document.querySelector(`.card-body[data-card-id="${id}"]`)) { delete pending[id]; return; }
      if (!window.__tmsCardVisible(id)) return;
      delete pending[id];
      renderCardLines(id);
    });
  }
  window.__tmsFlushHidden = flushHiddenCards;
  // Zusatzsignal, nie ein Riegel: Wird die Seite wieder sichtbar, zeichnen wir
  // nach. Ins Pausieren redet visibilitychange NICHT hinein (siehe __tmsCardVisible).
  document.addEventListener('visibilitychange', () => { if (!document.hidden) flushHiddenCards(); });
  // Liste: Karten, die in den Viewport scrollen, holen ihren Output nach.
  // Scroll-Events der .term-list erreichen weder Section noch document
  // zuverlässig (empirisch, auch capture nicht) — deshalb ein Wächter, der
  // NUR arbeitet, solange etwas aufgestaut ist: bei leerem Pending-Objekt
  // kostet der Tick nichts, es gibt keinen Dauer-Poll über den DOM.
  setInterval(() => {
    if (Object.keys(pendingHiddenCards()).length) flushHiddenCards();
  }, 400);

  // Ruhemodus: 15s ohne Interaktion -> body.is-calm, die Dauer-Pulse (Status-
  // Dots, Dock-Badge, Orb-Ring) pausieren und die GPU darf in den Leerlauf.
  // Jede Berührung weckt sie sofort wieder — der 1s-Riegel verhindert nur,
  // dass pointermove den Timer im Dauerfeuer neu aufzieht.
  let calmTimer = 0, calmLastBump = 0;
  function bumpCalm() {
    const now = performance.now();
    if (now - calmLastBump < 1000 && !document.body.classList.contains('is-calm')) return;
    calmLastBump = now;
    document.body.classList.remove('is-calm');
    clearTimeout(calmTimer);
    calmTimer = setTimeout(() => document.body.classList.add('is-calm'), 15000);
  }
  ['pointerdown', 'pointermove', 'keydown', 'wheel', 'touchstart'].forEach(ev =>
    window.addEventListener(ev, bumpCalm, { passive: true }));
  bumpCalm();

  function renderCardLines(id) {
    // Live-Terminals malt die Bridge selbst (farbig, inkrementell) — dieser
    // Klartext-Rebuild ist nur noch für Demo-Karten und den Cloud-Log-Viewer.
    if (window.__tmsBridgeRenders && window.__tmsBridgeRenders(id)) return;
    const pre = document.querySelector(`.card-body[data-card-id="${id}"]`);
    if (!pre) return;
    if (!window.__tmsCardVisible(id)) { pendingHiddenCards()[id] = 1; return; }
    delete pendingHiddenCards()[id];
    const cs = cardState[id];
    const atBottom = pre.scrollHeight - pre.scrollTop - pre.clientHeight < 24;
    // Did new lines actually arrive (streamed output), vs. a re-render for
    // some other reason (selection toggle, view rebuild)? Drives the ⏬
    // orb's "Neue Ausgabe" pulse below — comparing lengths is enough since
    // this function always fully re-renders from cs.lines regardless of cause.
    const grew = cs.lines.length > (cs._renderedLen || 0);
    cs._renderedLen = cs.lines.length;
    pre.innerHTML = cs.lines.map((line, i) => `<span class="term-line" data-i="${i}"><span class="term-line__text">${renderBufferLine(line)}</span></span>`).join('');
    // A card can be rebuilt fresh (view toggle, new terminal appended) well
    // after selection mode was toggled on — reapply it from cardState so
    // Stack ⇄ Liste never desyncs the "Aa" state visually.
    pre.classList.toggle('selection-mode', !!cs.selectionMode);
    if (cs.selection) {
      if (cs.selection.end >= cs.lines.length) { cs.selection = null; }
      else pre.querySelectorAll('.term-line').forEach((l, i) => l.classList.toggle('is-selected', i >= cs.selection.start && i <= cs.selection.end));
    }
    positionHandlesAndBubble(id);
    if (atBottom) pre.scrollTop = pre.scrollHeight;
    // Requirement 2 — Schnell-nach-unten: no-op for ids without a matching
    // .term-card (e.g. Cloud's XXL log viewer reuses this same function).
    updateJumpOrb(id, grew && !atBottom);
    // Only real terminal sessions feed the rail/overview previews — this same
    // function is reused for Cloud's XXL log viewer (id "cloud-<projectId>"),
    // whose 2s building-log appends would otherwise re-render the rail for nothing.
    if (TMS_DATA.sessions.some(s => s.id === id)) refreshPreviews();
  }

  // ============================================================
  // Requirement 2 — ⏬ Schnell-nach-unten (jump-to-bottom orb, per card in
  // Liste; active card only in Stack, mirroring how non-active stack cards
  // already suppress .card-body pointer-events in layoutStack()).
  // ============================================================
  function updateJumpOrb(id, pulse) {
    const card = document.querySelector(`.term-card[data-id="${id}"]`);
    if (!card) return; // not a terminal session card (e.g. Cloud log viewer) — nothing to do
    const btn = card.querySelector('.jump-bottom-orb');
    const pre = card.querySelector('.card-body');
    if (!btn || !pre) return;
    if (state.terminalView === 'stack' && state.order[state.activeIndex] !== id) {
      btn.classList.remove('show', 'pulse');
      return;
    }
    const atBottom = pre.scrollHeight - pre.scrollTop - pre.clientHeight < 24;
    btn.classList.toggle('show', !atBottom);
    if (atBottom) btn.classList.remove('pulse');
    else if (pulse) btn.classList.add('pulse');
  }

  function wireJumpOrb(card, id) {
    const pre = card.querySelector('.card-body');
    const btn = card.querySelector('.jump-bottom-orb');
    if (!pre || !btn) return;
    pre.addEventListener('scroll', () => updateJumpOrb(id));
    btn.addEventListener('click', e => {
      e.stopPropagation();
      btn.classList.remove('pulse');
      // Auto-follow re-arms itself: renderCardLines() recomputes "atBottom"
      // fresh from pre.scrollTop on every call, so once this scroll lands,
      // the next streamed line auto-scrolls again with no separate flag.
      pre.scrollTo({ top: pre.scrollHeight, behavior: 'smooth' });
    });
  }

  function updateStatusChip(id, status) {
    const session = TMS_DATA.sessions.find(s => s.id === id);
    if (!session) return;
    // Rail und Übersicht nur bei einem ECHTEN Statuswechsel neu bauen — dieser
    // Aufruf kam früher mit jedem Output-Häppchen (30×/s) und hat jedes Mal die
    // komplette Rail samt Glas-Layern weggeworfen und neu erzeugt.
    const changed = session.status !== status;
    session.status = status;
    const chip = document.querySelector(`.term-card[data-id="${id}"] .status-chip`);
    if (chip) { chip.dataset.status = status; chip.querySelector('.status-chip__label').textContent = STATUS_LABELS[status] || status; }
    if (changed) refreshPreviews();
  }

  function refreshPreviews() {
    renderRail();
    if (state.overviewOpen) renderOverview();
  }

  function layoutStack(floatIndex, opts) {
    opts = opts || {};
    const stackEl = document.getElementById('stack');
    if (!stackEl) return; // Liste is the active view — nothing to lay out
    if (opts.instant) stackEl.classList.add('is-dragging');
    state.order.forEach((id, i) => {
      const card = stackEl.querySelector(`.stack-card[data-id="${id}"]`);
      if (!card) return;
      const off = i - floatIndex;
      const ao = Math.min(Math.abs(off), 3);
      const tx = off * 42, ty = ao * 14, scale = 1 - ao * 0.075;
      const opacity = ao < 0.05 ? 1 : Math.max(0.12, 1 - ao * 0.42);
      card.style.transform = `translate3d(${tx}%, ${ty}px, 0) scale(${scale})`;
      card.style.opacity = opacity;
      card.style.zIndex = 100 - Math.round(ao * 10);
      card.classList.toggle('is-active', ao < 0.05);
      card.style.pointerEvents = ao < 1.5 ? 'auto' : 'none';
      const body = card.querySelector('.card-body');
      if (body) body.style.pointerEvents = ao < 0.05 ? 'auto' : 'none';
    });
    if (opts.instant) requestAnimationFrame(() => stackEl.classList.remove('is-dragging'));
    // Wisch/Scrub: eine Karte, die eben noch verdeckt war und jetzt in
    // Sichtweite rückt, malt hier ihren aufgestauten Output nach.
    flushHiddenCards();
  }

  function setActive_syncDock() { if (typeof syncDockTerminal === 'function') syncDockTerminal(); }
  function setActive(index) {
    index = clamp(index, 0, state.order.length - 1);
    state.activeIndex = index;
    state.activeFloat = index;
    state.activeCardId = state.order[index];
    layoutStack(index);
    renderRail();
    if (typeof tsRest === 'function' && tsVisible()) tsRest(index);
    // Switching the active card in Stack changes which card's ⏬ orb (if
    // any) is allowed to show — re-evaluate every card, cheap at this count.
    state.order.forEach(id => updateJumpOrb(id));
  }

  function wireStackDrag() {
    const stackEl = document.getElementById('stack');
    let dragging = false, pointerId = null, startX = 0, startY = 0, startFloat = 0, moved = false, cardWidthPx = 300;

    stackEl.addEventListener('pointerdown', e => {
      if (state.overviewOpen) return;
      const card = e.target.closest('.stack-card');
      if (!card) return;
      const idx = state.order.indexOf(card.dataset.id);
      const isActiveCard = idx === Math.round(state.activeFloat);
      if (isActiveCard && e.target.closest('.card-body-shell, .card-name, .card-desc, .status-chip, .auto-toggle, .replay-pill, .keys-panel, .term-input-row')) return;
      pointerId = e.pointerId; startX = e.clientX; startY = e.clientY; startFloat = state.activeFloat; moved = false;
      cardWidthPx = card.getBoundingClientRect().width || 300;
      dragging = true;
      try { stackEl.setPointerCapture(pointerId); } catch (err) { /* unsupported */ }
    });
    stackEl.addEventListener('pointermove', e => {
      if (!dragging || e.pointerId !== pointerId) return;
      const dx = e.clientX - startX, dy = e.clientY - startY;
      if (!moved) {
        if (Math.abs(dx) < 6 || Math.abs(dx) < Math.abs(dy)) return;
        moved = true;
        stackEl.classList.add('is-dragging');
      }
      state.activeFloat = clamp(startFloat - dx / cardWidthPx, -0.4, state.order.length - 1 + 0.4);
      layoutStack(state.activeFloat);
    });
    function endDrag(e) {
      if (!dragging) return;
      dragging = false;
      try { stackEl.releasePointerCapture(pointerId); } catch (err) { /* already released */ }
      stackEl.classList.remove('is-dragging');
      if (moved) {
        state.suppressClick = true;
        setTimeout(() => { state.suppressClick = false; }, 30);
        setActive(Math.round(state.activeFloat));
      } else {
        const card = e.target.closest && e.target.closest('.stack-card');
        if (card) {
          const idx = state.order.indexOf(card.dataset.id);
          if (idx !== state.activeIndex) setActive(idx);
        }
      }
    }
    stackEl.addEventListener('pointerup', endDrag);
    stackEl.addEventListener('pointercancel', endDrag);
  }

  document.addEventListener('keydown', e => {
    const screen = document.querySelector('[data-screen="terminals"]');
    if (screen.hidden || state.overviewOpen || state.terminalView !== 'stack') return;
    if (document.activeElement && document.activeElement.tagName === 'INPUT') return;
    if (e.key === 'ArrowRight') setActive(state.activeIndex + 1);
    else if (e.key === 'ArrowLeft') setActive(state.activeIndex - 1);
  });

  // ============================================================
  // Overview (⊞) — 2x2 grid
  // ============================================================
  function renderOverview() {
    const grid = document.getElementById('overviewGrid');
    grid.innerHTML = '';
    state.order.forEach((id, i) => {
      const session = TMS_DATA.sessions.find(s => s.id === id);
      const cs = cardState[id];
      const tile = document.createElement('div');
      tile.className = 'overview-tile glass';
      const previewLines = window.__tmsPreview ? window.__tmsPreview(id, 5) : cs.lines.slice(-4).map(l => ansiToHtml(l)).join('<br>');
      tile.dataset.id = id;
      tile.innerHTML = `
        <div class="overview-tile__head"><span class="card-tag" style="background:${session.colorTag}"></span><span class="overview-tile__name">${escapeHtml(session.name)}</span><span class="status-chip" data-status="${session.status}"><span class="dot"></span></span><button class="overview-tile__close" data-close-tile aria-label="Terminal beenden" title="Beenden">${icon('x', 11)}</button></div>
        <div class="overview-tile__body">${previewLines}</div>
      `;
      tile.addEventListener('click', () => { toggleOverview(false); focusTerminal(id); });
      const closeBtn = tile.querySelector('[data-close-tile]');
      closeBtn.addEventListener('click', e => {
        e.stopPropagation();
        if (!closeBtn.classList.contains('is-armed')) {
          closeBtn.classList.add('is-armed');
          toast('Nochmal tippen: Terminal beenden');
          setTimeout(() => closeBtn.classList.remove('is-armed'), 3000);
          return;
        }
        closeBtn.classList.remove('is-armed');
        closeTerminal(id);
      });
      grid.appendChild(tile);
    });
  }
  function toggleOverview(force) {
    state.overviewOpen = typeof force === 'boolean' ? force : !state.overviewOpen;
    const grid = document.getElementById('overviewGrid');
    const btn = document.getElementById('overviewBtn');
    const wrap = document.getElementById('termBodyWrap');
    if (state.overviewOpen) {
      renderOverview();
      grid.querySelectorAll('.overview-tile').forEach((t, i) => t.style.setProperty('--i', Math.min(i, 12)));
      grid.classList.add('is-open'); btn.classList.add('is-on'); if (wrap) wrap.classList.add('overview-active');
    }
    else { grid.classList.remove('is-open'); btn.classList.remove('is-on'); if (wrap) wrap.classList.remove('overview-active'); }
  }

  // ============================================================
  // Rail (expanded ≥700px) — mini previews, drag-to-swap
  // ============================================================
  let railStale = false;
  function renderRail() {
    const rail = document.getElementById('rail');
    if (!rail) return;
    // Auf dem Frontdisplay ist die Rail display:none (offsetParent == null):
    // dort weder Puffer-Previews rechnen noch Glas-Items bauen. Beim
    // Auffalten holt der resize-Listener unten den Aufbau nach.
    if (!rail.offsetParent) { railStale = true; return; }
    railStale = false;
    rail.innerHTML = '';
    state.order.forEach((id, i) => {
      const session = TMS_DATA.sessions.find(s => s.id === id);
      const cs = cardState[id];
      const isActive = i === state.activeIndex;
      const item = document.createElement('div');
      item.className = 'rail-item glass' + (isActive ? ' is-active' : '');
      item.dataset.id = id; item.dataset.index = i;
      const preview = window.__tmsPreview ? window.__tmsPreview(id, 2) : cs.lines.slice(-2).map(l => ansiToHtml(l)).join('<br>');
      item.innerHTML = `
        <div class="rail-item__top"><span class="card-tag" style="background:${session.colorTag}"></span><span class="rail-item__name">${escapeHtml(session.name)}</span></div>
        <div class="rail-item__preview">${preview}</div>
      `;
      item.addEventListener('click', () => { if (!isActive) setActive(i); });
      if (!isActive) wireRailDrag(item);
      rail.appendChild(item);
    });
  }

  window.addEventListener('resize', () => {
    const rail = document.getElementById('rail');
    if (railStale && rail && rail.offsetParent) renderRail();
  });

  function wireRailDrag(item) {
    item.addEventListener('pointerdown', e => {
      const startX = e.clientX, startY = e.clientY;
      const pointerId = e.pointerId;
      let dragging = false, ghost = null, cleaned = false;
      const fromId = item.dataset.id;
      const fromIndex = state.order.indexOf(fromId);
      function clearDropTargets() { document.querySelectorAll('.rail-item.drop-target, .stack-pane.drop-target').forEach(el => el.classList.remove('drop-target')); }
      function onMove(ev) {
        if (ev.pointerId !== pointerId) return;
        const dx = ev.clientX - startX, dy = ev.clientY - startY;
        if (!dragging) {
          if (Math.abs(dx) < 6 && Math.abs(dy) < 6) return;
          dragging = true;
          item.classList.add('is-dragging');
          ghost = document.createElement('div');
          ghost.className = 'rail-drop-ghost glass glass--strong';
          ghost.textContent = TMS_DATA.sessions.find(s => s.id === fromId).name;
          document.body.appendChild(ghost);
        }
        if (ghost) { ghost.style.left = ev.clientX + 12 + 'px'; ghost.style.top = ev.clientY + 8 + 'px'; }
        clearDropTargets();
        const under = document.elementFromPoint(ev.clientX, ev.clientY);
        const targetItem = under && under.closest('.rail-item');
        const targetPane = under && under.closest('.stack-pane');
        if (targetItem && targetItem !== item) targetItem.classList.add('drop-target');
        else if (targetPane) targetPane.classList.add('drop-target');
      }
      function cleanup() {
        if (cleaned) return;
        cleaned = true;
        document.removeEventListener('pointermove', onMove);
        document.removeEventListener('pointerup', onUp);
        document.removeEventListener('pointercancel', onCancel);
        item.removeEventListener('lostpointercapture', onLostCapture);
        try { item.releasePointerCapture(pointerId); } catch (err) { /* already released */ }
        if (ghost) { ghost.remove(); ghost = null; }
        item.classList.remove('is-dragging');
        clearDropTargets();
      }
      function onUp(ev) {
        const wasDragging = dragging;
        cleanup();
        if (!wasDragging) return;
        const under = document.elementFromPoint(ev.clientX, ev.clientY);
        const targetItem = under && under.closest('.rail-item');
        const targetPane = under && under.closest('.stack-pane');
        if (targetItem && targetItem !== item) { swapOrder(fromIndex, Number(targetItem.dataset.index)); toast('Getauscht ✓'); }
        else if (targetPane) { swapOrder(fromIndex, state.activeIndex); toast('Getauscht ✓'); }
      }
      function onCancel() { cleanup(); }
      function onLostCapture() { cleanup(); }
      try { item.setPointerCapture(pointerId); } catch (err) { /* unsupported */ }
      document.addEventListener('pointermove', onMove);
      document.addEventListener('pointerup', onUp);
      document.addEventListener('pointercancel', onCancel);
      item.addEventListener('lostpointercapture', onLostCapture);
    });
  }

  function swapOrder(a, b) {
    if (a === b) return;
    const tmp = state.order[a]; state.order[a] = state.order[b]; state.order[b] = tmp;
    layoutStack(state.activeIndex, { instant: true });
    renderRail();
    if (state.overviewOpen) renderOverview();
  }

  // ============================================================
  // Live Claude session (TMSSim) — session t1, auto-starts on load
  // so the Dynamic Island has something to report from any screen.
  // ============================================================
  function appendOutChunk(cs, chunk) {
    const pieces = chunk.split('\n');
    if (pieces[pieces.length - 1] === '') pieces.pop();
    cs.lines.push(...pieces);
  }

  let liveSimStarted = false;
  function initLiveSession() {
    if (liveSimStarted) return;
    liveSimStarted = true;
    const session = TMS_DATA.sessions.find(s => s.live);
    const id = session.id;
    const cs = cardState[id];
    const sim = TMSSim.createSession(session.script, { autoApprove: false });
    cs.mainSim = sim;
    cs.sim = sim;
    sim.on('out', chunk => {
      appendOutChunk(cs, chunk);
      renderCardLines(id);
      if (state.islandOpen) renderIslandExpanded();
    });
    sim.on('status', status => {
      updateStatusChip(id, status);
      if (status === 'running') setIslandActivity('live', `Claude arbeitet · ${session.name}`);
      else if (status === 'done') setIslandActivity('ok', 'Fertig');
      if (state.islandOpen) renderIslandExpanded();
    });
    sim.on('prompt', data => {
      handlePrompt(id, data);
    });
    // The main script's own 'done' both offers the replay affordance and,
    // a few seconds later, kicks off the question continuation (demo.
    // questionScript) — this fires on the initial run AND on every replay,
    // since replaySession() restarts mainSim from scratch (see below).
    sim.on('done', () => { showReplay(id); scheduleQuestionScript(id); });
    sim.start();
  }

  // A few seconds after t1's main script finishes, play the short follow-up
  // question continuation (demo.questionScript). Tracked in cs.questionTimer
  // so re-arming is idempotent (clearTimeout of a stale/previous timer before
  // scheduling a new one) — replaySession() also clears it outright so a
  // manual replay never leaves an orphaned timer racing the fresh run.
  function scheduleQuestionScript(id) {
    const cs = cardState[id];
    clearTimeout(cs.questionTimer);
    cs.questionTimer = setTimeout(() => startQuestionScript(id), 2600);
  }
  function startQuestionScript(id) {
    const cs = cardState[id];
    cs.questionTimer = null;
    const session = TMS_DATA.sessions.find(s => s.id === id);
    const qSim = TMSSim.createSession(TMS_DATA.demo.questionScript, { autoApprove: false });
    cs.questionSim = qSim;
    cs.sim = qSim; // now the active driver for respond()/reset()-based helpers
    qSim.on('out', chunk => {
      appendOutChunk(cs, chunk);
      renderCardLines(id);
      if (state.islandOpen) renderIslandExpanded();
    });
    qSim.on('status', status => {
      updateStatusChip(id, status);
      if (status === 'running') setIslandActivity('live', `Claude arbeitet · ${session.name}`);
      else if (status === 'done') setIslandActivity('ok', 'Fertig');
      if (state.islandOpen) renderIslandExpanded();
    });
    qSim.on('prompt', data => handlePrompt(id, data));
    qSim.on('done', () => showReplay(id));
    updateStatusChip(id, 'running');
    setIslandActivity('live', `Claude arbeitet · ${session.name}`);
    qSim.start();
  }

  // Prompt lifecycle. A prompt pauses the sim and records the pending request
  // on the owning card.
  //
  // kind:'question' prompts are structurally exempt from Auto-Approve — the
  // check happens here, first, before cs.autoApprove is even consulted, so a
  // question can never take the auto-approve branch no matter what the
  // terminal's ⚡ Auto toggle is set to. They always render the question
  // sheet (or the pending dock badge) instead.
  //
  // Tool-permission prompts keep the original behaviour: if that terminal's
  // Auto-Approve is ON they resolve automatically (with a toast so the user
  // SEES it); otherwise the permission sheet is shown — but ONLY while the
  // Terminals screen is active. syncPromptSheets re-homes/hides the relevant
  // sheet as the user navigates; the request stays pending either way.
  function handlePrompt(id, data) {
    const cs = cardState[id];
    const session = TMS_DATA.sessions.find(s => s.id === id);
    cs.pendingPrompt = data;
    state.pendingPromptId = id;
    if (data && data.kind === 'question') {
      setIslandActivity('warn', `Rückfrage · ${session.name}`);
      syncPromptSheets();
      updatePendingBadge();
      return;
    }
    setIslandActivity('warn', `Claude wartet · ${session.name}`);
    if (cs.autoApprove) {
      autoApproveResolve(id, data, session);
    } else {
      syncPromptSheets();
      updatePendingBadge();
    }
  }
  function autoApproveResolve(id, data, session) {
    const cs = cardState[id];
    clearTimeout(cs.autoTimer);
    cs.autoTimer = setTimeout(() => {
      if (!cs.pendingPrompt || !cs.sim) return;
      appendOutChunk(cs, '  ⎿ ✔ Auto-Approve\n');
      renderCardLines(id);
      cs.pendingPrompt = null;
      if (state.pendingPromptId === id) state.pendingPromptId = null;
      toast(`Auto-Approve: ${data.tool} erlaubt — ${session.name}`);
      setIslandActivity('live', `Claude arbeitet · ${session.name}`);
      updatePendingBadge();
      cs.sim.respond();
    }, 700);
  }
  function renderPermSheet(id) {
    const cs = cardState[id];
    const data = cs && cs.pendingPrompt;
    if (!data) return;
    const session = TMS_DATA.sessions.find(s => s.id === id);
    document.getElementById('permSourceDot').style.background = session ? session.colorTag : 'var(--warn)';
    document.getElementById('permSourceName').textContent = session ? session.name : '';
    document.getElementById('permTool').textContent = data.tool;
    document.getElementById('permTarget').textContent = data.target || '';
    document.getElementById('permQuestion').textContent = data.question || 'Erlauben?';
    document.getElementById('permAutoBtn').setAttribute('aria-pressed', String(cs.autoApprove));
  }
  // Show the permission sheet iff a non-auto, non-question prompt is pending
  // AND Terminals is active.
  function syncPermSheet() {
    const id = state.pendingPromptId;
    const cs = id ? cardState[id] : null;
    const isQuestion = !!(cs && cs.pendingPrompt && cs.pendingPrompt.kind === 'question');
    const termActive = !document.querySelector('[data-screen="terminals"]').hidden;
    const shouldShow = !!(cs && cs.pendingPrompt && !isQuestion && !cs.autoApprove && termActive && !document.body.classList.contains('is-locked'));
    if (shouldShow) {
      renderPermSheet(id);
      if (permWrap.hidden) openSheet(permWrap);
    } else if (!permWrap.hidden) {
      closeSheet(permWrap);
    }
  }
  // Show the question sheet iff a question prompt is pending AND Terminals is
  // active. Only (re-)rendered on the hidden→visible transition so an
  // in-progress selection/comment survives incidental re-syncs while it's
  // already open (e.g. a header Auto toggle elsewhere triggering a resync).
  function syncQuestionSheet() {
    const id = state.pendingPromptId;
    const cs = id ? cardState[id] : null;
    const isQuestion = !!(cs && cs.pendingPrompt && cs.pendingPrompt.kind === 'question');
    const termActive = !document.querySelector('[data-screen="terminals"]').hidden;
    const shouldShow = !!(isQuestion && termActive && !document.body.classList.contains('is-locked'));
    if (shouldShow) {
      if (questionWrap.hidden) { renderQuestionSheet(id); openSheet(questionWrap); }
    } else if (!questionWrap.hidden) {
      closeSheet(questionWrap);
    }
  }
  // The two sheets are mutually exclusive (one prompt pending at a time) but
  // always reconciled together so navigation/toggle call sites don't need to
  // know which kind is currently pending.
  function syncPromptSheets() {
    syncPermSheet();
    syncQuestionSheet();
  }
  function renderQuestionSheet(id) {
    const cs = cardState[id];
    const data = cs && cs.pendingPrompt;
    if (!data) return;
    const session = TMS_DATA.sessions.find(s => s.id === id);
    document.getElementById('questionSourceDot').style.background = session ? session.colorTag : 'var(--warn)';
    document.getElementById('questionSourceName').textContent = session ? session.name : '';
    document.getElementById('questionText').textContent = data.question || '';
    const inputType = data.multiSelect ? 'checkbox' : 'radio';
    const optionsEl = document.getElementById('questionOptions');
    optionsEl.innerHTML = (data.options || []).map(o => `
      <label class="question-option-row">
        <input type="${inputType}" name="questionOpt" value="${escapeHtml(o.id)}">
        <span class="question-option-row__text">
          <span class="question-option-row__label">${escapeHtml(o.label)}</span>
          ${o.description ? `<span class="question-option-row__desc">${escapeHtml(o.description)}</span>` : ''}
        </span>
      </label>`).join('');
    const submitBtn = document.getElementById('questionSubmitBtn');
    submitBtn.disabled = true;
    optionsEl.querySelectorAll('input').forEach(inp => {
      inp.addEventListener('change', () => { submitBtn.disabled = !optionsEl.querySelector('input:checked'); });
    });
    const commentEl = document.getElementById('questionComment');
    commentEl.value = '';
    commentEl.closest('.question-comment-row').hidden = data.allowComment === false;
  }
  // Subtle pending hint on the dock's Terminals tab when the relevant sheet is
  // hidden (user is elsewhere) but a request is still waiting. Question
  // prompts are never auto-resolved, so they're always "pending" here
  // regardless of the terminal's Auto-Approve flag.
  function updatePendingBadge() {
    const id = state.pendingPromptId;
    const cs = id ? cardState[id] : null;
    const isQuestion = !!(cs && cs.pendingPrompt && cs.pendingPrompt.kind === 'question');
    const pending = !!(cs && cs.pendingPrompt && (isQuestion || !cs.autoApprove));
    const termActive = !document.querySelector('[data-screen="terminals"]').hidden;
    const badge = document.getElementById('termPendingBadge');
    if (badge) badge.hidden = !(pending && !termActive);
  }
  function resolvePrompt(approved) {
    const id = state.pendingPromptId;
    if (!id) return;
    const cs = cardState[id];
    const session = TMS_DATA.sessions.find(s => s.id === id);
    clearTimeout(cs.autoTimer);
    cs.pendingPrompt = null;
    state.pendingPromptId = null;
    closeSheet(permWrap);
    updatePendingBadge();
    if (approved) {
      cs.sim.respond();
      setIslandActivity('live', `Claude arbeitet · ${session.name}`);
    } else {
      appendOutChunk(cs, '  ⎿ ✖ Abgelehnt — Aktion gestoppt\n');
      renderCardLines(id);
      updateStatusChip(id, 'idle');
      setIslandActivity('', 'Bereit');
      showReplay(id);
    }
  }
  // Answers a pending question prompt: echoes the selection (+ optional
  // comment) into the owning terminal's stream as a dim line, then resumes
  // playback. Text goes through appendOutChunk → renderCardLines →
  // renderBufferLine → ansiToHtml, which escapeHtml()s every non-ANSI
  // segment — labels and the free-text comment are never trusted as HTML.
  function submitQuestionAnswer() {
    const id = state.pendingPromptId;
    if (!id) return;
    const cs = cardState[id];
    const data = cs.pendingPrompt;
    if (!data) return;
    const optionsEl = document.getElementById('questionOptions');
    const checked = Array.from(optionsEl.querySelectorAll('input:checked'));
    if (!checked.length) return; // Senden stays disabled until ≥1 option is chosen
    const chosenIds = checked.map(inp => inp.value);
    const chosenLabels = (data.options || []).filter(o => chosenIds.includes(o.id)).map(o => o.label);
    const comment = document.getElementById('questionComment').value.trim();
    const session = TMS_DATA.sessions.find(s => s.id === id);
    cs.pendingPrompt = null;
    state.pendingPromptId = null;
    closeSheet(questionWrap);
    updatePendingBadge();
    let echo = `  ⎿ › Antwort: ${chosenLabels.join(', ')}`;
    if (comment) echo += ` — Anmerkung: "${comment}"`;
    appendOutChunk(cs, `\x1b[2m${echo}\x1b[0m\n`);
    renderCardLines(id);
    setIslandActivity('live', `Claude arbeitet · ${session.name}`);
    cs.sim.respond();
  }

  // Per-terminal Auto-Approve toggle (header pill + the sheet's Auto button).

    // Structural guard, same as handlePrompt(): a pending question prompt is
    // never touched by an auto-approve arm/disarm — toggling the flag here
    // only changes what happens to FUTURE tool-permission prompts on this
    // terminal, it must never resolve (or otherwise react to) an already-open
    // question sheet.
    if (cs.pendingPrompt && cs.pendingPrompt.kind !== 'question') {
      const session = TMS_DATA.sessions.find(s => s.id === id);
      if (cs.autoApprove) { syncPromptSheets(); updatePendingBadge(); autoApproveResolve(id, cs.pendingPrompt, session); }

    const btn = document.querySelector(`.term-card[data-id="${id}"] .replay-pill`);

  function replaySession(id) {
    const cs = cardState[id];
    const session = TMS_DATA.sessions.find(s => s.id === id);
    clearTimeout(cs.autoTimer);
    // Cancel/discard anything left over from a previous run's question
    // continuation so it can never fire into (or drive respond()/reset() for)
    // the fresh replay: clear the arm-timer, and reset() the abandoned
    // questionSim itself (bumps its internal epoch) so any of ITS still-live
    // setTimeout callbacks become no-ops instead of firing late.
    clearTimeout(cs.questionTimer);
    cs.questionTimer = null;
    if (cs.questionSim) { cs.questionSim.reset(); cs.questionSim = null; }

    // question playback — mainSim's own 'done' handler re-schedules the

    cs.sim = cs.mainSim;

  // ============================================================
  // Touch text-selection: glowing handles + copy bubble
  // ============================================================
  function handleLineTap(pre, line) {
    const id = pre.dataset.cardId;
    const cs = cardState[id];
    const i = Number(line.dataset.i);
    if (cs.selection && cs.selection.start === i && cs.selection.end === i) { clearSelection(id); return; }
    cs.selection = { start: i, end: i };
    pre.querySelectorAll('.term-line').forEach((l, idx) => l.classList.toggle('is-selected', idx === i));
    positionHandlesAndBubble(id);
  }
  function makeHandle(kind, cardId) {
    const el = document.createElement('div');
    el.className = `sel-handle sel-handle--${kind}`;
    el.addEventListener('pointerdown', e => startHandleDrag(e, cardId, kind));
    return el;
  }
  function startHandleDrag(e, cardId, kind) {
    e.stopPropagation();
    const handle = e.currentTarget;
    handle.setPointerCapture(e.pointerId);
    const pre = document.querySelector(`.card-body[data-card-id="${cardId}"]`);
    function onMove(ev) {
      const el = document.elementFromPoint(ev.clientX, ev.clientY);
      const line = el && el.closest && el.closest('.term-line');
      if (!line) return;
      const idx = Number(line.dataset.i);
      const cs = cardState[cardId];
      if (!cs.selection) return;
      if (kind === 'start') cs.selection.start = Math.min(idx, cs.selection.end);
      else cs.selection.end = Math.max(idx, cs.selection.start);
      pre.querySelectorAll('.term-line').forEach((l, i) => l.classList.toggle('is-selected', i >= cs.selection.start && i <= cs.selection.end));
      positionHandlesAndBubble(cardId);
    }
    function onUp(ev) {
      try { handle.releasePointerCapture(ev.pointerId); } catch (err) { /* already released */ }
      handle.removeEventListener('pointermove', onMove);
      handle.removeEventListener('pointerup', onUp);
      handle.removeEventListener('pointercancel', onUp);
    }
    handle.addEventListener('pointermove', onMove);
    handle.addEventListener('pointerup', onUp);
    // Same teardown on pointercancel — without it an interrupted touch drag
    // (incoming call, palm rejection, browser gesture claim) leaked the
    // move/up listeners and stacked a duplicate handler set onto the handle
    // on every later drag.
    handle.addEventListener('pointercancel', onUp);
  }
  function makeBubble(cardId) {
    const el = document.createElement('button');
    el.className = 'copy-bubble';
    el.textContent = 'Kopieren';
    el.addEventListener('click', e => {
      e.stopPropagation();
      const cs = cardState[cardId];
      if (!cs.selection) return;
      const pre = document.querySelector(`.card-body[data-card-id="${cardId}"]`);
      const lines = [...pre.querySelectorAll('.term-line')].slice(cs.selection.start, cs.selection.end + 1);
      const text = lines.map(l => l.querySelector('.term-line__text').textContent).join('\n');
      copyText(text);
      toast('Kopiert ✓');
      clearSelection(cardId);
    });
    return el;
  }
  function positionHandlesAndBubble(cardId) {
    const pre = document.querySelector(`.card-body[data-card-id="${cardId}"]`);
    if (!pre) return;
    const cs = cardState[cardId];
    let hs = pre.querySelector('.sel-handle--start');
    let he = pre.querySelector('.sel-handle--end');
    let bubble = pre.querySelector('.copy-bubble');
    if (!cs.selection) { [hs, he, bubble].forEach(el => el && el.remove()); return; }
    if (!hs) { hs = makeHandle('start', cardId); pre.appendChild(hs); }
    if (!he) { he = makeHandle('end', cardId); pre.appendChild(he); }
    if (!bubble) { bubble = makeBubble(cardId); pre.appendChild(bubble); }
    const startLine = pre.querySelector(`.term-line[data-i="${cs.selection.start}"]`);
    const endLine = pre.querySelector(`.term-line[data-i="${cs.selection.end}"]`);
    if (!startLine || !endLine) return;
    const startText = startLine.querySelector('.term-line__text');
    const endText = endLine.querySelector('.term-line__text');
    hs.style.top = (startLine.offsetTop + startLine.offsetHeight) + 'px';
    hs.style.left = startText.offsetLeft + 'px';
    he.style.top = (endLine.offsetTop + endLine.offsetHeight) + 'px';
    he.style.left = (endText.offsetLeft + endText.offsetWidth) + 'px';
    bubble.style.top = Math.max(0, startLine.offsetTop - 38) + 'px';
    bubble.style.left = Math.min(startText.offsetLeft, endText.offsetLeft) + 'px';
  }
  function clearSelection(cardId) {
    const cs = cardState[cardId];
    cs.selection = null;
    const pre = document.querySelector(`.card-body[data-card-id="${cardId}"]`);
    if (!pre) return;
    pre.querySelectorAll('.term-line.is-selected').forEach(l => l.classList.remove('is-selected'));
    positionHandlesAndBubble(cardId);
  }

  // Delegated: wrapped-link copy (outside selection mode) + line-tap selection (inside selection mode)
  document.addEventListener('click', e => {
    if (state.suppressClick) return;
    const link = e.target.closest('.wrapped-link');

      }

    const pre = e.target.closest('.card-body.selection-mode');

      const line = e.target.closest('.term-line');

  // Toast variant with an inline "Rückgängig" action.
  function toastWithUndo(message, onUndo, duration) {
    duration = duration || 4000;
    const host = document.getElementById('toasts');
    const el = document.createElement('div');
    el.className = 'toast toast--undo';
    el.innerHTML = `<span class="toast__msg">${escapeHtml(message)}</span><span class="toast__dash" aria-hidden="true">—</span><button type="button" class="toast__undo-btn">Rückgängig</button>`;
    host.appendChild(el);
    requestAnimationFrame(() => el.classList.add('show'));
    let dismissed = false;
    const dismiss = () => {
      if (dismissed) return;
      dismissed = true;
      el.classList.remove('show');
      setTimeout(() => el.remove(), 220);
    };
    const timer = setTimeout(dismiss, duration);
    el.querySelector('.toast__undo-btn').addEventListener('click', () => {
      clearTimeout(timer);
      dismiss();
      onUndo();
    });

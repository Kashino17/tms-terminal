  .cpu-bar__fill { position: absolute; inset: 0; width: var(--pct, 0%); background: var(--accent); border-radius: 3px; }

  .notes-grid { display: flex; flex-direction: column; gap: 10px; }
  .note-card { padding: 13px; background: rgba(var(--overlay-rgb),.05); border: 1px solid var(--glass-border); border-radius: 14px; }
  .note-card__title { font: 700 13px var(--font-ui); margin-bottom: 4px; }
  .note-card__body { font-size: 12.5px; color: var(--text-dim); line-height: 1.5; }
  .note-card__time { margin-top: 7px; font: 11px var(--font-mono); color: var(--text-dim); }

  .shot-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin-bottom: 14px; }
  .shot-tile { aspect-ratio: 9 / 16; border-radius: 14px; background: linear-gradient(160deg, rgba(var(--overlay-rgb),.10), rgba(var(--overlay-rgb),.02)); border: 1px solid var(--glass-border); }
  .shot-flash { position: fixed; inset: 0; background: var(--flash); opacity: 0; pointer-events: none; z-index: 110; transition: opacity 90ms ease-out; }
  .shot-flash.is-flashing { opacity: .85; transition: opacity 40ms ease-out; }

  .hit-badge { font: 700 11px var(--font-mono); color: var(--accent); background: rgba(var(--accent-rgb),var(--chip-a)); padding: 3px 8px; border-radius: 999px; flex: none; }

  /* ---------- Sub-tabs (Manager, Cloud detail) ---------- */
  .subtabs { display: flex; gap: 6px; margin: 4px 0 14px; flex-wrap: wrap; }
  .subtabs button { padding: 7px 14px; border-radius: 999px; font: 600 12px var(--font-ui); color: var(--text-dim); background: rgba(var(--overlay-rgb),.05); border: 1px solid var(--glass-border); cursor: pointer; transition: color 200ms var(--spring), background 200ms var(--spring), border-color 200ms var(--spring); }
  .subtabs button.active { color: var(--text); background: rgba(var(--accent-rgb),.18); border-color: rgba(var(--accent-rgb),.4); }

  /* ---------- Manager screen ---------- */
  section[data-screen="manager"]:not([hidden]) { display: flex; flex-direction: column; overflow: hidden; }
  .manager-col { flex: 1; min-height: 0; display: flex; flex-direction: column; width: 100%; max-width: 640px; margin: 0 auto; }
  .manager-view { flex: 1; min-height: 0; display: flex; flex-direction: column; overflow: hidden; }
  .chat-scroll:not([hidden]) { flex: 1; min-height: 0; overflow-y: auto; padding: 4px 2px 12px; display: flex; flex-direction: column; gap: 10px; }
  #managerArtifacts:not([hidden]) { flex: 1; min-height: 0; display: flex; flex-direction: column; padding: 4px 0 12px; overflow: hidden; }
  #managerMemory:not([hidden]) { flex: 1; min-height: 0; overflow-y: auto; padding: 4px 2px 12px; display: flex; flex-direction: column; gap: 4px; }

  /* ── Manager-Kopf: Profilbild, Name, Präsenz (Messenger-Kopfzeile) ───────── */
  .mgr-header { flex: none; display: flex; align-items: center; gap: 12px; padding: 2px 2px 12px; }
  .mgr-header__meta { min-width: 0; display: flex; flex-direction: column; gap: 1px; }
  .mgr-header__name { font-size: 17px; font-weight: 700; letter-spacing: -.01em; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .mgr-header__status { font-size: 12px; color: var(--ok); font-weight: 600; display: flex; align-items: center; gap: 5px; }
  .mgr-header__status::before { content: ''; width: 6px; height: 6px; border-radius: 50%; background: currentColor; }
  .mgr-header__status.is-typing { color: var(--accent); }
  /* Profilbild — Bild oder Initialen; ein Kreis, überall gleich. */
  .mgr-ava { flex: none; border-radius: 50%; object-fit: cover; display: inline-flex; align-items: center; justify-content: center;
    background: linear-gradient(135deg, rgba(var(--accent-rgb),.9), rgba(var(--accent-warm-rgb),.9)); color: var(--on-accent);
    font-weight: 700; letter-spacing: .01em; user-select: none; }

  .chat-row { display: flex; align-items: flex-end; gap: 8px; }
  .chat-row[data-from="user"] { justify-content: flex-end; }
  /* In einer Gruppe rücken die Blasen desselben Absenders eng zusammen. */
  .chat-row.is-grouped { margin-top: -8px; }
  .chat-row__avatar { flex: none; width: 26px; align-self: flex-end; }
  .chat-bubble { max-width: 76%; padding: 9px 12px; border-radius: 16px; font-size: 13px; line-height: 1.45; word-break: break-word; }
  .chat-row[data-from="manager"] .chat-bubble { background: var(--glass-strong); border: 1px solid var(--glass-border); border-bottom-left-radius: 16px; }
  .chat-row[data-from="user"] .chat-bubble { background: rgba(var(--accent-rgb),.20); border: 1px solid rgba(var(--accent-rgb),.34); border-bottom-right-radius: 16px; }
  /* Nur die LETZTE Blase einer Gruppe bekommt das Schwänzchen. */
  .chat-row.is-tail[data-from="manager"] .chat-bubble { border-bottom-left-radius: 5px; }
  .chat-row.is-tail[data-from="user"] .chat-bubble { border-bottom-right-radius: 5px; }
  /* Uhrzeit sitzt wie im Messenger unten rechts, leicht in die Blase gezogen. */
  .chat-bubble__time { float: right; margin: 6px -3px -2px 10px; font: 10px var(--font-ui); color: var(--text-dim); }

  .voice-pill { display: flex; align-items: center; gap: 9px; min-width: 180px; cursor: pointer; }
  .voice-pill__play { flex: none; width: 28px; height: 28px; border-radius: 50%; background: var(--accent); color: var(--on-accent); display: flex; align-items: center; justify-content: center; font-size: 10px; box-shadow: 0 0 14px rgba(var(--accent-rgb),.5); }
  .voice-pill__wave { flex: 1; display: flex; align-items: center; gap: 2px; height: 22px; color: var(--accent); }
  .voice-pill__wave span { width: 2.5px; display: block; background: currentColor; opacity: .5; border-radius: 2px; }
  .voice-pill.is-playing .voice-pill__wave span { animation: wave .9s ease-in-out infinite; }
  @keyframes wave { 0%, 100% { transform: scaleY(.4); } 50% { transform: scaleY(1); } }
  .voice-pill__dur { font: 11px var(--font-mono); color: var(--text-dim); flex: none; }
  .voice-transcript { margin-top: 8px; font-size: 12.5px; color: var(--text-dim); border-top: 1px solid rgba(var(--overlay-rgb),.1); padding-top: 8px; }
  .voice-transcribing { margin-top: 8px; font: 600 12px var(--font-mono); color: var(--accent); }
  .voice-transcribing .dots span { display: inline-block; animation: blink 1.2s infinite; opacity: .2; }
  .voice-transcribing .dots span:nth-child(2) { animation-delay: .2s; }
  .voice-transcribing .dots span:nth-child(3) { animation-delay: .4s; }
  @keyframes blink { 0%, 100% { opacity: .2; } 50% { opacity: 1; } }

  .chat-input-row:not([hidden]) { flex: none; display: flex; align-items: center; gap: 10px; padding-top: 10px; }
  .chat-input-row input { flex: 1; padding: 11px 15px; border-radius: 999px; font: 13px var(--font-ui); background: var(--glass); border: 1px solid var(--glass-border); color: var(--text); }
  .chat-input-row input::placeholder { color: var(--text-dim); }
  .mic-btn { flex: none; width: 38px; height: 38px; border-radius: 50%; color: var(--text-dim); display: flex; align-items: center; justify-content: center; cursor: pointer; transition: color 200ms var(--spring), border-color 200ms var(--spring), box-shadow 200ms var(--spring); }
  .mic-btn.is-recording { position: relative; border-color: rgba(var(--err-rgb),.6); color: var(--err); box-shadow: 0 0 0 6px rgba(var(--err-rgb),.15); }
  .mic-btn.is-recording::after { content: ''; position: absolute; inset: -2px; border-radius: 50%; border: 2px solid rgba(var(--err-rgb),.5); animation: ringPulse 1s ease-out infinite; pointer-events: none; }

  .artifact-carousel { display: flex; gap: 12px; overflow-x: auto; padding: 4px 2px 8px; scroll-snap-type: x mandatory; -webkit-overflow-scrolling: touch; }
  .artifact-card { scroll-snap-align: start; flex: 0 0 auto; width: min(78vw, 260px); padding: 16px; display: flex; flex-direction: column; gap: 8px; min-height: 92px; }
  .artifact-card__title { font-weight: 700; font-size: 14px; }
  .artifact-card__meta { font: 11px var(--font-mono); color: var(--text-dim); margin-top: auto; }

  .memory-row { display: flex; justify-content: space-between; gap: 10px; padding: 11px 2px; border-top: 1px solid rgba(var(--overlay-rgb),.08); font-size: 12.5px; }
  .memory-row:first-child { border-top: none; }
  .memory-row__time { color: var(--text-dim); font: 10.5px var(--font-mono); flex: none; white-space: nowrap; }

  /* ---------- Cloud screen ---------- */
  .cloud-toolbar { display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 14px; align-items: center; }
  .chip-group { display: flex; gap: 6px; }
  .chip-group button { padding: 7px 13px; border-radius: 999px; font: 600 12px var(--font-ui); color: var(--text-dim); background: rgba(var(--overlay-rgb),.05); border: 1px solid var(--glass-border); cursor: pointer; transition: color 200ms var(--spring), background 200ms var(--spring), border-color 200ms var(--spring); }
  .chip-group button.active { color: var(--text); background: rgba(var(--accent-rgb),.18); border-color: rgba(var(--accent-rgb),.4); }
  .cloud-toolbar__spacer { flex: 1; }

  .folder-group { padding: 6px 8px 8px; margin-bottom: 14px; }
  .folder-group__head { display: flex; align-items: center; gap: 8px; padding: 8px 6px; cursor: pointer; }
  .folder-group__head::before { content: '▾'; font-size: 10px; color: var(--text-dim); transition: transform 200ms var(--spring); }
  .folder-group.is-collapsed .folder-group__head::before { transform: rotate(-90deg); }
  .folder-group__name { font: 700 11px var(--font-mono); letter-spacing: .06em; text-transform: uppercase; color: var(--text-dim); flex: 1; }
  .folder-group__count { font: 11px var(--font-mono); color: var(--text-dim); }
  .folder-group.is-collapsed .folder-group__rows { display: none; }

  .cloud-row { display: flex; align-items: center; gap: 12px; width: 100%; padding: 12px 6px; border-top: 1px solid rgba(var(--overlay-rgb),.08); text-align: left; cursor: pointer; border-radius: 10px; transition: background 200ms var(--spring); }
  .folder-group__rows .cloud-row:first-child { border-top: none; }
  .cloud-row:active { background: rgba(var(--overlay-rgb),.05); }
  .provider-glyph { flex: none; width: 28px; height: 28px; display: flex; align-items: center; justify-content: center; border-radius: 9px; background: rgba(var(--overlay-rgb),.07); border: 1px solid var(--glass-border); font: 700 11px var(--font-mono); color: var(--text-dim); }
  .cloud-row__main { flex: 1; min-width: 0; display: flex; flex-direction: column; gap: 5px; }
  .cloud-row__name { font: 700 13.5px var(--font-ui); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .cloud-row__meta { display: flex; gap: 10px; align-items: center; flex-wrap: wrap; }
  .cloud-row__deploy { font: 11px var(--font-mono); color: var(--text-dim); }
  .fav-btn { flex: none; font-size: 18px; color: rgba(var(--overlay-rgb),.25); cursor: pointer; padding: 4px; line-height: 1; transition: color 200ms var(--spring), text-shadow 200ms var(--spring); }
  .fav-btn.is-fav { color: var(--accent-warm); text-shadow: 0 0 10px rgba(var(--accent-warm-rgb),.75), 0 0 20px rgba(var(--accent-warm-rgb),.35); }

  .cloud-detail__head { display: flex; align-items: center; gap: 10px; margin-bottom: 12px; }
  .back-btn { flex: none; color: var(--text-dim); font: 600 13px var(--font-mono); cursor: pointer; padding: 6px 8px; }
  .back-btn:hover { color: var(--accent); }
  .cloud-detail__title { font: 700 16px var(--font-ui); flex: 1; min-width: 0; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .cloud-detail__body { padding: 4px 4px 2px; }

  .env-row { padding: 12px 4px; border-top: 1px solid rgba(var(--overlay-rgb),.08); }
  .env-row:first-child { border-top: none; }
  .env-row__top { display: flex; align-items: center; gap: 8px; }
  .env-row__key { flex: 1; font: 700 12.5px var(--font-mono); min-width: 0; overflow: hidden; text-overflow: ellipsis; }
  .env-row__value { display: block; margin-top: 5px; font: 12.5px var(--font-mono); color: var(--text-dim); cursor: pointer; word-break: break-all; }
  .env-row__actions { display: flex; gap: 8px; margin-top: 9px; }
  .env-row__actions button { font: 600 11.5px var(--font-ui); padding: 6px 12px; border-radius: 999px; color: var(--text-dim); background: rgba(var(--overlay-rgb),.05); border: 1px solid var(--glass-border); cursor: pointer; transition: color 200ms var(--spring), border-color 200ms var(--spring); }
  .env-row__actions button:hover { border-color: var(--accent); color: var(--accent); }
  .env-row__edit { display: flex; gap: 8px; margin-top: 9px; }
  .env-row__edit input { flex: 1; padding: 8px 10px; border-radius: 8px; font: 12.5px var(--font-mono); background: rgba(var(--well-rgb),var(--well-a)); border: 1px solid var(--glass-border); color: var(--text); }

  .log-viewer { display: flex; flex-direction: column; height: min(60vh, 520px); }

  .log-viewer__search { flex: 1; min-width: 120px; padding: 9px 12px; border-radius: 10px; font: 12.5px var(--font-mono); background: rgba(var(--well-rgb),var(--well-a)); border: 1px solid var(--glass-border); color: var(--text); }
  .log-viewer__search::placeholder { color: var(--text-dim); }
  .log-viewer__pre { flex: 1; min-height: 0; margin: 0; }
  .btn-chip { font: 600 12px var(--font-ui); padding: 9px 14px; border-radius: 999px; color: var(--text-dim); background: rgba(var(--overlay-rgb),.05); border: 1px solid var(--glass-border); cursor: pointer; transition: color 200ms var(--spring), border-color 200ms var(--spring), background 200ms var(--spring); flex: none; }
  .btn-chip:hover { border-color: var(--accent); color: var(--accent); }
  .btn-chip.is-on { color: var(--accent); background: rgba(var(--accent-rgb),.18); border-color: rgba(var(--accent-rgb),.4); }

  .deploy-row { display: flex; align-items: center; gap: 10px; padding: 12px 4px; border-top: 1px solid rgba(var(--overlay-rgb),.08); }
  .deploy-row:first-child { border-top: none; }
  .deploy-row__version { font: 700 12.5px var(--font-mono); width: 40px; flex: none; }
  .deploy-row__time { flex: 1; font: 12px var(--font-ui); color: var(--text-dim); }

  /* ---------- Browser screen (app-wide, every tab incognito) ---------- */
  section[data-screen="browser"]:not([hidden]) { display: flex; flex-direction: column; overflow: hidden; }
  .browser-col { flex: 1; min-height: 0; display: flex; flex-direction: column; width: 100%; max-width: 640px; margin: 0 auto; }
  .browser-chrome { flex: none; }
  .browser-toolbar { display: flex; align-items: center; gap: 6px; }
  .browser-nav-btn { flex: none; width: var(--touch); height: var(--touch); border-radius: var(--radius-sm); display: flex; align-items: center; justify-content: center; color: var(--text-dim); transition: color 200ms var(--spring), background 200ms var(--spring), opacity 200ms var(--spring), transform 150ms var(--spring); }
  .browser-nav-btn .ic { width: var(--icon-md); height: var(--icon-md); }

  .browser-nav-btn:disabled { opacity: .3; pointer-events: none; }

  .browser-tabs-btn__count { font: 700 12.5px var(--font-mono); }
  .browser-address { flex: 1; min-width: 0; display: flex; align-items: center; gap: 6px; height: 38px; padding: 0 5px 0 11px; border-radius: var(--radius-pill); }
  .browser-address__incognito { flex: none; display: flex; color: var(--accent); opacity: .85; }
  .browser-address__incognito .ic { width: 15px; height: 15px; }

  .browser-address__input::placeholder { color: var(--text-dim); }
  .browser-address__reload { flex: none; width: 28px; height: 28px; border-radius: 50%; display: flex; align-items: center; justify-content: center; color: var(--text-dim); transition: color 200ms var(--spring), background 200ms var(--spring); }
  .browser-address__reload:active { background: rgba(var(--overlay-rgb),.1); color: var(--accent); }
  .browser-address__reload .ic { width: var(--icon-sm); height: var(--icon-sm); }
  .browser-progress { height: 3px; margin: 8px 4px 0; border-radius: 3px; overflow: hidden; opacity: 0; transition: opacity 200ms ease-out; }
  .browser-progress.is-active { opacity: 1; }
  .browser-progress__bar { height: 100%; width: 0%; border-radius: 3px; background: linear-gradient(90deg, rgba(var(--accent-rgb),.6), var(--accent)); }
  .browser-content { flex: 1; min-height: 0; overflow-y: auto; -webkit-overflow-scrolling: touch; margin-top: 14px; touch-action: pan-y; }

  .newtab-page { display: flex; flex-direction: column; align-items: center; padding: 26px 6px 10px; text-align: center; }
  .newtab-badge { display: flex; align-items: center; gap: 6px; padding: 6px 13px; border-radius: 999px; background: rgba(var(--accent-rgb),.12); color: var(--accent-ink); font: 600 11px var(--font-ui); margin-bottom: 24px; }
  .newtab-badge .ic { width: var(--icon-sm); height: var(--icon-sm); color: var(--accent); }
  .newtab-speed-dial { display: grid; grid-template-columns: repeat(2, 1fr); gap: 12px; width: 100%; max-width: 320px; }
  .speed-dial-tile { display: flex; flex-direction: column; align-items: center; gap: 8px; padding: 16px 8px; cursor: pointer; transition: transform 220ms var(--spring), background 220ms var(--spring); }
  .speed-dial-tile:active { transform: scale(.95); }
  .speed-dial-tile__glyph { width: 38px; height: 38px; border-radius: var(--radius-sm); display: flex; align-items: center; justify-content: center; background: rgba(var(--accent-rgb),.12); border: 1px solid var(--glass-border); color: var(--accent); font: 700 13px var(--font-mono); }
  .speed-dial-tile__label { font: 600 12px var(--font-ui); color: var(--text); }
  .newtab-hint { margin-top: 26px; max-width: 280px; font-size: 12px; color: var(--text-dim); line-height: 1.5; }

  .sim-page { padding: 4px 2px 20px; }

  .autofill-chip { display: flex; align-items: center; gap: 7px; width: 100%; margin-bottom: 14px; padding: 10px 14px; border-radius: 999px; background: rgba(var(--accent-rgb),.14); border: 1px solid rgba(var(--accent-rgb),.35); color: var(--accent-ink); font: 600 12.5px var(--font-ui); cursor: pointer; transition: background 200ms var(--spring), transform 150ms var(--spring); }
  .autofill-chip:active { background: rgba(var(--accent-rgb),.26); transform: scale(.98); }
  .autofill-chip .ic { width: var(--icon-sm); height: var(--icon-sm); color: var(--accent); flex: none; }
  .vercel-login-card, .vercel-dashboard { padding: 20px 18px; }
  .vercel-login-card h2 { margin: 0 0 14px; font-size: 17px; }
  .sim-field { display: block; margin-bottom: 12px; }
  .sim-field span { display: block; font: 600 11.5px var(--font-ui); color: var(--text-dim); margin-bottom: 6px; }
  .sim-field input { width: 100%; padding: 11px 13px; border-radius: 10px; font: 13.5px var(--font-ui); background: rgba(var(--well-rgb),var(--well-a)); border: 1px solid var(--glass-border); color: var(--text); }
  .vercel-dashboard__session { font-size: 13.5px; margin-bottom: 14px; }
  .vercel-dashboard__session b { color: var(--accent); }

  .docs-page { padding: 4px 2px 24px; max-width: 560px; }
  .docs-page h1 { font-size: 22px; margin: 4px 0 14px; letter-spacing: -.01em; }
  .docs-page h2 { font-size: 15.5px; margin: 24px 0 8px; }
  .docs-page p { font-size: 13.5px; line-height: 1.65; color: var(--text-dim); margin: 0 0 4px; }
  .docs-page code { font: 12px var(--font-mono); background: rgba(var(--well-rgb),var(--well-a)); padding: 2px 6px; border-radius: 5px; }

  .unknown-page { display: flex; flex-direction: column; align-items: center; text-align: center; padding: 64px 16px 20px; color: var(--text-dim); }
  .unknown-page__icon { color: var(--text-dim); opacity: .5; margin-bottom: 14px; }
  .unknown-page__title { font: 700 15px var(--font-ui); color: var(--text); margin-bottom: 8px; }
  .unknown-page__url { font: 12.5px var(--font-mono); word-break: break-all; padding: 8px 14px; border-radius: 10px; background: rgba(var(--well-rgb),var(--well-a)); max-width: 320px; }
  .unknown-page__hint { margin-top: 14px; font-size: 12px; max-width: 260px; line-height: 1.5; }

  .browser-tab-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 10px; }
  .browser-tab-card { position: relative; padding: 14px 12px 12px; display: flex; flex-direction: column; gap: 8px; cursor: pointer; transition: transform 200ms var(--spring), border-color 200ms var(--spring); border: 1px solid transparent; }
  .browser-tab-card:active { transform: scale(.97); }
  .browser-tab-card.is-active { border-color: rgba(var(--accent-rgb),.5); }
  .browser-tab-card__close { position: absolute; top: 6px; right: 6px; width: 26px; height: 26px; border-radius: 50%; display: flex; align-items: center; justify-content: center; color: var(--text-dim); transition: color 200ms var(--spring), background 200ms var(--spring); }
  .browser-tab-card__close .ic { width: 14px; height: 14px; }
  .browser-tab-card__close:active { background: rgba(var(--overlay-rgb),.1); color: var(--err); }
  .browser-tab-card__preview { height: 46px; border-radius: 10px; background: rgba(var(--overlay-rgb),.06); display: flex; align-items: center; justify-content: center; font: 700 15px var(--font-mono); color: var(--text-dim); }
  .browser-tab-card__title { font: 600 12.5px var(--font-ui); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; padding-right: 18px; }
  .browser-tab-card__badge { font: 600 10px var(--font-ui); color: var(--accent); opacity: .8; }
  .browser-tab-newcard { display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 6px; min-height: 96px; color: var(--accent); font: 600 12.5px var(--font-ui); transition: background 200ms var(--spring), transform 200ms var(--spring); }
  .browser-tab-newcard:active { transform: scale(.96); }
  .browser-tab-newcard .ic { width: var(--icon-md); height: var(--icon-md); }

  .pw-row { display: flex; align-items: center; gap: 10px; padding: 13px 4px; border-top: 1px solid rgba(var(--overlay-rgb),.08); }
  .pw-row:first-child { border-top: none; }
  .pw-row__info { flex: 1; min-width: 0; }
  .pw-row__site { font: 700 13.5px var(--font-ui); }
  .pw-row__user { color: var(--text-dim); margin-top: 3px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .pw-row__pass { margin-top: 3px; letter-spacing: .1em; cursor: pointer; }
  .pw-row__actions { display: flex; flex-direction: column; gap: 6px; flex: none; }

  /* ---------- Settings screen ---------- */
  .settings-group { padding: 16px 18px; margin-bottom: 14px; }
  .settings-group__title { font: 700 11px var(--font-mono); letter-spacing: .06em; text-transform: uppercase; color: var(--text-dim); padding-bottom: 8px; }
  .settings-row { display: flex; align-items: center; gap: 10px; padding: 13px 0; border-top: 1px solid rgba(var(--overlay-rgb),.08); }
  .settings-group .settings-row:first-of-type { border-top: none; }
  .settings-row--stack { flex-direction: column; align-items: stretch; gap: 9px; }
  .settings-row__label { flex: 1; font-size: 13px; }
  .settings-row__label small { display: block; margin-top: 2px; color: var(--text-dim); font-size: 11.5px; }
  .settings-row__value { font: 12.5px var(--font-mono); color: var(--text-dim); }
  .settings-row.is-tap { cursor: pointer; border-radius: 10px; transition: background 200ms var(--spring); }
  .settings-row.is-tap:active { background: rgba(var(--overlay-rgb),.06); }
  .settings-slider { width: 100%; accent-color: var(--accent); }
  .settings-pin-edit { display: flex; gap: 8px; padding-bottom: 12px; }
  .settings-pin-edit input { flex: 1; padding: 9px 11px; border-radius: 8px; font: 13px var(--font-mono); letter-spacing: .3em; background: rgba(var(--well-rgb),var(--well-a)); border: 1px solid var(--glass-border); color: var(--text); }
  .font-preview { padding: 10px 14px; border-radius: 12px; font-family: var(--font-mono); font-size: var(--term-font-size); max-height: 56px; overflow: hidden; }

  /* ---------- Prayer screen + Adhan overlay ---------- */
  .prayer-next-card { padding: 24px; text-align: center; margin-bottom: 18px; }
  .prayer-next-card__label { font: 700 11px var(--font-mono); letter-spacing: .06em; text-transform: uppercase; color: var(--accent); }
  .prayer-next-card__countdown { margin-top: 8px; font: 700 36px var(--font-mono); letter-spacing: -0.02em; font-variant-numeric: tabular-nums; }
  .prayer-next-card__time { margin-top: 6px; font: 12.5px var(--font-mono); color: var(--text-dim); }
  .prayer-list-panel { padding: 4px 10px 4px; margin-bottom: 18px; }
  .prayer-row { display: flex; justify-content: space-between; align-items: center; padding: 13px 6px; border-top: 1px solid rgba(var(--overlay-rgb),.08); transition: color 250ms var(--spring); }
  .prayer-list-panel .prayer-row:first-child { border-top: none; }
  .prayer-row.is-next { color: var(--accent); }
  .prayer-row__name { font: 600 14px var(--font-ui); }
  .prayer-row__time { font: 14px var(--font-mono); font-variant-numeric: tabular-nums; }
  .prayer-demo-btn { display: block; width: 100%; padding: 15px; text-align: center; font: 700 14px var(--font-ui); color: var(--accent); border-radius: 999px; cursor: pointer; }

  .adhan-overlay:not([hidden]) { position: fixed; inset: 0; z-index: 80; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 20px; background: rgba(var(--scrim-strong-rgb),var(--scrim-strong-a)); -webkit-backdrop-filter: blur(40px) saturate(160%); backdrop-filter: blur(40px) saturate(160%); opacity: 0; transition: opacity 350ms var(--spring); }
  .adhan-overlay.is-open { opacity: 1; }
  .adhan-ring { position: relative; width: 104px; height: 104px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font: 700 22px var(--font-mono); color: var(--accent); }
  .adhan-ring::after { content: ''; position: absolute; inset: -2px; border-radius: 50%; border: 2px solid rgba(var(--accent-rgb),.45); animation: ringPulse 1.8s ease-out infinite; pointer-events: none; }
  .adhan-overlay__name { font: 700 24px var(--font-ui); }
  .adhan-overlay__sub { color: var(--text-dim); font-size: 13px; }
  .adhan-overlay__stop { margin-top: 14px; padding: 13px 32px; border-radius: 999px; background: rgba(var(--accent-rgb),.22); border: 1px solid rgba(var(--accent-rgb),.4); color: var(--accent-ink); font: 700 14px var(--font-ui); cursor: pointer; }

  /* ---------- Files screen ---------- */
  section[data-screen="files"]:not([hidden]) { display: flex; flex-direction: column; overflow: hidden; }
  .fs-head { display: flex; align-items: center; gap: 6px; padding: 10px 12px 4px; }
  .fs-crumbs { flex: 1; display: flex; align-items: center; gap: 2px; overflow-x: auto; scrollbar-width: none; white-space: nowrap; }
  .fs-crumbs::-webkit-scrollbar { display: none; }
  .fs-crumb { background: none; border: 0; color: var(--text); font: inherit; font-size: 12.5px; padding: 4px 5px; border-radius: 8px; opacity: .75; cursor: pointer; }
  .fs-crumb:last-child { opacity: 1; font-weight: 700; }
  .fs-crumb-sep { opacity: .35; font-size: 11px; }
  .fs-tools { display: flex; gap: 4px; padding: 2px 12px 6px; align-items: center; flex-wrap: wrap; }
  .fs-searchrow { padding: 0 12px 6px; }
  .fs-list { flex: 1; overflow-y: auto; padding: 0 8px 120px; -webkit-overflow-scrolling: touch; }
  .fs-row { display: flex; align-items: center; gap: 10px; width: 100%; padding: 8px 8px; border: 0; background: none; color: var(--text); font: inherit; text-align: left; border-radius: 14px; cursor: pointer; }
  .fs-row:active { background: rgba(255,255,255,.06); }
  .fs-row.is-selected { background: rgba(var(--accent-rgb, 138,184,255),.14); }
  .fs-ico { width: 36px; height: 36px; border-radius: 10px; flex: none; display: flex; align-items: center; justify-content: center; font-size: 12px; font-weight: 800; background: rgba(255,255,255,.06); }
  .fs-thumb { width: 36px; height: 36px; border-radius: 10px; flex: none; object-fit: cover; background: rgba(255,255,255,.06); }
  .fs-cell { flex: 1; min-width: 0; }
  .fs-name { font-size: 13.5px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; display: block; }
  .fs-sub { font-size: 11px; opacity: .55; }
  .fs-check { width: 21px; height: 21px; border-radius: 7px; border: 1.5px solid rgba(255,255,255,.35); flex: none; display: flex; align-items: center; justify-content: center; font-size: 12px; }
  .fs-check.is-on { background: var(--accent, #8ab8ff); border-color: transparent; color: #0b0e14; }
  .fs-bulkbar { position: absolute; left: 12px; right: 12px; bottom: calc(84px + env(safe-area-inset-bottom)); display: flex; gap: 8px; padding: 10px; border-radius: 18px; z-index: 40; }
  .fs-bulkbar .btn-chip { flex: 1; justify-content: center; }
  .fs-dlbar { position: absolute; left: 12px; right: 12px; bottom: calc(84px + env(safe-area-inset-bottom)); padding: 8px 12px; border-radius: 14px; font-size: 12px; z-index: 39; display: flex; align-items: center; gap: 8px; }
  .fs-dlbar progress { flex: 1; height: 4px; }
  .fs-empty { text-align: center; opacity: .5; padding: 40px 0; font-size: 13px; }
  .fs-viewer { position: fixed; inset: 0; z-index: 90; background: rgba(5,7,12,.96); display: flex; flex-direction: column; }
  .fs-viewer__bar { display: flex; align-items: center; gap: 8px; padding: calc(10px + env(safe-area-inset-top)) 12px 10px; }
  .fs-viewer__name { flex: 1; min-width: 0; font-size: 13px; font-weight: 700; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .fs-viewer__body { flex: 1; min-height: 0; display: flex; align-items: center; justify-content: center; overflow: auto; position: relative; }
  .fs-viewer__body img { max-width: 100%; max-height: 100%; touch-action: pinch-zoom; }
  .fs-viewer__body video { width: 100%; max-height: 100%; background: #000; }
  .fs-viewer__body iframe { width: 100%; height: 100%; border: 0; background: #fff; }
  .fs-viewer__nav { position: absolute; top: 50%; transform: translateY(-50%); width: 44px; height: 64px; border: 0; border-radius: 14px; background: rgba(255,255,255,.08); color: var(--text); font-size: 20px; cursor: pointer; }
  .fs-md, .fs-txt { align-self: stretch; width: 100%; overflow: auto; padding: 4px 16px calc(20px + env(safe-area-inset-bottom)); font-size: 13.5px; line-height: 1.55; }
  .fs-md pre { background: rgba(255,255,255,.07); padding: 10px; border-radius: 10px; overflow-x: auto; }
  .fs-md code { background: rgba(255,255,255,.09); padding: 1px 5px; border-radius: 5px; font-family: ui-monospace, monospace; font-size: 12px; }
  .fs-md h1, .fs-md h2, .fs-md h3 { margin: 14px 0 6px; }
  .fs-md blockquote { border-left: 3px solid var(--accent, #8ab8ff); margin: 8px 0; padding: 2px 10px; opacity: .8; }
  .fs-txt pre { font-family: ui-monospace, monospace; font-size: 11.5px; line-height: 1.5; }
  .fs-txt .ln { opacity: .35; user-select: none; display: inline-block; min-width: 34px; text-align: right; margin-right: 10px; }
  .fs-infocard { text-align: center; padding: 24px; display: flex; flex-direction: column; gap: 10px; align-items: center; }

  /* ---------- Lock screen ---------- */
  section[data-screen="lock"]:not([hidden]) { display: flex; align-items: center; justify-content: center; padding: 16px; overflow: hidden; }
  body.is-locked #dock, body.is-locked #statusHeader, body.is-locked #islandScrim, body.is-locked #pullHint, body.is-locked #keyEcho { display: none !important; }
  /* Any sheet (permission prompt, Mehr, tool, spotlight) stays fully inert while
     locked — the live session keeps running in the background and can pop a
     permission prompt at any time, but it must never be reachable before PIN entry. */
  body.is-locked .sheet-wrap { display: none !important; }
  /* The Adhan overlay is a standalone fixed layer (not a .sheet-wrap), so the
     rule above doesn't cover it — without this it would stay reachable/visible
     on top of the PIN pad if a demo alarm fired while locked. */
  body.is-locked #adhanOverlay { display: none !important; }
  /* The Tasten accessory panel is also not a .sheet-wrap (it's a non-modal
     flex sibling inside each terminal card, not a fixed overlay) — hide it
     the same way while locked without touching state.keysPanelOpen, so it
     reappears exactly as left once the PIN is entered. */
  body.is-locked .keys-panel { display: none !important; }
  .lock-panel { display: flex; flex-direction: column; align-items: center; gap: 24px; padding: 38px 32px; }
  .lock-title { font: 700 11px var(--font-mono); letter-spacing: .1em; text-transform: uppercase; color: var(--text-dim); }
  .pin-dots { display: flex; gap: 16px; }
  .pin-dots span { display: block; width: 13px; height: 13px; border-radius: 50%; border: 1px solid var(--glass-border); background: rgba(var(--overlay-rgb),.03); transition: background 250ms var(--spring), border-color 250ms var(--spring), box-shadow 250ms var(--spring); }
  .pin-dots span.is-filled { background: var(--accent); border-color: var(--accent); box-shadow: 0 0 12px rgba(var(--accent-rgb),.7); }
  .pin-pad { display: grid; grid-template-columns: repeat(3, 68px); gap: 16px; }
  .pin-pad button { width: 68px; height: 68px; border-radius: 50%; border: 1px solid var(--glass-border); background: rgba(var(--overlay-rgb),.04); font: 600 22px var(--font-mono); color: var(--text); cursor: pointer; transition: background 200ms var(--spring), transform 200ms var(--spring); }
  .pin-pad button:active { background: rgba(var(--overlay-rgb),.14); transform: scale(.94); }
  .pin-pad button[data-key="back"] { font-size: 16px; color: var(--text-dim); border-color: transparent; background: none; }
  .pin-pad__spacer { visibility: hidden; }
  .lock-shake { animation: pin-shake 400ms ease-in-out; }
  @keyframes pin-shake {
    10%, 90% { transform: translateX(-6px); } 20%, 80% { transform: translateX(5px); }
    30%, 50%, 70% { transform: translateX(-8px); } 40%, 60% { transform: translateX(8px); }
  }

  /* ---------- Spotlight (pull-down / dock long-press universal search) ---------- */
  .sheet-wrap--top { align-items: flex-start; }
  .spotlight-panel { width: min(560px, 92vw); margin-top: max(env(safe-area-inset-top, 0px), 14px); display: flex; flex-direction: column; max-height: 70vh; overflow: hidden; transform: translateY(-14px) scale(.97); opacity: 0; transition: transform 380ms var(--spring), opacity 280ms var(--spring); }
  .sheet-wrap.is-open .spotlight-panel { transform: translateY(0) scale(1); opacity: 1; }
  .spotlight-search { display: flex; align-items: center; gap: 10px; padding: 6px 6px 14px; border-bottom: 1px solid rgba(var(--overlay-rgb),.1); flex: none; }
  .spotlight-icon { color: var(--accent); font-size: 15px; flex: none; }
  #spotlightInput { flex: 1; border: none; background: none; font: 500 15px var(--font-ui); color: var(--text); outline: none; }
  #spotlightInput::placeholder { color: var(--text-dim); }
  .spotlight-close { flex: none; font: 700 11px var(--font-mono); color: var(--text-dim); padding: 6px 11px; border-radius: 999px; background: rgba(var(--overlay-rgb),.06); border: 1px solid var(--glass-border); cursor: pointer; }
  .spotlight-results { overflow-y: auto; padding: 8px 2px; flex: 1; min-height: 0; }
  .spotlight-row { display: flex; align-items: center; gap: 10px; width: 100%; padding: 11px 10px; border-radius: 12px; text-align: left; cursor: pointer; transition: background 200ms var(--spring); }
  .spotlight-row.is-highlighted, .spotlight-row:hover { background: rgba(var(--overlay-rgb),.07); }
  .spotlight-row__type { flex: none; font: 600 10px var(--font-mono); text-transform: uppercase; letter-spacing: .05em; color: var(--text-dim); background: rgba(var(--overlay-rgb),.06); border: 1px solid var(--glass-border); padding: 3px 8px; border-radius: 999px; }
  .spotlight-row__label { font: 500 13.5px var(--font-ui); flex: 0 1 auto; white-space: nowrap; color: var(--text); }
  .spotlight-row__sub { font: 12px var(--font-mono); color: var(--text-dim); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; flex: 1; min-width: 0; }
  .spotlight-empty { padding: 24px; text-align: center; color: var(--text-dim); font-size: 13px; }

  .pull-hint { position: fixed; top: calc(env(safe-area-inset-top, 0px) + 58px); left: 50%; transform: translateX(-50%) translateY(-8px); z-index: 55; padding: 8px 16px; border-radius: 999px; font-size: 11.5px; font-weight: 700; color: var(--text-dim); opacity: 0; pointer-events: none; transition: opacity 140ms ease-out, transform 140ms ease-out; }
  .pull-hint.show { opacity: 1; transform: translateX(-50%) translateY(0); }

  /* ============================================================
     Feedback 1 — terminal input row (Feature 1+2) + per-session
     notes/todos sheet (Feature 4). Latency segment CSS lives up in the
     Dynamic Island block above.
     ============================================================ */
  /* ===== Input cluster — one coherent glass row per card. In Stack it also
     carries the primary quick-keys (^C, Esc) and the „Tasten" toggle inline;
     in Liste it stays lean (input + mic + send) and the toggle lives in
     the per-card swipe rail instead. Replaces the old floating global orb
     bar. The toggle no longer opens a sheet — it shows/hides the non-modal
     .keys-panel (see below) so the terminal stays visible while typing. ===== */
  .term-input-row { flex: none; display: flex; align-items: center; gap: 5px; margin: 0 8px 8px; padding: 5px 6px; border-radius: var(--radius-pill); font-family: var(--font-mono); }
  .term-input-row__prompt { flex: none; margin: 0 1px 0 7px; color: var(--text-dim); font-size: var(--fs-body); font-weight: 700; }
  .term-input { flex: 1; min-width: 36px; background: none; border: none; outline: none; color: var(--text); font: var(--fs-body) var(--font-mono); padding: 8px 2px; }
  .term-input::placeholder { color: var(--text-dim); }
  .term-input:disabled { color: var(--text-dim); }
  /* Die Eingabezeile ist ein Textfeld, kein Einzeiler mehr: sie wächst beim
     Schreiben mit — bis zu drei Zeilen, danach scrollt sie in sich selbst.
     Die Höhe setzt autoGrowInput() (JS), weil scrollHeight die einzige
     ehrliche Quelle dafür ist; CSS deckelt sie nur.
     touch-action: pan-y — ein waagerechtes Ziehen gehört dem Cursor-Schrubber
     (langes Drücken im Feld), nicht dem Browser. */
  textarea.term-input { resize: none; line-height: var(--term-input-lh, 20px);
    max-height: calc(var(--term-input-lh, 20px) * 3 + 16px); overflow-y: hidden;
    touch-action: pan-y; border-radius: 12px;
    /* KEINE Höhen-Transition: die Bar, die Tastenleiste und das Feld müssen
       exakt gleichzeitig umspringen. Animiert man nur das Feld, hinkt alles
       darüber 180 ms hinterher — genau das sah „verschoben" aus. */
    transition: background 200ms var(--spring); }
  textarea.term-input.is-scrubbing { background: rgba(var(--accent-rgb),.10); }
  /* Quick-key chip (^C / Esc) — mono text label, hit-area ≥34px tall */
  .term-key { flex: none; height: 34px; min-width: 36px; padding: 0 9px; border-radius: var(--radius-pill); display: flex; align-items: center; justify-content: center; font: 700 var(--fs-caption) var(--font-mono); color: var(--text-dim); background: rgba(var(--overlay-rgb),.06); border: 1px solid var(--glass-border); transition: background 200ms var(--spring), color 200ms var(--spring), transform 150ms var(--spring); }
  .term-key:active { transform: scale(.92); background: rgba(var(--overlay-rgb),.14); }
  .term-key--danger { color: var(--err); background: rgba(var(--err-rgb),.14); border-color: rgba(var(--err-rgb),.34); }
  /* Round icon controls (mic / send / Tasten) */
  .term-input-btn { flex: none; width: 36px; height: 36px; border-radius: 50%; display: flex; align-items: center; justify-content: center; color: var(--text-dim); background: transparent; transition: color 200ms var(--spring), background 200ms var(--spring), box-shadow 200ms var(--spring); }
  .term-input-btn .ic { width: var(--icon-md); height: var(--icon-md); }
  .term-input-btn:active { background: rgba(var(--overlay-rgb),.1); }
  .term-keys-btn:active { color: var(--accent); }
  .term-keys-btn.is-on { color: var(--accent); background: rgba(var(--accent-rgb),.16); }
  .term-send-btn { color: var(--accent); background: rgba(var(--accent-rgb),.16); }
  .term-send-btn:active { background: rgba(var(--accent-rgb),.3); }
  /* Mic — recording/transcribing render as an elegant pulsing ring */
  .term-mic-btn.is-recording, .term-mic-btn.is-transcribing { position: relative; }
  .term-mic-btn.is-recording { color: var(--err); }
  .term-mic-btn.is-transcribing { color: var(--accent); }
  .term-mic-btn.is-recording::after, .term-mic-btn.is-transcribing::after { content: ''; position: absolute; inset: -1px; border-radius: inherit; border: 2px solid rgba(var(--err-rgb),.55); animation: ringPulse 1.3s ease-out infinite; pointer-events: none; }
  .term-mic-btn.is-transcribing::after { border-color: rgba(var(--accent-rgb),.5); }

  .sheet-add-row { display: flex; align-items: center; gap: 8px; margin-top: 10px; padding-top: 10px; border-top: 1px solid rgba(var(--overlay-rgb),.08); }
  .sheet-add-row input { flex: 1; min-width: 0; padding: 10px 14px; border-radius: 999px; font: 13px var(--font-ui); background: var(--glass); border: 1px solid var(--glass-border); color: var(--text); }
  .sheet-add-row input::placeholder { color: var(--text-dim); }
  .sheet-add-btn { flex: none; width: 36px; height: 36px; border-radius: 50%; background: rgba(var(--accent-rgb),.18); color: var(--accent); font: 700 16px var(--font-ui); display: flex; align-items: center; justify-content: center; transition: background 200ms var(--spring); }
  .sheet-add-btn:active { background: rgba(var(--accent-rgb),.3); }

  .todo-list { display: flex; flex-direction: column; gap: 2px; }
  .todo-row { display: flex; align-items: center; gap: 10px; padding: 11px 6px; border-top: 1px solid rgba(var(--overlay-rgb),.08); cursor: pointer; }
  .todo-row:first-child { border-top: none; }
  .todo-row input[type="checkbox"] { width: 18px; height: 18px; accent-color: var(--accent); flex: none; }
  .todo-row__text { font-size: 13.5px; transition: color 200ms var(--spring), opacity 200ms var(--spring); }
  .todo-row__text.is-done { text-decoration: line-through; color: var(--text-dim); opacity: .7; }
  .sheet-empty-hint { padding: 10px 4px; color: var(--text-dim); font-size: 12.5px; }

  .tool-group-title { margin: 14px 0 8px; font-size: 11px; text-transform: uppercase; letter-spacing: .08em; color: var(--text-dim); font-weight: 600; }
  .tool-group-title:first-child { margin-top: 0; }

  /* ============================================================
     Icon-system integration + metric touch-ups (applied app-wide).
     The .ic class is the inline-SVG unit; sized here per host so every
     control lands on the icon ramp (16 / 20 / 24) with ≥44px hit areas.
     ============================================================ */
  .ic { display: block; flex: none; }
  /* Terminal body scrolls vertically; horizontal is reserved for the Liste
     swipe rail (see wireListSwipe). */
  .card-body { touch-action: pan-y; }
  /* Replay pill — icon + label, one centered row */
  .replay-pill { display: flex; align-items: center; justify-content: center; gap: 8px; }
  .replay-pill .ic { width: var(--icon-sm); height: var(--icon-sm); }
  .replay-pill span { font-size: inherit; }
  /* ^C label inside the round Liste swipe button */
  .list-swipe-btn .rail-key { font: 700 12px var(--font-mono); }
  /* Generic icon-button (settings gear etc.) */
  .icon-btn { width: var(--touch); height: var(--touch); }
  .icon-btn .ic { width: var(--icon-md); height: var(--icon-md); }
  /* Manager mic + voice controls */
  .mic-btn .ic { width: var(--icon-md); height: var(--icon-md); }
  .voice-pill__play .ic { width: var(--icon-sm); height: var(--icon-sm); }
  .add-terminal-cta__icon { display: flex; }
  .add-terminal-cta__icon .ic { width: var(--icon-md); height: var(--icon-md); }
  /* Cloud favorites star — outline by default, filled + glowing when active */
  .fav-btn { display: flex; align-items: center; justify-content: center; width: var(--touch); height: var(--touch); }
  .fav-btn .ic { width: 20px; height: 20px; }
  .fav-btn.is-fav .ic { fill: var(--accent-warm); color: var(--accent-warm); filter: drop-shadow(0 0 6px rgba(var(--accent-warm-rgb),.55)); }
  /* Cloud detail back button (chevron + label) */
  .back-btn { display: inline-flex; align-items: center; gap: 4px; }
  .back-btn .ic { width: var(--icon-sm); height: var(--icon-sm); }
  /* Spotlight + pull-hint leading icons */
  .spotlight-icon { display: flex; }
  .spotlight-icon .ic { width: var(--icon-sm); height: var(--icon-sm); }
  .pull-hint { display: flex; align-items: center; gap: 6px; }
  .pull-hint .ic { width: 14px; height: 14px; }
  /* Mehr-sheet + settings icons land on the ramp */
  .mehr-item svg { width: var(--icon-md); height: var(--icon-md); }
  /* Update-pill close + PIN backspace */
  .update-pill button.x { display: flex; align-items: center; justify-content: center; }
  .update-pill button.x .ic { width: var(--icon-sm); height: var(--icon-sm); }
  .pin-pad button[data-key="back"] { display: flex; align-items: center; justify-content: center; }
  .pin-pad button[data-key="back"] .ic { width: 22px; height: 22px; }
</style>
</head>

<script>
  // ============================================================
  // Charset workaround: the static dev server sends `../shared/*.js`
  // without a charset in Content-Type, so Chromium falls back to
  // windows-1252 for those two files regardless of this document's
  // UTF-8 meta tag — every non-ASCII byte in TMS_DATA (—, ●, ⎿, ä/ö/ü…)
  // arrives mis-decoded. Losslessly re-interpret the affected strings:
  // walk each char back to its original byte via the windows-1252
  // table, then re-decode that byte sequence as UTF-8. Already-correct
  // strings fail the strict re-decode and are returned untouched.
  // ============================================================
  (function fixSharedDataEncoding() {
    const CP1252_REV = { 0x20AC:0x80, 0x201A:0x82, 0x0192:0x83, 0x201E:0x84, 0x2026:0x85, 0x2020:0x86, 0x2021:0x87, 0x02C6:0x88, 0x2030:0x89, 0x0160:0x8A, 0x2039:0x8B, 0x0152:0x8C, 0x017D:0x8E, 0x2018:0x91, 0x2019:0x92, 0x201C:0x93, 0x201D:0x94, 0x2022:0x95, 0x2013:0x96, 0x2014:0x97, 0x02DC:0x98, 0x2122:0x99, 0x0161:0x9A, 0x203A:0x9B, 0x0153:0x9C, 0x017E:0x9E, 0x0178:0x9F };
    const decoder = (typeof TextDecoder !== 'undefined') ? new TextDecoder('utf-8', { fatal: true }) : null;
    function fixString(str) {
      if (!decoder || !/[-￿]/.test(str)) return str;
      try {
        const bytes = new Uint8Array(str.length);
        for (let i = 0; i < str.length; i++) {
          const code = str.charCodeAt(i);
          const byte = CP1252_REV[code] !== undefined ? CP1252_REV[code] : code;
          if (byte > 0xff) return str; // genuinely not a byte value -> already real unicode, leave alone
          bytes[i] = byte;
        }
        return decoder.decode(bytes);
      } catch (e) { return str; } // not a mis-decoded UTF-8 sequence -> leave untouched
    }
    function walk(node) {
      if (Array.isArray(node)) { for (let i = 0; i < node.length; i++) node[i] = walk(node[i]); return node; }
      if (node && typeof node === 'object') { for (const k in node) node[k] = walk(node[k]); return node; }
      if (typeof node === 'string') return fixString(node);
      return node;
    }
    if (typeof TMS_DATA === 'object') walk(TMS_DATA);
  })();

  // ============================================================
  // State
  // ============================================================
  // Phase 2 — Stack ⇄ Liste view preference persists across reloads; the
  // chosen view is the only piece of terminal-screen state that survives.
  const TERM_VIEW_KEY = 'tms-liquid-deck-terminal-view';
  function loadTerminalView() {
    try { return localStorage.getItem(TERM_VIEW_KEY) === 'list' ? 'list' : 'stack'; } catch (e) { return 'stack'; }
  }

  // ============================================================
  // Theme — dark (default, soft Kindle-gray) / light ("Outdoor", bright
  // frosted glass for sunlight). Applied pre-paint by the inline <head>
  // script already; here we just read that back into JS state and provide
  // the toggle used by Einstellungen + the expanded Dynamic Island.
  // ============================================================
  const THEME_KEY = 'tms-liquid-deck-theme';
  function loadTheme() {
    return document.documentElement.getAttribute('data-theme') === 'light' ? 'light' : 'dark';
  }
  function applyTheme(theme) {
    theme = theme === 'light' ? 'light' : 'dark';
    state.theme = theme;
    document.documentElement.setAttribute('data-theme', theme);
    try { localStorage.setItem(THEME_KEY, theme); } catch (e) { /* storage unavailable */ }
  }
  let themeAnimTimer = null;
  function toggleTheme() {
    // Brief, scoped cross-fade: only chrome colors transition, and only for
    // the duration of the switch — never a permanent transition storm.
    const root = document.documentElement;
    root.classList.add('theme-anim');
    clearTimeout(themeAnimTimer);
    themeAnimTimer = setTimeout(() => root.classList.remove('theme-anim'), 400);
    applyTheme(state.theme === 'light' ? 'dark' : 'light');
    // Re-render the two surfaces that show the current theme so they don't
    // go stale until their next natural re-render.
    if (document.getElementById('settingsBody')) renderSettings();
    if (state.islandOpen) renderIslandExpanded();
    toast(state.theme === 'light' ? 'Helles Design' : 'Dunkles Design');
  }

  const state = {
    dockPage: 'nav',
    theme: loadTheme(),
    order: TMS_DATA.sessions.map(s => s.id),   // logical stack position -> session id (mutable via rail swap)
    activeIndex: 0,
    activeFloat: 0,
    activeCardId: null, // last-interacted-with terminal, kept in sync across Stack + Liste (used by the Aa selection toolbar)
    terminalView: loadTerminalView(),
    overviewOpen: false,
    islandOpen: false,
    pendingPromptId: null,
    suppressClick: false,

    // intentionally simple per spec) drives every card's panel in
    // lockstep; see toggleKeysPanel()/applyKeysPanelVisibility().

  // prompt now auto-resolves on first run; toggling a terminal OFF + replay

  // are pushed straight into TMS_DATA.sessions (in-memory, mockup-only) so

  // them up automatically: Liste, Stack, ⊞ overview, the ≥700px rail and

  // ============================================================

    newTerminalCounter++;

      id, name: 'Terminal ' + num, description: 'Neues Terminal',
      colorTag: NEW_TERMINAL_COLORS[(num - 1) % NEW_TERMINAL_COLORS.length],
      status: 'idle', live: false,
      buffer: ['\x1b[2m~\x1b[0m $ '],
      notes: [], todos: [],
    };

    state.order.push(id);

    return session;

  // ============================================================

    key: '<circle cx="7" cy="17" r="4"/><path d="M10 14 20 4"/><path d="M15 9l3 3"/><path d="M18 6l2.5 2.5"/>',
  };
  ICON_PATHS.backspace = '<path d="M9 6h11a2 2 0 0 1 2 2v8a2 2 0 0 1-2 2H9l-6-6a1 1 0 0 1 0-1.4Z"/><path d="m17 10-4 4M13 10l4 4"/>';
  ICON_PATHS.camera = '<path d="M4 8a2 2 0 0 1 2-2h1.6l1-1.6a1 1 0 0 1 .85-.4h5.1a1 1 0 0 1 .85.4l1 1.6H18a2 2 0 0 1 2 2v9a2 2 0 0 1-2 2H6a2 2 0 0 1-2-2z"/><circle cx="12" cy="12.5" r="3.3"/>';
  ICON_PATHS.check = '<path d="m5 13 4 4L19 7"/>';
  function icon(name, size, cls) {
    const p = ICON_PATHS[name] || '';
    const s = size || 20;
    return `<svg class="ic${cls ? ' ' + cls : ''}" width="${s}" height="${s}" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">${p}</svg>`;
  }

  // Minimal ANSI SGR renderer: bold(1) dim(2) red(31) green(32) reset(0), incl. multi-param
  // sequences like \x1b[1;32m. Every other escape sequence (non-SGR CSI, OSC, lone ESC) is
  // stripped so no raw escape ever leaks into the DOM.
  function ansiToHtml(str) {
    const CLASS = { '1': 'sgr-b', '2': 'sgr-d', '31': 'sgr-r', '32': 'sgr-g' };
    let out = '', open = 0, last = 0, m;
    const re = /\x1b\[([0-9;]*)m/g;
    const emitText = chunk => {
      chunk = chunk
        .replace(/\x1b\][^\x07\x1b]*(?:\x07|\x1b\\)/g, '') // OSC (…BEL or …ESC\)
        .replace(/\x1b\[[0-9;?]*[ -\/]*[@-~]/g, '')        // any other CSI
        .replace(/\x1b./g, '');                            // lone ESC + follow byte
      out += escapeHtml(chunk);
    };
    while ((m = re.exec(str))) {
      emitText(str.slice(last, m.index));
      last = re.lastIndex;
      for (const code of (m[1] === '' ? '0' : m[1]).split(';')) {
        const c = code === '' ? '0' : code;
        if (c === '0') { while (open) { out += '</span>'; open--; } }
        else if (CLASS[c]) { out += `<span class="${CLASS[c]}">`; open++; }
      }
    }
    emitText(str.slice(last));
    while (open) { out += '</span>'; open--; }
    return out;
  }

  // Renders one buffer line, special-casing the wrapped deploy link so it always stays a
  // single inline element (the browser wraps it visually, it is never split in the DOM).
  function renderBufferLine(line) {
    const url = TMS_DATA.demo.wrappedLinkUrl;
    const idx = line.indexOf(url);
    if (idx === -1) return ansiToHtml(line);
    const idMatch = url.match(/dpl_\w+/);
    const shortId = idMatch ? idMatch[0].slice(0, 12) : url.slice(-12);
    const before = ansiToHtml(line.slice(0, idx));
    const after = ansiToHtml(line.slice(idx + url.length));
    const link = `<span class="wrapped-link" data-url="${escapeHtml(url)}" data-short="${escapeHtml(shortId)}" role="link" tabindex="0">${escapeHtml(url)}</span>`;
    return before + link + after;
  }

  function toast(message) {
    const host = document.getElementById('toasts');
    const el = document.createElement('div');
    el.className = 'toast';
    el.textContent = message;
    host.appendChild(el);
    requestAnimationFrame(() => el.classList.add('show'));
    setTimeout(() => {
      el.classList.remove('show');
      setTimeout(() => el.remove(), 220);
    }, 2400);
  }

  function fallbackCopy(text) {
    const ta = document.createElement('textarea');
    ta.value = text; ta.style.position = 'fixed'; ta.style.opacity = '0';
    document.body.appendChild(ta); ta.select();
    try { document.execCommand('copy'); } catch (e) { /* best effort */ }
    ta.remove();
  }
  function copyText(text) {
    try {
      if (navigator.clipboard && navigator.clipboard.writeText) {
        navigator.clipboard.writeText(text).catch(() => fallbackCopy(text));
        return;
      }
    } catch (e) { /* fall through */ }
    fallbackCopy(text);
  }

  // ============================================================
  // Prayer countdown — computed from the real current time, same
  // pattern as command-deck/mission-control: parse each prayer's
  // HH:MM against today's date, take the first one after "now",
  // and wrap to Fajr tomorrow once we're past Isha.
  // ============================================================
  function parsePrayerTime(t) {
    const [h, m] = t.split(':').map(Number);
    const d = new Date();
    d.setHours(h, m, 0, 0);
    return d;
  }
  function nextPrayer() {
    const now = new Date();
    const upcoming = TMS_DATA.prayerTimes.map(p => ({ ...p, date: parsePrayerTime(p.time) })).find(p => p.date > now);
    const next = upcoming || (() => {
      const first = TMS_DATA.prayerTimes[0];
      const d = parsePrayerTime(first.time);
      d.setDate(d.getDate() + 1);
      return { ...first, date: d, tomorrow: true };
    })();
    const diffMin = Math.max(0, next.date - now) / 60000;
    const h = Math.floor(diffMin / 60), m = Math.floor(diffMin % 60);
    return { ...next, diffMin, countdown: `${h}:${String(m).padStart(2, '0')}h` };
  }

  // ============================================================
  // Status header (global chrome) + status detail sheet. Replaces the old
  // floating Dynamic-Island pill but keeps its function names, so every
  // call-site (live sim, latency ticker, prompt) stays untouched.
  // state.islandOpen means "the Dynamic Island is morphed open".
  // ============================================================
  const statusHeaderEl = document.getElementById('statusHeader');
  const statusDot = document.getElementById('statusDot');
  const statusActivityLabel = document.getElementById('statusActivityLabel');
  const statusPrayerLabel = document.getElementById('statusPrayerLabel');
  const statusDetailBody = document.getElementById('statusDetailBody');
  const islandScrim = document.getElementById('islandScrim');
  const islandBody = statusHeaderEl.querySelector('.island-body');

  function setIslandActivity(kind, label) {
    statusDot.className = 'status-dot' + (kind === 'live' ? ' is-live' : kind === 'warn' ? ' is-warn' : kind === 'ok' ? ' is-ok' : '');
    statusActivityLabel.textContent = label;
  }

  function renderIslandExpanded() {
    const np = nextPrayer();
    const live = TMS_DATA.sessions.find(s => s.live);
    const cs = cardState[live.id];
    const lastLine = cs.lines[cs.lines.length - 1] || '';
    const building = TMS_DATA.cloudProjects.find(p => p.status === 'building');
    const connSrv = TMS_DATA.servers[0];
    const sessionRows = TMS_DATA.sessions.map(s => `
      <div class="island-row" data-session="${s.id}" role="button" tabindex="0">
        <span class="island-row__dot" style="background:${s.colorTag}"></span>
        <span class="island-row__name">${escapeHtml(s.name)}</span>
        <span class="island-row__meta">${escapeHtml(STATUS_LABELS[s.status] || s.status)}</span>
      </div>`).join('');
    const chev = '<span class="isl-item__chev">' + icon('chevron', 15) + '</span>';
    const online = connSrv.status === 'online';
    statusDetailBody.innerHTML = `
      <div class="isl-head">
        <span class="isl-head__icon">${icon('bolt', 17)}</span>
        <span class="isl-head__text">
          <strong>${escapeHtml(connSrv.name)}</strong>
          <small>${escapeHtml(connSrv.host || 'TMS Terminal')}</small>
        </span>
        <button class="isl-close" id="islandCloseBtn" type="button" aria-label="Schließen">${icon('x', 15)}</button>
      </div>

      <div class="isl-card">
        <div class="isl-stat ${online ? 'isl-stat--live' : ''}">
          <span class="isl-stat__dot" style="background:${online ? 'var(--ok)' : 'var(--text-dim)'}"></span>
          <span class="isl-stat__label">Verbindung</span>
          <span class="isl-stat__val">${connSrv.latency != null ? connSrv.latency + ' ms' : '—'}</span>
          <span class="isl-stat__act ${online ? 'is-ok' : ''}">${online ? 'Online' : 'Offline'}</span>
        </div>
        <div class="isl-stat">
          <span class="isl-stat__dot" style="background:var(--accent-warm)"></span>
          <span class="isl-stat__label">${escapeHtml(np.name)}</span>
          <span class="isl-stat__val">${escapeHtml(np.time)}</span>
          <span class="isl-stat__act">in ${np.countdown}</span>
        </div>
        <div class="isl-stat">
          <span class="isl-stat__dot" style="background:${building ? 'var(--warn)' : 'var(--text-dim)'}"></span>
          <span class="isl-stat__label">Deploy</span>
          <span class="isl-stat__val">${building ? escapeHtml(building.name) : 'keiner aktiv'}</span>
          <span class="isl-stat__act">${building ? 'läuft …' : ''}</span>
        </div>
      </div>

      <div class="isl-menu">
        <button class="isl-item" data-isl="tools" type="button">
          ${icon('tools', 18)}<span class="isl-item__label">Werkzeuge</span>${chev}
        </button>
        <button class="isl-item" data-isl="prayer" type="button">
          ${icon('moon', 18)}<span class="isl-item__label">Gebetszeiten</span>
          <span class="isl-item__val">${escapeHtml(np.name)}</span>${chev}
        </button>
        <button class="isl-item" data-isl="theme" type="button">
          ${state.theme === 'dark' ? icon('moon', 18) : icon('sun', 18)}<span class="isl-item__label">Erscheinungsbild</span>
          <span class="isl-item__val">${state.theme === 'dark' ? 'Dunkel' : 'Hell'}</span>${chev}
        </button>
        <button class="isl-item" data-isl="settings" type="button">
          ${icon('gear', 18)}<span class="isl-item__label">Einstellungen</span>${chev}
        </button>
        <button class="isl-item isl-item--danger" data-isl="lock" type="button">
          ${icon('lock', 18)}<span class="isl-item__label">Sperren</span>${chev}
        </button>
      </div>

      ${sessionRows ? `<h4>Aktive Sitzungen</h4>${sessionRows}` : ''}

      <h4>Agent-Aktivität</h4>
      <div class="island-activity-feed">${renderBufferLine(lastLine) || '—'}</div>
    `;
    statusDetailBody.querySelectorAll('[data-session]').forEach(row => {
      row.addEventListener('click', e => {
        e.stopPropagation();
        const id = row.dataset.session;
        closeIsland();
        goToTerminals();
        focusTerminal(id);
      });
    });
    document.getElementById('islandCloseBtn').addEventListener('click', e => {
      e.stopPropagation();
      closeIsland();
    });
    // Das frühere „Mehr" der Bottom-Bar wohnt jetzt hier: die Insel ist die
    // Stelle, an der ohnehin schon alles Übergreifende steht.
    statusDetailBody.querySelectorAll('[data-isl]').forEach(btn => {
      btn.addEventListener('click', e => {
        e.stopPropagation();
        const to = btn.dataset.isl;
        if (to === 'theme') { toggleTheme(); renderIslandExpanded(); return; }
        closeIsland();
        if (to === 'lock') lockApp();
        else show(to);
      });
    });
  }

  function openIsland() {
    state.islandOpen = true;
    renderIslandExpanded();
    statusHeaderEl.classList.add('is-expanded');
    statusHeaderEl.setAttribute('aria-expanded', 'true');
    islandBody.setAttribute('aria-hidden', 'false');
    islandScrim.classList.add('is-open');
  }
  function closeIsland() {
    state.islandOpen = false;
    statusHeaderEl.classList.remove('is-expanded');
    statusHeaderEl.setAttribute('aria-expanded', 'false');
    islandBody.setAttribute('aria-hidden', 'true');
    islandScrim.classList.remove('is-open');
  }
  function toggleIsland() { state.islandOpen ? closeIsland() : openIsland(); }

  let islSuppressClick = false;
  statusHeaderEl.addEventListener('click', e => {
    if (islSuppressClick) { islSuppressClick = false; return; }
    // Taps inside the expanded body operate its content; only the compact
    // row (or an outside/scrim tap) toggles the island closed.
    if (state.islandOpen && e.target.closest('.island-body')) return;
    toggleIsland();
  });
  statusHeaderEl.addEventListener('keydown', e => { if (e.key === 'Enter' || e.key === ' ') { e.preventDefault(); toggleIsland(); } });
  islandScrim.addEventListener('click', closeIsland);
  document.addEventListener('keydown', e => { if (e.key === 'Escape' && state.islandOpen) closeIsland(); });

  // ============================================================
  // Browser-Badge — grünes Globe-Icon, sobald irgendwo ein Browser-Tab
  // tatsächlich navigiert ist (nicht bloß ein leerer Neuer-Tab). Tap springt
  // direkt in den Browser; von dort führt der Swipe unten wieder zurück.
  // ============================================================
  const islandBrowserBadge = document.getElementById('islandBrowserBadge');
  function isBrowserActive() {
    const tab = typeof activeBrowserTab === 'function' ? activeBrowserTab() : null;
    const page = tab && tab.history && tab.history[tab.historyIndex];
    return !!page && page.kind !== 'newtab';
  }
  function updateIslandBrowserBadge() {
    islandBrowserBadge.classList.toggle('is-visible', isBrowserActive());
  }
  islandBrowserBadge.addEventListener('click', e => {
    e.stopPropagation();
    islSuppressClick = false; // eigener Tap, kein Insel-Toggle nötig
    show('browser');
  });

  // ============================================================
  // Long-Press + Ziehen auf der Insel wechselt den Bildschirm — dieselbe
  // Press-and-hold-dann-Ziehen-Mechanik wie der Terminal-Switcher unten,
  // nur über die fünf Dock-Einträge statt über Terminal-Tabs. Vom Browser
  // aus führt jede Zugrichtung zurück zu Terminals ("swipe back").
  // ============================================================
  const DOCK_SWIPE_ORDER = ['servers', 'terminals', 'manager', 'cloud', 'browser'];
  const DOCK_SWIPE_LABEL = { servers: 'Server', terminals: 'Terminals', manager: 'Manager', cloud: 'Cloud', browser: 'Browser' };
  const islandCompactEl = document.getElementById('islandCompact');
  const islandSwipeHintEl = document.getElementById('islandSwipeHint');
  let islHold = null, islArmed = false, islMoved = false, islStartX = 0, islX = 0, islRaf = 0, islFromIdx = 0;
  // Seit die vier Terminal-Knöpfe mitten in der Insel sitzen, bliebe für die
  // Geste kaum noch Fläche übrig, wenn die Knöpfe sie abwürgen. Sie darf
  // deshalb ÜBERALL beginnen — auch auf einem Knopf. Erst wenn das lange
  // Drücken wirklich scharf ist (260 ms), reißt die Insel die Geste an sich
  // und der Klick des Knopfes darunter wird geschluckt. Ein kurzes Antippen
  // bleibt ein ganz normaler Knopfdruck.
  let islDownBtn = null, islSwallowBtnClick = false, islPointerId = null;

  function islIndexFromDx(dx) {
    const STEP = 56; // px pro Schritt — ein bequemer Daumen-Swipe
    return clamp(islFromIdx - Math.round(dx / STEP), 0, DOCK_SWIPE_ORDER.length - 1);
  }
  function islFrame() {
    islRaf = 0;
    if (!islArmed) return;
    if (currentScreen === 'browser') { islandSwipeHintEl.textContent = '‹ Zurück zu Terminals'; return; }
    const idx = islIndexFromDx(islX - islStartX);
    islandSwipeHintEl.textContent = DOCK_SWIPE_LABEL[DOCK_SWIPE_ORDER[idx]] || '';
  }
  islandCompactEl.addEventListener('pointerdown', e => {
    islMoved = false;
    islSwallowBtnClick = false;
    islDownBtn = e.target.closest('.island-act, .island-browser-badge');
    islPointerId = e.pointerId;
    islStartX = e.clientX; islX = e.clientX;
    islFromIdx = Math.max(0, DOCK_SWIPE_ORDER.indexOf(currentScreen));
    clearTimeout(islHold);
    islHold = setTimeout(() => {
      islArmed = true;
      // Der Knopf unter dem Daumen darf jetzt nicht mehr auslösen — gehalten
      // wurde die Insel, nicht er.
      if (islDownBtn) islSwallowBtnClick = true;
      // Ohne Capture verlöre der Zug die Ereignisse, sobald der Finger den
      // Knopf verlässt, auf dem er gestartet ist.
      try { islandCompactEl.setPointerCapture(islPointerId); } catch (err) { /* kein Capture nötig */ }
      if (navigator.vibrate) navigator.vibrate(6);
      islandSwipeHintEl.classList.add('is-visible');
      islFrame();
    }, 260);
  });
  islandCompactEl.addEventListener('pointermove', e => {
    if (!islArmed) {
      // Wer sofort loszieht, wollte wischen und nicht drücken: kein Long-Press
      // erzwingen, aber den Knopf-Klick auch nicht aus Versehen auslösen.
      if (islHold && Math.abs(e.clientX - islStartX) > 12) { clearTimeout(islHold); islHold = null; }
      return;
    }
    islMoved = true;
    islX = e.clientX;
    if (!islRaf) islRaf = requestAnimationFrame(islFrame);
  });
  // Läuft VOR den Klick-Handlern der Knöpfe (Capture-Phase) und schluckt den
  // Klick, wenn die Geste ihn übernommen hat.
  islandCompactEl.addEventListener('click', e => {
    if (!islSwallowBtnClick) return;
    islSwallowBtnClick = false;
    e.stopPropagation();
    e.preventDefault();
  }, true);
  // Sicherheitsnetz: bleibt der Klick nach dem Zug aus (Android verschluckt ihn
  // bei gefangenem Pointer gern), verfällt das Flag von selbst — sonst fräße es
  // den nächsten ECHTEN Knopfdruck.
  function islArmSwallowExpiry() {
    setTimeout(() => { islSwallowBtnClick = false; }, 400);
  }
  function islEnd() {
    clearTimeout(islHold);
    islHold = null;
    islDownBtn = null;
    if (islPointerId != null) {
      try { islandCompactEl.releasePointerCapture(islPointerId); } catch (err) { /* nie gefangen */ }
      islPointerId = null;
    }
    if (!islArmed) { return; }
    islArmed = false;
    if (islSwallowBtnClick) islArmSwallowExpiry();
    islSuppressClick = true; // war ein Long-Press-Zug, kein normaler Tap — Insel nicht zusätzlich auf/zu
    cancelAnimationFrame(islRaf); islRaf = 0;
    islandSwipeHintEl.classList.remove('is-visible');
    if (!islMoved) return; // reiner Halt ohne Zug: nichts committen, Insel bleibt wie sie war
    if (currentScreen === 'browser') { show('terminals'); return; }
    const dx = islX - islStartX;
    if (Math.abs(dx) < 24) return; // zu kurz gezogen, keine erkennbare Absicht
    const target = DOCK_SWIPE_ORDER[islIndexFromDx(dx)];
    if (target && target !== currentScreen) show(target);
  }
  islandCompactEl.addEventListener('pointerup', islEnd);
  islandCompactEl.addEventListener('pointerleave', islEnd);
  islandCompactEl.addEventListener('pointercancel', islEnd);

  statusPrayerLabel.textContent = (() => { const np = nextPrayer(); return `${np.name} · ${np.countdown}`; })();

  // ============================================================
  // Ping / connection latency — compact island segment + expanded row.
  // Anchored to a fixed baseline (not a random walk) so it jitters ±1-4ms
  // around a stable center instead of drifting. Single global interval,
  // started once at boot (see Init) — never re-armed on screen navigation.
  // ============================================================
  const statusLatencyLabel = document.getElementById('statusLatencyLabel');
  function updateLatencyDisplay() {
    const val = TMS_DATA.servers[0].latency;
    if (statusLatencyLabel) statusLatencyLabel.textContent = (val != null ? val : '—') + ' ms';
    const chip = document.querySelector(`[data-latency-chip="${TMS_DATA.servers[0].id}"]`);
    if (chip) chip.textContent = (val != null ? val : '—') + ' ms';
    const np = nextPrayer();
    if (statusPrayerLabel) statusPrayerLabel.textContent = `${np.name} · ${np.countdown}`;
    if (state.islandOpen) renderIslandExpanded();
  }
  let latencyTickerStarted = false;
  let latencyTimer = 0;
  function startLatencyTicker() {
    if (latencyTickerStarted) return;
    latencyTickerStarted = true;
    const baseline = TMS_DATA.servers[0].latency;
    updateLatencyDisplay();
    latencyTimer = setInterval(() => {
      if (document.body.classList.contains('is-locked')) return; // paused while locked
      const mag = 1 + Math.floor(Math.random() * 4); // 1..4
      const jitter = Math.random() < 0.5 ? -mag : mag;
      TMS_DATA.servers[0].latency = Math.max(3, baseline + jitter);
      updateLatencyDisplay();
    }, 4000);
  }
  /** Am echten Server ist dieser Ticker nicht nur überflüssig, er ist FALSCH: er
   *  überschrieb den gemessenen Ping alle 4s mit einer erwürfelten Zahl. Die
   *  Bridge schaltet ihn ab; die echte Latenz kommt über TMSBridge.setStatus. */
  window.__tmsStopLatencyDemo = function () {
    if (latencyTimer) { clearInterval(latencyTimer); latencyTimer = 0; }
  };

  // ============================================================
  // Bottom sheets (Mehr / permission)
  // ============================================================
  // A close parks a hide-timer on the wrap; reopening within that window MUST
  // cancel it, or the timer hides a sheet that is visibly open (stuck scrim).
  const sheetCloseTimers = new WeakMap();
  function openSheet(wrapEl) {
    const pending = sheetCloseTimers.get(wrapEl);
    if (pending) { clearTimeout(pending); sheetCloseTimers.delete(wrapEl); }
    wrapEl.hidden = false;
    // Double rAF: the un-hidden closed state must hit the compositor once,
    // otherwise the enter transition occasionally skips (sheet pops in).
    requestAnimationFrame(() => requestAnimationFrame(() => {
      wrapEl.classList.add('is-open');
      if (!wrapEl.classList.contains('sheet-wrap--perm')) document.body.classList.add('sheet-open');
    }));
  }
  function closeSheet(wrapEl) {
    wrapEl.classList.remove('is-open');
    if (!document.querySelector('.sheet-wrap.is-open:not(.sheet-wrap--perm)')) {
      document.body.classList.remove('sheet-open');
    }
    const t = setTimeout(() => { sheetCloseTimers.delete(wrapEl); wrapEl.hidden = true; }, 420);
    sheetCloseTimers.set(wrapEl, t);
  }

  const mehrWrap = document.getElementById('mehrSheetWrap');
  // NUR die Knöpfe im Mehr-Sheet. Vorher stand hier document.querySelectorAll —
  // und .mehr-item ist auch die Klasse der Browser-Menü-Knöpfe (Hard Reload,
  // Cache leeren, Passwörter). Die haben kein data-target, also lief bei jedem
  // Klick dort ein show(undefined) mit: das blendete JEDEN Bildschirm aus und
  // keinen ein — die App stand leer da.
  mehrWrap.querySelectorAll('.mehr-item').forEach(btn => {
    btn.addEventListener('click', () => {
      closeSheet(mehrWrap);
      const target = btn.dataset.target;
      if (target === 'lock') { lockApp(); return; }
      show(target);
    });
  });
  mehrWrap.querySelector('[data-close-mehr]').addEventListener('click', () => closeSheet(mehrWrap));

  const toolSheetWrap = document.getElementById('toolSheetWrap');
  document.getElementById('toolSheetClose').addEventListener('click', () => closeSheet(toolSheetWrap));
  toolSheetWrap.querySelector('[data-close-tool]').addEventListener('click', () => closeSheet(toolSheetWrap));

  const spotlightWrap = document.getElementById('spotlightWrap');
  spotlightWrap.querySelector('[data-close-spotlight]').addEventListener('click', () => closeSheet(spotlightWrap));
  document.getElementById('spotlightClose').addEventListener('click', () => closeSheet(spotlightWrap));

  const permWrap = document.getElementById('permSheetWrap');
  permWrap.querySelector('[data-close-perm]').addEventListener('click', () => { /* modal — backdrop tap does not dismiss a pending decision */ });

  const questionWrap = document.getElementById('questionSheetWrap');
  questionWrap.querySelector('[data-close-question]').addEventListener('click', () => { /* modal — backdrop tap does not dismiss a pending question */ });

  // ============================================================
  // Router
  // ============================================================
  const SCREEN_HOOKS = {};
  // Dock indicator pill — a glass highlight that SLIDES to the active item
  // (FLIP over transform/width; the buttons themselves stay put).
  const NAV_ORDER = ['servers', 'terminals', 'manager', 'cloud', 'browser', 'tools', 'settings', 'prayer'];
  let currentScreen = null;
  const dockPillEl = document.getElementById('dockPill');
  function positionDockPill() {
    const active = document.querySelector('#dock .dock-btn.active');
    if (!active || !active.offsetWidth) { dockPillEl.classList.remove('is-ready'); return; }
    dockPillEl.style.width = active.offsetWidth + 'px';
    dockPillEl.style.transform = `translateX(${active.offsetLeft}px)`;
    requestAnimationFrame(() => dockPillEl.classList.add('is-ready'));
  }
  window.addEventListener('resize', positionDockPill);

  function show(name) {
    // Ohne Ziel wird NICHT navigiert. Die Zeile darunter blendet jeden Bildschirm
    // aus, dessen Name nicht passt — bei name === undefined trifft das auf ALLE zu,
    // und die App steht leer da (genau so ist der Browser "abgestürzt"). Ein
    // Fehlaufruf darf die Oberfläche nie wieder auslöschen.
    if (!name || !document.querySelector(`[data-screen="${name}"]`)) return;
    if (name !== 'cloud') stopCloudBuildTimer();
    if (name !== 'prayer') stopPrayerTick();
    if (name !== 'terminals') { cancelDictation(); closeAllListRails(); closeKeysPanel(); }
    if (name !== 'browser') stopBrowserProgressTimers();
    if (name !== 'terminals' && typeof setDockPage === 'function') setDockPage('nav');
    if (typeof renderTermSwitcher === 'function') setTimeout(renderTermSwitcher, 0);
    const prev = currentScreen;
    document.querySelectorAll('[data-screen]').forEach(s => s.hidden = s.dataset.screen !== name);
    document.querySelectorAll('#dock [data-nav]').forEach(b => b.classList.toggle('active', b.dataset.nav === name));
    positionDockPill();
    // Nach dem Entsperren ist die Bar zum ersten Mal überhaupt sichtbar — erst
    // jetzt lässt sich ihre Höhe messen.
    if (typeof syncDockHeight === 'function') syncDockHeight();
    // Zurück auf Terminals: verdeckte Karten holen ihren Output nach.
    if (name === 'terminals') flushHiddenCards();
    // Directional slide+fade between tab screens (transform/opacity only;
    // fires once per navigation, never on content updates or streaming).
    if (prev && prev !== name && name !== 'lock' && prev !== 'lock') {
      const to = document.querySelector(`[data-screen="${name}"]`);
      const iPrev = NAV_ORDER.indexOf(prev), iNext = NAV_ORDER.indexOf(name);
      if (to && iPrev !== -1 && iNext !== -1) {
        const cls = iNext > iPrev ? 'screen-anim-left' : 'screen-anim-right';
        to.classList.remove('screen-anim-left', 'screen-anim-right');
        void to.offsetWidth;
        to.classList.add(cls);
        to.addEventListener('animationend', () => to.classList.remove(cls), { once: true });
      }
    }
    // The island swaps status readout for the terminal mini-toolbar only on
    // this screen; the brief pop is the same "content just changed" bounce
    // Apple's Dynamic Island does, not a generic screen-transition effect —
    // so it only fires the moment terminal-mode itself flips, not on every nav.
    const enteringTerminalMode = name === 'terminals' && prev !== 'terminals';
    const leavingTerminalMode = name !== 'terminals' && prev === 'terminals';
    if (enteringTerminalMode || leavingTerminalMode) {
      statusHeaderEl.classList.toggle('is-terminal-mode', name === 'terminals');
      statusHeaderEl.classList.remove('is-popping');
      void statusHeaderEl.offsetWidth;
      statusHeaderEl.classList.add('is-popping');
      statusHeaderEl.addEventListener('animationend', () => statusHeaderEl.classList.remove('is-popping'), { once: true });
    }
    currentScreen = name;
    if (SCREEN_HOOKS[name]) SCREEN_HOOKS[name]();
    // A pending permission/question prompt only shows its sheet on the Terminals
    // screen; syncPromptSheets re-homes/hides it as the user navigates.
    syncPromptSheets();
    updatePendingBadge();
    if (typeof updateIslandBrowserBadge === 'function') updateIslandBrowserBadge();
  }
  function goToTerminals() { show('terminals'); }

  function handleDockTap(name) {
    if (name === 'mehr') { openSheet(mehrWrap); return; }
    if (document.querySelector(`[data-screen="${name}"]`)) { show(name); return; }
    toast('Kommt in Teil 2');
  }

  // Ein Knopf der Leiste tut genau eine Sache: navigieren. Das lange Drücken
  // öffnete hier früher Spotlight — es ist raus, damit die Leiste dem Wischen
  // nach oben (Seitenwechsel) gehört und nichts mehr um dieselbe Geste streitet.
  function wireNav() {
    document.querySelectorAll('#dock [data-nav]').forEach(btn => {
      btn.addEventListener('click', () => handleDockTap(btn.dataset.nav));
    });
  }

    pill.querySelector('.cta').addEventListener('click', () => toast('Mockup: Update-Vorgang wird nicht simuliert'));

  const SERVER_ICON = `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="4" width="18" height="6" rx="2"/><rect x="3" y="14" width="18" height="6" rx="2"/><circle cx="7" cy="7" r=".6" fill="currentColor" stroke="none"/><circle cx="7" cy="17" r=".6" fill="currentColor" stroke="none"/></svg>`;

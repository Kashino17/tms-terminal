<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>Liquid Deck — TMS Terminal</title>
<style>
  :root {
    --bg-grad: radial-gradient(120% 90% at 20% 0%, #1b2340 0%, #0b0e1a 55%, #06070d 100%);
    --glass: rgba(255,255,255,0.07); --glass-strong: rgba(255,255,255,0.12);
    --glass-border: rgba(255,255,255,0.16); --blur: blur(24px) saturate(160%);
    --text: #f2f4ff; --text-dim: rgba(242,244,255,0.55);
    --accent: #6aa8ff; --accent-warm: #ff9f6a;
    --ok: #4ade80; --warn: #fbbf24; --err: #f87171;
    --radius-lg: 24px; --radius-md: 16px; --radius-sm: 12px;
    --spring: cubic-bezier(0.34, 1.3, 0.5, 1);
    --font-ui: -apple-system, BlinkMacSystemFont, "SF Pro Display", "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    --font-mono: ui-monospace, "SF Mono", "Cascadia Code", "JetBrains Mono", Menlo, Consolas, monospace;
    --island-space: 92px;
    --chrome-space: 118px;
    --chrome-space-term: 168px;
  }

  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  html, body { height: 100%; }
  body {
    margin: 0; overflow: hidden; background: var(--bg-grad); color: var(--text);
    font: 400 14.5px/1.45 var(--font-ui); -webkit-font-smoothing: antialiased;
  }
  button, input { font: inherit; color: inherit; }
  button { background: none; border: none; cursor: pointer; }
  a { color: inherit; }

  /* ============================================================
     Ambient liquid background — soft drifting color blobs behind
     every glass surface, source of the "light" glass refracts.
     ============================================================ */
  .atmosphere { position: fixed; inset: 0; overflow: hidden; z-index: 0; pointer-events: none; }
  .atmosphere .blob { position: absolute; border-radius: 50%; filter: blur(60px); opacity: .55; will-change: transform; }
  .blob--a { width: 60vmax; height: 60vmax; left: -20vmax; top: -24vmax; background: radial-gradient(circle at 30% 30%, rgba(106,168,255,.35), transparent 65%); animation: driftA 46s ease-in-out infinite alternate; }
  .blob--b { width: 52vmax; height: 52vmax; right: -18vmax; top: 10vmax; background: radial-gradient(circle at 60% 40%, rgba(255,159,106,.22), transparent 65%); animation: driftB 58s ease-in-out infinite alternate; }
  .blob--c { width: 46vmax; height: 46vmax; left: 8vmax; bottom: -20vmax; background: radial-gradient(circle at 50% 50%, rgba(154,120,255,.20), transparent 65%); animation: driftC 64s ease-in-out infinite alternate; }
  @keyframes driftA { from { transform: translate(0,0) scale(1); } to { transform: translate(6vmax,8vmax) scale(1.08); } }
  @keyframes driftB { from { transform: translate(0,0) scale(1); } to { transform: translate(-8vmax,4vmax) scale(0.94); } }
  @keyframes driftC { from { transform: translate(0,0) scale(1); } to { transform: translate(4vmax,-6vmax) scale(1.06); } }
  @media (prefers-reduced-motion: reduce) {
    .atmosphere .blob { animation: none; }
  }

  /* ============================================================
     Glass utility — every surface in this concept is one of these.
     ============================================================ */
  .glass {
    position: relative;
    background: var(--glass);
    -webkit-backdrop-filter: var(--blur); backdrop-filter: var(--blur);
    border: 1px solid var(--glass-border);
    border-radius: var(--radius-lg);
  }
  .glass--strong { background: var(--glass-strong); }
  .glass--dark { background: rgba(6,9,18,0.55); -webkit-backdrop-filter: blur(20px) saturate(120%); backdrop-filter: blur(20px) saturate(120%); }
  .glass::before {
    content: ''; position: absolute; left: 10%; right: 10%; top: 0; height: 1px;
    background: linear-gradient(90deg, transparent, rgba(255,255,255,.55), transparent);
    pointer-events: none;
  }

  /* ============================================================
     Screens / router
     ============================================================ */
  #screens { position: fixed; inset: 0; z-index: 1; }
  section[data-screen] {
    position: absolute; inset: 0; overflow-y: auto; -webkit-overflow-scrolling: touch;
    padding: var(--island-space) 16px var(--chrome-space);
  }
  section[data-screen="terminals"] { padding-bottom: var(--chrome-space-term); }
  section[data-screen="terminals"]:not([hidden]) { overflow: hidden; display: flex; flex-direction: column; }

  ::-webkit-scrollbar { width: 0; height: 0; }

  /* ============================================================
     Dynamic Island — persistent, top center, morphs compact<->open.
     ============================================================ */
  #island { position: fixed; top: calc(env(safe-area-inset-top, 0px) + 10px); left: 50%; transform: translateX(-50%); z-index: 60; }
  .island-shell {
    width: 236px; height: 40px; overflow: hidden; cursor: pointer;
    display: flex; align-items: center;
    transition: width 380ms var(--spring), height 380ms var(--spring), border-radius 380ms var(--spring), background 380ms var(--spring);
    border-radius: 20px;
  }
  .island-shell.is-open { width: min(92vw, 400px); height: auto; max-height: 74vh; border-radius: var(--radius-lg); cursor: default; align-items: stretch; overflow-y: auto; }
  .island-compact { display: flex; align-items: center; gap: 10px; padding: 0 14px; width: 100%; white-space: nowrap; transition: opacity 200ms ease, transform 300ms var(--spring); }
  .island-shell.is-open .island-compact { opacity: 0; transform: translateY(-6px) scale(.94); pointer-events: none; position: absolute; }
  .island-seg { display: flex; align-items: center; gap: 6px; min-width: 0; }
  .island-seg__label { font-size: 12px; font-weight: 600; letter-spacing: .01em; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .island-dot { width: 7px; height: 7px; border-radius: 50%; flex: none; background: var(--text-dim); }
  .island-dot.is-live { background: var(--accent); box-shadow: 0 0 0 0 rgba(106,168,255,.6); animation: islandPulse 1.4s ease-out infinite; }
  .island-dot.is-warn { background: var(--warn); box-shadow: 0 0 0 0 rgba(251,191,36,.6); animation: islandPulse 1.1s ease-out infinite; }
  .island-dot.is-ok { background: var(--ok); }
  @keyframes islandPulse { 0% { box-shadow: 0 0 0 0 rgba(106,168,255,.55); } 70% { box-shadow: 0 0 0 7px rgba(106,168,255,0); } 100% { box-shadow: 0 0 0 0 rgba(106,168,255,0); } }
  .island-divider { width: 1px; height: 16px; background: var(--glass-border); flex: none; }
  .island-seg--prayer { color: var(--text-dim); font-variant-numeric: tabular-nums; }
  .island-moon { flex: none; opacity: .85; }

  .island-expanded { display: none; opacity: 0; padding: 16px 18px 18px; }
  .island-shell.is-open .island-expanded { display: block; opacity: 1; transition: opacity 320ms var(--spring) 90ms; }
  .island-expanded h4 { margin: 14px 0 8px; font-size: 11px; text-transform: uppercase; letter-spacing: .08em; color: var(--text-dim); font-weight: 600; }
  .island-expanded h4:first-child { margin-top: 0; }
  .island-row { display: flex; align-items: center; gap: 10px; padding: 8px 0; border-top: 1px solid rgba(255,255,255,.08); }
  .island-row:first-of-type { border-top: none; }
  .island-row__dot { width: 8px; height: 8px; border-radius: 50%; flex: none; }
  .island-row__name { font-weight: 600; font-size: 13.5px; flex: 1; min-width: 0; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .island-row__meta { font-size: 12px; color: var(--text-dim); flex: none; }
  .island-activity-feed { font: 12.5px/1.5 var(--font-mono); color: var(--text-dim); background: rgba(0,0,0,.28); border-radius: var(--radius-sm); padding: 10px 12px; white-space: pre-wrap; word-break: break-word; }
  .island-activity-feed .sgr-g { color: var(--ok); } .island-activity-feed .sgr-r { color: var(--err); } .island-activity-feed .sgr-b { font-weight: 700; } .island-activity-feed .sgr-d { opacity: .6; }
  .island-close-hint { text-align: center; font-size: 11px; color: var(--text-dim); padding-top: 12px; opacity: .7; }

  /* ============================================================
     Toasts
     ============================================================ */
  #toasts { position: fixed; left: 50%; bottom: calc(env(safe-area-inset-bottom,0px) + 96px); transform: translateX(-50%); z-index: 100; display: flex; flex-direction: column; gap: 8px; align-items: center; pointer-events: none; }
  .toast { background: var(--glass-strong); -webkit-backdrop-filter: var(--blur); backdrop-filter: var(--blur); border: 1px solid var(--glass-border); color: var(--text); padding: 10px 18px; border-radius: 999px; font-size: 13px; font-weight: 500; opacity: 0; transform: translateY(8px) scale(.96); transition: opacity 260ms var(--spring), transform 260ms var(--spring); white-space: nowrap; }
  .toast.show { opacity: 1; transform: translateY(0) scale(1); }

  /* ============================================================
     Glass dock — bottom pill navigation
     ============================================================ */
  #dock { position: fixed; left: 50%; bottom: calc(env(safe-area-inset-bottom, 0px) + 16px); transform: translateX(-50%); z-index: 40;
    display: flex; gap: 2px; padding: 6px; background: var(--glass); -webkit-backdrop-filter: var(--blur); backdrop-filter: var(--blur);
    border: 1px solid var(--glass-border); border-radius: 999px; }
  #dock::before { content: ''; position: absolute; left: 14%; right: 14%; top: 0; height: 1px; background: linear-gradient(90deg, transparent, rgba(255,255,255,.5), transparent); }
  .dock-btn { display: flex; flex-direction: column; align-items: center; gap: 3px; width: 58px; padding: 7px 2px 6px; border-radius: 999px; color: var(--text-dim); transition: color 250ms var(--spring), background 250ms var(--spring); }
  .dock-btn svg { width: 20px; height: 20px; }
  .dock-btn span { font-size: 9.5px; font-weight: 600; letter-spacing: .01em; }
  .dock-btn.active { color: var(--text); background: rgba(106,168,255,.16); }
  .dock-btn:active { transform: scale(.94); }

  /* ============================================================
     Bottom sheets (Mehr / permission) — slide up with spring
     ============================================================ */
  .sheet-wrap { position: fixed; inset: 0; z-index: 70; display: flex; align-items: flex-end; justify-content: center; visibility: hidden; }
  .sheet-wrap.is-open { visibility: visible; }
  .sheet-backdrop { position: absolute; inset: 0; background: rgba(4,6,12,0); transition: background 350ms var(--spring); }
  .sheet-wrap.is-open .sheet-backdrop { background: rgba(4,6,12,.5); }
  .sheet-panel { position: relative; width: 100%; max-width: 480px; margin: 0 10px calc(env(safe-area-inset-bottom, 0px) + 10px); padding: 10px 18px calc(18px + env(safe-area-inset-bottom, 0px));
    background: var(--glass-strong); -webkit-backdrop-filter: var(--blur); backdrop-filter: var(--blur); border: 1px solid var(--glass-border); border-radius: var(--radius-lg);
    transform: translateY(110%); transition: transform 400ms var(--spring); }
  .sheet-wrap.is-open .sheet-panel { transform: translateY(0); }
  .sheet-grabber { width: 36px; height: 4px; border-radius: 3px; background: var(--glass-border); margin: 4px auto 14px; }
  .sheet-title { font-size: 15px; font-weight: 700; margin-bottom: 12px; }

  .mehr-list { display: flex; flex-direction: column; gap: 4px; }
  .mehr-item { display: flex; align-items: center; gap: 12px; padding: 13px 10px; border-radius: var(--radius-md); text-align: left; transition: background 200ms var(--spring); }
  .mehr-item:active, .mehr-item:hover { background: rgba(255,255,255,.06); }
  .mehr-item svg { width: 19px; height: 19px; color: var(--accent); flex: none; }
  .mehr-item span { font-size: 14.5px; font-weight: 500; }

  .perm-tool-row { display: flex; align-items: baseline; gap: 8px; flex-wrap: wrap; }
  .perm-tool { font-weight: 700; font-size: 15px; }
  .perm-target { font: 12.5px var(--font-mono); color: var(--text-dim); background: rgba(0,0,0,.28); padding: 2px 7px; border-radius: 6px; }
  .perm-question { color: var(--text-dim); font-size: 13.5px; margin: 8px 0 16px; }
  .perm-actions { display: flex; gap: 8px; flex-wrap: wrap; }
  .perm-actions button { flex: 1; min-width: 96px; padding: 12px 10px; border-radius: var(--radius-md); font-weight: 600; font-size: 13.5px; border: 1px solid var(--glass-border); background: rgba(255,255,255,.05); transition: background 200ms var(--spring), border-color 200ms var(--spring), color 200ms var(--spring); }
  .perm-actions button[data-act="yes"] { background: rgba(106,168,255,.22); border-color: rgba(106,168,255,.4); color: #d9e6ff; }
  .perm-actions button[data-act="no"] { color: var(--err); }
  .perm-actions button[data-act="auto"][aria-pressed="true"] { background: rgba(74,222,128,.18); border-color: rgba(74,222,128,.4); color: var(--ok); }

  /* ============================================================
     Servers screen
     ============================================================ */
  .update-pill { display: flex; align-items: center; gap: 10px; padding: 11px 14px; margin-bottom: 18px; border-radius: 999px; }
  .update-pill__text { flex: 1; font-size: 12.5px; }
  .update-pill__text b { color: var(--accent-warm); }
  .update-pill button.cta { font-size: 12px; font-weight: 700; color: var(--accent); padding: 6px 12px; border-radius: 999px; background: rgba(106,168,255,.16); }
  .update-pill button.x { color: var(--text-dim); font-size: 16px; padding: 2px 4px; }

  .screen-title { font-size: 26px; font-weight: 700; letter-spacing: -0.01em; margin: 4px 0 16px; }

  .server-grid { display: grid; grid-template-columns: 1fr; gap: 12px; }
  .server-card { padding: 18px; display: flex; align-items: center; gap: 14px; transition: transform 300ms var(--spring), background 300ms var(--spring); }
  .server-card[data-status="online"] { cursor: pointer; }
  .server-card[data-status="online"]:active { transform: scale(.98); }
  .server-card[data-status="offline"] { opacity: .55; }
  .server-orb { position: relative; width: 46px; height: 46px; border-radius: 50%; flex: none; display: flex; align-items: center; justify-content: center; background: rgba(255,255,255,.06); border: 1px solid var(--glass-border); }
  .server-orb svg { width: 22px; height: 22px; }
  .server-card[data-status="online"] .server-orb { box-shadow: 0 0 0 1px rgba(74,222,128,.4), 0 0 30px 6px rgba(74,222,128,.30); color: var(--ok); }
  .server-card[data-status="offline"] .server-orb { color: var(--text-dim); }
  .server-info { flex: 1; min-width: 0; }
  .server-name { font-size: 17px; font-weight: 700; letter-spacing: -0.01em; }
  .server-host { font: 12px var(--font-mono); color: var(--text-dim); margin-top: 2px; }
  .server-meta { display: flex; gap: 8px; margin-top: 8px; flex-wrap: wrap; }
  .server-chip { font-size: 11px; font-weight: 600; padding: 4px 9px; border-radius: 999px; background: rgba(255,255,255,.06); color: var(--text-dim); }
  .server-chip.ok { color: var(--ok); }

  /* ============================================================
     Terminal workspace — spatial swipeable stack
     ============================================================ */
  .term-header { display: flex; align-items: center; justify-content: space-between; padding: 0 2px 12px; flex: none; }
  .term-header h2 { margin: 0; font-size: 22px; font-weight: 700; letter-spacing: -.01em; }
  .overview-btn { width: 38px; height: 38px; border-radius: 12px; font-size: 17px; display: flex; align-items: center; justify-content: center; }
  .overview-btn.is-on { background: rgba(106,168,255,.2); color: var(--accent); }

  .workspace { flex: 1; min-height: 0; display: flex; gap: 14px; padding: 0 16px; }
  .stack-pane { position: relative; flex: 1; min-width: 0; min-height: 0; overflow: hidden; border-radius: var(--radius-lg); }
  .stack { position: absolute; inset: 0; touch-action: pan-y; }
  .stack.is-dragging .stack-card { transition: none !important; }

  .stack-card { position: absolute; inset: 0; margin: 0 auto; width: 100%; max-width: 480px; display: flex; flex-direction: column; overflow: hidden;
    transition: transform 380ms var(--spring), opacity 380ms var(--spring), filter 380ms var(--spring); will-change: transform, opacity; }
  .card-header { flex: none; display: flex; align-items: center; gap: 10px; padding: 14px 16px 12px; cursor: grab; }
  .card-tag { width: 10px; height: 10px; border-radius: 50%; flex: none; }
  .card-name-wrap { flex: 1; min-width: 0; }
  .card-name { font-size: 15.5px; font-weight: 700; letter-spacing: -.005em; background: none; border: none; padding: 2px 0; width: 100%; border-bottom: 1px solid transparent; }
  .card-name[data-editing="1"] { border-bottom: 1px solid var(--accent); outline: none; }
  .card-desc { font-size: 11.5px; color: var(--text-dim); margin-top: 1px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .status-chip { flex: none; font-size: 10.5px; font-weight: 700; letter-spacing: .02em; padding: 4px 9px; border-radius: 999px; display: flex; align-items: center; gap: 5px; text-transform: uppercase; }
  .status-chip .dot { width: 6px; height: 6px; border-radius: 50%; }
  .status-chip[data-status="running"] { color: var(--accent); background: rgba(106,168,255,.14); }
  .status-chip[data-status="running"] .dot { background: var(--accent); animation: islandPulse 1.3s ease-out infinite; }
  .status-chip[data-status="waiting"] { color: var(--warn); background: rgba(251,191,36,.14); }
  .status-chip[data-status="waiting"] .dot { background: var(--warn); }
  .status-chip[data-status="done"] { color: var(--ok); background: rgba(74,222,128,.14); }
  .status-chip[data-status="done"] .dot { background: var(--ok); }
  .status-chip[data-status="idle"] { color: var(--text-dim); background: rgba(255,255,255,.06); }
  .status-chip[data-status="idle"] .dot { background: var(--text-dim); }

  .card-body { flex: 1; min-height: 0; overflow-y: auto; margin: 0 8px 8px; border-radius: var(--radius-md); padding: 12px 14px; font: 13px/1.6 var(--font-mono); position: relative; }
  .card-body::before { display: none; }
  .term-line { display: block; white-space: pre-wrap; word-break: break-word; padding: 1px 0; border-radius: 4px; }
  .term-line.is-selected { background: rgba(106,168,255,.22); }
  .selection-mode .term-line { cursor: pointer; }
  .selection-mode .term-line:active { background: rgba(106,168,255,.12); }
  .sgr-b { font-weight: 700; } .sgr-d { opacity: .58; } .sgr-g { color: var(--ok); } .sgr-r { color: var(--err); }
  .wrapped-link { color: var(--accent); text-decoration: underline; text-decoration-color: rgba(106,168,255,.4); text-underline-offset: 2px; cursor: pointer; word-break: break-all; }

  .replay-pill { flex: none; margin: 0 8px 10px; padding: 10px; border: 1px dashed var(--glass-border); border-radius: var(--radius-md); text-align: center; font-size: 12.5px; font-weight: 600; color: var(--text-dim); transition: border-color 250ms var(--spring), color 250ms var(--spring); }
  .replay-pill:hover { border-color: var(--accent); color: var(--accent); }
  .replay-pill[hidden] { display: none; }

  /* glowing selection handles + copy bubble */
  .sel-handle { position: absolute; width: 16px; height: 16px; border-radius: 50%; background: var(--accent); transform: translate(-50%, 0); touch-action: none; z-index: 5;
    box-shadow: 0 0 0 4px rgba(106,168,255,.22), 0 0 16px 3px rgba(106,168,255,.65); animation: handleGlow 1.6s ease-in-out infinite; }
  @keyframes handleGlow { 0%,100% { box-shadow: 0 0 0 4px rgba(106,168,255,.22), 0 0 16px 3px rgba(106,168,255,.55); } 50% { box-shadow: 0 0 0 6px rgba(106,168,255,.3), 0 0 22px 6px rgba(106,168,255,.8); } }
  .sel-handle::before { content: ''; position: absolute; left: 50%; bottom: 100%; width: 2px; height: 18px; background: var(--accent); transform: translateX(-50%); box-shadow: 0 0 8px rgba(106,168,255,.7); }
  .copy-bubble { position: absolute; transform: translateX(-8px); background: var(--glass-strong); -webkit-backdrop-filter: var(--blur); backdrop-filter: var(--blur); border: 1px solid var(--glass-border); color: var(--text); font: 600 12px var(--font-ui); padding: 7px 14px; border-radius: 999px; cursor: pointer; z-index: 6; white-space: nowrap; }

  /* rail (expanded ≥700px) */
  .rail { display: none; }
  .rail-item { padding: 10px 12px; margin-bottom: 8px; cursor: grab; transition: transform 300ms var(--spring), border-color 300ms var(--spring); border-radius: var(--radius-md); }
  .rail-item.is-active { border-color: rgba(106,168,255,.5); background: rgba(106,168,255,.08); }
  .rail-item.is-dragging { opacity: .35; }
  .rail-item__top { display: flex; align-items: center; gap: 8px; }
  .rail-item__name { font-size: 12.5px; font-weight: 700; flex: 1; min-width: 0; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .rail-item__preview { margin-top: 6px; font: 10.5px/1.4 var(--font-mono); color: var(--text-dim); max-height: 42px; overflow: hidden; word-break: break-word; overflow-wrap: anywhere; }
  .rail-drop-ghost { position: fixed; z-index: 90; pointer-events: none; opacity: .9; padding: 10px 14px; border-radius: var(--radius-md); font-size: 12.5px; font-weight: 700; }
  .rail-item.drop-target, .stack-pane.drop-target { outline: 2px solid var(--accent); outline-offset: -2px; border-radius: var(--radius-md); }
  .overview-tile .status-chip { padding: 4px 6px; }

  /* overview 2x2 grid */
  .overview-grid { display: none; position: absolute; inset: 0; z-index: 150; grid-template-columns: 1fr 1fr; grid-template-rows: 1fr 1fr; gap: 10px; padding: 4px; }
  .overview-grid.is-open { display: grid; }
  .stack-pane.overview-active .stack { visibility: hidden; }
  .overview-tile { min-width: 0; min-height: 0; padding: 12px; display: flex; flex-direction: column; gap: 6px; text-align: left; transition: transform 200ms var(--spring); cursor: pointer; }
  .overview-tile:active { transform: scale(.96); }
  .overview-tile__head { display: flex; align-items: center; gap: 6px; min-width: 0; }
  .overview-tile__name { font-size: 12.5px; font-weight: 700; flex: 1; min-width: 0; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .overview-tile__body { flex: 1; min-width: 0; min-height: 0; overflow: hidden; font: 10px/1.4 var(--font-mono); color: var(--text-dim); word-break: break-word; overflow-wrap: anywhere; }

  /* toolbar */
  #toolbarHost { position: fixed; left: 50%; bottom: calc(env(safe-area-inset-bottom, 0px) + 74px); transform: translateX(-50%); z-index: 45; display: none; flex-direction: column; align-items: center; gap: 6px; }
  #toolbarHost.is-visible { display: flex; }
  .key-echo-host { display: flex; gap: 6px; min-height: 0; }
  .key-echo { background: var(--glass-strong); border: 1px solid var(--glass-border); padding: 4px 10px; border-radius: 999px; font-size: 11px; font-weight: 700; opacity: 0; transform: translateY(4px); transition: opacity 180ms var(--spring), transform 180ms var(--spring); }
  .key-echo.show { opacity: 1; transform: translateY(0); }
  .toolbar-pill { display: flex; gap: 3px; padding: 6px; border-radius: 999px; }
  .toolbar-pill button { min-width: 34px; height: 32px; padding: 0 9px; border-radius: 999px; font-size: 12px; font-weight: 700; color: var(--text-dim); transition: background 200ms var(--spring), color 200ms var(--spring); }
  .toolbar-pill button:active { background: rgba(255,255,255,.1); }
  .toolbar-pill button.is-on { color: var(--accent); background: rgba(106,168,255,.18); }

  /* ============================================================
     Breakpoints — compact <400, medium 400-699, expanded >=700
     ============================================================ */
  @media (min-width: 700px) {
    .server-grid { grid-template-columns: 1fr 1fr; }
    .rail { display: block; flex: 0 0 38%; max-width: 320px; overflow-y: auto; padding-right: 2px; }
    .stack-pane { flex: 1 1 60%; }
  }
  @media (max-width: 699.98px) {
    .stack-card { max-width: 520px; }
  }
</style>
</head>
<body>

        <span>Tools</span>
      </button>
      <button class="mehr-item" data-target="settings">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.6 1.6 0 0 0 .3 1.8l.1.1a2 2 0 1 1-2.8 2.8l-.1-.1a1.6 1.6 0 0 0-1.8-.3 1.6 1.6 0 0 0-1 1.5V21a2 2 0 1 1-4 0v-.1a1.6 1.6 0 0 0-1-1.5 1.6 1.6 0 0 0-1.8.3l-.1.1a2 2 0 1 1-2.8-2.8l.1-.1a1.6 1.6 0 0 0 .3-1.8 1.6 1.6 0 0 0-1.5-1H3a2 2 0 1 1 0-4h.1a1.6 1.6 0 0 0 1.5-1 1.6 1.6 0 0 0-.3-1.8l-.1-.1a2 2 0 1 1 2.8-2.8l.1.1a1.6 1.6 0 0 0 1.8.3H9a1.6 1.6 0 0 0 1-1.5V3a2 2 0 1 1 4 0v.1a1.6 1.6 0 0 0 1 1.5 1.6 1.6 0 0 0 1.8-.3l.1-.1a2 2 0 1 1 2.8 2.8l-.1.1a1.6 1.6 0 0 0-.3 1.8V9a1.6 1.6 0 0 0 1.5 1H21a2 2 0 1 1 0 4h-.1a1.6 1.6 0 0 0-1.5 1z"/></svg>
        <span>Einstellungen</span>
      </button>
      <button class="mehr-item" data-target="prayer">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"><path d="M14.2 3.1a8.7 8.7 0 1 0 6.7 12.9A7.2 7.2 0 0 1 14.2 3.1z"/></svg>
        <span>Gebetszeiten</span>
      </button>
      <button class="mehr-item" data-target="lock">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"><rect x="5" y="11" width="14" height="9" rx="2"/><path d="M8 11V7a4 4 0 0 1 8 0v4"/></svg>
        <span>Sperren</span>
      </button>
    </div>
  </div>
</div>

<div id="toasts"></div>

<script src="../shared/data.js" charset="utf-8"></script>
<script src="../shared/sim.js" charset="utf-8"></script>
<script>
  // ============================================================
  // Charset workaround: the static dev server sends `../shared/*.js`
  // without a charset in Content-Type, so Chromium falls back to
  // windows-1252 for those two files regardless of this document's
  // UTF-8 meta tag — every non-ASCII byte in TMS_DATA (—, ●, ⎿, ä/ö/ü…)
  // arrives mis-decoded. Losslessly re-interpret the affected strings:
  // walk each char back to its original byte via the windows-1252
  // table, then re-decode that byte sequence as UTF-8. Already-correct
  // strings fail the strict re-decode and are returned untouched.
  // ============================================================
  (function fixSharedDataEncoding() {
    const CP1252_REV = { 0x20AC:0x80, 0x201A:0x82, 0x0192:0x83, 0x201E:0x84, 0x2026:0x85, 0x2020:0x86, 0x2021:0x87, 0x02C6:0x88, 0x2030:0x89, 0x0160:0x8A, 0x2039:0x8B, 0x0152:0x8C, 0x017D:0x8E, 0x2018:0x91, 0x2019:0x92, 0x201C:0x93, 0x201D:0x94, 0x2022:0x95, 0x2013:0x96, 0x2014:0x97, 0x02DC:0x98, 0x2122:0x99, 0x0161:0x9A, 0x203A:0x9B, 0x0153:0x9C, 0x017E:0x9E, 0x0178:0x9F };
    const decoder = (typeof TextDecoder !== 'undefined') ? new TextDecoder('utf-8', { fatal: true }) : null;
    function fixString(str) {
      if (!decoder || !/[-￿]/.test(str)) return str;
      try {
        const bytes = new Uint8Array(str.length);
        for (let i = 0; i < str.length; i++) {
          const code = str.charCodeAt(i);
          const byte = CP1252_REV[code] !== undefined ? CP1252_REV[code] : code;
          if (byte > 0xff) return str; // genuinely not a byte value -> already real unicode, leave alone
          bytes[i] = byte;
        }
        return decoder.decode(bytes);
      } catch (e) { return str; } // not a mis-decoded UTF-8 sequence -> leave untouched
    }
    function walk(node) {
      if (Array.isArray(node)) { for (let i = 0; i < node.length; i++) node[i] = walk(node[i]); return node; }
      if (node && typeof node === 'object') { for (const k in node) node[k] = walk(node[k]); return node; }
      if (typeof node === 'string') return fixString(node);
      return node;
    }
    if (typeof TMS_DATA === 'object') walk(TMS_DATA);
  })();

  // ============================================================
  // State
  // ============================================================
  const state = {
    order: TMS_DATA.sessions.map(s => s.id),   // logical stack position -> session id (mutable via rail swap)
    activeIndex: 0,
    activeFloat: 0,
    overviewOpen: false,
    islandOpen: false,
    pendingPromptId: null,
    suppressClick: false,
  };
  const cardState = {}; // id -> { lines, sim, autoApprove, pendingPrompt, autoTimer, selectionMode, selection }
  TMS_DATA.sessions.forEach(s => {
    cardState[s.id] = { lines: s.buffer.slice(), sim: null, autoApprove: false, pendingPrompt: null, autoTimer: null, selectionMode: false, selection: null };
  });

  // ============================================================
  // Generic helpers
  // ============================================================
  function escapeHtml(s) {
    return String(s).replace(/[&<>"']/g, c => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;' }[c]));
  }

  // Minimal ANSI SGR renderer: bold(1) dim(2) red(31) green(32) reset(0), incl. multi-param
  // sequences like \x1b[1;32m. Every other escape sequence (non-SGR CSI, OSC, lone ESC) is
  // stripped so no raw escape ever leaks into the DOM.
  function ansiToHtml(str) {
    const CLASS = { '1': 'sgr-b', '2': 'sgr-d', '31': 'sgr-r', '32': 'sgr-g' };
    let out = '', open = 0, last = 0, m;
    const re = /\x1b\[([0-9;]*)m/g;
    const emitText = chunk => {
      chunk = chunk
        .replace(/\x1b\][^\x07\x1b]*(?:\x07|\x1b\\)/g, '') // OSC (…BEL or …ESC\)
        .replace(/\x1b\[[0-9;?]*[ -\/]*[@-~]/g, '')        // any other CSI
        .replace(/\x1b./g, '');                            // lone ESC + follow byte
      out += escapeHtml(chunk);
    };
    while ((m = re.exec(str))) {
      emitText(str.slice(last, m.index));
      last = re.lastIndex;
      for (const code of (m[1] === '' ? '0' : m[1]).split(';')) {
        const c = code === '' ? '0' : code;
        if (c === '0') { while (open) { out += '</span>'; open--; } }
        else if (CLASS[c]) { out += `<span class="${CLASS[c]}">`; open++; }
      }
    }
    emitText(str.slice(last));
    while (open) { out += '</span>'; open--; }
    return out;
  }

  // Renders one buffer line, special-casing the wrapped deploy link so it always stays a
  // single inline element (the browser wraps it visually, it is never split in the DOM).
  function renderBufferLine(line) {
    const url = TMS_DATA.demo.wrappedLinkUrl;
    const idx = line.indexOf(url);
    if (idx === -1) return ansiToHtml(line);
    const idMatch = url.match(/dpl_\w+/);
    const shortId = idMatch ? idMatch[0].slice(0, 12) : url.slice(-12);
    const before = ansiToHtml(line.slice(0, idx));
    const after = ansiToHtml(line.slice(idx + url.length));
    const link = `<span class="wrapped-link" data-url="${escapeHtml(url)}" data-short="${escapeHtml(shortId)}" role="link" tabindex="0">${escapeHtml(url)}</span>`;
    return before + link + after;
  }

  function toast(message) {
    const host = document.getElementById('toasts');
    const el = document.createElement('div');
    el.className = 'toast';
    el.textContent = message;
    host.appendChild(el);
    requestAnimationFrame(() => el.classList.add('show'));
    setTimeout(() => {
      el.classList.remove('show');
      setTimeout(() => el.remove(), 220);
    }, 2400);
  }

  function fallbackCopy(text) {
    const ta = document.createElement('textarea');
    ta.value = text; ta.style.position = 'fixed'; ta.style.opacity = '0';
    document.body.appendChild(ta); ta.select();
    try { document.execCommand('copy'); } catch (e) { /* best effort */ }
    ta.remove();
  }
  function copyText(text) {
    try {
      if (navigator.clipboard && navigator.clipboard.writeText) {
        navigator.clipboard.writeText(text).catch(() => fallbackCopy(text));
        return;
      }
    } catch (e) { /* fall through */ }
    fallbackCopy(text);
  }

  // ============================================================
  // Prayer countdown — fixed demo "now" so the mockup is deterministic
  // ============================================================
  const DEMO_NOW_MIN = 15 * 60 + 17; // 15:17
  function toMin(hhmm) { const [h, m] = hhmm.split(':').map(Number); return h * 60 + m; }
  function nextPrayer() {
    const times = TMS_DATA.prayerTimes.map(p => ({ ...p, min: toMin(p.time) }));
    let next = times.find(p => p.min > DEMO_NOW_MIN);
    let diff;
    if (next) diff = next.min - DEMO_NOW_MIN;
    else { next = times[0]; diff = (next.min + 24 * 60) - DEMO_NOW_MIN; }
    const h = Math.floor(diff / 60), m = diff % 60;
    return { name: next.name, time: next.time, countdown: `${h}:${String(m).padStart(2, '0')}h` };
  }

  // ============================================================
  // Dynamic Island
  // ============================================================
  const islandShell = document.getElementById('islandShell');
  const islandDot = document.getElementById('islandDot');
  const islandActivityLabel = document.getElementById('islandActivityLabel');
  const islandPrayerLabel = document.getElementById('islandPrayerLabel');
  const islandExpanded = document.getElementById('islandExpanded');

  function setIslandActivity(kind, label) {
    islandDot.className = 'island-dot' + (kind === 'live' ? ' is-live' : kind === 'warn' ? ' is-warn' : kind === 'ok' ? ' is-ok' : '');
    islandActivityLabel.textContent = label;
  }

  function renderIslandExpanded() {
    const np = nextPrayer();
    const live = TMS_DATA.sessions.find(s => s.live);
    const cs = cardState[live.id];
    const lastLine = cs.lines[cs.lines.length - 1] || '';
    const building = TMS_DATA.cloudProjects.find(p => p.status === 'building');
    const sessionRows = TMS_DATA.sessions.map(s => `
      <div class="island-row" data-session="${s.id}" role="button" tabindex="0">
        <span class="island-row__dot" style="background:${s.colorTag}"></span>
        <span class="island-row__name">${escapeHtml(s.name)}</span>
        <span class="island-row__meta">${escapeHtml(s.status)}</span>
      </div>`).join('');
    islandExpanded.innerHTML = `
      <h4>Aktive Sitzungen</h4>
      ${sessionRows}
      <h4>Agent-Aktivität</h4>
      <div class="island-activity-feed">${renderBufferLine(lastLine) || '—'}</div>
      <h4>Nächstes Gebet</h4>
      <div class="island-row"><span class="island-row__dot" style="background:var(--accent-warm)"></span><span class="island-row__name">${np.name} · ${np.time}</span><span class="island-row__meta">in ${np.countdown}</span></div>
      <h4>Deploy</h4>
      <div class="island-row"><span class="island-row__dot" style="background:var(--warn)"></span><span class="island-row__name">${building ? escapeHtml(building.name) : 'Keine aktiven Builds'}</span><span class="island-row__meta">${building ? 'Build läuft…' : ''}</span></div>
      <div class="island-close-hint">Antippen zum Schließen</div>
    `;
    islandExpanded.querySelectorAll('[data-session]').forEach(row => {
      row.addEventListener('click', e => {
        e.stopPropagation();
        const id = row.dataset.session;
        closeIsland();
        goToTerminals();
        setActive(state.order.indexOf(id));
      });
    });
  }

  function openIsland() {
    state.islandOpen = true;
    renderIslandExpanded();
    islandShell.classList.add('is-open');
    islandShell.setAttribute('aria-expanded', 'true');
  }
  function closeIsland() {
    state.islandOpen = false;
    islandShell.classList.remove('is-open');
    islandShell.setAttribute('aria-expanded', 'false');
  }
  function toggleIsland() { state.islandOpen ? closeIsland() : openIsland(); }

  islandShell.addEventListener('click', toggleIsland);
  islandShell.addEventListener('keydown', e => { if (e.key === 'Enter' || e.key === ' ') { e.preventDefault(); toggleIsland(); } });
  document.addEventListener('keydown', e => { if (e.key === 'Escape' && state.islandOpen) closeIsland(); });

  islandPrayerLabel.textContent = (() => { const np = nextPrayer(); return `${np.name} in ${np.countdown}`; })();

  // ============================================================
  // Bottom sheets (Mehr / permission)
  // ============================================================
  function openSheet(wrapEl) { wrapEl.hidden = false; requestAnimationFrame(() => wrapEl.classList.add('is-open')); }
  function closeSheet(wrapEl) {
    wrapEl.classList.remove('is-open');
    setTimeout(() => { wrapEl.hidden = true; }, 420);
  }

  const mehrWrap = document.getElementById('mehrSheetWrap');
  document.querySelectorAll('.mehr-item').forEach(btn => {
    btn.addEventListener('click', () => {
      closeSheet(mehrWrap);
      toast('Kommt in Teil 2');
    });
  });
  mehrWrap.querySelector('[data-close-mehr]').addEventListener('click', () => closeSheet(mehrWrap));

  const permWrap = document.getElementById('permSheetWrap');
  permWrap.querySelector('[data-close-perm]').addEventListener('click', () => { /* modal — backdrop tap does not dismiss a pending decision */ });

  // ============================================================
  // Router
  // ============================================================
  const SCREEN_HOOKS = {
    terminals() { document.getElementById('toolbarHost').classList.add('is-visible'); },
  };
  function show(name) {
    document.querySelectorAll('[data-screen]').forEach(s => s.hidden = s.dataset.screen !== name);
    document.querySelectorAll('#dock [data-nav]').forEach(b => b.classList.toggle('active', b.dataset.nav === name));
    if (name !== 'terminals') document.getElementById('toolbarHost').classList.remove('is-visible');
    if (SCREEN_HOOKS[name]) SCREEN_HOOKS[name]();
  }
  function goToTerminals() { show('terminals'); }

  function wireNav() {
    document.querySelectorAll('#dock [data-nav]').forEach(btn => {
      const name = btn.dataset.nav;
      btn.addEventListener('click', () => {
        if (name === 'mehr') { openSheet(mehrWrap); return; }
        if (document.querySelector(`[data-screen="${name}"]`)) { show(name); return; }
        toast('Kommt in Teil 2');
      });
    });
  }

  // ============================================================
  // Servers screen
  // ============================================================
  function renderUpdateBanner(host) {
    const u = TMS_DATA.update;
    const pill = document.createElement('div');
    pill.className = 'update-pill glass';
    pill.innerHTML = `
      <div class="update-pill__text"><b>v${u.latest}</b> verfügbar — ${escapeHtml(u.notes)}</div>
      <button class="cta">Jetzt updaten</button>
      <button class="x" aria-label="Schließen">✕</button>
    `;
    pill.querySelector('.cta').addEventListener('click', () => toast('Mockup: Update-Vorgang wird nicht simuliert'));
    pill.querySelector('.x').addEventListener('click', () => pill.remove());
    host.appendChild(pill);
  }

  const SERVER_ICON = `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="4" width="18" height="6" rx="2"/><rect x="3" y="14" width="18" height="6" rx="2"/><circle cx="7" cy="7" r=".6" fill="currentColor" stroke="none"/><circle cx="7" cy="17" r=".6" fill="currentColor" stroke="none"/></svg>`;

  function renderServers() {
    const host = document.querySelector('[data-screen="servers"]');
    host.innerHTML = '';
    renderUpdateBanner(host);
    const title = document.createElement('h1');
    title.className = 'screen-title';
    title.textContent = 'Server';
    host.appendChild(title);
    const grid = document.createElement('div');
    grid.className = 'server-grid';
    TMS_DATA.servers.forEach(srv => {
      const online = srv.status === 'online';
      const card = document.createElement('div');
      card.className = 'glass server-card';
      card.dataset.status = srv.status;
      card.innerHTML = `
        <div class="server-orb">${SERVER_ICON}</div>
        <div class="server-info">
          <div class="server-name">${escapeHtml(srv.name)}</div>
          <div class="server-host">${escapeHtml(srv.host)}:${srv.port}</div>
          <div class="server-meta">
            <span class="server-chip ${online ? 'ok' : ''}">${online ? '● online' : '○ offline'}</span>
            <span class="server-chip">${srv.latency != null ? srv.latency + ' ms' : '—'}</span>
            <span class="server-chip">${srv.sessions} Terminals</span>
            <span class="server-chip">${escapeHtml(srv.os)}</span>
          </div>
        </div>
      `;
      card.addEventListener('click', () => {
        if (online) { goToTerminals(); }
        else { toast('Server offline — zuletzt gesehen vor 2 Std'); }
      });
      grid.appendChild(card);
    });
    host.appendChild(grid);
  }

  // ============================================================
  // Terminal workspace — spatial swipeable stack
  // ============================================================
  const STATUS_LABELS = { running: 'Läuft', waiting: 'Wartet', done: 'Fertig', idle: 'Bereit' };
  function clamp(v, lo, hi) { return Math.max(lo, Math.min(hi, v)); }

  function buildTerminalScreen() {
    const host = document.querySelector('[data-screen="terminals"]');
    host.innerHTML = `
      <div class="term-header">
        <h2>Terminals</h2>
        <button class="overview-btn glass" id="overviewBtn" aria-label="Übersicht" title="Übersicht">⊞</button>
      </div>
      <div class="workspace">
        <div class="stack-pane">
          <div class="stack" id="stack"></div>
          <div class="overview-grid" id="overviewGrid"></div>
        </div>
        <div class="rail" id="rail"></div>
      </div>
    `;
    buildStack();
    renderRail();
    document.getElementById('overviewBtn').addEventListener('click', () => toggleOverview());
    wireStackDrag();
  }

  function buildStack() {
    const stackEl = document.getElementById('stack');
    stackEl.innerHTML = '';
    state.order.forEach(id => {
      const session = TMS_DATA.sessions.find(s => s.id === id);
      const card = document.createElement('div');
      card.className = 'stack-card glass';
      card.dataset.id = id;
      card.innerHTML = `
        <div class="card-header">
          <span class="card-tag" style="background:${session.colorTag}"></span>
          <div class="card-name-wrap">
            <input class="card-name" value="${escapeHtml(session.name)}" readonly>
            <div class="card-desc">${escapeHtml(session.description)}</div>
          </div>
          <span class="status-chip" data-status="${session.status}"><span class="dot"></span><span class="status-chip__label">${STATUS_LABELS[session.status] || session.status}</span></span>
        </div>
        <pre class="card-body glass glass--dark" data-card-id="${id}"></pre>
        <button class="replay-pill" hidden>↻ Session erneut abspielen</button>
      `;
      stackEl.appendChild(card);
      wireCardHeader(card, id);
      renderCardLines(id);
    });
    layoutStack(state.activeIndex, { instant: true });
  }

  function wireCardHeader(card, id) {
    const input = card.querySelector('.card-name');
    const session = TMS_DATA.sessions.find(s => s.id === id);
    input.addEventListener('click', e => {
      e.stopPropagation();
      if (input.readOnly) { input.readOnly = false; input.dataset.editing = '1'; input.focus(); input.select(); }
    });
    function commit() {
      input.readOnly = true;
      delete input.dataset.editing;
      const val = input.value.trim();
      session.name = val || session.name;
      input.value = session.name;
      renderRail();
      if (state.overviewOpen) renderOverview();
    }
    input.addEventListener('blur', commit);
    input.addEventListener('keydown', e => {
      e.stopPropagation();
      if (e.key === 'Enter') input.blur();
      if (e.key === 'Escape') { input.value = session.name; input.blur(); }
    });
  }

  function renderCardLines(id) {
    const pre = document.querySelector(`.card-body[data-card-id="${id}"]`);
    if (!pre) return;
    const cs = cardState[id];
    const atBottom = pre.scrollHeight - pre.scrollTop - pre.clientHeight < 24;
    pre.innerHTML = cs.lines.map((line, i) => `<span class="term-line" data-i="${i}"><span class="term-line__text">${renderBufferLine(line)}</span></span>`).join('');
    if (cs.selection) {
      if (cs.selection.end >= cs.lines.length) { cs.selection = null; }
      else pre.querySelectorAll('.term-line').forEach((l, i) => l.classList.toggle('is-selected', i >= cs.selection.start && i <= cs.selection.end));
    }
    positionHandlesAndBubble(id);
    if (atBottom) pre.scrollTop = pre.scrollHeight;
    refreshPreviews();
  }

  function updateStatusChip(id, status) {
    const session = TMS_DATA.sessions.find(s => s.id === id);
    session.status = status;
    const chip = document.querySelector(`.stack-card[data-id="${id}"] .status-chip`);
    if (chip) { chip.dataset.status = status; chip.querySelector('.status-chip__label').textContent = STATUS_LABELS[status] || status; }
    refreshPreviews();
  }

  function refreshPreviews() {
    renderRail();
    if (state.overviewOpen) renderOverview();
  }

  function layoutStack(floatIndex, opts) {
    opts = opts || {};
    const stackEl = document.getElementById('stack');
    if (opts.instant) stackEl.classList.add('is-dragging');
    state.order.forEach((id, i) => {
      const card = stackEl.querySelector(`.stack-card[data-id="${id}"]`);
      if (!card) return;
      const off = i - floatIndex;
      const ao = Math.min(Math.abs(off), 3);
      const tx = off * 42, ty = ao * 14, scale = 1 - ao * 0.075;
      const opacity = ao < 0.05 ? 1 : Math.max(0.12, 1 - ao * 0.42);
      card.style.transform = `translate3d(${tx}%, ${ty}px, 0) scale(${scale})`;
      card.style.opacity = opacity;
      card.style.zIndex = 100 - Math.round(ao * 10);
      card.classList.toggle('is-active', ao < 0.05);
      card.style.pointerEvents = ao < 1.5 ? 'auto' : 'none';
      const body = card.querySelector('.card-body');
      if (body) body.style.pointerEvents = ao < 0.05 ? 'auto' : 'none';
    });
    if (opts.instant) requestAnimationFrame(() => stackEl.classList.remove('is-dragging'));
  }

  function setActive(index) {
    index = clamp(index, 0, state.order.length - 1);
    state.activeIndex = index;
    state.activeFloat = index;
    layoutStack(index);
    renderRail();
  }

  function wireStackDrag() {
    const stackEl = document.getElementById('stack');
    let dragging = false, pointerId = null, startX = 0, startY = 0, startFloat = 0, moved = false, cardWidthPx = 300;

    stackEl.addEventListener('pointerdown', e => {
      if (state.overviewOpen) return;
      const card = e.target.closest('.stack-card');
      if (!card) return;
      const idx = state.order.indexOf(card.dataset.id);
      const isActiveCard = idx === Math.round(state.activeFloat);
      if (isActiveCard && e.target.closest('.card-body, .card-name, .status-chip, .replay-pill')) return;
      pointerId = e.pointerId; startX = e.clientX; startY = e.clientY; startFloat = state.activeFloat; moved = false;
      cardWidthPx = card.getBoundingClientRect().width || 300;
      dragging = true;
      stackEl.setPointerCapture(pointerId);
    });
    stackEl.addEventListener('pointermove', e => {
      if (!dragging || e.pointerId !== pointerId) return;
      const dx = e.clientX - startX, dy = e.clientY - startY;
      if (!moved) {
        if (Math.abs(dx) < 6 || Math.abs(dx) < Math.abs(dy)) return;
        moved = true;
        stackEl.classList.add('is-dragging');
      }
      state.activeFloat = clamp(startFloat - dx / cardWidthPx, -0.4, state.order.length - 1 + 0.4);
      layoutStack(state.activeFloat);
    });
    function endDrag(e) {
      if (!dragging) return;
      dragging = false;
      try { stackEl.releasePointerCapture(pointerId); } catch (err) { /* already released */ }
      stackEl.classList.remove('is-dragging');
      if (moved) {
        state.suppressClick = true;
        setTimeout(() => { state.suppressClick = false; }, 30);
        setActive(Math.round(state.activeFloat));
      } else {
        const card = e.target.closest && e.target.closest('.stack-card');
        if (card) {
          const idx = state.order.indexOf(card.dataset.id);
          if (idx !== state.activeIndex) setActive(idx);
        }
      }
    }
    stackEl.addEventListener('pointerup', endDrag);
    stackEl.addEventListener('pointercancel', endDrag);
  }

  document.addEventListener('keydown', e => {
    const screen = document.querySelector('[data-screen="terminals"]');
    if (screen.hidden || state.overviewOpen) return;
    if (document.activeElement && document.activeElement.tagName === 'INPUT') return;
    if (e.key === 'ArrowRight') setActive(state.activeIndex + 1);
    else if (e.key === 'ArrowLeft') setActive(state.activeIndex - 1);
  });

  // ============================================================
  // Overview (⊞) — 2x2 grid
  // ============================================================
  function renderOverview() {
    const grid = document.getElementById('overviewGrid');
    grid.innerHTML = '';
    state.order.forEach((id, i) => {
      const session = TMS_DATA.sessions.find(s => s.id === id);
      const cs = cardState[id];
      const tile = document.createElement('div');
      tile.className = 'overview-tile glass';
      const previewLines = cs.lines.slice(-4).map(l => ansiToHtml(l)).join('<br>');
      tile.innerHTML = `
        <div class="overview-tile__head"><span class="card-tag" style="background:${session.colorTag}"></span><span class="overview-tile__name">${escapeHtml(session.name)}</span><span class="status-chip" data-status="${session.status}"><span class="dot"></span></span></div>
        <div class="overview-tile__body">${previewLines}</div>
      `;
      tile.addEventListener('click', () => { toggleOverview(false); setActive(i); });
      grid.appendChild(tile);
    });
  }
  function toggleOverview(force) {
    state.overviewOpen = typeof force === 'boolean' ? force : !state.overviewOpen;
    const grid = document.getElementById('overviewGrid');
    const btn = document.getElementById('overviewBtn');
    const pane = document.querySelector('.stack-pane');
    if (state.overviewOpen) { renderOverview(); grid.classList.add('is-open'); btn.classList.add('is-on'); pane.classList.add('overview-active'); }
    else { grid.classList.remove('is-open'); btn.classList.remove('is-on'); pane.classList.remove('overview-active'); }
  }

  // ============================================================
  // Rail (expanded ≥700px) — mini previews, drag-to-swap
  // ============================================================
  function renderRail() {
    const rail = document.getElementById('rail');
    if (!rail) return;
    rail.innerHTML = '';
    state.order.forEach((id, i) => {
      const session = TMS_DATA.sessions.find(s => s.id === id);
      const cs = cardState[id];
      const isActive = i === state.activeIndex;
      const item = document.createElement('div');
      item.className = 'rail-item glass' + (isActive ? ' is-active' : '');
      item.dataset.id = id; item.dataset.index = i;
      const preview = cs.lines.slice(-2).map(l => ansiToHtml(l)).join('<br>');
      item.innerHTML = `
        <div class="rail-item__top"><span class="card-tag" style="background:${session.colorTag}"></span><span class="rail-item__name">${escapeHtml(session.name)}</span></div>
        <div class="rail-item__preview">${preview}</div>
      `;
      item.addEventListener('click', () => { if (!isActive) setActive(i); });
      if (!isActive) wireRailDrag(item);
      rail.appendChild(item);
    });
  }

  function wireRailDrag(item) {
    item.addEventListener('pointerdown', e => {
      const startX = e.clientX, startY = e.clientY;
      let dragging = false, ghost = null;
      const fromId = item.dataset.id;
      const fromIndex = state.order.indexOf(fromId);
      function clearDropTargets() { document.querySelectorAll('.rail-item.drop-target, .stack-pane.drop-target').forEach(el => el.classList.remove('drop-target')); }
      function onMove(ev) {
        const dx = ev.clientX - startX, dy = ev.clientY - startY;
        if (!dragging) {
          if (Math.abs(dx) < 6 && Math.abs(dy) < 6) return;
          dragging = true;
          item.classList.add('is-dragging');
          ghost = document.createElement('div');
          ghost.className = 'rail-drop-ghost glass glass--strong';
          ghost.textContent = TMS_DATA.sessions.find(s => s.id === fromId).name;
          document.body.appendChild(ghost);
        }
        if (ghost) { ghost.style.left = ev.clientX + 12 + 'px'; ghost.style.top = ev.clientY + 8 + 'px'; }
        clearDropTargets();
        const under = document.elementFromPoint(ev.clientX, ev.clientY);
        const targetItem = under && under.closest('.rail-item');
        const targetPane = under && under.closest('.stack-pane');
        if (targetItem && targetItem !== item) targetItem.classList.add('drop-target');
        else if (targetPane) targetPane.classList.add('drop-target');
      }
      function onUp(ev) {
        document.removeEventListener('pointermove', onMove);
        document.removeEventListener('pointerup', onUp);
        if (ghost) ghost.remove();
        item.classList.remove('is-dragging');
        clearDropTargets();
        if (!dragging) return;
        const under = document.elementFromPoint(ev.clientX, ev.clientY);
        const targetItem = under && under.closest('.rail-item');
        const targetPane = under && under.closest('.stack-pane');
        if (targetItem && targetItem !== item) { swapOrder(fromIndex, Number(targetItem.dataset.index)); toast('Getauscht ✓'); }
        else if (targetPane) { swapOrder(fromIndex, state.activeIndex); toast('Getauscht ✓'); }
      }
      document.addEventListener('pointermove', onMove);
      document.addEventListener('pointerup', onUp);
    });
  }

  function swapOrder(a, b) {
    if (a === b) return;
    const tmp = state.order[a]; state.order[a] = state.order[b]; state.order[b] = tmp;
    layoutStack(state.activeIndex, { instant: true });
    renderRail();
    if (state.overviewOpen) renderOverview();
  }

  // ============================================================
  // Live Claude session (TMSSim) — session t1, auto-starts on load
  // so the Dynamic Island has something to report from any screen.
  // ============================================================
  function appendOutChunk(cs, chunk) {
    const pieces = chunk.split('\n');
    if (pieces[pieces.length - 1] === '') pieces.pop();
    cs.lines.push(...pieces);
  }

  let liveSimStarted = false;
  function initLiveSession() {
    if (liveSimStarted) return;
    liveSimStarted = true;
    const session = TMS_DATA.sessions.find(s => s.live);
    const id = session.id;
    const cs = cardState[id];
    const sim = TMSSim.createSession(session.script, { autoApprove: false });
    cs.sim = sim;
    sim.on('out', chunk => {
      appendOutChunk(cs, chunk);
      renderCardLines(id);
      if (state.islandOpen) renderIslandExpanded();
    });
    sim.on('status', status => {
      updateStatusChip(id, status);
      if (status === 'running') setIslandActivity('live', `Claude arbeitet · ${session.name}`);
      else if (status === 'done') setIslandActivity('ok', '✓ Fertig');
      if (state.islandOpen) renderIslandExpanded();
    });
    sim.on('prompt', data => {
      showPermSheet(id, data);
      setIslandActivity('warn', `Claude wartet · ${session.name}`);
    });
    sim.on('done', () => showReplay(id));
    sim.start();
  }

  function showPermSheet(id, data) {
    state.pendingPromptId = id;
    const cs = cardState[id];
    cs.pendingPrompt = data;
    document.getElementById('permTool').textContent = data.tool;
    document.getElementById('permTarget').textContent = data.target || '';
    document.getElementById('permQuestion').textContent = data.question || 'Erlauben?';
    document.getElementById('permAutoBtn').setAttribute('aria-pressed', String(cs.autoApprove));
    openSheet(permWrap);
    if (cs.autoApprove) armAutoApprove(id);
  }
  function armAutoApprove(id) {
    const cs = cardState[id];
    clearTimeout(cs.autoTimer);
    cs.autoTimer = setTimeout(() => {
      if (!cs.pendingPrompt || !cs.sim) return;
      appendOutChunk(cs, '  ⎿ ✔ Auto-Approve\n');
      renderCardLines(id);
      cs.pendingPrompt = null;
      closeSheet(permWrap);
      state.pendingPromptId = null;
      cs.sim.respond();
    }, 600);
  }
  function resolvePrompt(approved) {
    const id = state.pendingPromptId;
    if (!id) return;
    const cs = cardState[id];
    clearTimeout(cs.autoTimer);
    cs.pendingPrompt = null;
    state.pendingPromptId = null;
    closeSheet(permWrap);
    if (approved) {
      cs.sim.respond();
    } else {
      appendOutChunk(cs, '  ⎿ ✖ Abgelehnt — Aktion gestoppt\n');
      renderCardLines(id);
      updateStatusChip(id, 'idle');
      setIslandActivity('', 'Bereit');
      showReplay(id);
    }
  }
  function toggleAutoApprove() {
    const id = state.pendingPromptId;
    if (!id) return;
    const cs = cardState[id];
    cs.autoApprove = !cs.autoApprove;
    document.getElementById('permAutoBtn').setAttribute('aria-pressed', String(cs.autoApprove));
    if (cs.autoApprove && cs.pendingPrompt) armAutoApprove(id);
    else clearTimeout(cs.autoTimer);
  }
  document.querySelector('#permSheetWrap [data-act="yes"]').addEventListener('click', () => resolvePrompt(true));
  document.querySelector('#permSheetWrap [data-act="no"]').addEventListener('click', () => resolvePrompt(false));
  document.getElementById('permAutoBtn').addEventListener('click', toggleAutoApprove);

  function showReplay(id) {
    const btn = document.querySelector(`.stack-card[data-id="${id}"] .replay-pill`);
    if (!btn) return;
    btn.hidden = false;
    btn.onclick = () => replaySession(id);
  }
  function replaySession(id) {
    const cs = cardState[id];
    const session = TMS_DATA.sessions.find(s => s.id === id);
    clearTimeout(cs.autoTimer);
    cs.lines = session.buffer.slice();
    cs.pendingPrompt = null;
    clearSelection(id);
    const card = document.querySelector(`.stack-card[data-id="${id}"]`);
    card.querySelector('.replay-pill').hidden = true;
    renderCardLines(id);
    updateStatusChip(id, 'running');
    setIslandActivity('live', `Claude arbeitet · ${session.name}`);
    cs.sim.reset();
    cs.sim.start();
  }

  // ============================================================
  // Touch text-selection: glowing handles + copy bubble
  // ============================================================
  function handleLineTap(pre, line) {
    const id = pre.dataset.cardId;
    const cs = cardState[id];
    const i = Number(line.dataset.i);
    if (cs.selection && cs.selection.start === i && cs.selection.end === i) { clearSelection(id); return; }
    cs.selection = { start: i, end: i };
    pre.querySelectorAll('.term-line').forEach((l, idx) => l.classList.toggle('is-selected', idx === i));
    positionHandlesAndBubble(id);
  }
  function makeHandle(kind, cardId) {
    const el = document.createElement('div');
    el.className = `sel-handle sel-handle--${kind}`;
    el.addEventListener('pointerdown', e => startHandleDrag(e, cardId, kind));
    return el;
  }
  function startHandleDrag(e, cardId, kind) {
    e.stopPropagation();
    const handle = e.currentTarget;
    handle.setPointerCapture(e.pointerId);
    const pre = document.querySelector(`.card-body[data-card-id="${cardId}"]`);
    function onMove(ev) {
      const el = document.elementFromPoint(ev.clientX, ev.clientY);
      const line = el && el.closest && el.closest('.term-line');
      if (!line) return;
      const idx = Number(line.dataset.i);
      const cs = cardState[cardId];
      if (!cs.selection) return;
      if (kind === 'start') cs.selection.start = Math.min(idx, cs.selection.end);
      else cs.selection.end = Math.max(idx, cs.selection.start);
      pre.querySelectorAll('.term-line').forEach((l, i) => l.classList.toggle('is-selected', i >= cs.selection.start && i <= cs.selection.end));
      positionHandlesAndBubble(cardId);
    }
    function onUp(ev) {
      try { handle.releasePointerCapture(ev.pointerId); } catch (err) { /* already released */ }
      handle.removeEventListener('pointermove', onMove);
      handle.removeEventListener('pointerup', onUp);
    }
    handle.addEventListener('pointermove', onMove);
    handle.addEventListener('pointerup', onUp);
  }
  function makeBubble(cardId) {
    const el = document.createElement('button');
    el.className = 'copy-bubble';
    el.textContent = 'Kopieren';
    el.addEventListener('click', e => {
      e.stopPropagation();
      const cs = cardState[cardId];
      if (!cs.selection) return;
      const pre = document.querySelector(`.card-body[data-card-id="${cardId}"]`);
      const lines = [...pre.querySelectorAll('.term-line')].slice(cs.selection.start, cs.selection.end + 1);
      const text = lines.map(l => l.querySelector('.term-line__text').textContent).join('\n');
      copyText(text);
      toast('Kopiert ✓');
      clearSelection(cardId);
    });
    return el;
  }
  function positionHandlesAndBubble(cardId) {
    const pre = document.querySelector(`.card-body[data-card-id="${cardId}"]`);
    if (!pre) return;
    const cs = cardState[cardId];
    let hs = pre.querySelector('.sel-handle--start');
    let he = pre.querySelector('.sel-handle--end');
    let bubble = pre.querySelector('.copy-bubble');
    if (!cs.selection) { [hs, he, bubble].forEach(el => el && el.remove()); return; }
    if (!hs) { hs = makeHandle('start', cardId); pre.appendChild(hs); }
    if (!he) { he = makeHandle('end', cardId); pre.appendChild(he); }
    if (!bubble) { bubble = makeBubble(cardId); pre.appendChild(bubble); }
    const startLine = pre.querySelector(`.term-line[data-i="${cs.selection.start}"]`);
    const endLine = pre.querySelector(`.term-line[data-i="${cs.selection.end}"]`);
    if (!startLine || !endLine) return;
    const startText = startLine.querySelector('.term-line__text');
    const endText = endLine.querySelector('.term-line__text');
    hs.style.top = (startLine.offsetTop + startLine.offsetHeight) + 'px';
    hs.style.left = startText.offsetLeft + 'px';
    he.style.top = (endLine.offsetTop + endLine.offsetHeight) + 'px';
    he.style.left = (endText.offsetLeft + endText.offsetWidth) + 'px';
    bubble.style.top = Math.max(0, startLine.offsetTop - 38) + 'px';
    bubble.style.left = Math.min(startText.offsetLeft, endText.offsetLeft) + 'px';
  }
  function clearSelection(cardId) {
    const cs = cardState[cardId];
    cs.selection = null;
    const pre = document.querySelector(`.card-body[data-card-id="${cardId}"]`);
    if (!pre) return;
    pre.querySelectorAll('.term-line.is-selected').forEach(l => l.classList.remove('is-selected'));
    positionHandlesAndBubble(cardId);
  }

  // Delegated: wrapped-link copy (outside selection mode) + line-tap selection (inside selection mode)
  document.addEventListener('click', e => {
    if (state.suppressClick) return;
    const link = e.target.closest('.wrapped-link');
    if (link) {
      const inSelectionMode = link.closest('.card-body.selection-mode');
      if (!inSelectionMode) {
        copyText(link.dataset.url);
        toast(`Vollständiger Link kopiert ✓ (…${link.dataset.short}…)`);
        return;
      }
    }
    const pre = e.target.closest('.card-body.selection-mode');
    if (pre) {
      const line = e.target.closest('.term-line');
      if (line) handleLineTap(pre, line);
    }
  });

  // ============================================================
  // Terminal toolbar — floating glass pill above the dock
  // ============================================================
  function flashKeyEcho(label) {
    const host = document.getElementById('keyEchoHost');
    const chip = document.createElement('span');
    chip.className = 'key-echo';
    chip.textContent = label;
    host.appendChild(chip);
    requestAnimationFrame(() => chip.classList.add('show'));
    setTimeout(() => { chip.classList.remove('show'); setTimeout(() => chip.remove(), 200); }, 550);
  }
  function toggleSelectionMode() {
    const id = state.order[state.activeIndex];
    const cs = cardState[id];
    cs.selectionMode = !cs.selectionMode;
    document.getElementById('selToggleBtn').classList.toggle('is-on', cs.selectionMode);
    const pre = document.querySelector(`.card-body[data-card-id="${id}"]`);
    if (pre) pre.classList.toggle('selection-mode', cs.selectionMode);
    if (!cs.selectionMode) clearSelection(id);
  }
  function wireToolbar() {
    document.querySelectorAll('#toolbarPill button').forEach(btn => {
      btn.addEventListener('click', () => {
        const key = btn.dataset.key;
        if (key === 'Aa') { toggleSelectionMode(); return; }
        flashKeyEcho(key);
      });
    });
  }

  // ============================================================
  // Init
  // ============================================================
  renderServers();
  buildTerminalScreen();
  wireNav();
  wireToolbar();
  initLiveSession();
  show('servers');
</script>
</body>
</html>

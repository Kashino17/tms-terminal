<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TMS Terminal — Season 2</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: linear-gradient(135deg, #0a0e27 0%, #16213e 100%);
      color: #e0e0e0;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      padding: 1.5rem;
    }
    .container {
      max-width: 1200px;
      margin: 0 auto;
      width: 100%;
      flex: 1;
      display: flex;
      flex-direction: column;
    }
    header {
      text-align: center;
      margin-bottom: 2rem;
    }
    h1 {
      font-size: 1.75rem;
      font-weight: 600;
      margin-bottom: 0.5rem;
      letter-spacing: -0.5px;
    }
    .subtitle {
      color: #a0a0a0;
      font-size: 0.95rem;
      font-weight: 500;
    }
    .grid {
      display: grid;
      gap: 1.5rem;
      grid-template-columns: 1fr;
    }
    @media (min-width: 700px) {
      .grid { grid-template-columns: repeat(3, 1fr); }
    }
    .card {
      background: rgba(255, 255, 255, 0.04);
      border: 1px solid rgba(255, 255, 255, 0.08);
      border-radius: 12px;
      padding: 1.5rem;
      text-decoration: none;
      color: inherit;
      transition: all 0.3s ease;
      display: flex;
      flex-direction: column;
      cursor: pointer;
      backdrop-filter: blur(10px);
    }
    .card:hover {
      background: rgba(255, 255, 255, 0.07);
      border-color: rgba(255, 255, 255, 0.15);
      transform: translateY(-2px);
    }
    .card-name {
      font-size: 1.15rem;
      font-weight: 600;
      margin-bottom: 0.75rem;
    }
    .card-pitch {
      font-size: 0.9rem;
      color: #b0b0b0;
      line-height: 1.5;
      margin-bottom: 1rem;
      flex: 1;
    }
    .card-dots {
      display: flex;
      gap: 0.6rem;
      align-items: center;
    }
    .dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
    }
    .dot-1 { background: #667eea; }
    .dot-2 { background: #764ba2; }
    .dot-3 { background: #f093fb; }
  </style>
</head>
<body>
  <div class="container">
    <header>
      <h1>TMS Terminal — Season 2</h1>
      <p class="subtitle">Wähle ein Konzept</p>
    </header>
    <div class="grid">
      <a href="./command-deck/" class="card">
        <div class="card-name">Command Deck</div>
        <div class="card-pitch">Pro-Tool pur · dicht, präzise, schnell</div>
        <div class="card-dots">
          <div class="dot dot-1"></div>
          <div class="dot dot-2"></div>
          <div class="dot dot-3"></div>
        </div>
      </a>
      <a href="./liquid-deck/" class="card">
        <div class="card-name">Liquid Deck</div>
        <div class="card-pitch">iOS-Glass · Tiefe, Blur, Premium-Motion</div>
        <div class="card-dots">
          <div class="dot dot-1"></div>
          <div class="dot dot-2"></div>
          <div class="dot dot-3"></div>
        </div>
      </a>
      <a href="./mission-control/" class="card">
        <div class="card-name">Mission Control</div>
        <div class="card-pitch">Hub-first · alles auf einen Blick</div>
        <div class="card-dots">
          <div class="dot dot-1"></div>
          <div class="dot dot-2"></div>
          <div class="dot dot-3"></div>
        </div>
      </a>
    </div>
  </div>
</body>
</html>

          <div class="env-row__actions">
            <button data-act="copy">Kopieren</button>
            <button data-act="edit">Bearbeiten</button>
          </div>
        </div>`).join('');
      host.querySelectorAll('.env-row').forEach(row => {
        const idx = Number(row.dataset.idx);
        const entry = project.env[idx];
        const valueEl = row.querySelector('[data-act="reveal"]');
        let revealed = false;
        valueEl.addEventListener('click', () => {
          revealed = !revealed;
          valueEl.textContent = revealed ? entry.value : '•'.repeat(10);
        });
        row.querySelector('[data-act="copy"]').addEventListener('click', () => {
          copyText(entry.value);
          toast('Kopiert ✓');
        });
        row.querySelector('[data-act="edit"]').addEventListener('click', () => {
          if (row.querySelector('.env-row__edit')) return;
          const editRow = document.createElement('div');
          editRow.className = 'env-row__edit';
          editRow.innerHTML = `<input type="text" value="${escapeHtml(entry.value)}"><button class="btn-secondary" data-act="save">Speichern</button>`;
          row.appendChild(editRow);
          editRow.querySelector('input').focus();
          editRow.querySelector('[data-act="save"]').addEventListener('click', () => {
            entry.value = editRow.querySelector('input').value;
            valueEl.textContent = revealed ? entry.value : '•'.repeat(10);
            editRow.remove();
            toast('Gespeichert — Redeploy nötig');
          });
        });
      });
    }

    function cloudLogCardId(project) { return `cloud-${project.id}`; }

    function renderLogsTab(host, project) {
      const cardId = cloudLogCardId(project);
      if (!cardState[cardId]) cardState[cardId] = { lines: project.logs.slice(), collapsed: false, selectionMode: false, selection: null };
      else {
        // The DOM below (Selektieren button + .term-pre classes) is rebuilt fresh,
        // so reset selection state to match — otherwise flag and UI desync after
        // a Logs → other tab → Logs round-trip and the first toggle tap is a no-op.
        cardState[cardId].lines = project.logs.slice();
        cardState[cardId].selectionMode = false;
        cardState[cardId].selection = null;
      }
      host.innerHTML = `
        <div class="log-viewer">
          <div class="log-viewer__tools">
            <input type="text" class="log-viewer__search" id="cloudLogSearch" placeholder="Logs durchsuchen…" autocomplete="off">
            <button class="btn-secondary" id="cloudLogSelectBtn">Selektieren</button>
            <button class="btn-secondary" id="cloudLogCopyBtn">Kopieren</button>
          </div>
          <div class="term-pre term-pre--xxl log-viewer__pre" data-card-id="${cardId}"></div>
        </div>`;
      renderCardLines(cardId);
      document.getElementById('cloudLogSearch').addEventListener('input', e => {
        const q = e.target.value.toLowerCase();
        cardState[cardId].lines = q ? project.logs.filter(l => l.toLowerCase().includes(q)) : project.logs.slice();
        renderCardLines(cardId);
      });
      document.getElementById('cloudLogSelectBtn').addEventListener('click', () => {
        const cs = cardState[cardId];
        cs.selectionMode = !cs.selectionMode;
        document.getElementById('cloudLogSelectBtn').classList.toggle('is-on', cs.selectionMode);
        const pre = document.querySelector(`.term-pre[data-card-id="${cardId}"]`);
        pre.classList.toggle('selection-mode', cs.selectionMode);
        if (!cs.selectionMode) clearSelection(cardId);
      });
      document.getElementById('cloudLogCopyBtn').addEventListener('click', () => {
        copyText(cardState[cardId].lines.join('\n'));
        toast('Log kopiert ✓');
      });
      stopCloudBuildTimer();
      if (project.status === 'building') {
        let n = 0;
        state.cloudBuildTimer = setInterval(() => {
          n++;
          const time = new Date().toTimeString().slice(0, 5);
          const line = `${time} BUILD Verarbeite Modul ${n}…`;
          project.logs.push(line);
          const searchInput = document.getElementById('cloudLogSearch');
          if (searchInput && !searchInput.value) {
            cardState[cardId].lines.push(line);
            renderCardLines(cardId);
          }
        }, 2000);
      }
    }

    // ============================================================
    // Prayer screen + Adhan overlay
    // ============================================================
    function parsePrayerTime(t) {
      const [h, m] = t.split(':').map(Number);
      const d = new Date();
      d.setHours(h, m, 0, 0);
      return d;
    }

    function nextPrayer() {
      const now = new Date();
      const upcoming = TMS_DATA.prayerTimes.map(p => ({ ...p, date: parsePrayerTime(p.time) })).find(p => p.date > now);
      if (upcoming) return upcoming;
      const first = TMS_DATA.prayerTimes[0];
      const d = parsePrayerTime(first.time);
      d.setDate(d.getDate() + 1);
      return { ...first, date: d, tomorrow: true };
    }

    function renderPrayerList() {
      const next = nextPrayer();
      const host = document.getElementById('prayerList');
      host.innerHTML = TMS_DATA.prayerTimes.map(p => `
        <div class="prayer-row${p.name === next.name && !next.tomorrow ? ' is-next' : ''}">
          <span class="prayer-row__name">${escapeHtml(p.name)}</span>
          <span class="prayer-row__time">${escapeHtml(p.time)}</span>
        </div>`).join('');
    }

    let prayerTickTimer = null;
    function tickPrayerCountdown() {
      renderPrayerList();
      const next = nextPrayer();
      const card = document.getElementById('prayerNextCard');
      const update = () => {
        const diffMs = Math.max(0, next.date - new Date());
        const mins = Math.floor(diffMs / 60000);
        const h = Math.floor(mins / 60), m = mins % 60;
        card.innerHTML = `
          <div class="prayer-next-card">
            <div class="prayer-next-card__label">Nächstes Gebet — ${escapeHtml(next.name)}${next.tomorrow ? ' (morgen)' : ''}</div>
            <div class="prayer-next-card__countdown">${String(h).padStart(2, '0')}:${String(m).padStart(2, '0')}</div>
          </div>`;
      };
      update();
      clearInterval(prayerTickTimer);
      prayerTickTimer = setInterval(update, 30000);
    }

      document.getElementById('adhanName').textContent = prayerName;

    // Lock screen (PIN pad)
    // ============================================================
    function renderPinDots(n) {
      document.querySelectorAll('#pinDots span').forEach((dot, i) => dot.classList.toggle('is-filled', i < n));
    }

    function checkPin() {
      if (state.lockDigits === state.pin) {
        unlockApp();
        return;
      }
      const section = document.querySelector('[data-screen="lock"]');
      section.classList.add('lock-shake');
      setTimeout(() => section.classList.remove('lock-shake'), 400);
      state.lockDigits = '';
      setTimeout(() => renderPinDots(0), 400);
      toast('Falscher PIN');
    }

    function handlePinKey(key) {
      if (key === 'back') { state.lockDigits = state.lockDigits.slice(0, -1); renderPinDots(state.lockDigits.length); return; }
      if (!key || state.lockDigits.length >= 4) return;
      state.lockDigits += key;
      renderPinDots(state.lockDigits.length);
      if (state.lockDigits.length === 4) setTimeout(checkPin, 120);
    }

    function unlockApp() {
      document.body.classList.remove('is-locked');
      state.lockDigits = '';
      renderPinDots(0);
      show('servers');
    }

    function lockApp() {
      document.body.classList.add('is-locked');
      state.lockDigits = '';
      renderPinDots(0);
      closeSheet(); // join the lock-net: the fixed-position #sheet must never float above the lock screen
      closePalette();
      show('lock');
    }

    function wireLock() {
      document.getElementById('pinPad').addEventListener('click', e => {
        const btn = e.target.closest('button[data-key]');
        if (btn) handlePinKey(btn.dataset.key);
      });
      document.addEventListener('keydown', e => {
        if (!document.body.classList.contains('is-locked')) return;
        if (/^[0-9]$/.test(e.key)) handlePinKey(e.key);
        else if (e.key === 'Backspace') handlePinKey('back');
      });
    }

    // ============================================================
    // Command palette
    // ============================================================
    function buildPaletteIndex() {
      const idx = [];
      TMS_DATA.sessions.forEach(s => idx.push({
        type: 'Terminal', label: s.name, sub: s.description,
        action: () => { goToTerminals(); focusSessionCard(s.id); },
      }));
      TMS_DATA.snippets.forEach(sn => idx.push({
        type: 'Snippet', label: sn.label, sub: sn.cmd,
        action: () => toast('In Terminal eingefügt'),
      }));
      idx.push({ type: 'Screen', label: 'Server', sub: 'Serverliste öffnen', action: () => show('servers') });
      idx.push({ type: 'Screen', label: 'Terminals', sub: 'Terminal-Stack öffnen', action: () => goToTerminals() });
      idx.push({ type: 'Aktion', label: 'Neues Terminal', sub: 'Terminal erstellen', action: () => toast('Neues Terminal erstellt (Mockup)') });

      // Task 4: tools, manager, cloud, settings, prayer, lock
      TOOL_DEFS.forEach(t => idx.push({
        type: 'Tool', label: t.label, sub: 'Werkzeug öffnen',
        action: () => { show('tools'); openToolSheet(t.id); },
      }));
      TMS_DATA.cloudProjects.forEach(p => idx.push({
        type: 'Cloud', label: p.name, sub: `${p.provider} · ${p.folder}`,
        action: () => { show('cloud'); openCloudDetail(p.id, 'env'); },
      }));
      idx.push({ type: 'Screen', label: 'Manager', sub: 'Manager-Chat öffnen', action: () => show('manager') });
      idx.push({ type: 'Screen', label: 'Cloud', sub: 'Cloud-Projekte öffnen', action: () => show('cloud') });
      idx.push({ type: 'Screen', label: 'Werkzeuge', sub: 'Tool-Panels öffnen', action: () => show('tools') });
      idx.push({ type: 'Screen', label: 'Einstellungen', sub: 'Server, Sicherheit, Terminal, Über', action: () => show('settings') });
      idx.push({ type: 'Screen', label: 'Gebetszeiten', sub: 'Heutige Gebetszeiten', action: () => show('prayer') });
      idx.push({ type: 'Aktion', label: 'Adhan-Demo', sub: 'Adhan-Alarm testen', action: () => { show('prayer'); openAdhanOverlay(nextPrayer().name); } });
      idx.push({ type: 'Aktion', label: 'Env kopieren — pinterest-scraper', sub: 'Cloud → Env-Variablen', action: () => { show('cloud'); openCloudDetail('c1', 'env'); } });
      idx.push({ type: 'Aktion', label: 'App sperren', sub: 'Zur PIN-Sperre zurückkehren', action: () => lockApp() });
      return idx;
    }

    function fuzzyScore(query, text) {
      if (!query) return 0;
      query = query.toLowerCase();
      text = (text || '').toLowerCase();
      let qi = 0, score = 0, lastIndex = -1;
      for (let i = 0; i < text.length && qi < query.length; i++) {
        if (text[i] === query[qi]) {
          score += lastIndex === i - 1 ? 3 : 1;
          lastIndex = i;
          qi++;
        }
      }
      return qi === query.length ? score : -1;
    }

    function focusSessionCard(id) {
      setActiveCard(id);
      const cs = cardState[id];
      if (cs.collapsed) toggleCollapse(id);
      requestAnimationFrame(() => {
        const card = document.querySelector(`.term-card[data-id="${id}"]`);
        if (card) card.scrollIntoView({ behavior: 'smooth', block: 'center' });
      });
    }

    let paletteIndex = [];
    let paletteFiltered = [];
    let paletteHighlight = 0;

    function renderPaletteResults(query) {
      const scored = paletteIndex
        .map(entry => ({ entry, s: Math.max(fuzzyScore(query, entry.label), fuzzyScore(query, entry.sub || '')) }))
        .filter(x => query === '' || x.s >= 0);
      scored.sort((a, b) => b.s - a.s);
      paletteFiltered = scored.map(x => x.entry).slice(0, 30);
      paletteHighlight = 0;
      const host = document.getElementById('paletteResults');
      if (!paletteFiltered.length) {
        host.innerHTML = `<div class="palette__empty">Keine Treffer</div>`;
        return;
      }
      host.innerHTML = paletteFiltered.map((entry, i) => `
        <button class="palette__row${i === 0 ? ' is-highlighted' : ''}" data-idx="${i}">
          <span class="palette__row-type">${escapeHtml(entry.type)}</span>
          <span class="palette__row-label">${escapeHtml(entry.label)}</span>
          <span class="palette__row-sub">${escapeHtml(entry.sub || '')}</span>
        </button>
      `).join('');
    }

    function movePaletteHighlight(dir) {
      if (!paletteFiltered.length) return;
      paletteHighlight = (paletteHighlight + dir + paletteFiltered.length) % paletteFiltered.length;
      document.querySelectorAll('.palette__row').forEach((el, i) => el.classList.toggle('is-highlighted', i === paletteHighlight));
      const activeEl = document.querySelector('.palette__row.is-highlighted');
      if (activeEl) activeEl.scrollIntoView({ block: 'nearest' });
    }

    function activatePaletteEntry(i) {
      const entry = paletteFiltered[i];
      if (!entry) return;
      closePalette();
      entry.action();
    }

    function openPalette() {
      const paletteEl = document.getElementById('palette');
      paletteEl.hidden = false;
      const input = document.getElementById('paletteInput');
      input.value = '';
      renderPaletteResults('');
      requestAnimationFrame(() => {
        paletteEl.classList.add('is-open');
        input.focus();
      });
    }

    function closePalette() {
      const paletteEl = document.getElementById('palette');
      paletteEl.classList.remove('is-open');
      setTimeout(() => { paletteEl.hidden = true; }, 150);
    }

    function wirePalette() {
      paletteIndex = buildPaletteIndex();
      const input = document.getElementById('paletteInput');
      input.addEventListener('input', () => renderPaletteResults(input.value));
      input.addEventListener('keydown', e => {
        if (e.key === 'ArrowDown') { e.preventDefault(); movePaletteHighlight(1); }
        else if (e.key === 'ArrowUp') { e.preventDefault(); movePaletteHighlight(-1); }
        else if (e.key === 'Enter') { e.preventDefault(); activatePaletteEntry(paletteHighlight); }
        else if (e.key === 'Escape') { closePalette(); }
      });
      document.getElementById('paletteClose').addEventListener('click', closePalette);
      document.querySelector('.palette__scrim').addEventListener('click', closePalette);
      document.getElementById('paletteResults').addEventListener('click', e => {
        const row = e.target.closest('.palette__row');
        if (row) activatePaletteEntry(Number(row.dataset.idx));
      });
    }

    document.addEventListener('keydown', e => {
      if (document.body.classList.contains('is-locked')) return; // no shortcuts while locked
      const paletteEl = document.getElementById('palette');
      if ((e.metaKey || e.ctrlKey) && e.key.toLowerCase() === 'k') { e.preventDefault(); openPalette(); return; }
      if (e.key === 'Escape' && !paletteEl.hidden) closePalette();
    });

    // ============================================================
    // Bottom command bar + screen router
    // ============================================================
    function show(name) {
      if (name !== 'cloud') stopCloudBuildTimer();
      if (name !== 'terminals') stopAllDictationTimers();
      document.querySelectorAll('[data-screen]').forEach(s => s.hidden = s.dataset.screen !== name);
      document.querySelectorAll('#commandbar [data-nav]').forEach(b => b.classList.toggle('active', b.dataset.nav === name));
      if (SCREEN_HOOKS[name]) SCREEN_HOOKS[name]();
    }

    function wireNav() {
      document.querySelectorAll('#commandbar [data-nav]').forEach(btn => {
        const name = btn.dataset.nav;
        if (name === 'cloud') { wireCloudNavLongPress(btn); return; }
        btn.addEventListener('click', () => {
          if (name === 'palette') { openPalette(); return; }
          if (name === 'terminals') { goToTerminals(); return; }
          if (document.querySelector(`[data-screen="${name}"]`)) { show(name); return; }
          toast('Kommt in Teil 2');
        });
      });
    }

    // Cloud nav slot: tap → Cloud screen, long-press → Tools screen (brief-specified reach).
    function wireCloudNavLongPress(btn) {
      const LONG_PRESS_MS = 550;
      let timer = null, longPressed = false;
      btn.addEventListener('pointerdown', () => {
        longPressed = false;
        timer = setTimeout(() => { longPressed = true; show('tools'); }, LONG_PRESS_MS);
      });
      const cancelTimer = () => clearTimeout(timer);
      btn.addEventListener('pointerup', cancelTimer);
      btn.addEventListener('pointerleave', cancelTimer);
      btn.addEventListener('pointercancel', cancelTimer);
      btn.addEventListener('click', e => {
        if (longPressed) { e.preventDefault(); longPressed = false; return; }
        show('cloud');
      });
    }

    // ============================================================
    // Init
    // ============================================================
    ensureMessageIds();
    loadFavorites();

    renderServers();
    renderUpdateBanner();
    document.getElementById('updateCta').addEventListener('click', () => toast('Mockup: Update-Vorgang wird nicht simuliert'));
    document.getElementById('updateDismiss').addEventListener('click', () => { document.getElementById('updateBanner').hidden = true; });
    state.activeServerName = (TMS_DATA.servers.find(s => s.status === 'online') || {}).name || '';
    updateTerminalsHeader();
    initPing();

    renderTools();

    renderManagerArtifacts();
    renderManagerMemory();
    wireManagerTabs();
    wireManagerInput();
    renderManagerChat();

    renderCloudGroups();
    wireCloudToolbar();

    renderSettings();

    renderPrayerList();
    wirePrayer();

    wireLock();

    wireNav();
    wirePalette();
    wireToolbar();

    document.getElementById('settingsBtn').addEventListener('click', () => show('settings'));
    document.getElementById('termToolsBtn').addEventListener('click', () => show('tools'));
    document.getElementById('sheetClose').addEventListener('click', closeSheet);
    document.querySelector('.sheet__scrim').addEventListener('click', closeSheet);

    show('lock');
  </script>
</body>

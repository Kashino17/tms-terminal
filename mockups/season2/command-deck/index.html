<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>Command Deck — TMS Terminal</title>
<style>
  :root {
    --bg: #0a0a0c; --bg-raised: #131318; --border: #26262e;
    --text: #e6e6ea; --text-dim: #8b8b96; --accent: #7c6cff;
    --ok: #3fb950; --warn: #d29922; --err: #f85149;
    --font-ui: -apple-system, 'Segoe UI', Roboto, sans-serif;
    --font-mono: 'SF Mono', ui-monospace, 'JetBrains Mono', monospace;
    --radius: 10px; --hairline: 1px solid var(--border);

    /* Extended tokens (execution-quality layer on top of the required set) */
    --bg-sunken: #060607;
    --accent-dim: rgba(124, 108, 255, .14);
    --radius-sm: 6px;
    --transition: 150ms ease-out;
    --commandbar-h: 54px;
    --fs-micro: 11px;
    --term-font-size: 13px;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  html, body { height: 100%; }
  body {
    background: var(--bg); color: var(--text);
    font-family: var(--font-ui); font-size: 13.5px;
    -webkit-font-smoothing: antialiased;
    display: flex; flex-direction: column; height: 100dvh;
    overflow: hidden;
  }
  button, input { font-family: inherit; color: inherit; }
  button { appearance: none; -webkit-appearance: none; background: none; border: none; }
  a { color: inherit; }
  :focus-visible { outline: 2px solid var(--accent); outline-offset: 2px; }
  @media (prefers-reduced-motion: reduce) {
    *, *::before, *::after { animation-duration: .001ms !important; transition-duration: .001ms !important; }
  }

  /* ---------- Screen shell ---------- */
  #screens { flex: 1; min-height: 0; position: relative; }
  section[data-screen] { position: absolute; inset: 0; overflow-y: auto; }
  section[data-screen="terminals"]:not([hidden]) { overflow-y: hidden; display: flex; flex-direction: column; }
  .term-scroll { flex: 1; min-height: 0; overflow-y: auto; }

  .screen-head { display: flex; flex-wrap: wrap; align-items: baseline; column-gap: 8px; padding: 20px 16px 12px; }
  .screen-head__eyebrow { font: 700 var(--fs-micro)/1 var(--font-mono); letter-spacing: .08em; color: var(--text-dim); text-transform: uppercase; }
  .screen-head__count { font: 500 var(--fs-micro)/1 var(--font-mono); color: var(--text-dim); }
  .screen-head__subtitle { flex-basis: 100%; margin-top: 4px; font-size: 12.5px; color: var(--text-dim); }

  /* ---------- Update banner ---------- */
  .update-banner:not([hidden]) { display: flex; align-items: center; gap: 10px; padding: 10px 14px; background: var(--accent-dim); border-bottom: var(--hairline); font-size: 12.5px; }
  .update-banner__text { flex: 1; color: var(--text); }
  .update-banner__cta { color: var(--accent); font: 600 12.5px var(--font-ui); cursor: pointer; text-decoration: underline; }
  .update-banner__dismiss { color: var(--text-dim); cursor: pointer; font-size: 14px; padding: 2px 4px; line-height: 1; }
  .update-banner__dismiss:hover { color: var(--text); }

  /* ---------- Server list ---------- */
  .server-row { display: flex; flex-direction: column; gap: 6px; width: 100%; padding: 14px 16px; border: none; border-top: var(--hairline); text-align: left; cursor: pointer; transition: background var(--transition); }
  .server-row:first-child { border-top: none; }
  .server-row:active { background: var(--bg-raised); }
  .server-row[data-status="offline"] { opacity: .48; }
  .server-row__top, .server-row__meta { display: flex; align-items: center; gap: 8px; }
  .server-row__dot { width: 7px; height: 7px; border-radius: 50%; background: var(--ok); flex: 0 0 auto; }
  .server-row[data-status="offline"] .server-row__dot { background: var(--err); }
  .server-row__name { font: 600 15px var(--font-ui); flex: 1; min-width: 0; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .server-row__latency { font: 12px var(--font-mono); color: var(--text-dim); padding: 2px 7px; border: var(--hairline); border-radius: 20px; flex: 0 0 auto; }
  .server-row__meta { color: var(--text-dim); }
  .server-row__addr { font: 13px var(--font-mono); flex: 1; }
  .server-row__sessions { font: var(--fs-micro) var(--font-mono); flex: 0 0 auto; }

  /* ---------- Terminal stack ---------- */
  .term-stack { padding: 4px 16px 24px; display: flex; flex-direction: column; gap: 14px; }
  @media (min-width: 700px) {
    .term-stack { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; align-items: start; }
  }

  .term-card { position: relative; background: var(--bg-raised); border: var(--hairline); border-radius: var(--radius); padding-left: 4px; overflow: hidden; transition: border-color var(--transition); }
  .term-card::before { content: ''; position: absolute; left: 0; top: 0; bottom: 0; width: 4px; background: var(--tag-color, var(--border)); }
  .term-card.is-active { border-color: var(--accent); }

  .term-card__head { display: flex; align-items: flex-start; gap: 8px; padding: 12px 12px 12px 10px; }
  .term-card__chevron { flex: 0 0 auto; color: var(--text-dim); font-size: 12px; cursor: pointer; padding: 4px; line-height: 1; transition: transform var(--transition); }
  .term-card[data-collapsed="true"] .term-card__chevron { transform: rotate(-90deg); }
  .term-card__title { flex: 1; min-width: 0; }
  .term-card__name { display: block; width: 100%; background: transparent; border: none; font: 600 15px var(--font-ui); padding: 2px 4px; margin-left: -4px; border-radius: 4px; transition: background var(--transition); }
  .term-card__name:hover { background: rgba(255, 255, 255, .04); }
  .term-card__name:focus { background: var(--bg); outline: 2px solid var(--accent); outline-offset: 0; }
  .term-card__desc { font-size: 12.5px; color: var(--text-dim); margin-top: 2px; padding: 0 4px; }
  .status-chip { display: inline-flex; align-items: center; gap: 6px; font: 600 10.5px var(--font-mono); letter-spacing: .04em; text-transform: uppercase; color: var(--text-dim); flex: 0 0 auto; padding-top: 3px; white-space: nowrap; }
  .status-chip__dot { width: 6px; height: 6px; border-radius: 50%; background: var(--text-dim); }
  .status-chip[data-status="running"] .status-chip__dot { background: var(--accent); animation: pulse 1.6s ease-in-out infinite; }
  .status-chip[data-status="waiting"] .status-chip__dot { background: var(--warn); }
  .status-chip[data-status="done"] .status-chip__dot { background: var(--ok); }
  @keyframes pulse {
    0%, 100% { opacity: 1; box-shadow: 0 0 0 0 rgba(124, 108, 255, .5); }
    50% { opacity: .55; box-shadow: 0 0 0 4px rgba(124, 108, 255, 0); }
  }
  .term-card__reorder { display: flex; flex-direction: column; gap: 2px; flex: 0 0 auto; }
  .term-card__reorder button { color: var(--text-dim); font-size: 9px; cursor: pointer; padding: 2px 4px; line-height: 1; transition: color var(--transition); }
  .term-card__reorder button:hover { color: var(--text); }
  .term-card__notes-btn { flex: 0 0 auto; align-self: center; color: var(--text-dim); font-size: 14px; cursor: pointer; padding: 4px; line-height: 1; opacity: .8; transition: opacity var(--transition); }
  .term-card__notes-btn:hover { opacity: 1; }

  .term-card__body { border-top: var(--hairline); }
  .term-card[data-collapsed="true"] .term-card__body { display: none; }

  .term-pre {
    position: relative;
    font-size: var(--term-font-size);
    line-height: 1.6;
    font-family: var(--font-mono);
    color: var(--text);
    background: var(--bg-sunken);
    padding: 12px;
    max-height: min(320px, 42vh);
    overflow-y: auto;
    white-space: pre-wrap;
    overflow-wrap: anywhere;
  }
  .term-pre--xxl { max-height: none; height: 100%; }
  .font-preview { max-height: 56px; }
  .term-line { display: block; padding: 1px 4px; margin: 0 -4px; border-radius: 4px; }
  .term-pre.selection-mode .term-line { cursor: pointer; }
  .term-pre.selection-mode .term-line:hover { background: rgba(124, 108, 255, .08); }
  .term-line.is-selected { background: rgba(124, 108, 255, .32); }

  .ans-b { font-weight: 700; }
  .ans-d { color: var(--text-dim); }
  .ans-g { color: var(--ok); }
  .ans-r { color: var(--err); }

  .wrapped-link { color: var(--accent); text-decoration: underline; text-decoration-color: rgba(124, 108, 255, .5); text-underline-offset: 2px; cursor: pointer; transition: color var(--transition); }
  .wrapped-link:hover { color: #a99bff; }

  .sel-handle { position: absolute; width: 14px; height: 14px; border-radius: 50%; background: var(--accent); transform: translate(-50%, 0); touch-action: none; z-index: 5; }
  .sel-handle::before { content: ''; position: absolute; left: 50%; bottom: 100%; width: 2px; height: 16px; background: var(--accent); transform: translateX(-50%); }
  .copy-bubble { position: absolute; transform: translateX(-8px); background: var(--accent); color: #fff; font: 600 12px var(--font-ui); padding: 6px 12px; border-radius: 6px; cursor: pointer; z-index: 6; white-space: nowrap; }
  .copy-bubble::after { content: ''; position: absolute; left: 16px; top: 100%; border: 5px solid transparent; border-top-color: var(--accent); }

  .prompt-card { margin: 10px 12px; padding: 12px; background: var(--bg); border: var(--hairline); border-left: 2px solid var(--warn); border-radius: var(--radius-sm); transition: border-color var(--transition); }
  .prompt-card.is-armed { border-left-color: var(--accent); }
  .prompt-card__row { display: flex; gap: 8px; align-items: baseline; font: 13px var(--font-mono); flex-wrap: wrap; }
  .prompt-card__tool { font-weight: 700; }
  .prompt-card__target { color: var(--text-dim); overflow-wrap: anywhere; }
  .prompt-card__question { margin-top: 6px; font-size: 13px; }
  .prompt-card__actions { display: flex; gap: 8px; margin-top: 10px; flex-wrap: wrap; }
  .prompt-card__actions button { font: 600 12.5px var(--font-ui); padding: 7px 12px; border-radius: 6px; cursor: pointer; transition: background var(--transition), border-color var(--transition), color var(--transition); }
  .prompt-card__actions [data-act="yes"] { background: var(--accent); border: 1px solid var(--accent); color: #fff; }
  .prompt-card__actions [data-act="no"] { border: var(--hairline); }
  .prompt-card__actions [data-act="auto"] { border: var(--hairline); color: var(--text-dim); margin-left: auto; }
  .prompt-card__actions [data-act="auto"][aria-pressed="true"] { color: var(--accent); border-color: var(--accent); }

  .replay-btn:not([hidden]) { display: block; width: calc(100% - 24px); margin: 10px 12px 12px; padding: 10px; border: 1px dashed var(--border); border-radius: var(--radius-sm); color: var(--text-dim); font: 600 12.5px var(--font-ui); cursor: pointer; transition: border-color var(--transition), color var(--transition); }
  .replay-btn:hover { border-color: var(--accent); color: var(--accent); }

  /* ---------- Terminal toolbar ---------- */
  .term-toolbar-wrap { position: relative; flex: 0 0 auto; border-top: var(--hairline); background: var(--bg-raised); }
  .key-echo-host { position: absolute; left: 50%; bottom: 100%; transform: translateX(-50%); display: flex; gap: 6px; margin-bottom: 6px; pointer-events: none; }
  .key-echo { background: var(--bg-raised); border: var(--hairline); color: var(--text); font: 600 11px var(--font-mono); padding: 4px 8px; border-radius: 6px; opacity: 0; transform: translateY(4px); transition: opacity var(--transition), transform var(--transition); }
  .key-echo.show { opacity: 1; transform: translateY(0); }
  .term-toolbar { display: flex; gap: 6px; padding: 8px 10px; overflow-x: auto; scrollbar-width: none; }
  .term-toolbar::-webkit-scrollbar { display: none; }
  .term-toolbar button { flex: 0 0 auto; min-width: 38px; padding: 8px 10px; background: var(--bg); border: var(--hairline); border-radius: 6px; font: 600 12px var(--font-mono); cursor: pointer; transition: border-color var(--transition), color var(--transition); }
  .term-toolbar button:active { background: var(--bg-sunken); }
  #selToggleBtn.is-on { border-color: var(--accent); color: var(--accent); }

  /* ---------- Terminal input row (per-card command entry + dictation) ---------- */
  .term-input-row { display: flex; align-items: center; gap: 6px; padding: 8px 10px; border-top: var(--hairline); }
  .term-input-row__prompt { flex: 0 0 auto; color: var(--text-dim); font: 600 13px var(--font-mono); }
  .term-input-row__field { flex: 1; min-width: 0; padding: 7px 9px; background: var(--bg); border: var(--hairline); border-radius: 6px; font: 12.5px var(--font-mono); color: var(--text); }
  .term-input-row__field::placeholder { color: var(--text-dim); }
  .term-input-row__field:disabled { opacity: .55; }
  .term-input-row__send { flex: 0 0 auto; width: 30px; height: 30px; display: flex; align-items: center; justify-content: center; border: var(--hairline); border-radius: 6px; color: var(--text-dim); font: 600 13px var(--font-mono); cursor: pointer; transition: border-color var(--transition), color var(--transition); }
  .term-input-row__send:hover { border-color: var(--accent); color: var(--accent); }
  .term-input-row__mic { flex: 0 0 auto; width: 30px; height: 30px; border-radius: 50%; border: var(--hairline); color: var(--text-dim); display: flex; align-items: center; justify-content: center; font-size: 10px; cursor: pointer; transition: border-color var(--transition), color var(--transition); }
  .term-input-row__mic.is-recording { border-color: var(--err); color: var(--err); animation: pulse 1s ease-in-out infinite; }
  .term-input-row__mic.is-transcribing { border-color: var(--accent); color: var(--accent); }

  /* ---------- Ping / connection chip (Terminals header) ---------- */
  .ping-chip { display: inline-flex; align-items: center; gap: 6px; font: 12px var(--font-mono); color: var(--text-dim); padding: 4px 9px; border: var(--hairline); border-radius: 20px; flex: 0 0 auto; }
  .ping-chip__dot { width: 6px; height: 6px; border-radius: 50%; background: var(--ok); flex: 0 0 auto; }
  .ping-chip[data-state="offline"] .ping-chip__dot { background: var(--warn); }

  /* ---------- Bottom command bar ---------- */
  #commandbar { flex: 0 0 auto; height: var(--commandbar-h); display: flex; border-top: var(--hairline); background: var(--bg-raised); }
  #commandbar button { flex: 1; color: var(--text-dim); font: 500 12px var(--font-ui); padding: 10px 4px 8px; cursor: pointer; position: relative; transition: color var(--transition); }
  #commandbar button.active { color: var(--accent); }
  #commandbar button.active::before { content: ''; position: absolute; top: 0; left: 50%; transform: translateX(-50%); width: 20px; height: 2px; background: var(--accent); }
  #commandbar button[data-nav="palette"] { font: 600 16px var(--font-mono); color: var(--text); }

  /* ---------- Command palette ---------- */
  #palette:not([hidden]) { position: fixed; inset: 0; z-index: 1000; display: flex; align-items: flex-start; justify-content: center; padding-top: min(14vh, 90px); padding-left: 16px; padding-right: 16px; opacity: 0; transition: opacity var(--transition); }
  #palette.is-open { opacity: 1; }
  .palette__scrim { position: absolute; inset: 0; background: rgba(0, 0, 0, .6); }
  .palette__panel { position: relative; width: min(560px, 100%); max-height: 70vh; display: flex; flex-direction: column; background: var(--bg-raised); border: var(--hairline); border-radius: var(--radius); transform: translateY(-6px); transition: transform var(--transition); overflow: hidden; }
  #palette.is-open .palette__panel { transform: translateY(0); }
  .palette__search { display: flex; align-items: center; gap: 10px; padding: 12px 14px; border-bottom: var(--hairline); }
  .palette__icon { color: var(--text-dim); font: 600 14px var(--font-mono); }
  #paletteInput { flex: 1; border: none; background: none; font: 500 15px var(--font-ui); outline: none; }
  #paletteInput::placeholder { color: var(--text-dim); }
  .palette__close { background: var(--bg); border: var(--hairline); color: var(--text-dim); font: var(--fs-micro) var(--font-mono); padding: 4px 8px; border-radius: 6px; cursor: pointer; }
  .palette__results { overflow-y: auto; padding: 6px; }
  .palette__row { display: flex; align-items: center; gap: 10px; width: 100%; padding: 10px; border-radius: 6px; text-align: left; cursor: pointer; transition: background var(--transition); }
  .palette__row.is-highlighted, .palette__row:hover { background: var(--bg); }
  .palette__row-type { flex: 0 0 auto; font: 600 10px var(--font-mono); text-transform: uppercase; letter-spacing: .05em; color: var(--text-dim); border: var(--hairline); padding: 2px 6px; border-radius: 20px; }
  .palette__row-label { font: 500 13.5px var(--font-ui); flex: 0 1 auto; white-space: nowrap; }
  .palette__row-sub { font: 12px var(--font-mono); color: var(--text-dim); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; flex: 1; min-width: 0; }
  .palette__empty { padding: 20px; text-align: center; color: var(--text-dim); font-size: 13px; }

  /* ---------- Toasts ---------- */
  #toasts { position: fixed; left: 0; right: 0; bottom: calc(var(--commandbar-h) + 12px); display: flex; flex-direction: column; align-items: center; gap: 8px; z-index: 1100; pointer-events: none; padding: 0 16px; }
  .toast { background: var(--bg-raised); border: var(--hairline); font: 500 12.5px var(--font-ui); padding: 9px 14px; border-radius: 8px; opacity: 0; transform: translateY(6px); transition: opacity var(--transition), transform var(--transition); max-width: 88vw; text-align: center; }
  .toast.show { opacity: 1; transform: translateY(0); }

  /* ============================================================
     Task 4 — Tools, Manager, Cloud, Settings, Prayer, Lock
     ============================================================ */

  /* ---------- Shared: header actions, icon buttons, generic bits ---------- */
  .screen-head__actions { margin-left: auto; align-self: center; display: flex; gap: 8px; }
  .icon-btn { display: inline-flex; align-items: center; justify-content: center; width: 30px; height: 30px; border: var(--hairline); border-radius: var(--radius-sm); color: var(--text-dim); font: 600 13px var(--font-mono); cursor: pointer; transition: border-color var(--transition), color var(--transition); flex: 0 0 auto; }
  .icon-btn:hover { border-color: var(--accent); color: var(--accent); }
  .mono-text { font: 12.5px var(--font-mono); }
  .table-scroll { overflow-x: auto; }
  .btn-primary { display: inline-flex; align-items: center; gap: 6px; padding: 9px 14px; background: var(--accent); color: #fff; font: 600 12.5px var(--font-ui); border-radius: 6px; cursor: pointer; transition: opacity var(--transition); }
  .btn-primary:active { opacity: .8; }
  .btn-secondary { display: inline-flex; align-items: center; gap: 6px; padding: 9px 14px; border: var(--hairline); color: var(--text); font: 600 12.5px var(--font-ui); border-radius: 6px; cursor: pointer; transition: border-color var(--transition), color var(--transition); background: var(--bg-raised); }
  .btn-secondary:hover { border-color: var(--accent); color: var(--accent); }
  .btn-secondary.is-on { border-color: var(--accent); color: var(--accent); }

  /* Reusable status-chip dataset values for cloud project statuses */
  .status-chip[data-status="ready"] .status-chip__dot { background: var(--ok); }
  .status-chip[data-status="live"] .status-chip__dot { background: var(--ok); animation: pulse 1.6s ease-in-out infinite; }
  .status-chip[data-status="building"] .status-chip__dot { background: var(--accent); animation: pulse 1.6s ease-in-out infinite; }
  .status-chip[data-status="suspended"] .status-chip__dot { background: var(--text-dim); }

  /* Toggle switch component (ports, watchers, settings) */
  .switch { position: relative; display: inline-block; width: 38px; height: 22px; flex: 0 0 auto; }
  .switch input { position: absolute; inset: 0; opacity: 0; margin: 0; cursor: pointer; z-index: 1; }
  .switch__track { position: absolute; inset: 0; background: var(--bg-sunken); border: var(--hairline); border-radius: 20px; transition: background var(--transition), border-color var(--transition); }
  .switch__thumb { position: absolute; top: 2px; left: 2px; width: 16px; height: 16px; border-radius: 50%; background: var(--text-dim); transition: transform var(--transition), background var(--transition); }
  .switch input:checked + .switch__track { background: var(--accent-dim); border-color: var(--accent); }
  .switch input:checked + .switch__track .switch__thumb { transform: translateX(16px); background: var(--accent); }

  /* ---------- Tools screen + bottom sheet ---------- */
  .tool-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; padding: 4px 16px 24px; }
  @media (min-width: 700px) { .tool-grid { grid-template-columns: repeat(5, 1fr); } }
  .tool-tile { display: flex; flex-direction: column; align-items: center; gap: 8px; padding: 16px 8px; background: var(--bg-raised); border: var(--hairline); border-radius: var(--radius); cursor: pointer; transition: border-color var(--transition), background var(--transition); }
  .tool-tile:hover, .tool-tile:active { border-color: var(--accent); background: var(--bg); }
  .tool-tile__glyph { display: flex; align-items: center; justify-content: center; width: 34px; height: 34px; border: var(--hairline); border-radius: var(--radius-sm); font: 700 11px var(--font-mono); color: var(--accent); }
  .tool-tile__label { font: 500 12px var(--font-ui); color: var(--text); text-align: center; }

  #sheet:not([hidden]) { position: fixed; inset: 0; z-index: 1050; display: flex; align-items: flex-end; justify-content: center; opacity: 0; transition: opacity var(--transition); }
  #sheet.is-open { opacity: 1; }
  .sheet__scrim { position: absolute; inset: 0; background: rgba(0, 0, 0, .6); }
  .sheet__panel { position: relative; width: 100%; max-width: 720px; max-height: 82vh; display: flex; flex-direction: column; background: var(--bg-raised); border: var(--hairline); border-bottom: none; border-radius: 16px 16px 0 0; transform: translateY(16px); transition: transform var(--transition); overflow: hidden; }
  #sheet.is-open .sheet__panel { transform: translateY(0); }
  .sheet__head { display: flex; align-items: center; gap: 10px; padding: 14px 16px; border-bottom: var(--hairline); }
  .sheet__title { font: 700 14px var(--font-ui); flex: 1; }
  .sheet__close { color: var(--text-dim); font: 600 var(--fs-micro) var(--font-mono); padding: 4px 8px; border: var(--hairline); border-radius: 6px; cursor: pointer; }
  .sheet__close:hover { border-color: var(--accent); color: var(--accent); }
  .sheet__body { flex: 1; min-height: 0; overflow-y: auto; padding: 12px 16px 24px; }

  /* Tool-sheet content primitives */
  .tool-list { display: flex; flex-direction: column; }
  .tool-list__row { display: flex; align-items: center; gap: 10px; width: 100%; padding: 10px 2px; border-top: var(--hairline); text-align: left; }
  .tool-list__row:first-child { border-top: none; }
  .tool-list__row.is-tap { cursor: pointer; transition: background var(--transition); }
  .tool-list__row.is-tap:active { background: var(--bg); }
  .tool-list__icon { font: 12px var(--font-mono); color: var(--text-dim); width: 14px; text-align: center; flex: 0 0 auto; }
  .tool-list__name { flex: 1; font: 13px var(--font-ui); min-width: 0; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }

  .todo-list { display: flex; flex-direction: column; }

  .shot-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin-bottom: 14px; }
  .shot-tile { aspect-ratio: 9 / 16; background: linear-gradient(160deg, #1c1c22, #101013); border: var(--hairline); border-radius: var(--radius-sm); }

  .browser-bar { padding: 9px 12px; background: var(--bg); border: var(--hairline); border-radius: 20px; font: 12.5px var(--font-mono); color: var(--text-dim); margin-bottom: 14px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }

  .hit-badge { font: 700 11px var(--font-mono); color: var(--accent); background: var(--accent-dim); padding: 2px 7px; border-radius: 20px; flex: 0 0 auto; }

  /* ---------- Sub-tabs (Manager, Cloud detail) ---------- */
  .subtabs { display: flex; gap: 6px; padding: 0 16px 12px; flex: 0 0 auto; }
  .subtabs button { padding: 6px 12px; border: var(--hairline); border-radius: 20px; font: 600 12px var(--font-ui); color: var(--text-dim); cursor: pointer; transition: border-color var(--transition), color var(--transition); }
  .subtabs button.active { border-color: var(--accent); color: var(--accent); background: var(--accent-dim); }

  /* ---------- Manager screen ---------- */
  section[data-screen="manager"]:not([hidden]) { display: flex; flex-direction: column; overflow: hidden; }
  .manager-view { flex: 1; min-height: 0; display: flex; flex-direction: column; overflow: hidden; }
  .chat-scroll:not([hidden]), #managerArtifacts:not([hidden]), #managerMemory:not([hidden]) { flex: 1; min-height: 0; overflow-y: auto; padding: 4px 16px 12px; display: flex; flex-direction: column; gap: 10px; }

  .chat-bubble-row { display: flex; }
  .chat-bubble-row[data-from="user"] { justify-content: flex-end; }
  .chat-bubble { max-width: 82%; padding: 10px 12px; border-radius: 12px; font-size: 13px; line-height: 1.5; }
  .chat-bubble-row[data-from="manager"] .chat-bubble { background: var(--bg-raised); border: var(--hairline); border-bottom-left-radius: 4px; }
  .chat-bubble-row[data-from="user"] .chat-bubble { background: var(--accent-dim); border: 1px solid rgba(124, 108, 255, .3); border-bottom-right-radius: 4px; }
  .chat-bubble__time { display: block; margin-top: 4px; font: var(--fs-micro) var(--font-mono); color: var(--text-dim); }

  .voice-pill { display: flex; align-items: center; gap: 8px; min-width: 180px; cursor: pointer; }
  .voice-pill__play { flex: 0 0 auto; width: 26px; height: 26px; border-radius: 50%; background: var(--accent); color: #fff; display: flex; align-items: center; justify-content: center; font-size: 10px; }
  .voice-pill__wave { flex: 1; display: flex; align-items: center; gap: 2px; height: 20px; color: var(--accent); }
  .voice-pill__wave span { width: 2px; display: block; background: currentColor; opacity: .5; border-radius: 1px; }
  .voice-pill__dur { font: 11px var(--font-mono); color: var(--text-dim); flex: 0 0 auto; }
  .voice-pill.is-playing .voice-pill__wave span { animation: wave .9s ease-in-out infinite; }
  @keyframes wave { 0%, 100% { transform: scaleY(.4); } 50% { transform: scaleY(1); } }
  .voice-transcript { margin-top: 8px; font-size: 12.5px; color: var(--text-dim); border-top: var(--hairline); padding-top: 8px; }
  .voice-transcribing { margin-top: 8px; font: 600 12px var(--font-mono); color: var(--accent); }
  .voice-transcribing .dots span { display: inline-block; animation: blink 1.2s infinite; opacity: .2; }
  .voice-transcribing .dots span:nth-child(2) { animation-delay: .2s; }
  .voice-transcribing .dots span:nth-child(3) { animation-delay: .4s; }
  @keyframes blink { 0%, 100% { opacity: .2; } 50% { opacity: 1; } }

  .chat-input-row:not([hidden]) { flex: 0 0 auto; display: flex; align-items: center; gap: 8px; padding: 10px 12px; border-top: var(--hairline); background: var(--bg-raised); }
  .chat-input-row input { flex: 1; padding: 9px 12px; background: var(--bg); border: var(--hairline); border-radius: 20px; font: 13px var(--font-ui); }
  .mic-btn { flex: 0 0 auto; width: 34px; height: 34px; border-radius: 50%; border: var(--hairline); color: var(--text-dim); display: flex; align-items: center; justify-content: center; cursor: pointer; transition: border-color var(--transition), color var(--transition); }
  .mic-btn.is-recording { border-color: var(--err); color: var(--err); animation: pulse 1s ease-in-out infinite; }

  .memory-row { display: flex; justify-content: space-between; gap: 10px; padding: 10px 2px; border-top: var(--hairline); font-size: 12.5px; }
  .memory-row:first-child { border-top: none; }
  .memory-row__time { color: var(--text-dim); font: var(--fs-micro) var(--font-mono); flex: 0 0 auto; white-space: nowrap; }

  /* ---------- Cloud screen ---------- */
  .cloud-toolbar { display: flex; flex-wrap: wrap; gap: 8px; padding: 0 16px 12px; align-items: center; }
  .chip-group { display: flex; gap: 6px; }
  .chip-group button { padding: 6px 12px; border: var(--hairline); border-radius: 20px; font: 600 12px var(--font-ui); color: var(--text-dim); cursor: pointer; transition: border-color var(--transition), color var(--transition); }
  .chip-group button.active { border-color: var(--accent); color: var(--accent); background: var(--accent-dim); }
  .cloud-toolbar__spacer { flex: 1; }

  .folder-group__head { display: flex; align-items: center; gap: 8px; padding: 10px 16px; cursor: pointer; }
  .folder-group__head::before { content: '▾'; font-size: 10px; color: var(--text-dim); transition: transform var(--transition); }
  .folder-group.is-collapsed .folder-group__head::before { transform: rotate(-90deg); }
  .folder-group__name { font: 700 var(--fs-micro) var(--font-mono); letter-spacing: .06em; text-transform: uppercase; color: var(--text-dim); flex: 1; }
  .folder-group__count { font: var(--fs-micro) var(--font-mono); color: var(--text-dim); }
  .folder-group.is-collapsed .folder-group__rows { display: none; }

  .cloud-row { display: flex; align-items: center; gap: 10px; width: 100%; padding: 12px 16px; border-top: var(--hairline); text-align: left; cursor: pointer; transition: background var(--transition); }
  .cloud-row:active { background: var(--bg-raised); }
  .provider-glyph { flex: 0 0 auto; width: 26px; height: 26px; display: flex; align-items: center; justify-content: center; border: var(--hairline); border-radius: 6px; font: 700 11px var(--font-mono); color: var(--text-dim); }
  .cloud-row__main { flex: 1; min-width: 0; display: flex; flex-direction: column; gap: 4px; }
  .cloud-row__name { font: 600 13.5px var(--font-ui); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .cloud-row__meta { display: flex; gap: 10px; align-items: center; flex-wrap: wrap; }
  .cloud-row__deploy { font: 11.5px var(--font-mono); color: var(--text-dim); }
  .fav-btn { flex: 0 0 auto; font-size: 17px; color: var(--border); cursor: pointer; padding: 4px; line-height: 1; transition: color var(--transition); }
  .fav-btn.is-fav { color: var(--accent); }

  .cloud-detail__head { display: flex; align-items: center; gap: 10px; padding: 14px 16px 8px; }
  .back-btn { flex: 0 0 auto; color: var(--text-dim); font: 600 13px var(--font-mono); cursor: pointer; padding: 4px 6px; }
  .back-btn:hover { color: var(--accent); }
  .cloud-detail__title { font: 700 15px var(--font-ui); flex: 1; min-width: 0; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .cloud-detail__body { padding: 0 16px 24px; }

  .env-row { padding: 10px 2px; border-top: var(--hairline); }
  .env-row:first-child { border-top: none; }
  .env-row__top { display: flex; align-items: center; gap: 8px; }
  .env-row__key { flex: 1; font: 600 12.5px var(--font-mono); min-width: 0; overflow: hidden; text-overflow: ellipsis; }
  .env-row__value { display: block; margin-top: 4px; font: 12.5px var(--font-mono); color: var(--text-dim); cursor: pointer; word-break: break-all; }
  .env-row__actions { display: flex; gap: 8px; margin-top: 8px; }
  .env-row__actions button { font: 600 11.5px var(--font-ui); padding: 5px 10px; border: var(--hairline); border-radius: 6px; color: var(--text-dim); cursor: pointer; transition: border-color var(--transition), color var(--transition); }
  .env-row__actions button:hover { border-color: var(--accent); color: var(--accent); }
  .env-row__edit { display: flex; gap: 8px; margin-top: 8px; }
  .env-row__edit input { flex: 1; padding: 7px 9px; background: var(--bg); border: var(--hairline); border-radius: 6px; font: 12.5px var(--font-mono); }

  .log-viewer { display: flex; flex-direction: column; height: min(60vh, 520px); }
  .log-viewer__tools { display: flex; gap: 8px; padding: 0 0 10px; flex: 0 0 auto; flex-wrap: wrap; }
  .log-viewer__search { flex: 1; min-width: 120px; padding: 8px 10px; background: var(--bg); border: var(--hairline); border-radius: 6px; font: 12.5px var(--font-mono); }
  .log-viewer__pre { flex: 1; min-height: 0; border-radius: var(--radius-sm); }

  .deploy-row { display: flex; align-items: center; gap: 10px; padding: 11px 2px; border-top: var(--hairline); }
  .deploy-row:first-child { border-top: none; }
  .deploy-row__version { font: 700 12.5px var(--font-mono); width: 40px; flex: 0 0 auto; }
  .deploy-row__time { flex: 1; font: 12px var(--font-ui); color: var(--text-dim); }

  /* ---------- Settings screen ---------- */
  .settings-group { padding: 4px 16px 18px; }
  .settings-group__title { font: 700 var(--fs-micro) var(--font-mono); letter-spacing: .06em; text-transform: uppercase; color: var(--text-dim); padding: 0 0 8px; }
  .settings-row { display: flex; align-items: center; gap: 10px; padding: 12px 0; border-top: var(--hairline); }
  .settings-group .settings-row:first-of-type { border-top: none; }
  .settings-row--stack { flex-direction: column; align-items: stretch; gap: 8px; }
  .settings-row__label { flex: 1; font-size: 13px; }
  .settings-row__label small { display: block; margin-top: 2px; color: var(--text-dim); font-size: 11.5px; }
  .settings-row__value { font: 12.5px var(--font-mono); color: var(--text-dim); }
  .settings-row.is-tap { cursor: pointer; }
  .settings-row.is-tap:active { background: var(--bg-raised); }
  .settings-slider { width: 100%; accent-color: var(--accent); }
  .settings-pin-edit { display: flex; gap: 8px; padding: 0 0 12px; }
  .settings-pin-edit input { flex: 1; padding: 8px 10px; background: var(--bg); border: var(--hairline); border-radius: 6px; font: 13px var(--font-mono); letter-spacing: .3em; }

  /* ---------- Prayer screen + Adhan overlay ---------- */
  .prayer-list { padding: 4px 16px 8px; }
  .prayer-row { display: flex; justify-content: space-between; align-items: center; padding: 13px 2px; border-top: var(--hairline); transition: color var(--transition); }
  .prayer-row:first-child { border-top: none; }
  .prayer-row.is-next { color: var(--accent); }
  .prayer-row__name { font: 600 14px var(--font-ui); }
  .prayer-row__time { font: 14px var(--font-mono); }
  .prayer-next-card { margin: 4px 16px 18px; padding: 16px; background: var(--accent-dim); border: 1px solid rgba(124, 108, 255, .35); border-radius: var(--radius); text-align: center; }
  .prayer-next-card__label { font: 700 var(--fs-micro) var(--font-mono); letter-spacing: .06em; text-transform: uppercase; color: var(--accent); }
  .prayer-next-card__countdown { margin-top: 4px; font: 700 26px var(--font-mono); }
  .prayer-demo-btn { display: block; margin: 4px 16px 24px; }

  .adhan-overlay:not([hidden]) { position: fixed; inset: 0; z-index: 1300; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 18px; background: var(--bg); opacity: 0; transition: opacity var(--transition); }
  .adhan-overlay.is-open { opacity: 1; }
  .adhan-ring { width: 96px; height: 96px; border-radius: 50%; border: 2px solid var(--accent); display: flex; align-items: center; justify-content: center; font: 700 20px var(--font-mono); color: var(--accent); animation: adhan-pulse 1.6s ease-in-out infinite; }
  @keyframes adhan-pulse { 0%, 100% { box-shadow: 0 0 0 0 rgba(124, 108, 255, .4); } 50% { box-shadow: 0 0 0 18px rgba(124, 108, 255, 0); } }
  .adhan-overlay__name { font: 700 22px var(--font-ui); }
  .adhan-overlay__sub { color: var(--text-dim); font-size: 13px; }
  .adhan-overlay__stop { margin-top: 12px; padding: 12px 28px; background: var(--accent); color: #fff; font: 700 14px var(--font-ui); border-radius: 8px; cursor: pointer; }

  /* ---------- Lock screen ---------- */
  section[data-screen="lock"]:not([hidden]) { display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 22px; overflow: hidden; }
  body.is-locked #commandbar { display: none; }
  .lock-title { font: 700 var(--fs-micro) var(--font-mono); letter-spacing: .1em; text-transform: uppercase; color: var(--text-dim); }
  .pin-dots { display: flex; gap: 14px; }
  .pin-dots span { display: block; width: 12px; height: 12px; border-radius: 50%; border: var(--hairline); transition: background var(--transition), border-color var(--transition); }
  .pin-dots span.is-filled { background: var(--accent); border-color: var(--accent); }
  .pin-pad { display: grid; grid-template-columns: repeat(3, 64px); gap: 14px; }
  .pin-pad button { width: 64px; height: 64px; border-radius: 50%; border: var(--hairline); font: 600 20px var(--font-mono); color: var(--text); cursor: pointer; transition: border-color var(--transition), background var(--transition); }
  .pin-pad button:active { background: var(--bg-raised); }
  .pin-pad button[data-key="back"] { font-size: 15px; color: var(--text-dim); border-color: transparent; }
  .pin-pad__spacer { visibility: hidden; }
  .lock-shake { animation: pin-shake 400ms ease-in-out; }
  @keyframes pin-shake {
    10%, 90% { transform: translateX(-6px); } 20%, 80% { transform: translateX(5px); }
    30%, 50%, 70% { transform: translateX(-8px); } 40%, 60% { transform: translateX(8px); }
  }
</style>

<body class="is-locked">
  <main id="screens">

    </section>

  <nav id="commandbar">
    <button data-nav="servers">Server</button>
    <button data-nav="terminals">Terminals</button>
    <button data-nav="manager">Manager</button>
    <button data-nav="cloud">Cloud</button>

    <div class="palette__scrim"></div>
    <div class="palette__panel" role="dialog" aria-modal="true" aria-label="Befehlspalette">
      <div class="palette__search">
        <span class="palette__icon">⌘</span>
        <input id="paletteInput" type="text" placeholder="Suchen…" autocomplete="off" spellcheck="false">
        <button class="palette__close" id="paletteClose">Esc</button>

    <div class="sheet__scrim"></div>
    <div class="sheet__panel" role="dialog" aria-modal="true" aria-label="Werkzeug">
      <div class="sheet__head">
        <span class="sheet__title" id="sheetTitle"></span>
        <button class="sheet__close" id="sheetClose">Schließen</button>

  <div class="adhan-overlay" id="adhanOverlay" hidden>
    <div class="adhan-ring"><span id="adhanRingCode"></span></div>
    <div class="adhan-overlay__name" id="adhanName"></div>

  <div class="shot-flash" id="shotFlash"></div>

  <div id="toasts"></div>

  <script src="../shared/data.js" charset="utf-8"></script>
  <script src="../shared/sim.js" charset="utf-8"></script>
  <script>
    // ============================================================
    // State
    // ============================================================
    const state = {
      activeCardId: 't1', activeServerName: '',
      managerTab: 'chat',
      cloudView: 'folder', cloudProviderFilter: 'all', cloudDetailId: null, cloudDetailTab: 'env', cloudBuildTimer: null,
      autoLock: false, pushNotif: true, adhanNotif: true, fontSize: 13,
      pin: TMS_DATA.demo.pin, lockDigits: '',
      pingTimer: null, pingBaseline: null, pingValue: null,
      // Global single-flight dictation state: ALL cards are visible simultaneously in the
      // stack (unlike a single-terminal view), so a per-card flag would let two mics run
      // concurrently. Only one card may dictate at a time, tracked here.
      dictation: { active: false, cardId: null, phase: null },
    };
    const cardState = {};
    TMS_DATA.sessions.forEach(s => {
      cardState[s.id] = {
        lines: s.buffer.slice(),
        collapsed: false,
        selectionMode: false,
        selection: null,
        autoApprove: false,
        pendingPrompt: null,
        sim: null,
        autoTimer: null,
      };
    });

    // SCREEN_HOOKS: optional per-screen refresh callback, run every time show(name) activates
    // that screen. Populated by each feature area next to its render functions; declared here
    // (top-level, before any of those areas run) so their init-time assignments never hit the TDZ.
    const SCREEN_HOOKS = {};

    // ============================================================
    // Utilities: escaping, ANSI rendering, wrapped-link, toast, clipboard
    // ============================================================
    function escapeHtml(s) {
      return String(s).replace(/[&<>"']/g, c => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;' }[c]));
    }

    // Minimal ANSI SGR renderer: bold(1) dim(2) red(31) green(32) reset(0),
    // incl. multi-param sequences like \x1b[1;32m. Every other escape sequence
    // (non-SGR CSI, OSC, lone ESC) is stripped so no raw escapes ever leak into the DOM.
    function ansiToHtml(str) {
      const CLASS = { '1': 'ans-b', '2': 'ans-d', '31': 'ans-r', '32': 'ans-g' };
      let out = '', open = 0, last = 0, m;
      const re = /\x1b\[([0-9;]*)m/g;
      const emitText = chunk => {
        chunk = chunk
          .replace(/\x1b\][^\x07\x1b]*(?:\x07|\x1b\\)/g, '') // OSC (…BEL or …ESC\)
          .replace(/\x1b\[[0-9;?]*[ -\/]*[@-~]/g, '')        // any other CSI
          .replace(/\x1b./g, '');                            // lone ESC + follow byte
        out += escapeHtml(chunk);
      };
      while ((m = re.exec(str))) {
        emitText(str.slice(last, m.index));
        last = re.lastIndex;
        for (const code of (m[1] === '' ? '0' : m[1]).split(';')) {
          const c = code === '' ? '0' : code;
          if (c === '0') { while (open) { out += '</span>'; open--; } }
          else if (CLASS[c]) { out += `<span class="${CLASS[c]}">`; open++; }
        }
      }
      emitText(str.slice(last));
      while (open) { out += '</span>'; open--; }
      return out;
    }

    // Renders one buffer line to HTML, special-casing the wrapped deploy link so
    // it always stays a single inline element (browser wraps it visually, never split in the DOM).
    function renderBufferLine(line) {
      const url = TMS_DATA.demo.wrappedLinkUrl;
      const idx = line.indexOf(url);
      if (idx === -1) return ansiToHtml(line);
      const idMatch = url.match(/dpl_\w+/);
      const shortId = idMatch ? idMatch[0].slice(0, 12) : url.slice(-12);
      const before = ansiToHtml(line.slice(0, idx));
      const after = ansiToHtml(line.slice(idx + url.length));
      const link = `<span class="wrapped-link" data-url="${escapeHtml(url)}" data-short="${escapeHtml(shortId)}" role="link" tabindex="0">${escapeHtml(url)}</span>`;
      return before + link + after;
    }

    function toast(message) {
      const host = document.getElementById('toasts');
      const el = document.createElement('div');
      el.className = 'toast';
      el.textContent = message;
      host.appendChild(el);
      requestAnimationFrame(() => el.classList.add('show'));
      setTimeout(() => {
        el.classList.remove('show');
        setTimeout(() => el.remove(), 200);
      }, 2400);
    }

    function copyText(text) {
      try {
        if (navigator.clipboard && navigator.clipboard.writeText) {
          navigator.clipboard.writeText(text).catch(() => fallbackCopy(text));
          return;
        }
      } catch (e) { /* fall through to fallback */ }
      fallbackCopy(text);
    }
    function fallbackCopy(text) {
      try {
        const ta = document.createElement('textarea');
        ta.value = text; ta.style.position = 'fixed'; ta.style.opacity = '0';
        document.body.appendChild(ta); ta.select();
        document.execCommand('copy');
        document.body.removeChild(ta);
      } catch (e) { /* no-op: mockup best-effort copy */ }
    }

    // ============================================================
    // Servers screen
    // ============================================================
    function renderUpdateBanner() {
      const u = TMS_DATA.update;
      const banner = document.getElementById('updateBanner');
      if (!u || u.current === u.latest) { banner.hidden = true; return; }
      document.getElementById('updateBannerText').textContent = `v${u.latest} verfügbar —`;
      banner.hidden = false;
    }

    function renderServers() {
      const list = document.getElementById('serverList');
      list.innerHTML = '';
      document.getElementById('serverCount').textContent = String(TMS_DATA.servers.length);
      TMS_DATA.servers.forEach(s => {
        const row = document.createElement('button');
        row.className = 'server-row';
        row.dataset.status = s.status;
        const latency = s.latency != null ? `${s.latency}ms` : '—';
        row.innerHTML = `
          <div class="server-row__top">
            <span class="server-row__dot"></span>
            <span class="server-row__name">${escapeHtml(s.name)}</span>
            <span class="server-row__latency">${latency}</span>
          </div>
          <div class="server-row__meta">
            <span class="server-row__addr">${escapeHtml(s.host)}:${s.port}</span>
            <span class="server-row__sessions">${s.sessions} Sessions</span>
          </div>
        `;
        row.addEventListener('click', () => {
          if (s.status === 'online') {
            state.activeServerName = s.name;
            updateTerminalsHeader();
            goToTerminals();
          } else {
            toast('Server offline — zuletzt gesehen vor 2 Std');
          }
        });
        list.appendChild(row);
      });
    }

    function updateTerminalsHeader() {
      document.getElementById('terminalsSubtitle').textContent = state.activeServerName ? `Server: ${state.activeServerName}` : '';
      document.getElementById('terminalCount').textContent = String(TMS_DATA.sessions.length);
    }

    // ============================================================
    // Terminal stack
    // ============================================================
    function statusLabel(status) {
      return status === 'done' ? 'done ✓' : status;
    }

    function updateStatusChip(id, status) {
      const chip = document.querySelector(`.term-card[data-id="${id}"] .status-chip`);
      if (!chip) return;
      chip.dataset.status = status;
      chip.innerHTML = `<span class="status-chip__dot"></span>${statusLabel(status)}`;
    }

    function buildCard(s) {
      const card = document.createElement('article');
      card.className = 'term-card';
      card.dataset.id = s.id;
      card.dataset.collapsed = 'false';
      card.style.setProperty('--tag-color', s.colorTag);
      card.innerHTML = `
        <header class="term-card__head">
          <button class="term-card__chevron" data-act="toggle" aria-label="Ein-/Ausklappen">⌄</button>
          <div class="term-card__title">
            <input class="term-card__name" value="${escapeHtml(s.name)}" data-prev="${escapeHtml(s.name)}" spellcheck="false" aria-label="Terminal-Name">
            <p class="term-card__desc">${escapeHtml(s.description)}</p>
          </div>
          <span class="status-chip" data-status="${s.status}"><span class="status-chip__dot"></span>${statusLabel(s.status)}</span>
          <button class="term-card__notes-btn" data-act="notes" aria-label="Notizen &amp; Todos öffnen">📝</button>
          <div class="term-card__reorder">
            <button data-act="up" aria-label="Nach oben">▲</button>
            <button data-act="down" aria-label="Nach unten">▼</button>
          </div>
        </header>
        <div class="term-card__body">
          <div class="term-pre" data-card-id="${s.id}"></div>
          <div class="prompt-card" hidden></div>
          <button class="replay-btn" hidden>▶ Session erneut abspielen</button>
          <div class="term-input-row">
            <span class="term-input-row__prompt">$</span>
            <input type="text" class="term-input-row__field" data-card-id="${s.id}" placeholder="Befehl eingeben…" autocomplete="off" spellcheck="false" aria-label="Befehl eingeben">
            <button class="term-input-row__send" data-act="send" aria-label="Befehl senden">↵</button>
            <button class="term-input-row__mic" data-act="mic" data-card-id="${s.id}" aria-label="Diktieren">●</button>
          </div>
        </div>
      `;
      card.addEventListener('pointerdown', () => setActiveCard(s.id));
      return card;
    }

    function renderCardLines(id) {
      const pre = document.querySelector(`.term-pre[data-card-id="${id}"]`);
      if (!pre) return;
      const cs = cardState[id];
      const atBottom = pre.scrollHeight - pre.scrollTop - pre.clientHeight < 6;
      const prevScrollTop = pre.scrollTop;
      pre.querySelectorAll('.term-line').forEach(l => l.remove());
      const frag = document.createDocumentFragment();
      cs.lines.forEach((line, i) => {
        const div = document.createElement('div');
        div.className = 'term-line';
        div.dataset.i = String(i);
        const span = document.createElement('span');
        span.className = 'term-line__text';
        span.innerHTML = renderBufferLine(line) || '&nbsp;';
        div.appendChild(span);
        frag.appendChild(div);
      });
      pre.insertBefore(frag, pre.firstChild);
      if (cs.selection) {
        // Lines were rebuilt: reapply highlight classes; drop the selection if it no longer maps to existing lines
        if (cs.selection.end >= cs.lines.length) cs.selection = null;
        renderSelection(id);
      }
      pre.scrollTop = atBottom ? pre.scrollHeight : prevScrollTop;
    }

    function toggleCollapse(id) {
      const card = document.querySelector(`.term-card[data-id="${id}"]`);
      const cs = cardState[id];
      cs.collapsed = !cs.collapsed;
      card.dataset.collapsed = String(cs.collapsed);
    }

    function moveCard(id, dir) {
      const card = document.querySelector(`.term-card[data-id="${id}"]`);
      if (!card) return;
      if (dir < 0) {
        const prev = card.previousElementSibling;
        if (prev) card.parentNode.insertBefore(card, prev);
      } else {
        const next = card.nextElementSibling;
        if (next) card.parentNode.insertBefore(next, card);
      }
    }

    function setActiveCard(id) {
      state.activeCardId = id;
      document.querySelectorAll('.term-card').forEach(c => c.classList.toggle('is-active', c.dataset.id === id));
    }

    function applyResponsiveDefaults() {
      const w = window.innerWidth;
      const cards = [...document.querySelectorAll('.term-card')];
      cards.forEach((card, i) => {
        const id = card.dataset.id;
        const shouldCollapse = w < 400 ? i !== 0 : false;
        cardState[id].collapsed = shouldCollapse;
        card.dataset.collapsed = String(shouldCollapse);
      });
    }

    let stackBuilt = false;
    function buildTerminalStack() {
      if (stackBuilt) return;
      stackBuilt = true;
      const stackEl = document.getElementById('terminalStack');
      TMS_DATA.sessions.forEach(s => {
        const card = buildCard(s);
        stackEl.appendChild(card);
        renderCardLines(s.id);
      });
      stackEl.addEventListener('click', e => {
        const btn = e.target.closest('[data-act]');
        if (!btn) return;
        const card = btn.closest('.term-card');
        if (!card) return;
        const id = card.dataset.id;
        const act = btn.dataset.act;
        if (act === 'toggle') toggleCollapse(id);
        else if (act === 'up') moveCard(id, -1);
        else if (act === 'down') moveCard(id, 1);
        else if (act === 'send') sendTerminalCommand(id);
        else if (act === 'mic') startDictation(id);
        else if (act === 'notes') openSessionNotesSheet(id);
      });
      stackEl.addEventListener('keydown', e => {
        if (e.target.classList.contains('term-card__name') && e.key === 'Enter') e.target.blur();
        if (e.target.classList.contains('term-input-row__field') && e.key === 'Enter') {
          e.preventDefault();
          const card = e.target.closest('.term-card');
          if (card) sendTerminalCommand(card.dataset.id);
        }
      });
      stackEl.addEventListener('focusout', e => {
        if (!e.target.classList || !e.target.classList.contains('term-card__name')) return;
        const input = e.target;
        if (!input.value.trim()) input.value = input.dataset.prev;
        else input.dataset.prev = input.value;
      });
      setActiveCard(state.activeCardId);
      initLiveSession();
    }

    function goToTerminals() {
      const firstBuild = !stackBuilt;
      buildTerminalStack();
      // Responsive collapse defaults only on first build — re-entry keeps the user's chevron choices
      if (firstBuild) applyResponsiveDefaults();
      show('terminals');
    }

    // ============================================================
    // Live Claude session (TMSSim) — session t1
    // ============================================================
    function appendOutChunk(cs, chunk) {
      const pieces = chunk.split('\n');
      if (pieces[pieces.length - 1] === '') pieces.pop();
      cs.lines.push(...pieces);
    }

    let liveSimStarted = false;
    function initLiveSession() {
      if (liveSimStarted) return;
      liveSimStarted = true;
      const session = TMS_DATA.sessions.find(s => s.live);
      if (!session) return;
      const id = session.id;
      const cs = cardState[id];
      const sim = TMSSim.createSession(session.script, { autoApprove: false });
      cs.sim = sim;

      sim.on('out', chunk => { appendOutChunk(cs, chunk); renderCardLines(id); });
      sim.on('status', status => updateStatusChip(id, status));
      sim.on('prompt', data => showPromptCard(id, data));
      sim.on('done', () => showReplay(id));

      sim.start();
    }

    function showPromptCard(id, data) {
      const cs = cardState[id];
      cs.pendingPrompt = data;
      const card = document.querySelector(`.term-card[data-id="${id}"]`);
      if (cs.collapsed) toggleCollapse(id);
      const box = card.querySelector('.prompt-card');
      box.hidden = false;
      box.classList.toggle('is-armed', cs.autoApprove);
      box.innerHTML = `
        <div class="prompt-card__row"><span class="prompt-card__tool">${escapeHtml(data.tool)}</span><span class="prompt-card__target">${escapeHtml(data.target || '')}</span></div>
        <div class="prompt-card__question">${escapeHtml(data.question || 'Erlauben?')}</div>
        <div class="prompt-card__actions">
          <button data-act="yes">Ja</button>
          <button data-act="no">Nein</button>
          <button data-act="auto" aria-pressed="${cs.autoApprove}">Auto-Approve an</button>
        </div>
      `;
      box.querySelector('[data-act="yes"]').addEventListener('click', () => resolvePrompt(id, true));
      box.querySelector('[data-act="no"]').addEventListener('click', () => resolvePrompt(id, false));
      box.querySelector('[data-act="auto"]').addEventListener('click', () => toggleAutoApprove(id));
      if (cs.autoApprove) armAutoApprove(id);
    }

    function armAutoApprove(id) {
      const cs = cardState[id];
      clearTimeout(cs.autoTimer);
      cs.autoTimer = setTimeout(() => {
        if (!cs.pendingPrompt || !cs.sim) return;
        appendOutChunk(cs, '  ⎿ ✔ Auto-Approve\n');
        renderCardLines(id);
        const card = document.querySelector(`.term-card[data-id="${id}"]`);
        const box = card && card.querySelector('.prompt-card');
        if (box) { box.hidden = true; box.innerHTML = ''; }
        cs.pendingPrompt = null;
        cs.sim.respond();
      }, 600);
    }

    function resolvePrompt(id, approved) {
      const cs = cardState[id];
      clearTimeout(cs.autoTimer);
      const card = document.querySelector(`.term-card[data-id="${id}"]`);
      const box = card.querySelector('.prompt-card');
      box.hidden = true;
      box.innerHTML = '';
      cs.pendingPrompt = null;
      if (approved) {
        cs.sim.respond();
      } else {
        appendOutChunk(cs, '  ⎿ ✖ Abgelehnt — Aktion gestoppt\n');
        renderCardLines(id);
        updateStatusChip(id, 'idle');
        showReplay(id); // sim stays paused at the prompt; replay is the recovery path
      }
    }

    function toggleAutoApprove(id) {
      const cs = cardState[id];
      cs.autoApprove = !cs.autoApprove;
      const card = document.querySelector(`.term-card[data-id="${id}"]`);
      const btn = card.querySelector('.prompt-card [data-act="auto"]');
      if (btn) btn.setAttribute('aria-pressed', String(cs.autoApprove));
      const box = card.querySelector('.prompt-card');
      if (box) box.classList.toggle('is-armed', cs.autoApprove);
      if (cs.autoApprove && cs.pendingPrompt) armAutoApprove(id);
      else if (!cs.autoApprove) clearTimeout(cs.autoTimer);
    }

    function showReplay(id) {
      const card = document.querySelector(`.term-card[data-id="${id}"]`);
      const btn = card.querySelector('.replay-btn');
      btn.hidden = false;
      btn.onclick = () => replaySession(id);
    }

    function replaySession(id) {
      const cs = cardState[id];
      const session = TMS_DATA.sessions.find(s => s.id === id);
      clearTimeout(cs.autoTimer);
      cs.lines = session.buffer.slice();
      cs.pendingPrompt = null;
      clearSelection(id);
      const card = document.querySelector(`.term-card[data-id="${id}"]`);
      card.querySelector('.replay-btn').hidden = true;
      const box = card.querySelector('.prompt-card');
      box.hidden = true; box.innerHTML = '';
      renderCardLines(id);
      updateStatusChip(id, session.status);
      cs.sim.reset();
      cs.sim.start();
    }

    // ============================================================
    // Touch text-selection: handles + copy bubble
    // ============================================================
    function handleLineTap(pre, line) {
      const cardId = pre.dataset.cardId;
      const cs = cardState[cardId];
      const i = Number(line.dataset.i);
      if (cs.selection && cs.selection.start === i && cs.selection.end === i) {
        clearSelection(cardId);
        return;
      }
      cs.selection = { start: i, end: i };
      renderSelection(cardId);
    }

    function renderSelection(cardId) {
      const pre = document.querySelector(`.term-pre[data-card-id="${cardId}"]`);
      const cs = cardState[cardId];
      pre.querySelectorAll('.term-line').forEach(l => {
        const i = Number(l.dataset.i);
        l.classList.toggle('is-selected', !!cs.selection && i >= cs.selection.start && i <= cs.selection.end);
      });
      positionHandlesAndBubble(cardId);
    }

    function makeHandle(kind, cardId) {
      const el = document.createElement('div');
      el.className = `sel-handle sel-handle--${kind}`;
      el.addEventListener('pointerdown', e => startDrag(e, cardId, kind));
      return el;
    }

    function startDrag(e, cardId, kind) {
      e.preventDefault(); e.stopPropagation();
      const pre = document.querySelector(`.term-pre[data-card-id="${cardId}"]`);
      const handle = e.currentTarget;
      handle.setPointerCapture(e.pointerId);
      function onMove(ev) {
        const rect = pre.getBoundingClientRect();
        const y = ev.clientY - rect.top + pre.scrollTop;
        const lines = [...pre.querySelectorAll('.term-line')];
        if (!lines.length) return;
        let idx = lines.findIndex(l => y >= l.offsetTop && y <= l.offsetTop + l.offsetHeight);
        if (idx === -1) idx = y < lines[0].offsetTop ? 0 : lines.length - 1;
        const cs = cardState[cardId];
        if (!cs.selection) return;
        if (kind === 'start') cs.selection.start = Math.min(idx, cs.selection.end);
        else cs.selection.end = Math.max(idx, cs.selection.start);
        renderSelection(cardId);
      }
      function onUp() {
        try { handle.releasePointerCapture(e.pointerId); } catch (err) { /* already released */ }
        handle.removeEventListener('pointermove', onMove);
        handle.removeEventListener('pointerup', onUp);
      }
      handle.addEventListener('pointermove', onMove);
      handle.addEventListener('pointerup', onUp);
    }

    function makeBubble(cardId) {
      const el = document.createElement('button');
      el.className = 'copy-bubble';
      el.textContent = 'Kopieren';
      el.addEventListener('click', e => {
        e.stopPropagation();
        const cs = cardState[cardId];
        if (!cs.selection) return;
        const pre = document.querySelector(`.term-pre[data-card-id="${cardId}"]`);
        const lines = [...pre.querySelectorAll('.term-line')].slice(cs.selection.start, cs.selection.end + 1);
        const text = lines.map(l => l.querySelector('.term-line__text').textContent).join('\n');
        copyText(text);
        toast('Kopiert ✓');
        clearSelection(cardId);
      });
      return el;
    }

    function positionHandlesAndBubble(cardId) {
      const pre = document.querySelector(`.term-pre[data-card-id="${cardId}"]`);
      const cs = cardState[cardId];
      let handleStart = pre.querySelector('.sel-handle--start');
      let handleEnd = pre.querySelector('.sel-handle--end');
      let bubble = pre.querySelector('.copy-bubble');
      if (!cs.selection) {
        [handleStart, handleEnd, bubble].forEach(el => el && el.remove());
        return;
      }
      if (!handleStart) { handleStart = makeHandle('start', cardId); pre.appendChild(handleStart); }
      if (!handleEnd) { handleEnd = makeHandle('end', cardId); pre.appendChild(handleEnd); }
      if (!bubble) { bubble = makeBubble(cardId); pre.appendChild(bubble); }

      const startLine = pre.querySelector(`.term-line[data-i="${cs.selection.start}"]`);
      const endLine = pre.querySelector(`.term-line[data-i="${cs.selection.end}"]`);
      if (!startLine || !endLine) return;
      const startText = startLine.querySelector('.term-line__text');
      const endText = endLine.querySelector('.term-line__text');

      handleStart.style.top = (startLine.offsetTop + startLine.offsetHeight) + 'px';
      handleStart.style.left = startText.offsetLeft + 'px';
      handleEnd.style.top = (endLine.offsetTop + endLine.offsetHeight) + 'px';
      handleEnd.style.left = (endText.offsetLeft + endText.offsetWidth) + 'px';

      bubble.style.top = Math.max(0, startLine.offsetTop - 34) + 'px';
      bubble.style.left = Math.min(startText.offsetLeft, endText.offsetLeft) + 'px';
    }

    function clearSelection(cardId) {
      const cs = cardState[cardId];
      cs.selection = null;
      const pre = document.querySelector(`.term-pre[data-card-id="${cardId}"]`);
      if (!pre) return;
      pre.querySelectorAll('.term-line.is-selected').forEach(l => l.classList.remove('is-selected'));
      positionHandlesAndBubble(cardId);
    }

    // Delegated: wrapped-link copy (outside selection mode) + line-tap selection (inside selection mode)
    document.addEventListener('click', e => {
      const link = e.target.closest('.wrapped-link');
      if (link) {
        const inSelectionMode = link.closest('.term-pre.selection-mode');
        if (!inSelectionMode) {
          copyText(link.dataset.url);
          toast(`Vollständiger Link kopiert ✓ (…${link.dataset.short}…)`);
          return;
        }
      }
      const pre = e.target.closest('.term-pre.selection-mode');
      if (pre) {
        const line = e.target.closest('.term-line');
        if (line) handleLineTap(pre, line);

    function flashKeyEcho(label) {

      const chip = document.createElement('span');
      chip.className = 'key-echo';
      chip.textContent = label;
      host.appendChild(chip);

      setTimeout(() => {

    function toggleSelectionMode() {
      const id = state.activeCardId;
      const cs = cardState[id];
      cs.selectionMode = !cs.selectionMode;
      document.getElementById('selToggleBtn').classList.toggle('is-on', cs.selectionMode);
      document.getElementById('selToggleBtn').setAttribute('aria-pressed', String(cs.selectionMode));
      if (cs.selectionMode && cs.collapsed) toggleCollapse(id);
      const pre = document.querySelector(`.term-pre[data-card-id="${id}"]`);
      if (pre) pre.classList.toggle('selection-mode', cs.selectionMode);
      if (!cs.selectionMode) clearSelection(id);

    function wireToolbar() {
      document.querySelectorAll('.term-toolbar [data-key]').forEach(btn => {
        if (btn.id === 'selToggleBtn') return;
        btn.addEventListener('click', () => flashKeyEcho(btn.dataset.key));
      });
      document.getElementById('selToggleBtn').addEventListener('click', toggleSelectionMode);

    // ============================================================
    // Terminal input row: send command + dictation (per card)
    // ============================================================
    function sendTerminalCommand(id) {
      const input = document.querySelector(`.term-input-row__field[data-card-id="${id}"]`);
      if (!input || input.disabled) return;
      const cmd = input.value.trim();
      if (!cmd) return;
      const cs = cardState[id];
      cs.lines.push(`\x1b[2m$\x1b[0m ${cmd}`);
      cs.lines.push('\x1b[2m(Demo) Befehl an PTY gesendet\x1b[0m');
      renderCardLines(id);
      input.value = '';
    }

    // ONE dictation at a time GLOBALLY across all cards (all cards are visible at once in
    // the stack, so a per-card flag would let two mics record concurrently): recording
    // (~1.8s) → transcribing (~0.7s) → inserted. Timer ids tracked in `dictationTimers` so
    // stopAllDictationTimers() can clear whichever one is in flight.
    let dictationTimers = [];
    function startDictation(id) {
      if (state.dictation.active) return; // ignore taps while another card is dictating
      const micBtn = document.querySelector(`.term-input-row__mic[data-card-id="${id}"]`);
      const input = document.querySelector(`.term-input-row__field[data-card-id="${id}"]`);
      if (!micBtn || !input) return;
      state.dictation = { active: true, cardId: id, phase: 'recording' };
      micBtn.classList.add('is-recording');
      input.disabled = true;
      input.placeholder = 'Aufnahme läuft…';
      const t1 = setTimeout(() => {
        state.dictation.phase = 'transcribing';
        micBtn.classList.remove('is-recording');
        micBtn.classList.add('is-transcribing');
        input.placeholder = 'Transkribiere…';
        const t2 = setTimeout(() => {
          state.dictation = { active: false, cardId: null, phase: null };
          dictationTimers = [];
          micBtn.classList.remove('is-transcribing');
          input.disabled = false;
          input.placeholder = 'Befehl eingeben…';
          input.value = TMS_DATA.demo.dictation;
          input.focus();
          const len = input.value.length;
          input.setSelectionRange(len, len);
          toast('Diktat eingefügt');
        }, 700);
        dictationTimers = [t2];
      }, 1800);
      dictationTimers = [t1];
    }

    // Clears the in-flight dictation timer (if any) + resets the affected mic/input DOM.
    // Called on screen exit so recording/transcribing state never leaks across navigation.
    function stopAllDictationTimers() {
      if (!state.dictation.active) return;
      dictationTimers.forEach(t => clearTimeout(t));
      dictationTimers = [];
      const { cardId } = state.dictation;
      const micBtn = document.querySelector(`.term-input-row__mic[data-card-id="${cardId}"]`);
      const input = document.querySelector(`.term-input-row__field[data-card-id="${cardId}"]`);
      if (micBtn) micBtn.classList.remove('is-recording', 'is-transcribing');
      if (input) { input.disabled = false; input.placeholder = 'Befehl eingeben…'; }
      state.dictation = { active: false, cardId: null, phase: null };
    }

    // ============================================================
    // Ping / connection chip (Terminals header) — single interval, never re-created.
    // ============================================================
    function renderPing() {
      const el = document.getElementById('pingValue');
      if (el) el.textContent = `${state.pingValue} ms`;
    }

    function tickPing() {
      if (document.body.classList.contains('is-locked')) return; // stop while locked
      if (document.hidden) return; // pause DOM writes when the tab itself is hidden
      const screen = document.querySelector('[data-screen="terminals"]');
      if (!screen || screen.hidden) return; // pause DOM writes while off-screen
      const jitter = (1 + Math.floor(Math.random() * 4)) * (Math.random() < 0.5 ? -1 : 1);
      state.pingValue = Math.max(1, state.pingBaseline + jitter);
      renderPing();
    }

    function initPing() {
      if (state.pingTimer) return; // guard: never multiply the interval on re-entry
      state.pingBaseline = (TMS_DATA.servers[0] && TMS_DATA.servers[0].latency) || 12;
      state.pingValue = state.pingBaseline;
      renderPing();
      state.pingTimer = setInterval(tickPing, 4000);
    }

    // ============================================================
    // Manager screen (Chat / Artifacts / Memory)
    // ============================================================
    function ensureMessageIds() {
      TMS_DATA.manager.messages.forEach((m, i) => { if (!m._id) m._id = 'msg' + i; });
    }

    function scheduleTranscription(m) {
      if (!m.transcribing || m._transcribeScheduled) return;
      m._transcribeScheduled = true;
      setTimeout(() => {
        m.transcribing = false;
        m.transcript = '(Demo) Transkription abgeschlossen';
        const screen = document.querySelector('[data-screen="manager"]');
        if (screen && !screen.hidden) renderManagerChat();
      }, 2500);
    }

    function renderChatMessageHtml(m) {
      if (m.type === 'voice') {
        const bars = Array.from({ length: 18 }, (_, i) => `<span style="height:${6 + ((i * 37) % 14)}px"></span>`).join('');
        let inner = '';
        if (m.transcribing) {
          inner = `<div class="voice-transcribing">Transkribiere… <span class="dots"><span>●</span><span>●</span><span>●</span></span></div>`;
        } else if (m.transcript) {
          inner = `<div class="voice-transcript">${escapeHtml(m.transcript)}</div>`;
        }
        return `
          <div class="chat-bubble-row" data-from="${m.from}">
            <div class="chat-bubble">
              <div class="voice-pill" data-act="play">
                <span class="voice-pill__play">▶</span>
                <span class="voice-pill__wave">${bars}</span>
                <span class="voice-pill__dur">0:${String(m.duration).padStart(2, '0')}</span>
              </div>
              ${inner}
              <span class="chat-bubble__time">${escapeHtml(m.time)}</span>
            </div>
          </div>`;
      }
      return `
        <div class="chat-bubble-row" data-from="${m.from}">
          <div class="chat-bubble">${escapeHtml(m.text)}<span class="chat-bubble__time">${escapeHtml(m.time)}</span></div>
        </div>`;
    }

    function renderManagerChat() {
      const host = document.getElementById('managerChat');
      host.innerHTML = TMS_DATA.manager.messages.map(renderChatMessageHtml).join('');
      host.scrollTop = host.scrollHeight;
      wireManagerChatInteractions();
      // Arm transcription timers only while the Manager screen is visible, so the
      // seed message's "Transkribiere… → transcript" demo moment plays on first
      // entry to the screen (via SCREEN_HOOKS.manager) instead of expiring at page init.
      const screen = document.querySelector('[data-screen="manager"]');
      if (screen && !screen.hidden) TMS_DATA.manager.messages.forEach(scheduleTranscription);
    }

    function wireManagerChatInteractions() {
      document.querySelectorAll('#managerChat .voice-pill').forEach(pill => {
        pill.addEventListener('click', () => {
          const playing = pill.classList.toggle('is-playing');
          const playBtn = pill.querySelector('.voice-pill__play');
          if (playing) {
            playBtn.textContent = '❚❚';
            const durText = pill.querySelector('.voice-pill__dur').textContent;
            const secs = parseInt(durText.split(':')[1], 10) || 5;
            setTimeout(() => { pill.classList.remove('is-playing'); playBtn.textContent = '▶'; }, Math.min(secs, 6) * 1000);
          } else {
            playBtn.textContent = '▶';
          }
        });
      });
    }

      const host = document.getElementById('managerArtifacts');
      host.innerHTML = TMS_DATA.manager.artifacts.map(a => `
        <div class="artifact-card">
          <div class="artifact-card__title">${escapeHtml(a.title)}</div>
          <div class="artifact-card__meta">${escapeHtml(a.kind)} · ${escapeHtml(a.time)}</div>
        </div>`).join('');
    }

    function renderManagerMemory() {
      const host = document.getElementById('managerMemory');
      host.innerHTML = TMS_DATA.manager.memory.map(m => `
        <div class="memory-row"><span>${escapeHtml(m.text)}</span><span class="memory-row__time">${escapeHtml(m.time)}</span></div>`).join('');

    function wireManagerInput() {

      micBtn.addEventListener('click', () => {
        if (micBtn.classList.contains('is-recording')) return;
        micBtn.classList.add('is-recording');
        setTimeout(() => {
          micBtn.classList.remove('is-recording');
          const now = new Date();
          const time = `${String(now.getHours()).padStart(2, '0')}:${String(now.getMinutes()).padStart(2, '0')}`;
          const msg = { type: 'voice', from: 'user', time, duration: 8, transcript: null, transcribing: true, _id: 'msg' + TMS_DATA.manager.messages.length };
          TMS_DATA.manager.messages.push(msg);
          renderManagerChat();
        }, 2000);
      });
      document.getElementById('managerTextInput').addEventListener('keydown', e => {
        if (e.key !== 'Enter') return;
        const input = e.target;
        const text = input.value.trim();
        if (!text) return;
        const now = new Date();
        const time = `${String(now.getHours()).padStart(2, '0')}:${String(now.getMinutes()).padStart(2, '0')}`;
        TMS_DATA.manager.messages.push({ type: 'text', from: 'user', time, text, _id: 'msg' + TMS_DATA.manager.messages.length });
        input.value = '';
        renderManagerChat();
      });

    const FAV_KEY = 'tms-command-deck-cloud-favorites';
    function loadFavorites() {
      try {
        const raw = localStorage.getItem(FAV_KEY);
        if (!raw) return;
        const map = JSON.parse(raw);
        TMS_DATA.cloudProjects.forEach(p => { if (Object.prototype.hasOwnProperty.call(map, p.id)) p.favorite = !!map[p.id]; });
      } catch (e) { /* corrupt/unavailable storage: keep seed favorites */ }
    }
    function saveFavorites() {
      const map = {};
      TMS_DATA.cloudProjects.forEach(p => { map[p.id] = p.favorite; });
      try { localStorage.setItem(FAV_KEY, JSON.stringify(map)); } catch (e) { /* storage unavailable */ }
    }

    function cloudFilteredProjects() {
      return TMS_DATA.cloudProjects.filter(p => state.cloudProviderFilter === 'all' || p.provider === state.cloudProviderFilter);

    function cloudRowHtml(p) {
      return `
        <button class="cloud-row" data-project="${p.id}">
          <span class="provider-glyph">${CLOUD_GLYPH[p.provider] || '?'}</span>
          <span class="cloud-row__main">

              <span class="status-chip" data-status="${p.status}"><span class="status-chip__dot"></span>${escapeHtml(p.status)}</span>
              <span class="cloud-row__deploy">${escapeHtml(p.lastDeploy)}</span>

          <span class="fav-btn${p.favorite ? ' is-fav' : ''}" data-fav="${p.id}">★</span>

    function renderCloudGroups() {
      const host = document.getElementById('cloudGroups');
      const list = cloudFilteredProjects();
      document.getElementById('cloudCount').textContent = String(list.length);
      if (state.cloudView === 'list') {
        const sorted = [...list].sort((a, b) => (b.favorite - a.favorite));
        host.innerHTML = `<div class="folder-group__rows">${sorted.map(cloudRowHtml).join('')}</div>`;
        return;
      }
      const folders = {};
      list.forEach(p => { (folders[p.folder] = folders[p.folder] || []).push(p); });
      const folderNames = Object.keys(folders).sort();
      host.innerHTML = folderNames.map(name => {
        const rows = [...folders[name]].sort((a, b) => (b.favorite - a.favorite));
        return `
          <div class="folder-group" data-folder="${escapeHtml(name)}">

              <span class="folder-group__count">${rows.length}</span>

        state.cloudProviderFilter = btn.dataset.provider;

    function renderEnvTab(host, project) {
      host.innerHTML = project.env.map((e, i) => `
        <div class="env-row" data-idx="${i}">
          <div class="env-row__top">
            <span class="env-row__key">${escapeHtml(e.key)}</span>
          </div>

name: Build & Release APK

# Builds the signed release APK on a GitHub runner (local Metro bundling hangs
# headless on the dev Mac) and publishes a GitHub Release so the in-app
# auto-updater shows the update banner. Triggered by pushing a vX.Y.Z tag
# (tag-triggered runs use the workflow file at the tagged commit, so it works
# from any branch without needing the workflow on the default branch).
on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Node 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: mobile/package-lock.json

      - name: Install JS dependencies
        working-directory: mobile
        run: npm ci

      # The release keystore + Firebase config are gitignored, so CI gets them
      # from base64 repo secrets. Same keystore as local => stable signing key,
      # so the app updates over the existing install without a reinstall.
      - name: Restore release keystore
        run: echo "${{ secrets.ANDROID_RELEASE_KEYSTORE_B64 }}" | base64 -d > mobile/android/app/tms-release.keystore

      - name: Restore google-services.json
        run: echo "${{ secrets.GOOGLE_SERVICES_JSON_B64 }}" | base64 -d > mobile/android/app/google-services.json

      - name: Build release APK
        working-directory: mobile/android
        run: |
          chmod +x ./gradlew
          ./gradlew assembleRelease --no-daemon --stacktrace

      - name: Read app version
        id: ver
        run: echo "version=$(node -e "console.log(require('./mobile/app.json').expo.version)")" >> "$GITHUB_OUTPUT"

      - name: Rename APK
        run: cp mobile/android/app/build/outputs/apk/release/app-release.apk "TMS-Terminal-v${{ steps.ver.outputs.version }}.apk"

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          TAG="v${{ steps.ver.outputs.version }}"
          # The tag already exists (this run was triggered by pushing it), so we
          # only need to create the release object for it. Delete just a stale
          # release (not the tag) so re-runs succeed without re-triggering.
          gh release delete "$TAG" --yes 2>/dev/null || true
          gh release create "$TAG" \
            "TMS-Terminal-v${{ steps.ver.outputs.version }}.apk" \
            --title "TMS Terminal $TAG" \
            --notes "Manager-Modelle + LM-Studio-Steuerung. Das Modell-Sheet zeigte 'Keine Modelle gemeldet' — Season 2 hat die Liste nie angefordert (der Server schickte sie nur beim Ein-/Ausschalten des Managers, was Season 2 nicht macht). Jetzt holt die App die Modelle beim Verbinden. Alle Modelle wie in der alten Ansicht: GLM, Kimi und die lokalen Gemma 4 31B, Qwen 3.6 27B, Qwen 3.6 35B. Nebenbei behoben: die im Server hinterlegten Modell-IDs der Qwen-Modelle waren veraltet (qwen3-27b statt qwen3.6-27b) — die Auswahl wäre selbst mit sichtbarer Liste fehlgeschlagen. NEU: Wählt man ein lokales Modell, erscheint ein Context-Window-Regler mit Zahlenfeld (4.096 bis zum echten Maximum des Modells, bei den Qwen/Gemma 256k). Ein Tippen auf Laden lädt das Modell mit genau dieser Context-Länge automatisch in LM Studio — vorher werden andere lokale Modelle entladen, damit der Speicher reicht. Der Chip zeigt waehrenddessen lädt…. Braucht LM Studio auf dem Server samt lms-CLI (lms bootstrap). Rein additiv: ist LM Studio aus, bleibt alles wie bisher. Server-Update noetig (tms-terminal update), damit die Modell-Liste und das Laden greifen." \
            --latest

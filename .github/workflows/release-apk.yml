name: Build & Release APK

# Builds the signed release APK on a GitHub runner (local Metro bundling hangs
# headless on the dev Mac) and publishes a GitHub Release so the in-app
# auto-updater shows the update banner. Triggered by pushing a vX.Y.Z tag
# (tag-triggered runs use the workflow file at the tagged commit, so it works
# from any branch without needing the workflow on the default branch).
on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Node 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: mobile/package-lock.json

      - name: Install JS dependencies
        working-directory: mobile
        run: npm ci

      # The release keystore + Firebase config are gitignored, so CI gets them
      # from base64 repo secrets. Same keystore as local => stable signing key,
      # so the app updates over the existing install without a reinstall.
      - name: Restore release keystore
        run: echo "${{ secrets.ANDROID_RELEASE_KEYSTORE_B64 }}" | base64 -d > mobile/android/app/tms-release.keystore

      - name: Restore google-services.json
        run: echo "${{ secrets.GOOGLE_SERVICES_JSON_B64 }}" | base64 -d > mobile/android/app/google-services.json

      - name: Build release APK
        working-directory: mobile/android
        run: |
          chmod +x ./gradlew
          ./gradlew assembleRelease --no-daemon --stacktrace

      - name: Read app version
        id: ver
        run: echo "version=$(node -e "console.log(require('./mobile/app.json').expo.version)")" >> "$GITHUB_OUTPUT"

      - name: Rename APK
        run: cp mobile/android/app/build/outputs/apk/release/app-release.apk "TMS-Terminal-v${{ steps.ver.outputs.version }}.apk"

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          TAG="v${{ steps.ver.outputs.version }}"
          # The tag already exists (this run was triggered by pushing it), so we
          # only need to create the release object for it. Delete just a stale
          # release (not the tag) so re-runs succeed without re-triggering.
          gh release delete "$TAG" --yes 2>/dev/null || true
          gh release create "$TAG" \
            "TMS-Terminal-v${{ steps.ver.outputs.version }}.apk" \
            --title "TMS Terminal $TAG" \
            --notes "Browser-Fix. Der Browser wurde weiss/leer, sobald man 'Hard Reload' oder 'Cache komplett leeren' benutzt hat. Grund: beide Menuepunkte waren in Season 2 nie zu Ende implementiert. 'Hard Reload' schickte einen Befehl, den die App gar nicht entgegennahm — es passierte NICHTS, gemeldet wurde trotzdem Erfolg. 'Cache komplett leeren' setzte nur Attrappen-Flags aus dem Design-Entwurf zurueck und erreichte den echten Browser nie: Cache und Anmeldungen blieben, wo sie waren. Beides tut jetzt wirklich, was draufsteht — die Seite laedt neu bzw. Cache und Sitzung fliegen raus und die Seite wird frisch aufgebaut. Dazu zwei Haertungen gegen das weisse Bild: (1) Die Seitenadresse wurde dem Browser bei JEDER Kleinigkeit neu gereicht, auch wenn die App nur eine Hintergrund-Klasse umlegte (Ruhemodus nach 15s, Tastenleiste, Theme). Android springt in dem Fall auf die urspruengliche Adresse zurueck, sobald man sich auf der Seite weitergeklickt hat — die Seite konnte also staendig neu laden. Gemeldet wird jetzt nur noch, was sich wirklich geaendert hat (40 Klassenwechsel ergeben 0 Meldungen statt 40). (2) Stirbt der Seiten-Prozess (Android raeumt bei Speichermangel auf), blieb eine tote Browser-Instanz zurueck; jetzt baut sie sich selbst wieder auf. Reine App-Aenderung — kein Server-Update noetig." \
            --latest

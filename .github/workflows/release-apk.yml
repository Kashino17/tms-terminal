name: Build & Release APK

# Builds the signed release APK on a GitHub runner (local Metro bundling hangs
# headless on the dev Mac) and publishes a GitHub Release so the in-app
# auto-updater shows the update banner. Triggered by pushing a vX.Y.Z tag
# (tag-triggered runs use the workflow file at the tagged commit, so it works
# from any branch without needing the workflow on the default branch).
on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Node 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: mobile/package-lock.json

      - name: Install JS dependencies
        working-directory: mobile
        run: npm ci

      # The release keystore + Firebase config are gitignored, so CI gets them
      # from base64 repo secrets. Same keystore as local => stable signing key,
      # so the app updates over the existing install without a reinstall.
      - name: Restore release keystore
        run: echo "${{ secrets.ANDROID_RELEASE_KEYSTORE_B64 }}" | base64 -d > mobile/android/app/tms-release.keystore

      - name: Restore google-services.json
        run: echo "${{ secrets.GOOGLE_SERVICES_JSON_B64 }}" | base64 -d > mobile/android/app/google-services.json

      - name: Build release APK
        working-directory: mobile/android
        run: |
          chmod +x ./gradlew
          ./gradlew assembleRelease --no-daemon --stacktrace

      - name: Read app version
        id: ver
        run: echo "version=$(node -e "console.log(require('./mobile/app.json').expo.version)")" >> "$GITHUB_OUTPUT"

      - name: Rename APK
        run: cp mobile/android/app/build/outputs/apk/release/app-release.apk "TMS-Terminal-v${{ steps.ver.outputs.version }}.apk"

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          TAG="v${{ steps.ver.outputs.version }}"
          # The tag already exists (this run was triggered by pushing it), so we
          # only need to create the release object for it. Delete just a stale
          # release (not the tag) so re-runs succeed without re-triggering.
          gh release delete "$TAG" --yes 2>/dev/null || true
          gh release create "$TAG" \
            "TMS-Terminal-v${{ steps.ver.outputs.version }}.apk" \
            --title "TMS Terminal $TAG" \
            --notes "Wärme-Update, zweite Runde. Nach v1.84.0 wurde das Gerät nur noch lauwarm — hier sind die restlichen Ursachen. GPU: Der Terminal-Boden hatte selbst einen backdrop-filter — eine Blur-Fläche unter genau dem Element, das sich bei jeder Ausgabe neu befüllt und ans Ende scrollt. Sichtbar trug sie nichts bei (die Fläche ist zu 82% deckend und liegt vor einer bereits geblurrten Karte, A/B geprüft: identisch), kostete aber permanent Compositor-Arbeit. Hintergrund: Lag das Handy in der Tasche, während Claude weiterlief, malte die App munter weiter — Rendern, Scrollen und Compositing für niemanden. Jetzt ruht das Zeichnen, sobald die App in den Hintergrund geht, und holt beim Aufwachen alles nach (der Verlauf bleibt vollständig). Platte: Die Terminal-Historie wurde bei Dauerausgabe ALLE 2 Sekunden komplett neu als JSON geschrieben (bis zu ~480 KB) — über einen langen Claude-Lauf hunderte Megabyte Schreiblast. Jetzt wird gespeichert, wenn der Strom zur Ruhe kommt, und während er läuft höchstens alle 30 Sekunden. Speicher: Jedes Ausgabe-Häppchen kopierte bis zu 400 KB Text (megabyteweise pro Sekunde, die der Garbage Collector gleich wieder einsammeln musste) — jetzt wird gesammelt statt kopiert. Rendern: Das Zeilenfenster wanderte bei jeder neuen Zeile mit und musste dabei alle 800 Zeilen-Adressen neu schreiben; jetzt klebt es und wird nur alle 200 Zeilen einmal beschnitten (0,31ms statt 1,7ms pro Tick). Bonus-Fix: Die Latenzanzeige zeigte gar nicht deinen echten Ping — ein Demo-Ticker aus dem Entwurf überschrieb ihn alle 4 Sekunden mit einer Zufallszahl. Hinweis: Diese Runde ist rein app-seitig — ein Server-Update ist NICHT nötig (wer v1.84.0 übersprungen hat, sollte 'tms-terminal update' aber noch nachholen)." \
            --latest

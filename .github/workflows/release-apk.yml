name: Build & Release APK

# Builds the signed release APK on a GitHub runner (local Metro bundling hangs
# headless on the dev Mac) and publishes a GitHub Release so the in-app
# auto-updater shows the update banner. Triggered by pushing a vX.Y.Z tag
# (tag-triggered runs use the workflow file at the tagged commit, so it works
# from any branch without needing the workflow on the default branch).
on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Node 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: mobile/package-lock.json

      - name: Install JS dependencies
        working-directory: mobile
        run: npm ci

      # The release keystore + Firebase config are gitignored, so CI gets them
      # from base64 repo secrets. Same keystore as local => stable signing key,
      # so the app updates over the existing install without a reinstall.
      - name: Restore release keystore
        run: echo "${{ secrets.ANDROID_RELEASE_KEYSTORE_B64 }}" | base64 -d > mobile/android/app/tms-release.keystore

      - name: Restore google-services.json
        run: echo "${{ secrets.GOOGLE_SERVICES_JSON_B64 }}" | base64 -d > mobile/android/app/google-services.json

      - name: Build release APK
        working-directory: mobile/android
        run: |
          chmod +x ./gradlew
          ./gradlew assembleRelease --no-daemon --stacktrace

      - name: Read app version
        id: ver
        run: echo "version=$(node -e "console.log(require('./mobile/app.json').expo.version)")" >> "$GITHUB_OUTPUT"

      - name: Rename APK
        run: cp mobile/android/app/build/outputs/apk/release/app-release.apk "TMS-Terminal-v${{ steps.ver.outputs.version }}.apk"

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          TAG="v${{ steps.ver.outputs.version }}"
          # The tag already exists (this run was triggered by pushing it), so we
          # only need to create the release object for it. Delete just a stale
          # release (not the tag) so re-runs succeed without re-triggering.
          gh release delete "$TAG" --yes 2>/dev/null || true
          gh release create "$TAG" \
            "TMS-Terminal-v${{ steps.ver.outputs.version }}.apk" \
            --title "TMS Terminal $TAG" \
            --notes "Wärme-Update: Season 2 heizt bei Terminalnutzung nicht mehr das Gerät auf. Sechs Ursachen behoben. Server (nur nach 'tms-terminal update' aktiv): Der Sofort-Versand für Tasten-Echos galt auch für Spinner-Frames — jeder Claude-Spinner feuerte ~30 Nachrichten pro Sekunde aufs Handy. Jetzt gilt er nur noch direkt nach echter Eingabe, sonst wird gebündelt (12 Häppchen -> 4 Nachrichten, Tipp-Latenz unverändert). App: Der Terminal-Status ging bei JEDEM Ausgabe-Häppchen über die Bridge und baute jedes Mal die komplette Seitenleiste samt Glas-Flächen neu — jetzt nur noch bei echtem Statuswechsel, und auf dem Frontdisplay gar nicht. Das Terminal baute alle 60ms seine kompletten 800 Zeilen neu (~70.000 Zellen-Lesevorgänge pro Tick) — jetzt werden nur geänderte Zeilen ersetzt (0,34ms statt Vollaufbau). Die 'unsichtbaren' Terminal-Emulatoren standen tatsächlich sichtbar hinter den Glasflächen und wurden bei jeder Ausgabe mitgezeichnet — jetzt wirklich offscreen. Jede Stack-Karte hielt dauerhaft einen bildschirmgroßen GPU-Layer (~10MB) — jetzt nur noch während des Wischens. Hinweis: Für die Server-Fixes 'tms-terminal update' ausführen; die App-Fixes sind sofort mit diesem Update aktiv." \
            --latest

name: Build & Release APK

# Builds the signed release APK on a GitHub runner (local Metro bundling hangs
# headless on the dev Mac) and publishes a GitHub Release so the in-app
# auto-updater shows the update banner. Triggered by pushing a vX.Y.Z tag
# (tag-triggered runs use the workflow file at the tagged commit, so it works
# from any branch without needing the workflow on the default branch).
on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Node 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: mobile/package-lock.json

      - name: Install JS dependencies
        working-directory: mobile
        run: npm ci

      # The release keystore + Firebase config are gitignored, so CI gets them
      # from base64 repo secrets. Same keystore as local => stable signing key,
      # so the app updates over the existing install without a reinstall.
      - name: Restore release keystore
        run: echo "${{ secrets.ANDROID_RELEASE_KEYSTORE_B64 }}" | base64 -d > mobile/android/app/tms-release.keystore

      - name: Restore google-services.json
        run: echo "${{ secrets.GOOGLE_SERVICES_JSON_B64 }}" | base64 -d > mobile/android/app/google-services.json

      - name: Build release APK
        working-directory: mobile/android
        run: |
          chmod +x ./gradlew
          ./gradlew assembleRelease --no-daemon --stacktrace

      - name: Read app version
        id: ver
        run: echo "version=$(node -e "console.log(require('./mobile/app.json').expo.version)")" >> "$GITHUB_OUTPUT"

      - name: Rename APK
        run: cp mobile/android/app/build/outputs/apk/release/app-release.apk "TMS-Terminal-v${{ steps.ver.outputs.version }}.apk"

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          TAG="v${{ steps.ver.outputs.version }}"
          # The tag already exists (this run was triggered by pushing it), so we
          # only need to create the release object for it. Delete just a stale
          # release (not the tag) so re-runs succeed without re-triggering.
          gh release delete "$TAG" --yes 2>/dev/null || true
          gh release create "$TAG" \
            "TMS-Terminal-v${{ steps.ver.outputs.version }}.apk" \
            --title "TMS Terminal $TAG" \
            --notes "DER Browser-Fix — jetzt die echte Ursache. Bisher wurde die App komplett leer (kein Browser, keine Adresszeile, gar nichts), sobald man im Browser-Menue 'Hard Reload', 'Cache komplett leeren' oder 'Passwoerter' angetippt hat. Grund: Die drei Knoepfe teilen sich die CSS-Klasse .mehr-item mit den Knoepfen des Mehr-Menues, das zwischen den Bildschirmen umschaltet. Der Umschalt-Handler war mit document.querySelectorAll gebunden und hat deshalb AUCH die Browser-Menue-Knoepfe erwischt. Die haben aber kein Bildschirm-Ziel — also lief bei jedem Klick ein show(undefined) mit, und das blendet jeden Bildschirm aus und keinen ein. Die App stand leer da. Behoben: Der Handler haengt jetzt nur noch an den Knoepfen im Mehr-Menue. Zusaetzlich als Sicherung: ein Navigationsaufruf ohne gueltiges Ziel wird ignoriert, statt die Oberflaeche auszuloeschen — dieser Fehler kann sich so nicht wiederholen. Reine App-Aenderung, kein Server-Update noetig." \
            --latest
